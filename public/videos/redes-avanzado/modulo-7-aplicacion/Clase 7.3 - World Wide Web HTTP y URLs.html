<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>Clase 7.3 – World Wide Web: HTTP y URLs</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a14;color:#e8f0fe;font-family:'Segoe UI',sans-serif;width:1280px;height:720px;overflow:hidden}
.layout{display:flex;height:720px}
.sidebar{width:220px;background:#0f1628;border-right:1px solid #1e3a5f;display:flex;flex-direction:column;padding:16px 0}
.sidebar h2{color:#3b82f6;font-size:13px;font-weight:700;padding:0 16px 12px;border-bottom:1px solid #1e3a5f;text-transform:uppercase;letter-spacing:.5px}
.nav-btn{background:none;border:none;color:#7c8db8;padding:10px 16px;text-align:left;cursor:pointer;font-size:13px;width:100%;transition:all .2s;border-left:3px solid transparent;line-height:1.4}
.nav-btn:hover{color:#e8f0fe;background:#0a1020}
.nav-btn.active{color:#3b82f6;background:#0a1020;border-left-color:#3b82f6;font-weight:600}
.content{flex:1;padding:32px;overflow-y:auto}
h1{font-size:22px;font-weight:700;color:#e8f0fe;margin-bottom:6px}
.subtitle{color:#7c8db8;font-size:14px;margin-bottom:24px}
.card{background:#0f1628;border:1px solid #1e3a5f;border-radius:10px;padding:20px;margin-bottom:16px}
.card h3{color:#3b82f6;font-size:15px;font-weight:600;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#0a1020;color:#3b82f6;padding:8px 10px;text-align:left;font-weight:600}
td{padding:7px 10px;border-bottom:1px solid #1e3a5f;color:#e8f0fe}
tr:last-child td{border-bottom:none}
.mono{font-family:monospace;background:#0a1020;border:1px solid #1e3a5f;border-radius:6px;padding:12px;font-size:12px;line-height:1.8}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const SCENES=[{id:1,label:"URLs y estructura"},{id:2,label:"Métodos HTTP"},{id:3,label:"Versiones HTTP"}];

function Scene1(){
  const urlExample="https://www.example.com:443/path/page.html?q=dns&lang=es#section2";
  const parts=[
    {part:"https",color:"#3b82f6",label:"Esquema",desc:"Protocolo a usar. http, https, ftp, mailto, file…"},
    {part:"www.example.com",color:"#f97316",label:"Host",desc:"Nombre de dominio o dirección IP del servidor"},
    {part:"443",color:"#10b981",label:"Puerto",desc:"Puerto TCP. Opcional si es el default (80 HTTP, 443 HTTPS)"},
    {part:"/path/page.html",color:"#8b5cf6",label:"Ruta",desc:"Ruta al recurso en el servidor. Sensible a mayúsculas en Unix"},
    {part:"q=dns&lang=es",color:"#f59e0b",label:"Query string",desc:"Parámetros clave=valor separados por &. Codificados en URL"},
    {part:"section2",color:"#06b6d4",label:"Fragmento",desc:"Ancla de la página. Solo procesado por el navegador, no se envía al servidor"},
  ];
  return(
    <div>
      <h1>URL — Uniform Resource Locator</h1>
      <p className="subtitle">Una URL identifica de forma única y accesible un recurso en la Web</p>
      <div className="grid2">
        <div>
          <div className="card">
            <h3>Anatomía de una URL</h3>
            <div className="mono" style={{marginBottom:12,fontSize:11,wordBreak:"break-all"}}>{urlExample}</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {parts.map(p=>(
                <div key={p.part} style={{background:"#0a1020",border:`1px solid ${p.color}33`,borderRadius:6,padding:"8px 12px"}}>
                  <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:3}}>
                    <span style={{color:p.color,fontFamily:"monospace",fontWeight:700,fontSize:12}}>{p.part}</span>
                    <span style={{background:p.color+"22",color:p.color,fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:3}}>{p.label}</span>
                  </div>
                  <div style={{color:"#7c8db8",fontSize:11}}>{p.desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div>
          <div className="card">
            <h3>Codificación de URL (Percent-encoding)</h3>
            <p style={{color:"#e8f0fe",fontSize:13,lineHeight:1.7,marginBottom:12}}>Los caracteres especiales se codifican como <strong style={{color:"#3b82f6"}}>%XX</strong> donde XX es el valor hexadecimal del byte UTF-8. El espacio también se puede codificar como <strong style={{color:"#f97316"}}>+</strong> en query strings.</p>
            <table style={{marginBottom:12}}><tbody>
              <tr><th>Carácter</th><th>Codificación</th><th>Carácter</th><th>Codificación</th></tr>
              <tr><td>Espacio</td><td style={{color:"#3b82f6"}}>%20 / +</td><td>@</td><td style={{color:"#3b82f6"}}>%40</td></tr>
              <tr><td>á</td><td style={{color:"#f97316"}}>%C3%A1</td><td>ñ</td><td style={{color:"#f97316"}}>%C3%B1</td></tr>
              <tr><td>/</td><td style={{color:"#10b981"}}>%2F</td><td>?</td><td style={{color:"#10b981"}}>%3F</td></tr>
              <tr><td>=</td><td style={{color:"#8b5cf6"}}>%3D</td><td>&</td><td style={{color:"#8b5cf6"}}>%26</td></tr>
            </tbody></table>
          </div>
          <div className="card">
            <h3>URL vs URI vs URN</h3>
            <div style={{fontSize:13,lineHeight:1.8}}>
              <div style={{background:"#0a1020",border:"1px solid #3b82f6",borderRadius:8,padding:12,marginBottom:8}}>
                <div style={{color:"#3b82f6",fontWeight:700}}>URI (Uniform Resource Identifier)</div>
                <div style={{color:"#7c8db8",fontSize:12}}>Concepto general para identificar recursos. URL y URN son subtipos de URI.</div>
              </div>
              <div style={{background:"#0a1020",border:"1px solid #f97316",borderRadius:8,padding:12,marginBottom:8}}>
                <div style={{color:"#f97316",fontWeight:700}}>URL (Uniform Resource Locator)</div>
                <div style={{color:"#7c8db8",fontSize:12}}>Identifica Y especifica cómo acceder al recurso. https://example.com/page</div>
              </div>
              <div style={{background:"#0a1020",border:"1px solid #10b981",borderRadius:8,padding:12}}>
                <div style={{color:"#10b981",fontWeight:700}}>URN (Uniform Resource Name)</div>
                <div style={{color:"#7c8db8",fontSize:12}}>Identifica el recurso por nombre, sin ubicación. urn:isbn:0-486-27557-4</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Scene2(){
  const [sel,setSel]=useState("GET");
  const methods={
    GET:{safe:true,idem:true,body:false,color:"#3b82f6",desc:"Solicita un recurso. Sin efectos secundarios. Puede ser cacheado.",ex:"GET /index.html HTTP/1.1\nHost: www.example.com"},
    POST:{safe:false,idem:false,body:true,color:"#f97316",desc:"Envía datos al servidor para crear/procesar. No idempotente.",ex:"POST /api/users HTTP/1.1\nContent-Type: application/json\n\n{\"name\":\"Alice\"}"},
    PUT:{safe:false,idem:true,body:true,color:"#10b981",desc:"Reemplaza el recurso completo. Idempotente: el resultado es el mismo.",ex:"PUT /api/users/1 HTTP/1.1\nContent-Type: application/json\n\n{\"name\":\"Alice Updated\"}"},
    DELETE:{safe:false,idem:true,body:false,color:"#ef4444",desc:"Elimina el recurso especificado. Idempotente.",ex:"DELETE /api/users/1 HTTP/1.1\nHost: api.example.com"},
    PATCH:{safe:false,idem:false,body:true,color:"#8b5cf6",desc:"Modificación parcial del recurso. Solo los campos indicados.",ex:"PATCH /api/users/1 HTTP/1.1\n\n{\"email\":\"new@example.com\"}"},
    HEAD:{safe:true,idem:true,body:false,color:"#06b6d4",desc:"Como GET pero sin body. Útil para verificar si recurso existe.",ex:"HEAD /archivo.pdf HTTP/1.1\nHost: files.example.com"},
    OPTIONS:{safe:true,idem:true,body:false,color:"#f59e0b",desc:"Consulta métodos soportados. Preflight en CORS.",ex:"OPTIONS /api/resource HTTP/1.1\nOrigin: https://app.example.com"},
  };
  const m=methods[sel];
  const codes=[
    {c:"1xx",n:"Informacional",ex:"100 Continue, 101 Switching Protocols",color:"#7c8db8"},
    {c:"2xx",n:"Éxito",ex:"200 OK, 201 Created, 204 No Content",color:"#10b981"},
    {c:"3xx",n:"Redirección",ex:"301 Moved, 302 Found, 304 Not Modified",color:"#3b82f6"},
    {c:"4xx",n:"Error cliente",ex:"400 Bad Request, 401 Unauth, 403 Forbidden, 404 Not Found",color:"#f97316"},
    {c:"5xx",n:"Error servidor",ex:"500 Internal Error, 502 Bad Gateway, 503 Unavailable",color:"#ef4444"},
  ];
  return(
    <div>
      <h1>Métodos HTTP y Códigos de Estado</h1>
      <p className="subtitle">HTTP define un conjunto de métodos que indican la acción a realizar sobre el recurso</p>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {Object.keys(methods).map(k=>(
          <button key={k} onClick={()=>setSel(k)}
            style={{background:sel===k?methods[k].color:"#0a1020",border:`2px solid ${sel===k?methods[k].color:"#1e3a5f"}`,color:sel===k?"#0a1020":"#7c8db8",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>
            {k}
          </button>
        ))}
      </div>
      <div className="grid2">
        <div>
          <div className="card">
            <h3 style={{color:m.color}}>HTTP {sel}</h3>
            <p style={{color:"#e8f0fe",fontSize:13,lineHeight:1.7,marginBottom:12}}>{m.desc}</p>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <span style={{background:m.safe?"#10b98133":"#ef444433",border:`1px solid ${m.safe?"#10b981":"#ef4444"}`,color:m.safe?"#10b981":"#ef4444",borderRadius:4,padding:"3px 10px",fontSize:11,fontWeight:600}}>{m.safe?"Seguro (sin efectos)":"No seguro"}</span>
              <span style={{background:m.idem?"#3b82f633":"#f9731633",border:`1px solid ${m.idem?"#3b82f6":"#f97316"}`,color:m.idem?"#3b82f6":"#f97316",borderRadius:4,padding:"3px 10px",fontSize:11,fontWeight:600}}>{m.idem?"Idempotente":"No idempotente"}</span>
              <span style={{background:m.body?"#8b5cf633":"#7c8db833",border:`1px solid ${m.body?"#8b5cf6":"#1e3a5f"}`,color:m.body?"#8b5cf6":"#7c8db8",borderRadius:4,padding:"3px 10px",fontSize:11,fontWeight:600}}>{m.body?"Con body":"Sin body"}</span>
            </div>
            <pre className="mono" style={{whiteSpace:"pre-wrap",fontSize:11}}>{m.ex}</pre>
          </div>
        </div>
        <div>
          <div className="card">
            <h3>Códigos de estado HTTP</h3>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {codes.map(c=>(
                <div key={c.c} style={{background:"#0a1020",border:`1px solid ${c.color}33`,borderRadius:8,padding:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                    <span style={{color:c.color,fontWeight:700,fontSize:16,fontFamily:"monospace",width:40}}>{c.c}</span>
                    <span style={{color:"#e8f0fe",fontWeight:600,fontSize:13}}>{c.n}</span>
                  </div>
                  <div style={{color:"#7c8db8",fontSize:11}}>{c.ex}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Scene3(){
  const [ver,setVer]=useState("1.1");
  const versions={
    "1.0":{color:"#7c8db8",features:["Sin conexiones persistentes (una por request)","Sin Host header (obligatorio en 1.1)","Sin pipelining","Negociación básica de tipo de contenido","Lento: TCP handshake por cada recurso"],issues:"Un TCP por request: latencia alta, no escalable para páginas con muchos recursos."},
    "1.1":{color:"#3b82f6",features:["Conexiones persistentes (Keep-Alive por defecto)","Pipelining (envío múltiples requests sin esperar)","Host header obligatorio (virtual hosting)","Chunked transfer encoding","Caché mejorada (ETag, Cache-Control)"],issues:"HOL blocking: bloqueo de cola si una respuesta tarda. No multiplexación real."},
    "2.0":{color:"#f97316",features:["Multiplexación de streams (múltiples en una conexión)","Compresión de cabeceras (HPACK)","Server Push: el servidor envía recursos sin que el cliente los pida","Binario (no texto): frames y streams","Priorización de streams"],issues:"HOL blocking a nivel TCP: si un paquete se pierde, todos los streams esperan."},
    "3.0":{color:"#10b981",features:["QUIC sobre UDP (no TCP): elimina HOL blocking a nivel transporte","TLS 1.3 integrado (0-RTT para reconexiones)","Streams independientes: pérdida de paquete afecta solo su stream","Menor latencia: 0-1 RTT para establecer conexión","Migración de conexión (cambia IP sin reestablecer)"],issues:"UDP puede ser bloqueado por algunos firewalls. Mayor uso de CPU en endpoints."}
  };
  const v=versions[ver];
  return(
    <div>
      <h1>Evolución de HTTP: HTTP/1.0 → HTTP/3</h1>
      <p className="subtitle">Cada versión resuelve las limitaciones de la anterior, mejorando rendimiento y latencia</p>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        {Object.keys(versions).map(k=>(
          <button key={k} onClick={()=>setVer(k)}
            style={{background:ver===k?versions[k].color:"#0a1020",border:`2px solid ${ver===k?versions[k].color:"#1e3a5f"}`,color:ver===k?"#0a1020":"#7c8db8",borderRadius:6,padding:"6px 20px",cursor:"pointer",fontWeight:700,fontSize:14}}>
            HTTP/{k}
          </button>
        ))}
      </div>
      <div className="grid2">
        <div>
          <div className="card">
            <h3 style={{color:v.color}}>HTTP/{ver} — Características</h3>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {v.features.map(f=>(
                <div key={f} style={{display:"flex",gap:8,fontSize:13}}>
                  <span style={{color:v.color,fontWeight:700,marginTop:1}}>✓</span>
                  <span style={{color:"#e8f0fe"}}>{f}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{background:"#1a0a0a",border:"1px solid #ef444433"}}>
            <h3 style={{color:"#ef4444"}}>Limitación principal</h3>
            <p style={{color:"#e8f0fe",fontSize:13,lineHeight:1.7}}>{v.issues}</p>
          </div>
        </div>
        <div>
          <div className="card">
            <h3>Ciclo Request/Response HTTP/1.1</h3>
            <div className="mono" style={{fontSize:11,marginBottom:12}}>
              <div style={{color:"#7c8db8"}}>Cliente → Servidor:</div>
              <div>GET /index.html HTTP/1.1</div>
              <div>Host: www.example.com</div>
              <div>Accept: text/html,application/xhtml+xml</div>
              <div>Accept-Language: es-ES,es;q=0.9</div>
              <div>Connection: keep-alive</div>
              <div style={{marginTop:8,color:"#7c8db8"}}>Servidor → Cliente:</div>
              <div>HTTP/1.1 200 OK</div>
              <div>Content-Type: text/html; charset=UTF-8</div>
              <div>Content-Length: 2048</div>
              <div>Cache-Control: max-age=3600</div>
              <div>ETag: "abc123"</div>
              <div style={{marginTop:4}}>&lt;html&gt;...&lt;/html&gt;</div>
            </div>
          </div>
          <div className="card">
            <h3>Cabeceras de caché HTTP</h3>
            <table><tbody>
              <tr><th>Cabecera</th><th>Descripción</th></tr>
              <tr><td style={{color:"#3b82f6"}}>Cache-Control</td><td>max-age=3600, no-cache, private</td></tr>
              <tr><td style={{color:"#f97316"}}>ETag</td><td>Huella digital del recurso; validación condicional</td></tr>
              <tr><td style={{color:"#10b981"}}>Last-Modified</td><td>Fecha última modificación del recurso</td></tr>
              <tr><td style={{color:"#8b5cf6"}}>If-None-Match</td><td>Envía ETag; 304 si no cambió</td></tr>
              <tr><td style={{color:"#06b6d4"}}>Expires</td><td>Fecha absoluta de expiración (HTTP/1.0)</td></tr>
              <tr><td style={{color:"#f59e0b"}}>Vary</td><td>Claves de variación del caché (Accept-Language)</td></tr>
            </tbody></table>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [sc,setSc]=useState(1);
  return(
    <div className="layout">
      <div className="sidebar">
        <h2>7.3 HTTP</h2>
        {SCENES.map(s=>(
          <button key={s.id} className={`nav-btn${sc===s.id?" active":""}`} onClick={()=>setSc(s.id)}>
            {s.id}. {s.label}
          </button>
        ))}
      </div>
      <div className="content">
        {sc===1&&<Scene1/>}
        {sc===2&&<Scene2/>}
        {sc===3&&<Scene3/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
