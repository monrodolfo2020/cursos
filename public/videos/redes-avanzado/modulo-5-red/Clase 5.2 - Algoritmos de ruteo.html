<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 5.2 — Algoritmos de Ruteo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#060a14;font-family:'Space Grotesk',system-ui,sans-serif;color:#e8f0fe;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#060a14,#0a1020);border-bottom:2px solid rgba(59,130,246,0.35);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#7c8db8;font-family:'IBM Plex Mono',monospace;}
.scene-badge{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#3b82f6;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:220px;background:#0a1020;border-right:1px solid rgba(59,130,246,0.12);padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:8px 14px;cursor:pointer;font-size:11px;color:#3a4a72;border-left:3px solid transparent;transition:all .2s;font-family:'IBM Plex Mono',monospace;line-height:1.4;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:rgba(59,130,246,0.07);font-weight:600;}
.nav-item:hover:not(.active){color:#e8f0fe;background:rgba(255,255,255,0.03);}
.main{flex:1;padding:18px 24px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.18);border-radius:2px;}
.sec-title{font-size:21px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#3a4a72;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;}
.card{background:#0f1628;border:1px solid rgba(59,130,246,0.14);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.card-h{font-size:11px;font-weight:600;color:#3b82f6;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  return(<div>
    <div className="sec-title">Algoritmo de Dijkstra — Link State</div>
    <div className="sec-sub">El algoritmo que usa OSPF para calcular rutas óptimas</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{marginBottom:10}}>
          <div className="card-h">Idea del algoritmo</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Dijkstra calcula el camino más corto desde un nodo origen hacia todos los demás. Mantiene un conjunto de nodos ya procesados (definitivos) y va expandiendo el nodo más barato no procesado.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#3b82f6',lineHeight:1.8}}>
            {`Grafo: A-B(1) A-C(4) B-C(2) B-D(5) C-D(1)\n\nInicializar: dist[A]=0, todos demás=∞\nProcesados: {}\n\nIter 1: sacar A (coste 0)\n  dist[B]=min(∞,0+1)=1\n  dist[C]=min(∞,0+4)=4\nProcesados: {A}\n\nIter 2: sacar B (coste 1, min no proc.)\n  dist[C]=min(4,1+2)=3 ← actualiza!\n  dist[D]=min(∞,1+5)=6\nProcesados: {A,B}\n\nIter 3: sacar C (coste 3)\n  dist[D]=min(6,3+1)=4 ← actualiza!\nProcesados: {A,B,C}\n\nIter 4: sacar D (coste 4)\nRESULTADO: A→B→C→D = 4`}
          </div>
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(249,115,22,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#f97316'}}>Link State — Cómo construir el mapa</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Cada router conoce el estado de todos sus enlaces. Broadcast esta información a toda la red (LSA — Link State Advertisement). Cada router tiene el mismo mapa completo y calcula sus propias rutas con Dijkstra.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#f97316',lineHeight:1.8}}>
            {`Fases de Link State:\n1. Descubrir vecinos (Hello packets)\n2. Medir coste de cada enlace\n3. Crear LSA: {Router-ID, vecinos, costes}\n4. Inundar (flood) LSA a toda la red\n5. Calcular rutas con Dijkstra\n\nSi cambia un enlace → nuevo LSA → reflood\nConvergencia: segundos`}
          </div>
        </div>
        <div className="card">
          <div className="card-h">Complejidad y escalabilidad</div>
          {[
            {m:'Tiempo de cómputo',v:'O(N² log N) con heap binario'},
            {m:'Memoria',v:'O(N² ) para la base de datos de estado de enlace'},
            {m:'Tráfico de control',v:'O(N²) — cada LSA inunda toda la red'},
            {m:'Convergencia',v:'Segundos tras fallo'},
            {m:'Problema de escala',v:'Areas OSPF dividen la red para reducir LSA flooding'},
          ].map(r=>(
            <div key={r.m} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid rgba(59,130,246,0.07)',fontSize:11}}>
              <span style={{color:'#7c8db8'}}>{r.m}</span>
              <span style={{color:'#10b981',fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  return(<div>
    <div className="sec-title">Algoritmo de Bellman-Ford — Distance Vector</div>
    <div className="sec-sub">El algoritmo que usa RIP, distribuido y sin mapa global</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{marginBottom:10}}>
          <div className="card-h">Principio de Distance Vector</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Cada router conoce solo el coste a sus vecinos directos. Cada router anuncia su vector de distancias (tabla de rutas) a sus vecinos. Los vecinos actualizan sus tablas. Proceso iterativo hasta convergencia.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#3b82f6',lineHeight:1.8}}>
            {`Ecuación de Bellman-Ford:\nd_x(y) = min_v { c(x,v) + d_v(y) }\n\nx quiere llegar a y:\n  Para cada vecino v:\n    coste = coste(x→v) + coste_según_v(v→y)\n  Tomar el mínimo\n\nCada router solo habla con sus vecinos\nConocimiento distribuido = convergencia lenta`}
          </div>
        </div>
        <div className="card">
          <div className="card-h">Ejemplo de iteración</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#10b981',lineHeight:1.8}}>
            {`Inicio: A─1─B─1─C (A quiere llegar a C)\n\nIter 0 (solo vecinos directos):\nA: {A:0, B:1, C:∞}\nB: {A:1, B:0, C:1}\nC: {A:∞, B:1, C:0}\n\nIter 1 (A recibe vector de B):\nA: d_A(C) = min(∞, c(A,B)+d_B(C)) = min(∞,1+1) = 2\nA: {A:0, B:1, C:2}  ← ahora conoce C\n\nConvergió en 1 iteración para esta topología`}
          </div>
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(239,68,68,0.3)',marginBottom:10}}>
          <div className="card-h" style={{color:'#ef4444'}}>El problema "count to infinity"</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Si un enlace falla, la convergencia puede ser muy lenta. Dos routers que "se informan mutuamente" que pueden llegar a un destino (a través del otro) generan un bucle de conteo.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#ef4444',lineHeight:1.8,marginBottom:8}}>
            {`A─1─B─1─C   (C falla su enlace a B)\n\nB sabe que C está a distancia 1\nA sabe que C está a distancia 2 (via B)\n\nB falla → B piensa: A llega a C en 2\n         → B dice: puedo llegar via A en 3\nA recibe: B llega en 3 → A dice: llego en 4\n...B dice: llego en 5...\n→ cuentan hasta 16 (RIP) antes de descartarlo`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8'}}>Soluciones parciales: Split horizon (no anunciar al vecino por el que aprendiste la ruta), Poison reverse (anunciar con coste infinito), hold-down timers.</div>
        </div>
        <div className="card">
          <div className="card-h">DV vs. LS: comparativa</div>
          {[
            {c:'Información global',dv:'No — solo vecinos',ls:'Sí — mapa completo'},
            {c:'Convergencia',dv:'Lenta (count-to-inf)',ls:'Rápida (segundos)'},
            {c:'Computo de ruta',dv:'Distribuido (B-F)',ls:'Local (Dijkstra)'},
            {c:'Uso de ancho de banda',dv:'Bajo (solo a vecinos)',ls:'Alto (flood toda la red)'},
            {c:'Robustez',dv:'Puede tener loops',ls:'Loop-free garantizado'},
            {c:'Protocolo',dv:'RIP, BGP (variante)',ls:'OSPF, IS-IS'},
          ].map((r,i)=>(
            <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,padding:'4px 0',borderBottom:'1px solid rgba(59,130,246,0.06)',fontSize:10}}>
              <span style={{color:'#e8f0fe',fontWeight:600}}>{r.c}</span>
              <span style={{color:'#7c8db8',fontFamily:'IBM Plex Mono,monospace'}}>{r.dv}</span>
              <span style={{color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace'}}>{r.ls}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  return(<div>
    <div className="sec-title">Algoritmos Jerárquicos y Broadcast</div>
    <div className="sec-sub">Enrutamiento a escala de Internet</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{borderColor:'rgba(249,115,22,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#f97316'}}>Enrutamiento jerárquico</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Internet tiene ~1 millón de prefijos. Ningún router puede mantener rutas a todos. La solución: jerarquía de zonas. Dentro de una zona: protocolo interior (IGP como OSPF). Entre zonas/AS: protocolo exterior (EGP como BGP).</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#f97316',lineHeight:1.8,marginBottom:8}}>
            {`OSPF usa Areas:\nArea 0 (backbone) conecta todas las áreas\nArea 1, 2, 3... (hojas)\n\nRouter interno: solo conoce su área\nABR (Area Border Router): conecta áreas\nASBR: conecta a otros sistemas autónomos\n\nBeneficios:\n- LSA flooding solo dentro del área\n- Reducción enorme de estado en routers`}
          </div>
        </div>
        <div className="card">
          <div className="card-h">Enrutamiento entre AS: BGP</div>
          <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6}}>BGP (Border Gateway Protocol) es el protocolo que hace funcionar Internet entre los ~75,000 Sistemas Autónomos (AS). No busca el camino más corto sino el "más conveniente" según políticas. Un AS es un conjunto de redes bajo una misma política administrativa (un ISP, empresa, universidad).</div>
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(16,185,129,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#10b981'}}>Enrutamiento multicast</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Enviar un paquete a un grupo de receptores sin replicar en el origen. Se replica en los routers, solo en los nodos donde los caminos divergen.</div>
          {[
            {a:'RPF — Reverse Path Forwarding',d:'Si el paquete llegó por el enlace que usa el router para llegar al origen: reenviar. Si no: descartar. Evita bucles.'},
            {a:'DVMRP — DVM Routing Protocol',d:'Inunda primero, luego poda. Árbol de entrega por (S,G). Ineficiente para grupos dispersos.'},
            {a:'PIM-SM — Protocol Independent Multicast',d:'Punto de rendezvous (RP). Receptores se unen explícitamente. Eficiente para grupos dispersos. Estándar actual.'},
          ].map((r,i)=>(
            <div key={i} style={{padding:'6px 0',borderBottom:'1px solid rgba(59,130,246,0.07)'}}>
              <div style={{fontSize:11,fontWeight:700,color:'#10b981',marginBottom:2}}>{r.a}</div>
              <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.4}}>{r.d}</div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-h">Enrutamiento broadcast</div>
          <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6,marginBottom:6}}>Enviar un paquete a todos los nodos de la red. Dos enfoques eficientes:</div>
          {[
            {t:'Spanning tree','d':'Construir un árbol que abarque todos los nodos. Solo se usa cada enlace una vez. Óptimo pero requiere construcción del árbol.'},
            {t:'RPF (Reverse Path Forwarding)','d':'Cada router reenvía el broadcast solo si llegó por el enlace que llevaría al origen (uplink hacia la fuente). Descarta duplicados.'},
          ].map((r,i)=>(
            <div key={i} style={{padding:'5px 0',borderBottom:'1px solid rgba(59,130,246,0.07)'}}>
              <div style={{fontSize:11,fontWeight:700,color:'#3b82f6'}}>{r.t}</div>
              <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.4}}>{r.d}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>);
}

const SCENES=[{id:1,label:'Dijkstra — Link State',C:Scene1},{id:2,label:'Bellman-Ford — Distance Vector',C:Scene2},{id:3,label:'Jerárquico y Multicast',C:Scene3}];
function App(){
  const [sc,setSc]=useState(1);
  const cur=SCENES.find(s=>s.id===sc);
  return(
    <div className="slide">
      <div className="topbar">
        <div><div className="topbar-title">Clase 5.2 — Algoritmos de Ruteo</div><div className="topbar-sub">Módulo 5 — La Capa de Red</div></div>
        <div className="scene-badge">ESCENA {sc}/{SCENES.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          <div style={{padding:'8px 14px',fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:4}}>Contenido</div>
          {SCENES.map(s=><div key={s.id} className={`nav-item${sc===s.id?' active':''}`} onClick={()=>setSc(s.id)}>{String(s.id).padStart(2,'0')} · {s.label}</div>)}
          <div style={{flex:1}}/>
          <div style={{padding:'10px 14px',borderTop:'1px solid rgba(59,130,246,0.1)'}}>
            <div style={{fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.12em',marginBottom:4}}>OBJETIVO</div>
            <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.5}}>Dominar Dijkstra (Link State) y Bellman-Ford (Distance Vector), sus diferencias, y los algoritmos de broadcast y multicast.</div>
          </div>
        </div>
        <div className="main"><cur.C/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
