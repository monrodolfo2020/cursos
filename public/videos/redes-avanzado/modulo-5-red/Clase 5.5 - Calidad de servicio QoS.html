<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 5.5 — Calidad de Servicio QoS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#060a14;font-family:'Space Grotesk',system-ui,sans-serif;color:#e8f0fe;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#060a14,#0a1020);border-bottom:2px solid rgba(59,130,246,0.35);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#7c8db8;font-family:'IBM Plex Mono',monospace;}
.scene-badge{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#3b82f6;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:220px;background:#0a1020;border-right:1px solid rgba(59,130,246,0.12);padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:8px 14px;cursor:pointer;font-size:11px;color:#3a4a72;border-left:3px solid transparent;transition:all .2s;font-family:'IBM Plex Mono',monospace;line-height:1.4;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:rgba(59,130,246,0.07);font-weight:600;}
.nav-item:hover:not(.active){color:#e8f0fe;background:rgba(255,255,255,0.03);}
.main{flex:1;padding:18px 24px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.18);border-radius:2px;}
.sec-title{font-size:21px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#3a4a72;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;}
.card{background:#0f1628;border:1px solid rgba(59,130,246,0.14);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.card-h{font-size:11px;font-weight:600;color:#3b82f6;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const req=[
    {app:'VoIP (voz)',lat:'< 150 ms',jit:'< 30 ms',loss:'< 1%',bw:'8–64 kbps',nota:'G.711=64kbps, G.729=8kbps. Jitter buffer absorbe variaciones. Pérdida ≥ 5%: llamada incomprensible.'},
    {app:'Video conferencia',lat:'< 150 ms',jit:'< 30 ms',loss:'< 0.5%',bw:'384k–4 Mbps',nota:'H.264/H.265. Más tolerante a pérdida con FEC. I-frames grandes, P/B-frames pequeños.'},
    {app:'Video streaming',lat:'< 30 s (buffer)',jit:'Tolerante',loss:'< 0.1%',bw:'2–25 Mbps',nota:'ABR (Adaptive Bitrate): Netflix, YouTube. Ajusta calidad al ancho de banda disponible. Buffering de 10–30 s absorbe jitter.'},
    {app:'Juegos en línea',lat:'< 50 ms',jit:'< 5 ms',loss:'< 1%',bw:'1–5 Mbps',nota:'Latencia crítica para FPS/battle royale. Jitter = aiming inconsistente. Pérdida = lag.'},
    {app:'HTTP/transferencia',lat:'Tolerante',jit:'Irrelevante',loss:'TCP retransmite',bw:'Variable',nota:'TCP gestiona pérdidas con retransmisión. La latencia no afecta la experiencia mientras el throughput sea suficiente.'},
    {app:'Base de datos/backup',lat:'Tolerante',jit:'Irrelevante',loss:'TCP retransmite',bw:'Alto sostenido',nota:'Bulk transfer. Prioridad baja. TCP usa toda la BW disponible sin impacto en usuario final.'},
  ];
  return(<div>
    <div className="sec-title">QoS — Calidad de Servicio: Requisitos</div>
    <div className="sec-sub">Diferentes aplicaciones necesitan garantías muy distintas</div>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,marginBottom:10}}>
      <thead>
        <tr style={{borderBottom:'2px solid rgba(59,130,246,0.3)'}}>
          {['Aplicación','Latencia','Jitter','Pérdida','BW','Notas'].map((h,i)=>(
            <th key={i} style={{padding:'7px 8px',color:'#3b82f6',textAlign:'left',fontFamily:'IBM Plex Mono,monospace',fontSize:9}}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {req.map((r,i)=>(
          <tr key={i} style={{background:i%2===0?'#0f1628':'transparent',borderBottom:'1px solid rgba(59,130,246,0.06)'}}>
            <td style={{padding:'6px 8px',color:'#f97316',fontWeight:600}}>{r.app}</td>
            <td style={{padding:'6px 8px',color:r.lat.includes('<')&&parseInt(r.lat)<200?'#ef4444':'#7c8db8',fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.lat}</td>
            <td style={{padding:'6px 8px',color:'#7c8db8',fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.jit}</td>
            <td style={{padding:'6px 8px',color:'#7c8db8',fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.loss}</td>
            <td style={{padding:'6px 8px',color:'#10b981',fontSize:10}}>{r.bw}</td>
            <td style={{padding:'6px 8px',color:'#3a4a72',fontSize:10}}>{r.nota}</td>
          </tr>
        ))}
      </tbody>
    </table>
    <div className="card" style={{borderColor:'rgba(59,130,246,0.25)'}}>
      <div className="card-h">Los cuatro parámetros de QoS</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
        {[
          {p:'Ancho de banda',c:'#10b981',d:'Capacidad máxima del enlace. Se garantiza una tasa mínima para el flujo.'},
          {p:'Latencia (retardo)',c:'#3b82f6',d:'Tiempo de extremo a extremo. Crítico para voz y gaming. Compuesto de propagación + transmisión + colas.'},
          {p:'Jitter (variación)',c:'#f97316',d:'Variación en el retardo entre paquetes sucesivos. Jitter buffer lo absorbe en VoIP.'},
          {p:'Tasa de pérdida',c:'#ef4444',d:'Porcentaje de paquetes descartados. TCP retransmite. UDP (voz) no — se pierde calidad directamente.'},
        ].map((p,i)=>(
          <div key={i} style={{background:'#060a14',borderRadius:6,padding:'8px',borderLeft:`3px solid ${p.c}`}}>
            <div style={{fontSize:11,fontWeight:700,color:p.c,marginBottom:4}}>{p.p}</div>
            <div style={{fontSize:10,color:'#7c8db8',lineHeight:1.5}}>{p.d}</div>
          </div>
        ))}
      </div>
    </div>
  </div>);
}

function Scene2(){
  return(<div>
    <div className="sec-title">Mecanismos QoS: Scheduling y Shaping</div>
    <div className="sec-sub">Cómo los routers priorizan y regulan el tráfico</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{borderColor:'rgba(249,115,22,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#f97316'}}>Algoritmos de planificación (Scheduling)</div>
          {[
            {a:'FIFO (First In, First Out)',d:'Cola simple. Sin diferenciación. Equitativo pero sin prioridades. Un flujo grande bloquea a todos los demás.'},
            {a:'Priority Queuing',d:'Múltiples colas ordenadas por prioridad. La cola más alta siempre se sirve primero. Riesgo: starvation de colas bajas bajo carga.'},
            {a:'WFQ (Weighted Fair Queuing)',d:'Cada flujo tiene su propia cola. Asigna ancho de banda proporcionalmente al peso. Aísla flujos. Garantías de mínimo BW.'},
            {a:'WRR (Weighted Round Robin)',d:'Sirve W₁ paquetes del flujo 1, luego W₂ del flujo 2, etc. Más simple que WFQ. Usado en switches con hardware limitado.'},
            {a:'CBWFQ / LLQ (Cisco)',d:'CBWFQ + Low Latency Queue: cola estricta para voz + WFQ para el resto. Estándar para QoS de voz en redes empresariales.'},
          ].map((r,i)=>(
            <div key={i} style={{padding:'5px 0',borderBottom:'1px solid rgba(59,130,246,0.07)'}}>
              <div style={{fontSize:11,fontWeight:700,color:'#f97316',marginBottom:2}}>{r.a}</div>
              <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.4}}>{r.d}</div>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(16,185,129,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#10b981'}}>Traffic Shaping: Token Bucket y Leaky Bucket</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#10b981',lineHeight:1.8,marginBottom:8}}>
            {`LEAKY BUCKET:\n  Entrada: ráfagas arbitrarias\n  Salida: tasa constante (r paquetes/s)\n  Si balde lleno → descarte\n  Suaviza tráfico en ráfagas → CBR\n\nTOKEN BUCKET:\n  Tokens se acumulan a tasa r/s\n  Cada paquete consume 1 token\n  Puede acumular hasta B tokens\n  → permite ráfagas de hasta B paquetes\n  Más flexible que Leaky Bucket\n  SLA: CIR (Committed) + EIR (burst)  `}
          </div>
          <div style={{fontSize:11,color:'#7c8db8'}}>Token Bucket permite ráfagas controladas dentro del contrato. Fundamental para SLAs en WAN/MPLS (CIR, PIR, Bc, Be).</div>
        </div>
        <div className="card">
          <div className="card-h">Policer vs. Shaper</div>
          {[
            {t:'Policer (policing)',d:'Descarta o marca (DSCP inferior) los paquetes que exceden el contrato. Instantáneo. Sin buffer extra. Causa pérdidas en ráfagas.'},
            {t:'Shaper (shaping)',d:'Retrasa los paquetes que exceden el contrato. Buffer adicional. Sin pérdidas en ráfagas controladas. Mayor latencia. Más justo.'},
          ].map((r,i)=>(
            <div key={i} style={{padding:'7px 0',borderBottom:'1px solid rgba(59,130,246,0.07)'}}>
              <div style={{fontSize:11,fontWeight:700,color:'#3b82f6',marginBottom:3}}>{r.t}</div>
              <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.5}}>{r.d}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  return(<div>
    <div className="sec-title">DiffServ y RSVP — Modelos de QoS en Internet</div>
    <div className="sec-sub">Los dos enfoques para QoS a escala de Internet</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{borderColor:'rgba(59,130,246,0.25)',marginBottom:10}}>
          <div className="card-h">DiffServ — Differentiated Services (RFC 2474)</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Modelo escalable basado en marcado. En el borde de la red se clasifica y marca el tráfico (DSCP en el campo ToS/TClass de IP). En el núcleo, los routers solo leen el DSCP y aplican un PHB (Per-Hop Behavior).</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#3b82f6',lineHeight:1.8,marginBottom:8}}>
            {`PHBs principales:\nEF (Expedited Forwarding, CS5):\n  Para VoIP. Baja latencia, baja pérdida.\n  Tasa de salida ≥ tasa de llegada\n\nAF (Assured Forwarding, AF11..43):\n  4 clases × 3 niveles drop precedence\n  Garantía de mínimo BW por clase\n\nBE (Best Effort, DSCP=0):\n  Tráfico estándar de Internet`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8'}}>DiffServ es escalable: estado solo en los bordes, no en el núcleo. Millones de flujos → solo 64 clases DSCP en core.</div>
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(249,115,22,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#f97316'}}>IntServ y RSVP (RFC 2205)</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Modelo con reserva de recursos explícita. RSVP (Resource Reservation Protocol) permite a los flujos reservar ancho de banda a lo largo del camino. Garantías fuertes pero no escala en el núcleo de Internet.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#f97316',lineHeight:1.8,marginBottom:8}}>
            {`Flujo:\n1. Emisor envía PATH message hop-a-hop\n2. Cada router registra el estado del flujo\n3. Receptor envía RESV message de vuelta\n4. Cada router reserva recursos (BW, buffer)\n5. Emisor puede transmitir con garantías\n\nGuaranteed Service: latencia máx garantizada\nControlled Load: comportamiento de red sin carga\n\nProblema: O(N_flujos) estado en cada router`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8'}}>RSVP se usa hoy principalmente en MPLS TE (Traffic Engineering) y en LTE/5G para reservas de radio, no en el núcleo IP.</div>
        </div>
        <div className="card">
          <div className="card-h">QoS en la práctica 2024</div>
          <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6}}>Las redes empresariales usan DiffServ + LLQ para voz y video. Los ISPs usan MPLS + DiffServ. El núcleo de Internet es mayoritariamente Best Effort con sobreprovisión. Los CDNs (Cloudflare, Akamai) resuelven la latencia con servidores geográficamente distribuidos, no con QoS. Video streaming usa ABR (Adaptive Bitrate) sobre Best Effort.</div>
        </div>
      </div>
    </div>
  </div>);
}

const SCENES=[{id:1,label:'Requisitos por aplicación',C:Scene1},{id:2,label:'Scheduling y shaping',C:Scene2},{id:3,label:'DiffServ y RSVP',C:Scene3}];
function App(){
  const [sc,setSc]=useState(1);
  const cur=SCENES.find(s=>s.id===sc);
  return(
    <div className="slide">
      <div className="topbar">
        <div><div className="topbar-title">Clase 5.5 — Calidad de Servicio (QoS)</div><div className="topbar-sub">Módulo 5 — La Capa de Red</div></div>
        <div className="scene-badge">ESCENA {sc}/{SCENES.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          <div style={{padding:'8px 14px',fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:4}}>Contenido</div>
          {SCENES.map(s=><div key={s.id} className={`nav-item${sc===s.id?' active':''}`} onClick={()=>setSc(s.id)}>{String(s.id).padStart(2,'0')} · {s.label}</div>)}
          <div style={{flex:1}}/>
          <div style={{padding:'10px 14px',borderTop:'1px solid rgba(59,130,246,0.1)'}}>
            <div style={{fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.12em',marginBottom:4}}>OBJETIVO</div>
            <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.5}}>Entender los parámetros de QoS, los algoritmos de scheduling, traffic shaping y los modelos DiffServ e IntServ.</div>
          </div>
        </div>
        <div className="main"><cur.C/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
