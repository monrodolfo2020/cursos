<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>Clase 8.4 – Firmas Digitales y Certificados: PKI y CA</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a14;color:#e8f0fe;font-family:'Segoe UI',sans-serif;width:1280px;height:720px;overflow:hidden}
.layout{display:flex;height:720px}
.sidebar{width:220px;background:#0f1628;border-right:1px solid #1e3a5f;display:flex;flex-direction:column;padding:16px 0}
.sidebar h2{color:#ef4444;font-size:13px;font-weight:700;padding:0 16px 12px;border-bottom:1px solid #1e3a5f;text-transform:uppercase;letter-spacing:.5px}
.nav-btn{background:none;border:none;color:#7c8db8;padding:10px 16px;text-align:left;cursor:pointer;font-size:13px;width:100%;transition:all .2s;border-left:3px solid transparent;line-height:1.4}
.nav-btn:hover{color:#e8f0fe;background:#0a1020}
.nav-btn.active{color:#ef4444;background:#0a1020;border-left-color:#ef4444;font-weight:600}
.content{flex:1;padding:32px;overflow-y:auto}
h1{font-size:22px;font-weight:700;color:#e8f0fe;margin-bottom:6px}
.subtitle{color:#7c8db8;font-size:14px;margin-bottom:24px}
.card{background:#0f1628;border:1px solid #1e3a5f;border-radius:10px;padding:20px;margin-bottom:16px}
.card h3{color:#3b82f6;font-size:15px;font-weight:600;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#0a1020;color:#3b82f6;padding:8px 10px;text-align:left;font-weight:600}
td{padding:7px 10px;border-bottom:1px solid #1e3a5f;color:#e8f0fe}
tr:last-child td{border-bottom:none}
.mono{font-family:monospace;background:#0a1020;border:1px solid #1e3a5f;border-radius:6px;padding:12px;font-size:12px;line-height:1.8}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const SCENES=[{id:1,label:"Firmas digitales"},{id:2,label:"Certificados X.509"},{id:3,label:"PKI y cadena de confianza"}];

function Scene1(){
  const [mode,setMode]=useState("sign");
  return(
    <div>
      <h1>Firmas Digitales</h1>
      <p className="subtitle">Una firma digital garantiza autenticidad (quién firmó), integridad (no modificado) y no repudio (no puede negar haberlo firmado)</p>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <button onClick={()=>setMode("sign")} style={{background:mode==="sign"?"#3b82f6":"#0a1020",border:"1px solid #1e3a5f",color:mode==="sign"?"#0a1020":"#e8f0fe",borderRadius:6,padding:"6px 20px",cursor:"pointer",fontWeight:600}}>Proceso de firma</button>
        <button onClick={()=>setMode("verify")} style={{background:mode==="verify"?"#10b981":"#0a1020",border:"1px solid #1e3a5f",color:mode==="verify"?"#0a1020":"#e8f0fe",borderRadius:6,padding:"6px 20px",cursor:"pointer",fontWeight:600}}>Verificación</button>
      </div>
      <div className="grid2">
        <div>
          <div className="card">
            {mode==="sign"?(
              <>
                <h3>Proceso de Firma (Alice firma)</h3>
                <div style={{display:"flex",flexDirection:"column",gap:8,fontSize:12}}>
                  {[
                    {n:"1. Calcular hash",c:"#3b82f6",d:'hash = SHA-256(mensaje)\nhash = "e3b0c44298fc1c149..."'},
                    {n:"2. Cifrar hash con clave privada",c:"#f97316",d:"firma = RSA_Encrypt(hash, clave_privada_Alice)\n→ Esto ES la firma digital"},
                    {n:"3. Enviar mensaje + firma",c:"#10b981",d:"Alice envía:\n  • Mensaje original (en claro)\n  • Firma digital\n  • Certificado (clave pública Alice)"},
                  ].map(s=>(
                    <div key={s.n} style={{background:"#0a1020",border:`1px solid ${s.c}44`,borderRadius:6,padding:10}}>
                      <div style={{color:s.c,fontWeight:600,marginBottom:4}}>{s.n}</div>
                      <pre style={{color:"#7c8db8",fontSize:11,lineHeight:1.7,fontFamily:"monospace",whiteSpace:"pre-wrap"}}>{s.d}</pre>
                    </div>
                  ))}
                </div>
              </>
            ):(
              <>
                <h3>Verificación (Bob verifica)</h3>
                <div style={{display:"flex",flexDirection:"column",gap:8,fontSize:12}}>
                  {[
                    {n:"1. Descifrar firma",c:"#3b82f6",d:'hash_recibido = RSA_Decrypt(firma, clave_pública_Alice)\n→ Obtiene el hash original de Alice'},
                    {n:"2. Calcular hash del mensaje",c:"#f97316",d:'hash_calculado = SHA-256(mensaje_recibido)\n→ Bob calcula su propio hash'},
                    {n:"3. Comparar hashes",c:"#10b981",d:"SI hash_recibido == hash_calculado:\n  ✓ Firma válida: autenticidad + integridad\nSI son distintos:\n  ✗ Firma inválida: modificación o fraude"},
                  ].map(s=>(
                    <div key={s.n} style={{background:"#0a1020",border:`1px solid ${s.c}44`,borderRadius:6,padding:10}}>
                      <div style={{color:s.c,fontWeight:600,marginBottom:4}}>{s.n}</div>
                      <pre style={{color:"#7c8db8",fontSize:11,lineHeight:1.7,fontFamily:"monospace",whiteSpace:"pre-wrap"}}>{s.d}</pre>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
        <div>
          <div className="card">
            <h3>Propiedades de la firma digital</h3>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
              {[
                {n:"Autenticidad",c:"#3b82f6",d:"Solo el poseedor de la clave privada puede generar la firma. Identifica unívocamente al firmante."},
                {n:"Integridad",c:"#10b981",d:"Si el mensaje se modifica, el hash cambia y la verificación falla."},
                {n:"No repudio",c:"#f97316",d:"El firmante no puede negar haber firmado: solo él tiene la clave privada."},
                {n:"Eficiencia",c:"#8b5cf6",d:"Se firma el hash (pequeño), no el mensaje completo. SHA-256 = 32 bytes siempre."},
              ].map(p=>(
                <div key={p.n} style={{background:"#0a1020",border:`1px solid ${p.c}44`,borderRadius:6,padding:8}}>
                  <div style={{color:p.c,fontWeight:600,fontSize:12,marginBottom:2}}>{p.n}</div>
                  <div style={{color:"#7c8db8",fontSize:11}}>{p.d}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <h3>Algoritmos de firma</h3>
            <table><tbody>
              <tr><th>Algoritmo</th><th>Base</th><th>Tamaño firma</th><th>Uso</th></tr>
              <tr><td style={{color:"#3b82f6"}}>RSA-2048</td><td>Factorización</td><td>256 bytes</td><td>TLS, S/MIME</td></tr>
              <tr><td style={{color:"#f97316"}}>ECDSA P-256</td><td>Curvas elípt.</td><td>64 bytes</td><td>TLS 1.3, Bitcoin</td></tr>
              <tr><td style={{color:"#10b981"}}>EdDSA (Ed25519)</td><td>Edwards curve</td><td>64 bytes</td><td>SSH, Signal</td></tr>
              <tr><td style={{color:"#8b5cf6"}}>DSA</td><td>Log discreto</td><td>40–72 bytes</td><td>Legado</td></tr>
            </tbody></table>
          </div>
        </div>
      </div>
    </div>
  );
}

function Scene2(){
  const [field,setField]=useState("subject");
  const certFields={
    version:{label:"Versión",color:"#7c8db8",value:"v3 (X.509 versión 3)",desc:"La versión del estándar X.509. V3 (1996) añade extensiones como SAN, KeyUsage, etc."},
    serial:{label:"Número de serie",color:"#3b82f6",value:"0x0A3B2C1D... (único por CA)",desc:"Número único asignado por la CA. Usado para revocación (CRL, OCSP)."},
    issuer:{label:"Emisor (Issuer)",color:"#f97316",value:"CN=DigiCert Global Root CA, O=DigiCert Inc",desc:"Nombre distinguido (DN) de la CA que emitió y firmó el certificado."},
    subject:{label:"Sujeto (Subject)",color:"#10b981",value:"CN=*.google.com, O=Google LLC, C=US",desc:"La entidad que el certificado identifica. Para web: el dominio/empresa."},
    pubkey:{label:"Clave pública",color:"#8b5cf6",value:"EC Public Key (P-256, 65 bytes)",desc:"La clave pública del sujeto. Cualquiera puede usarla para cifrar o verificar firmas."},
    validity:{label:"Validez",color:"#06b6d4",value:"2024-01-01 → 2025-01-01",desc:"Fecha de inicio y fin de validez. Certificados web: 13 meses máximo (Apple/Google)."},
    san:{label:"SAN (Subject Alternative Name)",color:"#f59e0b",value:"*.google.com, google.com, *.youtube.com",desc:"Extensión crítica v3: lista de dominios/IPs cubiertos. El CN ya no se usa para validar."},
    signature:{label:"Firma de la CA",color:"#ef4444",value:"SHA256withRSA / ECDSA",desc:"La CA firma el certificado con su clave privada. Esto es lo que verifica el navegador."},
  };
  const f=certFields[field];
  return(
    <div>
      <h1>Certificados X.509</h1>
      <p className="subtitle">Un certificado X.509 vincula una clave pública a una identidad (dominio, empresa, persona). La CA lo firma, garantizando la autenticidad.</p>
      <div className="grid2">
        <div>
          <div className="card">
            <h3>Campos del certificado X.509</h3>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {Object.entries(certFields).map(([k,v])=>(
                <button key={k} onClick={()=>setField(k)}
                  style={{background:field===k?v.color+"22":"#0a1020",border:`1px solid ${field===k?v.color:"#1e3a5f"}`,color:field===k?v.color:"#7c8db8",borderRadius:5,padding:"6px 10px",cursor:"pointer",textAlign:"left",fontSize:11,fontWeight:field===k?700:400,transition:"all .2s"}}>
                  <span style={{opacity:.7,marginRight:6}}>[{k.toUpperCase()}]</span>{v.label}
                </button>
              ))}
            </div>
          </div>
        </div>
        <div>
          <div className="card" style={{background:"#0a1020",border:`2px solid ${f.color}`,marginBottom:12}}>
            <h3 style={{color:f.color}}>{f.label}</h3>
            <div className="mono" style={{marginBottom:10,fontSize:11}}>{f.value}</div>
            <p style={{color:"#e8f0fe",fontSize:13,lineHeight:1.7}}>{f.desc}</p>
          </div>
          <div className="card">
            <h3>Tipos de certificados SSL/TLS</h3>
            <div style={{display:"flex",flexDirection:"column",gap:6,fontSize:12}}>
              {[
                {n:"DV (Domain Validation)",c:"#3b82f6",d:"Solo verifica control del dominio. Rápido (~minutos). Gratis con Let's Encrypt."},
                {n:"OV (Organization Validation)",c:"#f97316",d:"Verifica dominio + empresa (registro mercantil). Días. Muestra organización en cert."},
                {n:"EV (Extended Validation)",c:"#10b981",d:"Verificación exhaustiva. Semanas. Barra verde (ya no en Chrome). Bancos, gobierno."},
                {n:"Wildcard *.dominio.com",c:"#8b5cf6",d:"Un cert cubre todos los subdominios de un nivel. *.google.com → mail, www, etc."},
                {n:"SAN / Multi-domain",c:"#06b6d4",d:"Un cert cubre múltiples dominios distintos (SAN extension)."},
              ].map(t=>(
                <div key={t.n} style={{background:"#0f1628",border:`1px solid ${t.c}44`,borderRadius:5,padding:"6px 10px"}}>
                  <div style={{color:t.c,fontWeight:600}}>{t.n}</div>
                  <div style={{color:"#7c8db8",marginTop:2}}>{t.d}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Scene3(){
  const [level,setLevel]=useState("root");
  const pki={
    root:{name:"Root CA",color:"#3b82f6",desc:"Ancla de confianza. Certificado auto-firmado preinstalado en el OS/browser. Nunca se usa en línea: está en almacenamiento offline (air-gapped).",examples:["DigiCert Global Root CA","ISRG Root X1 (Let's Encrypt)","Comodo RSA CA","GlobalSign Root R3"]},
    inter:{name:"Intermediate CA",color:"#f97316",desc:"Firmada por la Root CA. Es la que realmente firma los certificados finales. Si se compromete, se puede revocar sin tocar la Root CA.",examples:["DigiCert TLS RSA SHA256 2020 CA1","R3 (Let's Encrypt Intermediate)","GTS CA 1C3 (Google)"]},
    end:{name:"End-entity Certificate",color:"#10b981",desc:"El certificado final del dominio/empresa. Firmado por la Intermediate CA. Tiene fecha de expiración corta (≤13 meses).",examples:["*.google.com","www.amazon.com","api.example.com"]},
  };
  const p=pki[level];
  return(
    <div>
      <h1>PKI — Infraestructura de Clave Pública</h1>
      <p className="subtitle">PKI es el conjunto de hardware, software, políticas y procedimientos que crean, gestionan y revocan certificados digitales</p>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {Object.entries(pki).map(([k,v])=>(
          <button key={k} onClick={()=>setLevel(k)}
            style={{flex:1,background:level===k?v.color+"22":"#0a1020",border:`2px solid ${level===k?v.color:"#1e3a5f"}`,color:level===k?v.color:"#7c8db8",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontWeight:700,fontSize:13,transition:"all .2s"}}>
            {v.name}
          </button>
        ))}
      </div>
      <div className="grid2">
        <div>
          <div className="card" style={{borderColor:p.color+"44"}}>
            <h3 style={{color:p.color}}>{p.name}</h3>
            <p style={{color:"#e8f0fe",fontSize:13,lineHeight:1.7,marginBottom:12}}>{p.desc}</p>
            <div style={{background:"#0a1020",border:`1px solid ${p.color}44`,borderRadius:6,padding:10}}>
              <div style={{color:p.color,fontWeight:600,fontSize:12,marginBottom:6}}>Ejemplos reales:</div>
              {p.examples.map(e=>(
                <div key={e} style={{display:"flex",gap:6,marginBottom:4,fontSize:12}}>
                  <span style={{color:p.color}}>▸</span><span style={{color:"#e8f0fe"}}>{e}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div>
          <div className="card">
            <h3>Cadena de confianza — Ejemplo HTTPS</h3>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
              <div style={{background:"#0a1020",border:"2px solid #3b82f6",borderRadius:6,padding:10,textAlign:"center"}}>
                <div style={{color:"#3b82f6",fontWeight:700}}>ISRG Root X1 (Let's Encrypt)</div>
                <div style={{color:"#7c8db8",fontSize:11}}>Auto-firmado → preinstalado en OS</div>
              </div>
              <div style={{textAlign:"center",color:"#3b82f6",fontSize:18}}>↓ firma</div>
              <div style={{background:"#0a1020",border:"2px solid #f97316",borderRadius:6,padding:10,textAlign:"center"}}>
                <div style={{color:"#f97316",fontWeight:700}}>R3 (Intermediate CA)</div>
                <div style={{color:"#7c8db8",fontSize:11}}>Firmado por Root → online, firma end-entity</div>
              </div>
              <div style={{textAlign:"center",color:"#f97316",fontSize:18}}>↓ firma</div>
              <div style={{background:"#0a1020",border:"2px solid #10b981",borderRadius:6,padding:10,textAlign:"center"}}>
                <div style={{color:"#10b981",fontWeight:700}}>example.com</div>
                <div style={{color:"#7c8db8",fontSize:11}}>Certificado del sitio, validez ≤13 meses</div>
              </div>
            </div>
          </div>
          <div className="card">
            <h3>Revocación de certificados</h3>
            <div style={{display:"flex",flexDirection:"column",gap:6,fontSize:12}}>
              {[
                {n:"CRL (Certificate Revocation List)",c:"#f97316",d:"Lista publicada por la CA con todos los certs revocados. Descarga periódica. Puede ser grande y lenta."},
                {n:"OCSP (Online Certificate Status Protocol)",c:"#3b82f6",d:"Consulta en tiempo real: ¿está revocado este cert? Más ágil que CRL."},
                {n:"OCSP Stapling",c:"#10b981",d:"El servidor incluye la respuesta OCSP firmada en el handshake TLS. Sin consulta extra del cliente."},
                {n:"CAA Record (DNS)",c:"#8b5cf6",d:"Registro DNS que especifica qué CAs pueden emitir certs para el dominio."},
              ].map(r=>(
                <div key={r.n} style={{background:"#0a1020",border:`1px solid ${r.c}44`,borderRadius:5,padding:"6px 10px"}}>
                  <div style={{color:r.c,fontWeight:600}}>{r.n}</div>
                  <div style={{color:"#7c8db8",marginTop:2}}>{r.d}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [sc,setSc]=useState(1);
  return(
    <div className="layout">
      <div className="sidebar">
        <h2>8.4 PKI / Firmas</h2>
        {SCENES.map(s=>(
          <button key={s.id} className={`nav-btn${sc===s.id?" active":""}`} onClick={()=>setSc(s.id)}>
            {s.id}. {s.label}
          </button>
        ))}
      </div>
      <div className="content">
        {sc===1&&<Scene1/>}
        {sc===2&&<Scene2/>}
        {sc===3&&<Scene3/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
