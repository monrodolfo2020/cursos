<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>Clase 6.6 – Gestión de Conexión TCP</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a14;color:#e8f0fe;font-family:'Segoe UI',sans-serif;width:1280px;height:720px;overflow:hidden}
.layout{display:flex;height:720px}
.sidebar{width:220px;background:#0f1628;border-right:1px solid #1e3a5f;display:flex;flex-direction:column;padding:16px 0}
.sidebar h2{color:#3b82f6;font-size:13px;font-weight:700;padding:0 16px 12px;border-bottom:1px solid #1e3a5f;text-transform:uppercase;letter-spacing:.5px}
.nav-btn{background:none;border:none;color:#7c8db8;padding:10px 16px;text-align:left;cursor:pointer;font-size:13px;width:100%;transition:all .2s;border-left:3px solid transparent;line-height:1.4}
.nav-btn:hover{color:#e8f0fe;background:#0a1020}
.nav-btn.active{color:#3b82f6;background:#0a1020;border-left-color:#3b82f6;font-weight:600}
.content{flex:1;padding:32px;overflow-y:auto}
h1{font-size:22px;font-weight:700;color:#e8f0fe;margin-bottom:6px}
.subtitle{color:#7c8db8;font-size:14px;margin-bottom:24px}
.card{background:#0f1628;border:1px solid #1e3a5f;border-radius:10px;padding:20px;margin-bottom:16px}
.card h3{color:#3b82f6;font-size:15px;font-weight:600;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#0a1020;color:#3b82f6;padding:8px 10px;text-align:left;font-weight:600}
td{padding:7px 10px;border-bottom:1px solid #1e3a5f;color:#e8f0fe}
tr:last-child td{border-bottom:none}
.mono{font-family:monospace;background:#0a1020;border:1px solid #1e3a5f;border-radius:6px;padding:12px;font-size:12px;line-height:1.8}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const SCENES=[{id:1,label:"Modelo de servicio TCP"},{id:2,label:"Máquina de estados TCP"},{id:3,label:"Crasheo y keepalive"}];

function Scene1(){
  const [sel,setSel]=useState(null);
  const features=[
    {n:"Flujo de bytes",color:"#3b82f6",d:"TCP entrega un stream de bytes ordenado. No hay delimitadores de mensajes: si envías 100 bytes en 5 llamadas send(), el receptor puede recibirlos en 1 recv() de 100 o en 10 de 10. La aplicación debe gestionar límites."},
    {n:"Full-duplex",color:"#10b981",d:"Datos fluyen simultáneamente en ambas direcciones sobre la misma conexión. Cada dirección tiene su propio número de secuencia y ventana."},
    {n:"Piggybacking",color:"#f97316",d:"Los ACKs se adjuntan a segmentos de datos en sentido contrario, evitando enviar un segmento solo de ACK. Reduce el overhead. Si no hay datos inmediatos, el ACK se envía tras un breve delay (delayed ACK, ~200ms)."},
    {n:"Urgent data",color:"#8b5cf6",d:"URG flag + Urgent Pointer permiten enviar datos fuera de banda urgentes (ej: Ctrl+C en Telnet). El receptor puede procesarlos antes que los datos normales. En la práctica, poco usado y con inconsistencias entre implementaciones."},
    {n:"Segmentación",color:"#3b82f6",d:"TCP divide el stream en segmentos. El MSS (Max Segment Size) se negocia en el SYN: típicamente MTU - 40 bytes (Ethernet: 1500-40=1460 bytes)."},
    {n:"Reordenamiento",color:"#10b981",d:"Los segmentos pueden llegar en orden diferente al enviado (redes distintas, ECMP). TCP los reordena en el buffer de recepción usando los números de secuencia."},
  ];
  const f=features.find(f=>f.n===sel);
  return(
    <div>
      <h1>Modelo de Servicio TCP</h1>
      <p className="subtitle">Características del servicio que TCP provee a la capa de aplicación</p>
      <div className="grid2">
        <div>
          <div className="card">
            <h3>Características del servicio — clic para detalle</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {features.map(ft=>(
                <div key={ft.n} onClick={()=>setSel(sel===ft.n?null:ft.n)}
                  style={{background:sel===ft.n?"#1e3a5f":"#0a1020",border:`1px solid ${sel===ft.n?ft.color:"#1e3a5f"}`,borderRadius:6,padding:"10px 12px",cursor:"pointer"}}>
                  <div style={{color:sel===ft.n?ft.color:"#e8f0fe",fontWeight:600,fontSize:13}}>{ft.n}</div>
                </div>
              ))}
            </div>
            {f&&(
              <div style={{marginTop:12,background:"#0a1020",border:`2px solid ${f.color}`,borderRadius:8,padding:14}}>
                <div style={{color:f.color,fontWeight:700,fontSize:14,marginBottom:8}}>{f.n}</div>
                <div style={{color:"#e8f0fe",fontSize:13}}>{f.d}</div>
              </div>
            )}
          </div>
        </div>
        <div>
          <div className="card">
            <h3>Delayed ACK</h3>
            <div style={{fontSize:13,color:"#e8f0fe",lineHeight:1.7}}>
              <div style={{marginBottom:8}}>En lugar de ACKar cada segmento inmediatamente, TCP espera hasta 200ms o la llegada de otro segmento para enviar un ACK combinado.</div>
              <div style={{background:"#0a1020",borderLeft:"3px solid #10b981",borderRadius:"0 6px 6px 0",padding:10,marginBottom:8}}>
                <div style={{color:"#10b981",fontWeight:600}}>Ventaja:</div>
                <div>Reduce ACKs innecesarios en tráfico request-response (HTTP)</div>
              </div>
              <div style={{background:"#0a1020",borderLeft:"3px solid #ef4444",borderRadius:"0 6px 6px 0",padding:10}}>
                <div style={{color:"#ef4444",fontWeight:600}}>Problema:</div>
                <div>Interacción con Nagle: puede causar 200ms de latencia extra en tráfico interactivo pequeño</div>
              </div>
            </div>
          </div>
          <div className="card">
            <h3>TCP vs UDP — Cuándo TCP no es suficiente</h3>
            <table><tbody>
              <tr><th>Limitación TCP</th><th>Solución</th></tr>
              <tr><td>Head-of-line blocking</td><td>HTTP/3 sobre QUIC</td></tr>
              <tr><td>Handshake lento (1.5 RTT)</td><td>TLS 1.3 0-RTT / QUIC</td></tr>
              <tr><td>No multicast</td><td>UDP + multicast aplicación</td></tr>
              <tr><td>Stream sin límites msg</td><td>SCTP, WebRTC DataChannel</td></tr>
              <tr><td>Congestión muy conservadora</td><td>QUIC, SCTP, aplicación</td></tr>
            </tbody></table>
          </div>
        </div>
      </div>
    </div>
  );
}

function Scene2(){
  const [sel,setSel]=useState("ESTABLISHED");
  const states=[
    {s:"CLOSED",desc:"Sin conexión TCP activa",trans:["→ LISTEN (pasivo open)","→ SYN_SENT (activo open)"],color:"#7c8db8"},
    {s:"LISTEN",desc:"Esperando conexión entrante (después de bind+listen)",trans:["← CLOSED (close)","→ SYN_RCVD (SYN recibido)"],color:"#8b5cf6"},
    {s:"SYN_SENT",desc:"SYN enviado, esperando SYN-ACK",trans:["→ ESTABLISHED (SYN-ACK recibido)","→ CLOSED (timeout/RST)"],color:"#3b82f6"},
    {s:"SYN_RCVD",desc:"SYN recibido, SYN-ACK enviado",trans:["→ ESTABLISHED (ACK recibido)","→ LISTEN (RST recibido)"],color:"#3b82f6"},
    {s:"ESTABLISHED",desc:"Conexión activa — datos fluyen",trans:["→ FIN_WAIT_1 (close activo)","→ CLOSE_WAIT (FIN recibido)"],color:"#10b981"},
    {s:"FIN_WAIT_1",desc:"FIN enviado, esperando ACK",trans:["→ FIN_WAIT_2 (ACK recibido)","→ CLOSING (FIN simultáneo)"],color:"#f97316"},
    {s:"FIN_WAIT_2",desc:"ACK de FIN recibido, esperando FIN del peer",trans:["→ TIME_WAIT (FIN recibido)"],color:"#f97316"},
    {s:"CLOSE_WAIT",desc:"FIN del peer recibido, esperando que la app llame close()",trans:["→ LAST_ACK (close llamado)"],color:"#f97316"},
    {s:"CLOSING",desc:"FIN simultáneo — ambos cerraron al mismo tiempo",trans:["→ TIME_WAIT (ACK recibido)"],color:"#8b5cf6"},
    {s:"LAST_ACK",desc:"FIN enviado tras recibir FIN del peer, esperando ACK final",trans:["→ CLOSED (ACK recibido)"],color:"#f97316"},
    {s:"TIME_WAIT",desc:"Espera 2×MSL para asegurar que el ACK llegó y paquetes tardíos expiran",trans:["→ CLOSED (2×MSL timeout)"],color:"#8b5cf6"},
  ];
  const s=states.find(s=>s.s===sel)||states[4];
  return(
    <div>
      <h1>Máquina de Estados TCP (FSM)</h1>
      <p className="subtitle">11 estados posibles de una conexión TCP según RFC 793</p>
      <div className="grid2">
        <div>
          <div className="card">
            <h3>Estados — clic para detalle</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {states.map(st=>(
                <div key={st.s} onClick={()=>setSel(st.s)}
                  style={{background:sel===st.s?"#1e3a5f":"#0a1020",border:`1px solid ${sel===st.s?st.color:"#1e3a5f"}`,borderRadius:6,padding:"7px 10px",cursor:"pointer"}}>
                  <div style={{color:sel===st.s?st.color:"#7c8db8",fontWeight:700,fontSize:12,fontFamily:"monospace"}}>{st.s}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div>
          <div className="card" style={{border:`1px solid ${s.color}`}}>
            <h3 style={{color:s.color,fontFamily:"monospace"}}>{s.s}</h3>
            <p style={{color:"#e8f0fe",fontSize:14,marginBottom:12}}>{s.desc}</p>
            <div style={{color:"#7c8db8",fontSize:12,fontWeight:600,marginBottom:6}}>Transiciones:</div>
            {s.trans.map(t=>(
              <div key={t} style={{background:"#0a1020",border:"1px solid #1e3a5f",borderRadius:4,padding:"6px 10px",marginBottom:6,fontSize:12,color:"#e8f0fe",fontFamily:"monospace"}}>{t}</div>
            ))}
          </div>
          <div className="card">
            <h3>Herramientas para ver estados TCP</h3>
            <div className="mono">
              <div style={{color:"#7c8db8"}}># Linux</div>
              <div>ss -tnp</div>
              <div>netstat -tnp</div>
              <div style={{marginTop:6,color:"#7c8db8"}}># Ver solo ESTABLISHED</div>
              <div>ss -tnp state established</div>
              <div style={{marginTop:6,color:"#7c8db8"}}># Ver TIME_WAIT (muchos = problema)</div>
              <div>ss -tnp state time-wait | wc -l</div>
              <div style={{marginTop:6,color:"#7c8db8"}}># Reducir TIME_WAIT en servidores</div>
              <div>sysctl net.ipv4.tcp_tw_reuse=1</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Scene3(){
  return(
    <div>
      <h1>Crasheo y TCP Keepalive</h1>
      <p className="subtitle">Detección de conexiones muertas y comportamiento ante fallos</p>
      <div className="grid2">
        <div>
          <div className="card">
            <h3>Escenarios de fallo de conexión</h3>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[
                {n:"Crash del proceso",c:"#f97316",d:"El SO envía RST a todos los sockets abiertos del proceso. El peer recibe RST y cierra la conexión inmediatamente."},
                {n:"Crash del host",c:"#ef4444",d:"El SO no puede enviar RST (hardware failure, poweroff). El peer cree que la conexión sigue activa. Solo el timeout detecta el fallo."},
                {n:"Fallo de red (intermitente)",c:"#8b5cf6",d:"Paquetes se pierden. TCP retransmite con backoff exponencial. Tras ~15 intentos (~9 min) aborta la conexión con ETIMEDOUT."},
                {n:"Half-open",c:"#ef4444",d:"Un lado cree que la conexión existe, el otro no. Si el lado 'vivo' envía datos, el lado 'muerto' (tras reboot) responde con RST."},
              ].map(s=>(
                <div key={s.n} style={{background:"#0a1020",borderLeft:`3px solid ${s.c}`,borderRadius:"0 6px 6px 0",padding:"10px 14px"}}>
                  <div style={{color:s.c,fontWeight:600,fontSize:13,marginBottom:4}}>{s.n}</div>
                  <div style={{color:"#e8f0fe",fontSize:12}}>{s.d}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div>
          <div className="card">
            <h3>TCP Keepalive (SO_KEEPALIVE)</h3>
            <div style={{fontSize:13,color:"#e8f0fe",lineHeight:1.7,marginBottom:12}}>
              Cuando está habilitado, TCP envía periódicamente segmentos keepalive (sin datos) para verificar que el peer sigue vivo.
            </div>
            <table><tbody>
              <tr><th>Parámetro</th><th>Descripción</th><th>Default Linux</th></tr>
              <tr><td style={{color:"#3b82f6",fontFamily:"monospace"}}>tcp_keepalive_time</td><td>Tiempo de inactividad antes del primer probe</td><td>7200s (2h)</td></tr>
              <tr><td style={{color:"#f97316",fontFamily:"monospace"}}>tcp_keepalive_intvl</td><td>Intervalo entre probes</td><td>75s</td></tr>
              <tr><td style={{color:"#10b981",fontFamily:"monospace"}}>tcp_keepalive_probes</td><td>Número de probes sin respuesta antes de cerrar</td><td>9</td></tr>
            </tbody></table>
            <div style={{marginTop:10}} className="mono">
              <div style={{color:"#7c8db8"}}># Configurar keepalive corto en servidor</div>
              <div>sysctl -w net.ipv4.tcp_keepalive_time=60</div>
              <div>sysctl -w net.ipv4.tcp_keepalive_intvl=10</div>
              <div>sysctl -w net.ipv4.tcp_keepalive_probes=5</div>
            </div>
          </div>
          <div className="card">
            <h3>Keepalive vs Application Heartbeat</h3>
            <table><tbody>
              <tr><th>Aspecto</th><th>TCP Keepalive</th><th>App Heartbeat</th></tr>
              <tr><td>Nivel</td><td>Kernel/OS</td><td>Aplicación</td></tr>
              <tr><td>Detecta</td><td>Host muerto/inalcanzable</td><td>App muerta, lógica colgada</td></tr>
              <tr><td>Firewall</td><td>Puede ser bloqueado</td><td>Transparente</td></tr>
              <tr><td>Recomendado</td><td>Junto con heartbeat</td><td>Siempre en producción</td></tr>
            </tbody></table>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [sc,setSc]=useState(1);
  return(
    <div className="layout">
      <div className="sidebar">
        <h2>6.6 Gestión TCP</h2>
        {SCENES.map(s=>(
          <button key={s.id} className={`nav-btn${sc===s.id?" active":""}`} onClick={()=>setSc(s.id)}>
            {s.id}. {s.label}
          </button>
        ))}
      </div>
      <div className="content">
        {sc===1&&<Scene1/>}
        {sc===2&&<Scene2/>}
        {sc===3&&<Scene3/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
