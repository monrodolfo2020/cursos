<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 5.1 — Ciclo de Vida IEC 61511</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0a0f1e,#0f1a35);border-bottom:2px solid #3b82f6;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#3b82f622;border:1px solid #3b82f655;color:#3b82f6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e3a5f;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:#3b82f610;font-weight:600;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.main{flex:1;padding:16px 22px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:#3b82f644;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e3a5f;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#3b82f6;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 7px 7px 0;padding:10px 14px;margin:7px 0;font-size:12px;line-height:1.6;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

const fases=[
  {n:1,grupo:'Análisis',fase:'Análisis del EUC y sus condiciones de operación',entregable:'Descripción del EUC, límites del sistema',clausula:'§8',color:'#6366f1'},
  {n:2,grupo:'Análisis',fase:'Análisis de peligros y riesgo del EUC',entregable:'Informe HAZOP, escenarios peligrosos identificados',clausula:'§8',color:'#6366f1'},
  {n:3,grupo:'Análisis',fase:'Asignación de las funciones de seguridad al SIS',entregable:'SIL objetivo por SIF, restricciones del SIS',clausula:'§9',color:'#6366f1'},
  {n:4,grupo:'Diseño',fase:'Especificación de los requisitos de seguridad del SIS (SRS)',entregable:'Documento SRS aprobado',clausula:'§10',color:'#3b82f6'},
  {n:5,grupo:'Diseño',fase:'Diseño e ingeniería del SIS',entregable:'Arquitectura del SIS, selección de equipos, cálculo PFD',clausula:'§11',color:'#3b82f6'},
  {n:6,grupo:'Diseño',fase:'Diseño e ingeniería del sistema de control de seguridad SIS',entregable:'Hardware design, lógica de seguridad',clausula:'§11',color:'#3b82f6'},
  {n:7,grupo:'Realización',fase:'Fabricación e integración del SIS',entregable:'SIS ensamblado y probado en fábrica (FAT)',clausula:'§12',color:'#22c55e'},
  {n:8,grupo:'Realización',fase:'Instalación del SIS en sitio',entregable:'SIS instalado, cableado, documentación as-built',clausula:'§14',color:'#22c55e'},
  {n:9,grupo:'Realización',fase:'Pre-arranque de la planta y SAT del SIS',entregable:'Pruebas en sitio completadas, SIS listo para operar',clausula:'§14',color:'#22c55e'},
  {n:10,grupo:'Operación',fase:'Operación y mantenimiento del SIS',entregable:'Registros de proof test, mantenimiento preventivo',clausula:'§16',color:'#f59e0b'},
  {n:11,grupo:'Operación',fase:'Modificación y retrofit del SIS',entregable:'MOC documentado, revalidación SIL',clausula:'§17',color:'#f59e0b'},
  {n:12,grupo:'Operación',fase:'Descomisionamiento del SIS',entregable:'Procedimiento formal de retiro, cierre del dossier',clausula:'§18',color:'#ef4444'},
];

function Scene1(){
  const [sel,setSel]=useState(null);
  const grupos=[...new Set(fases.map(f=>f.grupo))];
  const gColors={'Análisis':'#6366f1','Diseño':'#3b82f6','Realización':'#22c55e','Operación':'#f59e0b','Descomisionamiento':'#ef4444'};
  return(<div>
    <div className="sec-title">Ciclo de Vida de Seguridad IEC 61511</div>
    <div className="sec-sub">12 fases desde el análisis hasta el descomisionamiento — IEC 61511 Parte 1</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card" style={{padding:'10px'}}>
          <div className="card-h">Fases del ciclo de vida — haz clic para detalles</div>
          {fases.map((f,i)=>(
            <div key={i} onClick={()=>setSel(sel===i?null:i)} style={{display:'flex',gap:6,padding:'4px 6px',borderRadius:5,cursor:'pointer',marginBottom:2,background:sel===i?`${f.color}22`:'transparent',border:`1px solid ${sel===i?f.color:'transparent'}`,transition:'all .15s'}}>
              <span style={{width:20,height:20,borderRadius:'50%',background:f.color,color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{f.n}</span>
              <span style={{fontSize:10,color:sel===i?f.color:'#cbd5e1',lineHeight:1.3,alignSelf:'center'}}>{f.fase}</span>
              <span style={{fontSize:9,color:'#475569',flexShrink:0,alignSelf:'center'}}>{f.clausula}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        {sel!==null?(
          <div className="card" style={{borderLeft:`3px solid ${fases[sel].color}`}}>
            <div style={{fontSize:16,fontWeight:700,color:fases[sel].color,marginBottom:3}}>Fase {fases[sel].n}</div>
            <div style={{fontSize:12,fontWeight:600,color:'#e2e8f0',marginBottom:8}}>{fases[sel].fase}</div>
            <div style={{fontSize:10,color:'#64748b',marginBottom:4}}>Grupo: <span style={{color:fases[sel].color,fontWeight:700}}>{fases[sel].grupo}</span></div>
            <div style={{fontSize:10,color:'#64748b',marginBottom:8}}>Cláusula IEC 61511: <span style={{color:'#60a5fa',fontWeight:700}}>{fases[sel].clausula}</span></div>
            <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:3}}>Entregable principal:</div>
            <div style={{fontSize:12,color:'#cbd5e1',lineHeight:1.5}}>{fases[sel].entregable}</div>
          </div>
        ):(
          <div>
            <div className="card">
              <div className="card-h">Grupos del ciclo de vida</div>
              {grupos.map((g,i)=>(
                <div key={i} style={{display:'flex',gap:8,padding:'5px 0',borderBottom:'1px solid #1e3a5f22',alignItems:'center'}}>
                  <div style={{width:10,height:10,borderRadius:2,background:gColors[g]||'#3b82f6',flexShrink:0}}/>
                  <span style={{fontSize:12,fontWeight:700,color:gColors[g]||'#3b82f6'}}>{g}</span>
                  <span style={{fontSize:10,color:'#64748b'}}>{fases.filter(f=>f.grupo===g).length} fases</span>
                </div>
              ))}
            </div>
            <div className="def-box" style={{marginTop:8}}>
              <span style={{color:'#3b82f6',fontWeight:700}}>Selecciona una fase</span> del panel izquierdo para ver sus detalles, entregables y referencia de cláusula en IEC 61511.
            </div>
          </div>
        )}
      </div>
    </div>
  </div>);
}

function Scene2(){
  const etapas=[
    {grupo:'ANÁLISIS',color:'#6366f1',fases:[
      {n:1,f:'Análisis del EUC',out:'Descripción del sistema'},
      {n:2,f:'HAZOP / Análisis de riesgo',out:'Escenarios peligrosos'},
      {n:3,f:'Asignación de SIF / SIL',out:'SIL objetivo por SIF'},
    ]},
    {grupo:'DISEÑO',color:'#3b82f6',fases:[
      {n:4,f:'SRS — Especificación de requisitos',out:'Documento SRS'},
      {n:5,f:'Diseño del SIS',out:'Arquitectura, equipos, PFD'},
      {n:6,f:'Diseño del sistema de control SIS',out:'Hardware + lógica'},
    ]},
    {grupo:'REALIZACIÓN',color:'#22c55e',fases:[
      {n:7,f:'Fabricación e integración (FAT)',out:'SIS probado en fábrica'},
      {n:8,f:'Instalación en sitio',out:'As-built documentado'},
      {n:9,f:'Pre-arranque (SAT)',out:'SIS validado en sitio'},
    ]},
    {grupo:'OPERACIÓN',color:'#f59e0b',fases:[
      {n:10,f:'Operación y mantenimiento',out:'Registros de proof test'},
      {n:11,f:'Modificación (MOC)',out:'Revalidación SIL'},
      {n:12,f:'Descomisionamiento',out:'Cierre formal del SIS'},
    ]},
  ];
  return(<div>
    <div className="sec-title">Visión general del ciclo de vida</div>
    <div className="sec-sub">Flujo de fases, documentos de entrada y salida</div>
    <div style={{display:'flex',gap:6,alignItems:'stretch',height:460}}>
      {etapas.map((e,i)=>(
        <div key={i} style={{flex:1,background:`${e.color}11`,border:`1px solid ${e.color}44`,borderRadius:8,padding:'10px 8px'}}>
          <div style={{fontSize:10,fontWeight:700,color:e.color,textAlign:'center',marginBottom:8,letterSpacing:1}}>{e.grupo}</div>
          {e.fases.map((f,j)=>(
            <div key={j} style={{background:'#0d1425',border:'1px solid #1e3a5f',borderRadius:6,padding:'6px 8px',marginBottom:5}}>
              <div style={{display:'flex',gap:5,alignItems:'center',marginBottom:3}}>
                <span style={{width:16,height:16,borderRadius:'50%',background:e.color,color:'#fff',fontSize:8,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{f.n}</span>
                <span style={{fontSize:10,color:'#e2e8f0',lineHeight:1.3}}>{f.f}</span>
              </div>
              <div style={{fontSize:9,color:'#64748b',paddingLeft:20}}>→ {f.out}</div>
            </div>
          ))}
          {i<etapas.length-1&&(
            <div style={{textAlign:'center',color:e.color,fontSize:16,marginTop:4}}>↓</div>
          )}
        </div>
      ))}
    </div>
  </div>);
}

const scenes=[
  {id:1,label:'Las 12 fases',comp:<Scene1/>},
  {id:2,label:'Flujo del ciclo de vida',comp:<Scene2/>},
];
function App(){
  const [active,setActive]=useState(1);
  const scene=scenes.find(s=>s.id===active);
  return(
    <div className="slide">
      <div className="topbar">
        <div>
          <div className="topbar-title">IEC 61511 — Seguridad Funcional en la Industria de Proceso</div>
          <div className="topbar-sub">Módulo 5 · Lección 5.1 — Fases del ciclo de vida según IEC 61511</div>
        </div>
        <div className="scene-badge">{active}/{scenes.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          {scenes.map(s=>(
            <div key={s.id} className={'nav-item'+(active===s.id?' active':'')} onClick={()=>setActive(s.id)}>{s.id}. {s.label}</div>
          ))}
        </div>
        <div className="main">{scene.comp}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
