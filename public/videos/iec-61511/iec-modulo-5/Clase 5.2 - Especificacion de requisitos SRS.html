<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 5.2 — SRS: Especificación de Requisitos</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0a0f1e,#0f1a35);border-bottom:2px solid #3b82f6;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#3b82f622;border:1px solid #3b82f655;color:#3b82f6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e3a5f;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:#3b82f610;font-weight:600;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.main{flex:1;padding:16px 22px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:#3b82f644;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e3a5f;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#3b82f6;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 7px 7px 0;padding:10px 14px;margin:7px 0;font-size:12px;line-height:1.6;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const secciones=[
    {sec:'1. Descripción del SIS',req:['Alcance y propósito del SIS','Límites del sistema','Interfaces con BPCS y otros sistemas','Condiciones del EUC']},
    {sec:'2. Descripción de cada SIF',req:['Causa de activación (setpoint, variable, condición)','Acción de seguridad (qué hace el SIS)','Estado seguro del proceso','Tiempo máximo de respuesta']},
    {sec:'3. Requisitos de integridad (SIL)',req:['SIL objetivo por SIF','PFDavg requerida','Modo de operación (baja/alta demanda)','Arquitectura mínima requerida']},
    {sec:'4. Requisitos funcionales',req:['Lógica de votación y bypass','Reseteo manual vs automático','Alarmas e indicaciones requeridas','Prioridades entre SIF']},
    {sec:'5. Requisitos no funcionales',req:['Disponibilidad requerida','Ambiente (temperatura, área ATEX)','Interfaz humana (HMI, panel)','Alimentación eléctrica y UPS']},
    {sec:'6. Pruebas y mantenimiento',req:['Intervalo de proof test (TI)','Cobertura del proof test','Plan de mantenimiento preventivo','Gestión del bypass durante pruebas']},
  ];
  return(<div>
    <div className="sec-title">SRS — Safety Requirements Specification</div>
    <div className="sec-sub">El documento maestro del SIS — IEC 61511 §10</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">¿Qué es el SRS?</div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1',marginBottom:8}}>
            El SRS (Safety Requirements Specification) es el documento que define <strong>todos los requisitos funcionales y de integridad del SIS</strong>. Es la base para el diseño, la verificación y la validación del sistema.
          </p>
          <div className="def-box">
            <span style={{color:'#3b82f6',fontWeight:700}}>IEC 61511 §10.3:</span> El SRS debe ser preparado antes del diseño del SIS y debe ser revisado y aprobado por las partes responsables del diseño, operación y seguridad.
          </div>
          <div className="def-box" style={{marginTop:8,borderColor:'#ef4444'}}>
            <span style={{color:'#ef4444',fontWeight:700}}>Error crítico:</span> Diseñar el SIS sin un SRS aprobado viola IEC 61511. Sin SRS, no hay base para verificar que el SIS fue diseñado correctamente.
          </div>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Contenido mínimo del SRS — IEC 61511 §10.3</div>
          {secciones.map((s,i)=>(
            <div key={i} style={{padding:'5px 0',borderBottom:'1px solid #1e3a5f22'}}>
              <div style={{fontSize:11,fontWeight:700,color:'#3b82f6',marginBottom:2}}>{s.sec}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:2}}>
                {s.req.map((r,j)=>(
                  <span key={j} style={{fontSize:9,background:'#1e3a8a33',color:'#93c5fd',border:'1px solid #1e3a8a55',padding:'1px 5px',borderRadius:3}}>{r}</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const ejemplo={
    sif:'SIF-001: Tripeo del reactor R-101 por alta temperatura',
    causa:'TAHH-101: temperatura del reactor > 185°C durante > 5 segundos',
    accion:'Cerrar XV-101 (válvula de alimentación) + paro de bomba P-101',
    estadoSeguro:'Reactor aislado: sin alimentación, sin agitación, refrigeración activa',
    tiempoRespuesta:'< 2 segundos desde detección hasta cierre de válvula',
    sil:'SIL 2 (PFDavg requerida: ≥ 0.001 a < 0.01)',
    modoOp:'Baja demanda (< 1 demanda/año)',
    arquitectura:'Mínima: 1oo2 para sensores + 1oo1 para lógica + 1oo1 para elemento final',
    bypass:'Bypass manual permitido solo con PTW autorizado. Tiempo máximo bypass: 8 horas',
    proofTest:'TI = 1 año. Cobertura mínima 90%.',
    reseteo:'Reseteo manual en campo con llave de supervisor',
  };
  return(<div>
    <div className="sec-title">Ejemplo de SRS para una SIF</div>
    <div className="sec-sub">SIF-001 — Tripeo de reactor por alta temperatura</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h" style={{color:'#22c55e',fontSize:13}}>{ejemplo.sif}</div>
          {[
            {f:'Causa de activación',v:ejemplo.causa,c:'#22d3ee'},
            {f:'Acción de seguridad',v:ejemplo.accion,c:'#22c55e'},
            {f:'Estado seguro',v:ejemplo.estadoSeguro,c:'#3b82f6'},
            {f:'Tiempo de respuesta',v:ejemplo.tiempoRespuesta,c:'#f59e0b'},
            {f:'Reseteo',v:ejemplo.reseteo,c:'#94a3b8'},
          ].map((r,i)=>(
            <div key={i} style={{padding:'5px 0',borderBottom:'1px solid #1e3a5f22'}}>
              <span style={{fontSize:10,fontWeight:700,color:r.c}}>{r.f}: </span>
              <span style={{fontSize:11,color:'#cbd5e1'}}>{r.v}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Requisitos de integridad y mantenimiento</div>
          {[
            {f:'SIL objetivo',v:ejemplo.sil,c:'#3b82f6'},
            {f:'Modo de operación',v:ejemplo.modoOp,c:'#94a3b8'},
            {f:'Arquitectura mínima',v:ejemplo.arquitectura,c:'#22c55e'},
            {f:'Gestión de bypass',v:ejemplo.bypass,c:'#f59e0b'},
            {f:'Proof test',v:ejemplo.proofTest,c:'#60a5fa'},
          ].map((r,i)=>(
            <div key={i} style={{padding:'5px 0',borderBottom:'1px solid #1e3a5f22'}}>
              <span style={{fontSize:10,fontWeight:700,color:r.c}}>{r.f}: </span>
              <span style={{fontSize:11,color:'#cbd5e1'}}>{r.v}</span>
            </div>
          ))}
        </div>
        <div className="def-box" style={{marginTop:8}}>
          <span style={{color:'#3b82f6',fontWeight:700}}>Nota:</span> Este es un fragmento simplificado. Un SRS real incluye diagramas lógicos, referencias al P&ID, criterios de aceptación de prueba y firmas de aprobación.
        </div>
      </div>
    </div>
  </div>);
}

const scenes=[
  {id:1,label:'¿Qué es el SRS?',comp:<Scene1/>},
  {id:2,label:'Ejemplo SRS completo',comp:<Scene2/>},
];
function App(){
  const [active,setActive]=useState(1);
  const scene=scenes.find(s=>s.id===active);
  return(
    <div className="slide">
      <div className="topbar">
        <div>
          <div className="topbar-title">IEC 61511 — Seguridad Funcional en la Industria de Proceso</div>
          <div className="topbar-sub">Módulo 5 · Lección 5.2 — Especificación de requisitos de seguridad (SRS)</div>
        </div>
        <div className="scene-badge">{active}/{scenes.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          {scenes.map(s=>(
            <div key={s.id} className={'nav-item'+(active===s.id?' active':'')} onClick={()=>setActive(s.id)}>{s.id}. {s.label}</div>
          ))}
        </div>
        <div className="main">{scene.comp}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
