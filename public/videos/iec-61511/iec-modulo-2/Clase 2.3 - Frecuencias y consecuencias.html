<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 2.3 — Frecuencias y Consecuencias</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.blue{color:#3b82f6;}.green{color:#22c55e;}.amber{color:#f59e0b;}.red{color:#ef4444;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0a0f1e,#0f1a35);border-bottom:2px solid #3b82f6;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#3b82f622;border:1px solid #3b82f655;color:#3b82f6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e3a5f;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:#3b82f610;font-weight:600;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.main{flex:1;padding:16px 22px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:#3b82f644;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e3a5f;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#3b82f6;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 7px 7px 0;padding:10px 14px;margin:7px 0;font-size:12px;line-height:1.6;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#0f1729;color:#3b82f6;padding:6px 8px;text-align:left;border-bottom:1px solid #1e3a5f;font-size:10px;text-transform:uppercase;}
td{padding:5px 8px;border-bottom:1px solid #0f1729;color:#cbd5e1;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const eventos=[
    {tipo:'Falla de válvula de control (falla abierto)',freq:'0.01 – 0.1 /año',fuente:'OREDA, CCPS'},
    {tipo:'Falla de transmisor de presión',freq:'0.02 – 0.05 /año',fuente:'OREDA'},
    {tipo:'Falla de tubería (línea de proceso)',freq:'1×10⁻⁵ – 1×10⁻³ /m·año',fuente:'API 581'},
    {tipo:'Falla de bomba centrifuga (pérdida flujo)',freq:'0.05 – 0.5 /año',fuente:'CCPS'},
    {tipo:'Error humano (operación normal)',freq:'0.001 – 0.01 /demanda',fuente:'CCPS, HEART'},
    {tipo:'Pérdida de servicios (energía eléctrica)',freq:'0.01 – 1 /año',fuente:'Datos de sitio'},
    {tipo:'Falla de compresor',freq:'0.1 – 1 /año',fuente:'OREDA'},
  ];
  return(<div>
    <div className="sec-title">Frecuencias de Eventos Iniciadores</div>
    <div className="sec-sub">Fuentes de datos y valores típicos para LOPA — industria de proceso</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">¿De dónde vienen las frecuencias?</div>
          {[
            {src:'OREDA (Offshore Reliability Data)',uso:'Datos de confiabilidad offshore y onshore de equipos de proceso'},
            {src:'CCPS Guidelines for LOPA',uso:'Tablas de frecuencias típicas para eventos iniciadores'},
            {src:'API 581 RBI',uso:'Frecuencias de falla de tuberías y recipientes a presión'},
            {src:'Datos históricos de planta',uso:'La mejor fuente — basados en el historial real de la instalación'},
            {src:'HEART / THERP',uso:'Probabilidades de error humano en tareas específicas'},
          ].map((s,i)=>(
            <div key={i} style={{padding:'5px 0',borderBottom:'1px solid #1e3a5f22',fontSize:11}}>
              <div style={{color:'#3b82f6',fontWeight:700}}>{s.src}</div>
              <div style={{color:'#94a3b8'}}>{s.uso}</div>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Frecuencias típicas de eventos iniciadores</div>
          <table>
            <thead><tr><th>Evento iniciador</th><th>Frecuencia típica</th><th>Fuente</th></tr></thead>
            <tbody>
              {eventos.map((e,i)=>(
                <tr key={i}>
                  <td>{e.tipo}</td>
                  <td style={{fontFamily:'monospace',color:'#f59e0b'}}>{e.freq}</td>
                  <td style={{color:'#64748b'}}>{e.fuente}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const consecuencias=[
    {cat:'Catastrófica',def:'Múltiples fatalidades externas (comunidad)',tolerable:'< 10⁻⁵ /año',color:'#dc2626'},
    {cat:'Crítica',def:'Fatalidad única o múltiples lesiones graves en sitio',tolerable:'< 10⁻⁴ /año',color:'#ef4444'},
    {cat:'Marginal',def:'Lesiones graves reversibles en personal',tolerable:'< 10⁻³ /año',color:'#f97316'},
    {cat:'Menor',def:'Lesiones leves, daño ambiental menor',tolerable:'< 10⁻² /año',color:'#f59e0b'},
    {cat:'Despreciable',def:'Sin daño personal, daño material menor',tolerable:'No regulado',color:'#22c55e'},
  ];
  return(<div>
    <div className="sec-title">Evaluación de Consecuencias y Tolerabilidad</div>
    <div className="sec-sub">Clasificación de severidad y frecuencias tolerables por categoría</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">Categorías de consecuencias (CCPS)</div>
          {consecuencias.map((c,i)=>(
            <div key={i} style={{display:'flex',gap:8,padding:'7px 0',borderBottom:'1px solid #1e3a5f22',alignItems:'center'}}>
              <div style={{width:10,height:10,borderRadius:2,background:c.color,flexShrink:0}}/>
              <div style={{flex:1}}>
                <span style={{fontSize:12,fontWeight:700,color:c.color}}>{c.cat}: </span>
                <span style={{fontSize:11,color:'#cbd5e1'}}>{c.def}</span>
              </div>
              <div style={{fontFamily:'monospace',fontSize:10,color:'#94a3b8',flexShrink:0}}>{c.tolerable}</div>
            </div>
          ))}
        </div>
        <div className="def-box" style={{marginTop:8}}>
          <span className="blue" style={{fontWeight:700}}>Criterio ALARP:</span> As Low As Reasonably Practicable. El riesgo debe reducirse hasta que el costo adicional de reducción sea desproporcionado al beneficio obtenido.
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Matriz de Riesgo — 5×5</div>
          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  <th>Frecuencia ↓ / Severidad →</th>
                  <th style={{color:'#22c55e'}}>Menor</th>
                  <th style={{color:'#f59e0b'}}>Marginal</th>
                  <th style={{color:'#f97316'}}>Crítica</th>
                  <th style={{color:'#ef4444'}}>Catastrófica</th>
                </tr>
              </thead>
              <tbody>
                {[
                  {freq:'Frecuente (>1/año)',cells:['Medio','Alto','Muy Alto','Muy Alto']},
                  {freq:'Probable (0.1-1/año)',cells:['Bajo','Medio','Alto','Muy Alto']},
                  {freq:'Ocasional (0.01-0.1/año)',cells:['Bajo','Bajo','Medio','Alto']},
                  {freq:'Remoto (<0.01/año)',cells:['Bajo','Bajo','Bajo','Medio']},
                ].map((r,i)=>(
                  <tr key={i}>
                    <td style={{fontSize:10}}>{r.freq}</td>
                    {r.cells.map((c,j)=>(
                      <td key={j} style={{textAlign:'center',fontWeight:700,fontSize:10,
                        color:c==='Muy Alto'?'#ef4444':c==='Alto'?'#f97316':c==='Medio'?'#f59e0b':'#22c55e'}}>
                        {c}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <p style={{fontSize:10,color:'#64748b',marginTop:6}}>Los niveles "Alto" y "Muy Alto" requieren SIF con SIL ≥ 1.</p>
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  const [freq,setFreq]=useState(-1);
  const [sev,setSev]=useState(1);
  const fvals=[1,0.1,0.01,0.001];
  const slabels=['Frecuente','Probable','Ocasional','Remoto'];
  const sevLabels=['Menor','Marginal','Crítica','Catastrófica'];
  const sevColors=['#22c55e','#f59e0b','#f97316','#ef4444'];
  const matrix=[['Medio','Alto','Muy Alto','Muy Alto'],['Bajo','Medio','Alto','Muy Alto'],['Bajo','Bajo','Medio','Alto'],['Bajo','Bajo','Bajo','Medio']];
  const fi=Math.pow(10,freq);
  const sifCred=[null,0.1,0.01,0.001];
  const ftolerable=[null,1e-2,1e-3,1e-4];
  const silNeeded=sev>0?(fi>ftolerable[sev]?'SIF requerida':'No requiere SIF adicional'):null;
  return(<div>
    <div className="sec-title">Tolerabilidad del Riesgo — Herramienta interactiva</div>
    <div className="sec-sub">Selecciona frecuencia y severidad para evaluar si se requiere SIF</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">Selecciona el escenario</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:'#94a3b8',marginBottom:6}}>Frecuencia del evento iniciador</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {slabels.map((l,i)=>(
                <button key={i} onClick={()=>setFreq(-i)}
                  style={{background:freq===-i?'#3b82f6':'transparent',color:freq===-i?'#fff':'#94a3b8',border:'1px solid #1e3a5f',borderRadius:5,padding:'4px 10px',cursor:'pointer',fontSize:11}}>
                  {l}<br/><span style={{fontSize:9,fontFamily:'monospace'}}>{fvals[i]}/año</span>
                </button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:'#94a3b8',marginBottom:6}}>Severidad de la consecuencia</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {sevLabels.map((l,i)=>(
                <button key={i} onClick={()=>setSev(i+1)}
                  style={{background:sev===i+1?sevColors[i]:'transparent',color:sev===i+1?'#fff':sevColors[i],border:`1px solid ${sevColors[i]}`,borderRadius:5,padding:'4px 10px',cursor:'pointer',fontSize:11}}>
                  {l}
                </button>
              ))}
            </div>
          </div>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">Nivel de riesgo</div>
          {(()=>{
            const fi_idx=Math.abs(freq);
            const sev_idx=sev-1;
            const nivel=matrix[fi_idx][sev_idx];
            const col=nivel==='Muy Alto'?'#ef4444':nivel==='Alto'?'#f97316':nivel==='Medio'?'#f59e0b':'#22c55e';
            return(<div style={{textAlign:'center',padding:'12px 0'}}>
              <div style={{fontSize:28,fontWeight:700,color:col}}>{nivel}</div>
              <div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>
                {nivel==='Muy Alto'||nivel==='Alto'?'→ Requiere SIF obligatoria':nivel==='Medio'?'→ Evaluar LOPA':'→ Riesgo tolerable sin SIF adicional'}
              </div>
            </div>);
          })()}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Matriz de Riesgo — tu selección</div>
          <table>
            <thead>
              <tr>
                <th>Frecuencia ↓ / Severidad →</th>
                {sevLabels.map((l,i)=><th key={i} style={{color:sevColors[i]}}>{l}</th>)}
              </tr>
            </thead>
            <tbody>
              {matrix.map((row,ri)=>(
                <tr key={ri}>
                  <td style={{fontSize:9,fontWeight:ri===Math.abs(freq)?700:400,color:ri===Math.abs(freq)?'#3b82f6':'#94a3b8'}}>{slabels[ri]}</td>
                  {row.map((cell,ci)=>{
                    const isActive=ri===Math.abs(freq)&&ci===sev-1;
                    const col=cell==='Muy Alto'?'#ef4444':cell==='Alto'?'#f97316':cell==='Medio'?'#f59e0b':'#22c55e';
                    return(<td key={ci} style={{textAlign:'center',fontWeight:700,fontSize:11,background:isActive?`${col}33`:'',color:col,border:isActive?`2px solid ${col}`:'',borderRadius:isActive?4:0}}>{cell}</td>);
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="def-box" style={{marginTop:8}}>
          <span className="blue" style={{fontWeight:700}}>Próximo paso:</span> Si el riesgo es Alto o Muy Alto, ejecutar LOPA para cuantificar el SIL objetivo del SIS.
        </div>
      </div>
    </div>
  </div>);
}

const scenes=[
  {id:1,label:'Frecuencias de eventos',comp:<Scene1/>},
  {id:2,label:'Consecuencias y tolerabilidad',comp:<Scene2/>},
  {id:3,label:'Herramienta interactiva',comp:<Scene3/>},
];
function App(){
  const [active,setActive]=useState(1);
  const scene=scenes.find(s=>s.id===active);
  return(
    <div className="slide">
      <div className="topbar">
        <div>
          <div className="topbar-title">IEC 61511 — Seguridad Funcional en la Industria de Proceso</div>
          <div className="topbar-sub">Módulo 2 · Lección 2.3 — Determinación de frecuencias y consecuencias</div>
        </div>
        <div className="scene-badge">{active}/{scenes.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          {scenes.map(s=>(
            <div key={s.id} className={'nav-item'+(active===s.id?' active':'')} onClick={()=>setActive(s.id)}>{s.id}. {s.label}</div>
          ))}
        </div>
        <div className="main">{scene.comp}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
