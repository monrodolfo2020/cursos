<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 2.2 — LOPA</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.blue{color:#3b82f6;}.green{color:#22c55e;}.amber{color:#f59e0b;}.red{color:#ef4444;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0a0f1e,#0f1a35);border-bottom:2px solid #3b82f6;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#3b82f622;border:1px solid #3b82f655;color:#3b82f6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e3a5f;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:#3b82f610;font-weight:600;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.main{flex:1;padding:16px 22px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:#3b82f644;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e3a5f;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#3b82f6;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 7px 7px 0;padding:10px 14px;margin:7px 0;font-size:12px;line-height:1.6;}
.ipl-layer{border-radius:8px;padding:8px 12px;margin-bottom:5px;font-size:11px;}
.btn-blue{background:#3b82f6;color:#fff;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const ipls=[
    {n:1,nombre:'Diseño intrínseco',tipo:'Pasiva',credito:'-',desc:'Diseño del proceso que elimina o reduce el peligro. No requiere energía ni señal. Ej: reducir inventario tóxico.'},
    {n:2,nombre:'BPCS — Control básico',tipo:'Activa',credito:'0.1',desc:'Sistema de control de proceso normal. Puede recibir crédito como IPL SOLO si es independiente del evento iniciador.'},
    {n:3,nombre:'Alarma + respuesta operador',tipo:'Activa/Humana',credito:'0.1',desc:'El operador recibe alarma y actúa en tiempo. PFD = 0.1 (sin entrenamiento) o hasta 0.01 (con entrenamiento + P&ID).'},
    {n:4,nombre:'SIS — Sistema instrumentado',tipo:'Activa',credito:'SIL 1-3',desc:'El SIS actúa automáticamente. PFD = 0.1 (SIL1) a 0.001 (SIL3). Es la capa de seguridad central.'},
    {n:5,nombre:'Dispositivos físicos (PSV)',tipo:'Pasiva',credito:'0.01',desc:'Válvulas de alivio, discos de ruptura. Actúan sin energía externa. PFD = 0.01 (bien mantenidas).'},
    {n:6,nombre:'Diques y contención',tipo:'Pasiva',credito:'0.01',desc:'Diques alrededor de tanques. Mitigan las consecuencias una vez ocurrido el evento.'},
  ];
  const colors=['#6366f1','#3b82f6','#06b6d4','#22c55e','#f59e0b','#ef4444'];
  return(<div>
    <div className="sec-title">LOPA — Análisis de Capas de Protección</div>
    <div className="sec-sub">Layer of Protection Analysis — cuantificación del riesgo mediante capas independientes</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">¿Qué es LOPA?</div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1',marginBottom:8}}>
            LOPA es un método semi-cuantitativo que calcula la frecuencia de un evento peligroso considerando el efecto de reducción de cada capa de protección independiente (IPL).
          </p>
          <div className="def-box">
            <span className="blue" style={{fontWeight:700}}>Fórmula básica:</span><br/>
            <span style={{fontFamily:'monospace',fontSize:13,color:'#60a5fa'}}>f_mitigada = f_iniciador × PFD_IPL1 × PFD_IPL2 × ...</span><br/>
            <span style={{fontSize:11,color:'#94a3b8',marginTop:4,display:'block'}}>Si f_mitigada {'>'} f_tolerable → se necesita SIF adicional</span>
          </div>
        </div>
        <div className="def-box">
          <span className="blue" style={{fontWeight:700}}>Independencia de IPL:</span> Para contar como IPL, la capa debe ser <strong>independiente</strong> del evento iniciador y de otras capas. Una alarma que usa el mismo sensor del BPCS no es una IPL independiente.
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Las 6 capas de protección típicas</div>
          {ipls.map((l,i)=>(
            <div key={i} className="ipl-layer" style={{background:`${colors[i]}11`,borderLeft:`3px solid ${colors[i]}`,marginBottom:5}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                <span style={{fontSize:11,fontWeight:700,color:colors[i]}}>{l.n}. {l.nombre}</span>
                <span style={{fontSize:9,color:'#64748b'}}>{l.tipo} · PFD≈{l.credito}</span>
              </div>
              <p style={{fontSize:10,color:'#94a3b8',lineHeight:1.3}}>{l.desc}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const [fi,setFi]=useState(0.1);
  const [pfdBpcs,setPfdBpcs]=useState(0.1);
  const [pfdAlarm,setPfdAlarm]=useState(0.1);
  const [pfdSIS,setPfdSIS]=useState(0.01);
  const ftolerable=1e-4;
  const fmit=fi*pfdBpcs*pfdAlarm*pfdSIS;
  const cumple=fmit<=ftolerable;
  const silRequerido=(fmit/fi/pfdBpcs/pfdAlarm);
  const getSIL=(pfd)=>pfd<1e-3?'SIL 3':pfd<1e-2?'SIL 2':pfd<1e-1?'SIL 1':'< SIL 1';
  return(<div>
    <div className="sec-title">Calculadora LOPA</div>
    <div className="sec-sub">Determinación de SIL objetivo a partir de frecuencias y créditos de IPL</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">Parámetros del escenario</div>
          {[
            {label:'Frecuencia evento iniciador (f_i)',val:fi,set:setFi,min:0.001,max:10,step:0.01,unit:'/año',fmt:v=>v.toFixed(3)},
            {label:'PFD — BPCS (capa 1)',val:pfdBpcs,set:setPfdBpcs,min:0.01,max:1,step:0.01,unit:'',fmt:v=>v.toFixed(2)},
            {label:'PFD — Alarma operador (capa 2)',val:pfdAlarm,set:setPfdAlarm,min:0.01,max:1,step:0.01,unit:'',fmt:v=>v.toFixed(2)},
            {label:'PFD — SIS (capa 3)',val:pfdSIS,set:setPfdSIS,min:0.0001,max:0.1,step:0.0001,unit:'',fmt:v=>v.toExponential(1)},
          ].map((p,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginBottom:3}}>
                <span>{p.label}</span>
                <span className="blue" style={{fontWeight:700}}>{p.fmt(p.val)}{p.unit}</span>
              </div>
              <input type="range" min={p.min} max={p.max} step={p.step} value={p.val} onChange={e=>p.set(+e.target.value)}
                style={{WebkitAppearance:'none',width:'100%',height:4,background:'#1e3a5f',borderRadius:2,outline:'none'}}/>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Resultado LOPA</div>
          <div style={{background:'#060a14',borderRadius:8,padding:12,marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #1e3a5f22',fontSize:12}}>
              <span style={{color:'#64748b'}}>Frecuencia iniciador:</span>
              <span style={{fontFamily:'monospace',color:'#60a5fa'}}>{fi.toFixed(3)} /año</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #1e3a5f22',fontSize:12}}>
              <span style={{color:'#64748b'}}>× PFD BPCS:</span>
              <span style={{fontFamily:'monospace',color:'#60a5fa'}}>× {pfdBpcs.toFixed(2)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #1e3a5f22',fontSize:12}}>
              <span style={{color:'#64748b'}}>× PFD Alarma:</span>
              <span style={{fontFamily:'monospace',color:'#60a5fa'}}>× {pfdAlarm.toFixed(2)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #1e3a5f22',fontSize:12}}>
              <span style={{color:'#64748b'}}>× PFD SIS:</span>
              <span style={{fontFamily:'monospace',color:'#60a5fa'}}>× {pfdSIS.toExponential(1)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0',fontSize:14,fontWeight:700}}>
              <span style={{color:'#94a3b8'}}>f_mitigada:</span>
              <span style={{fontFamily:'monospace',color:cumple?'#22c55e':'#ef4444'}}>{fmit.toExponential(2)} /año</span>
            </div>
          </div>
          <div style={{borderRadius:8,padding:12,background:cumple?'#14532d33':'#7f1d1d33',border:`1px solid ${cumple?'#22c55e':'#ef4444'}`,textAlign:'center'}}>
            <div style={{fontSize:16,fontWeight:700,color:cumple?'#22c55e':'#ef4444'}}>
              {cumple?'✓ RIESGO TOLERABLE':'✗ RIESGO INTOLERABLE'}
            </div>
            <div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>
              Tolerable: ≤ {ftolerable.toExponential(0)} /año · Actual: {fmit.toExponential(2)} /año
            </div>
            {!cumple&&<div style={{marginTop:6,fontSize:12,color:'#f59e0b'}}>
              SIL requerido para SIS: {getSIL(silRequerido)} (PFD ≤ {silRequerido.toExponential(1)})
            </div>}
          </div>
        </div>
        <div className="def-box">
          <span className="blue" style={{fontWeight:700}}>Interpretación:</span> Si la frecuencia mitigada supera el tolerable, se necesita una SIF adicional (o más restrictiva). El SIL del SIS se determina por la diferencia.
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  const pasos=[
    {n:1,paso:'Definir el escenario peligroso',detail:'Del HAZOP: causa → consecuencia específica con severidad definida'},
    {n:2,paso:'Determinar frecuencia del evento iniciador',detail:'Tablas de frecuencia (CCPS, API) o datos de planta. Unidad: /año'},
    {n:3,paso:'Identificar consecuencia y severidad',detail:'Múltiples fatalidades, fatalidad única, lesión grave, impacto ambiental'},
    {n:4,paso:'Determinar frecuencia tolerable',detail:'Basada en política de tolerabilidad de riesgo de la empresa (ej: 10⁻⁴ /año para fatalidad)'},
    {n:5,paso:'Listar IPL independientes',detail:'Solo IPL verificadas y certificadas. No contar IPL no probadas o no independientes'},
    {n:6,paso:'Calcular frecuencia mitigada',detail:'f_mit = f_iniciador × ∏ PFD_IPLi'},
    {n:7,paso:'Comparar con tolerable',detail:'Si f_mit > f_tolerable → necesita SIF con SIL = RRF_requerido'},
    {n:8,paso:'Determinar SIL objetivo del SIS',detail:'PFD_SIS_req = f_tolerable / (f_iniciador × ∏ PFD_otras_IPL)'},
  ];
  return(<div>
    <div className="sec-title">Procedimiento LOPA Paso a Paso</div>
    <div className="sec-sub">Metodología estándar según CCPS Guidelines for LOPA e IEC 61511</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        {pasos.slice(0,4).map((p,i)=>(
          <div key={i} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:'1px solid #1e3a5f22'}}>
            <div style={{width:26,height:26,borderRadius:'50%',background:'#3b82f6',color:'#fff',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{p.n}</div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'#e2e8f0'}}>{p.paso}</div>
              <div style={{fontSize:10,color:'#64748b',marginTop:2}}>{p.detail}</div>
            </div>
          </div>
        ))}
      </div>
      <div>
        {pasos.slice(4).map((p,i)=>(
          <div key={i} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:'1px solid #1e3a5f22'}}>
            <div style={{width:26,height:26,borderRadius:'50%',background:'#3b82f6',color:'#fff',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{p.n}</div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'#e2e8f0'}}>{p.paso}</div>
              <div style={{fontSize:10,color:'#64748b',marginTop:2}}>{p.detail}</div>
            </div>
          </div>
        ))}
        <div className="def-box" style={{marginTop:8}}>
          <span className="blue" style={{fontWeight:700}}>Documentación requerida:</span> IEC 61511 §11 exige que el análisis LOPA esté documentado, firmado y forme parte del registro de seguridad del SIS.
        </div>
      </div>
    </div>
  </div>);
}

const scenes=[
  {id:1,label:'Concepto LOPA e IPL',comp:<Scene1/>},
  {id:2,label:'Calculadora LOPA',comp:<Scene2/>},
  {id:3,label:'Procedimiento paso a paso',comp:<Scene3/>},
];
function App(){
  const [active,setActive]=useState(1);
  const scene=scenes.find(s=>s.id===active);
  return(
    <div className="slide">
      <div className="topbar">
        <div>
          <div className="topbar-title">IEC 61511 — Seguridad Funcional en la Industria de Proceso</div>
          <div className="topbar-sub">Módulo 2 · Lección 2.2 — Análisis de Capas de Protección (LOPA)</div>
        </div>
        <div className="scene-badge">{active}/{scenes.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          {scenes.map(s=>(
            <div key={s.id} className={'nav-item'+(active===s.id?' active':'')} onClick={()=>setActive(s.id)}>{s.id}. {s.label}</div>
          ))}
        </div>
        <div className="main">{scene.comp}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
