<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 6.1 — Pruebas de Comprobación</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0a0f1e,#0f1a35);border-bottom:2px solid #3b82f6;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#3b82f622;border:1px solid #3b82f655;color:#3b82f6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e3a5f;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:#3b82f610;font-weight:600;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.main{flex:1;padding:16px 22px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:#3b82f644;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e3a5f;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#3b82f6;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 7px 7px 0;padding:10px 14px;margin:7px 0;font-size:12px;line-height:1.6;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const [sil,setSil]=useState(2);
  const silData={
    1:{label:'SIL 1',ti:'5 años (máx)',pfd_range:'0.01 – 0.1',cobertura:'≥ 60%',color:'#22c55e'},
    2:{label:'SIL 2',ti:'2 años (máx)',pfd_range:'0.001 – 0.01',cobertura:'≥ 80%',color:'#3b82f6'},
    3:{label:'SIL 3',ti:'1 año (máx)',pfd_range:'0.0001 – 0.001',cobertura:'≥ 90%',color:'#f59e0b'},
  };
  const d=silData[sil];
  return(<div>
    <div className="sec-title">Proof Test — Prueba de Comprobación</div>
    <div className="sec-sub">La actividad de mantenimiento más crítica para mantener el SIL del sistema</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">¿Qué es el Proof Test?</div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1',marginBottom:8}}>
            El proof test (prueba de comprobación) es una prueba periódica que detecta las <strong>fallas peligrosas no detectadas (λ_DU)</strong> que los diagnósticos automáticos no pueden encontrar. Es la única forma de "resetear" la acumulación de fallas ocultas.
          </p>
          <div className="def-box">
            <span style={{color:'#3b82f6',fontWeight:700}}>IEC 61511 §16.2.4:</span> Las pruebas de comprobación deben realizarse con la frecuencia y cobertura definidas en el SRS para mantener el PFDavg dentro del rango del SIL objetivo.
          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:6}}>Principio fundamental:</div>
            <div style={{background:'#060a14',borderRadius:8,padding:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:11,color:'#cbd5e1'}}>PFDavg ≈ λ_DU × (1 - C_PT) × TI/2</span>
              </div>
              <div style={{fontSize:10,color:'#64748b'}}>Donde C_PT = cobertura del proof test (0 a 1)</div>
              <div style={{fontSize:10,color:'#64748b',marginTop:2}}>TI = intervalo de prueba en horas</div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Intervalos típicos según SIL — selecciona:</div>
          <div style={{display:'flex',gap:6,marginBottom:10}}>
            {[1,2,3].map(s=>(
              <button key={s} onClick={()=>setSil(s)}
                style={{flex:1,background:sil===s?silData[s].color:'transparent',color:sil===s?'#fff':'#94a3b8',border:`1px solid ${silData[s].color}55`,borderRadius:6,padding:'6px 0',cursor:'pointer',fontSize:13,fontWeight:700,transition:'all .2s'}}>
                SIL {s}
              </button>
            ))}
          </div>
          <div className="card" style={{borderLeft:`3px solid ${d.color}`,background:'#060a14'}}>
            <div style={{fontSize:15,fontWeight:700,color:d.color,marginBottom:8}}>{d.label}</div>
            {[
              {l:'Intervalo máximo (TI)',v:d.ti},
              {l:'PFDavg requerida',v:d.pfd_range},
              {l:'Cobertura mínima de prueba',v:d.cobertura},
            ].map((r,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #1e3a5f22',fontSize:11}}>
                <span style={{color:'#94a3b8'}}>{r.l}</span>
                <span style={{color:d.color,fontWeight:700}}>{r.v}</span>
              </div>
            ))}
            <div className="def-box" style={{marginTop:8,borderColor:d.color,fontSize:11}}>
              Mayor cobertura del proof test permite aumentar el intervalo TI manteniendo el mismo PFDavg.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const pasos=[
    {t:'1. Planificación y PTW',d:'Solicitar permiso de trabajo (PTW). Coordinar con operaciones para autorizar el bypass. Notificar al supervisor de seguridad funcional.',doc:'PTW firmado, registro de notificación'},
    {t:'2. Activar bypass documentado',d:'Registrar hora de inicio del bypass en el log del SIS. Confirmar que las alarmas de bypass están activas en la sala de control.',doc:'Registro de bypass con timestamp'},
    {t:'3. Prueba del sensor/transmisor',d:'Simular la variable de proceso (presión, temperatura, nivel) hasta el setpoint de activación. Verificar que la señal llega al lógico.',doc:'Hoja de registro de la prueba'},
    {t:'4. Prueba de lógica',d:'Verificar que la condición de activación en el PLC SIS genera la salida correcta hacia el elemento final.',doc:'Registro de E/S del lógico'},
    {t:'5. Prueba del elemento final',d:'Confirmar que la válvula de seguridad actúa (cierra/abre) correctamente y dentro del tiempo de respuesta requerido.',doc:'Tiempo de respuesta medido'},
    {t:'6. Restauración y cierre',d:'Restaurar el sistema a modo operativo normal. Cancelar bypass. Verificar que todos los indicadores muestran estado normal.',doc:'Registro de cierre de prueba, firma'},
  ];
  const [paso,setPaso]=useState(0);
  return(<div>
    <div className="sec-title">Procedimiento de Proof Test</div>
    <div className="sec-sub">Pasos estándar para ejecutar un proof test completo de una SIF</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">Guía paso a paso</div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10}}>
            {pasos.map((p,i)=>(
              <button key={i} onClick={()=>setPaso(i)}
                style={{background:paso===i?'#3b82f6':'transparent',color:paso===i?'#fff':'#64748b',border:'1px solid #1e3a5f',borderRadius:4,padding:'3px 9px',cursor:'pointer',fontSize:10,fontWeight:700,transition:'all .15s'}}>
                {i+1}
              </button>
            ))}
          </div>
          <div style={{background:'#060a14',borderRadius:8,padding:12,borderLeft:'3px solid #3b82f6'}}>
            <div style={{fontSize:13,fontWeight:700,color:'#3b82f6',marginBottom:6}}>{pasos[paso].t}</div>
            <p style={{fontSize:12,color:'#cbd5e1',lineHeight:1.6,marginBottom:8}}>{pasos[paso].d}</p>
            <div style={{display:'flex',gap:6,background:'#0d1425',padding:'7px 10px',borderRadius:6,alignItems:'flex-start'}}>
              <span style={{color:'#22c55e',flexShrink:0,fontSize:11}}>DOC:</span>
              <span style={{fontSize:11,color:'#86efac'}}>{pasos[paso].doc}</span>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Cobertura del proof test — tipos</div>
          {[
            {tipo:'Proof test completo (100%)',desc:'Prueba todos los componentes del lazo de seguridad de inicio a fin. Detecta todas las fallas λ_DU. Requiere paro de la función.',cob:'~95–98%',color:'#22c55e'},
            {tipo:'Proof test parcial',desc:'Prueba solo subsistemas (sensores + lógica por separado). No verifica el lazo completo end-to-end. Menor disrupción operativa.',cob:'~60–80%',color:'#3b82f6'},
            {tipo:'Partial Stroke Test (PST)',desc:'Prueba del elemento final (válvula) moviendo un porcentaje del recorrido sin llegar al cierre total. No interrumpe el proceso.',cob:'~50–70%',color:'#f59e0b'},
          ].map((t,i)=>(
            <div key={i} style={{padding:'7px 0',borderBottom:'1px solid #1e3a5f22'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{fontSize:11,fontWeight:700,color:t.color}}>{t.tipo}</span>
                <span style={{fontSize:10,color:t.color,fontWeight:700}}>{t.cob}</span>
              </div>
              <p style={{fontSize:10,color:'#64748b',lineHeight:1.4}}>{t.desc}</p>
            </div>
          ))}
          <div className="def-box" style={{marginTop:8}}>
            <span style={{color:'#3b82f6',fontWeight:700}}>Regla:</span> Si se usa proof test parcial, se debe demostrar que la combinación de PST + proof test anual alcanza la cobertura mínima requerida en el SRS.
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  const [ldu,setLdu]=useState(1e-6);
  const [ti,setTi]=useState(8760);
  const [cpt,setCpt]=useState(0.9);
  const pfd=ldu*(1-cpt)*ti/2;
  const pfdNoCov=ldu*ti/2;
  const getSIL=(p)=>p<1e-4?'SIL 3':p<1e-3?'SIL 2':p<1e-2?'SIL 1':'< SIL';
  const silC={'SIL 3':'#f59e0b','SIL 2':'#3b82f6','SIL 1':'#22c55e','< SIL':'#ef4444'};
  return(<div>
    <div className="sec-title">Impacto del Proof Test en el PFDavg</div>
    <div className="sec-sub">Calculadora interactiva — cobertura y frecuencia</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">Parámetros</div>
          {[
            {label:'λ_DU (fallas/hora)',val:ldu,set:setLdu,min:1e-8,max:1e-5,step:1e-8,fmt:v=>v.toExponential(1)},
            {label:'TI — Intervalo de prueba (horas)',val:ti,set:setTi,min:720,max:43800,step:720,fmt:v=>{const y=v/8760;return y>=1?y.toFixed(1)+' años':Math.round(v/720)+' meses'}},
            {label:'Cobertura del proof test (C_PT)',val:cpt,set:setCpt,min:0.1,max:0.99,step:0.01,fmt:v=>(v*100).toFixed(0)+'%'},
          ].map((p,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginBottom:2}}>
                <span>{p.label}</span>
                <span style={{color:'#3b82f6',fontWeight:700,fontFamily:'monospace'}}>{p.fmt(p.val)}</span>
              </div>
              <input type="range" min={p.min} max={p.max} step={p.step} value={p.val} onChange={e=>p.set(+e.target.value)}
                style={{WebkitAppearance:'none',width:'100%',height:4,background:'#1e3a5f',borderRadius:2,outline:'none'}}/>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Resultado</div>
          <div style={{background:'#060a14',borderRadius:8,padding:14}}>
            {[
              {label:'Sin cobertura (C_PT=0)',pfd:pfdNoCov,note:'Solo por frecuencia TI'},
              {label:`Con cobertura ${(cpt*100).toFixed(0)}%`,pfd:pfd,note:'Efecto combinado TI + cobertura'},
            ].map((r,i)=>(
              <div key={i} style={{marginBottom:12}}>
                <div style={{fontSize:11,color:'#94a3b8',marginBottom:4}}>{r.label}</div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{fontSize:20,fontWeight:700,color:silC[getSIL(r.pfd)],fontFamily:'monospace'}}>{r.pfd.toExponential(2)}</div>
                  <div style={{background:silC[getSIL(r.pfd)]+'33',border:`1px solid ${silC[getSIL(r.pfd)]}55`,color:silC[getSIL(r.pfd)],borderRadius:4,padding:'2px 8px',fontSize:12,fontWeight:700}}>{getSIL(r.pfd)}</div>
                </div>
                <div style={{fontSize:9,color:'#475569',marginTop:2}}>{r.note}</div>
              </div>
            ))}
            <div style={{height:1,background:'#1e3a5f',marginBottom:10}}/>
            <div style={{fontSize:11,color:'#22c55e'}}>
              Mejora: <span style={{fontWeight:700,fontFamily:'monospace'}}>{(pfdNoCov/Math.max(pfd,1e-12)).toFixed(1)}×</span> reducción en PFDavg gracias a la cobertura
            </div>
          </div>
          <div className="def-box" style={{marginTop:8}}>
            <span style={{color:'#3b82f6',fontWeight:700}}>Conclusión:</span> Aumentar la cobertura del proof test tiene mayor impacto en el PFDavg que aumentar la frecuencia de prueba.
          </div>
        </div>
      </div>
    </div>
  </div>);
}

const scenes=[
  {id:1,label:'¿Qué es el Proof Test?',comp:<Scene1/>},
  {id:2,label:'Procedimiento estándar',comp:<Scene2/>},
  {id:3,label:'Impacto en PFDavg',comp:<Scene3/>},
];
function App(){
  const [active,setActive]=useState(1);
  const scene=scenes.find(s=>s.id===active);
  return(
    <div className="slide">
      <div className="topbar">
        <div>
          <div className="topbar-title">IEC 61511 — Seguridad Funcional en la Industria de Proceso</div>
          <div className="topbar-sub">Módulo 6 · Lección 6.1 — Pruebas de comprobación y frecuencia de inspección</div>
        </div>
        <div className="scene-badge">{active}/{scenes.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          {scenes.map(s=>(
            <div key={s.id} className={'nav-item'+(active===s.id?' active':'')} onClick={()=>setActive(s.id)}>{s.id}. {s.label}</div>
          ))}
        </div>
        <div className="main">{scene.comp}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
