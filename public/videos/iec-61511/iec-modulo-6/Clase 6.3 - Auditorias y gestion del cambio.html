<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 6.3 — Auditorías y Gestión del Cambio</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0a0f1e,#0f1a35);border-bottom:2px solid #3b82f6;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#3b82f622;border:1px solid #3b82f655;color:#3b82f6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e3a5f;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:#3b82f610;font-weight:600;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.main{flex:1;padding:16px 22px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:#3b82f644;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e3a5f;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#3b82f6;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 7px 7px 0;padding:10px 14px;margin:7px 0;font-size:12px;line-height:1.6;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const [step,setStep]=useState(0);
  const mocSteps=[
    {t:'1. Solicitud de cambio',d:'Documentar la naturaleza del cambio propuesto. ¿Qué se cambia? ¿Por qué? ¿Cuál es el alcance? Incluir descripción técnica y justificación.',doc:'Formulario MOC con descripción del cambio'},
    {t:'2. Clasificación del cambio',d:'Determinar si el cambio es: Temporal o Permanente. Menor (sin impacto en SIL) o Mayor (requiere revalidación SIL). Esta clasificación determina el nivel de revisión requerido.',doc:'Clasificación MOC firmada por ingeniero SIS'},
    {t:'3. Evaluación de impacto en seguridad',d:'Revisar si el cambio afecta: SIL del sistema, PFDavg, arquitectura, tiempos de respuesta, lógica de seguridad, interfaces. Si hay impacto → HAZOP/LOPA parcial.',doc:'Evaluación de impacto en seguridad funcional'},
    {t:'4. Revisión y aprobación',d:'El cambio debe ser revisado por: Ingeniero de seguridad funcional, Operaciones, Mantenimiento, HSE. Firmas de aprobación obligatorias antes de implementar.',doc:'Lista de firmas de aprobación del MOC'},
    {t:'5. Implementación controlada',d:'Ejecutar el cambio siguiendo el procedimiento aprobado. Documentar exactamente lo realizado. Actualizar planos as-built, P&IDs, lógica.',doc:'Registros de implementación, as-built actualizado'},
    {t:'6. Verificación post-cambio',d:'Confirmar que el sistema modificado cumple con el SRS actualizado. Realizar proof test del área afectada. Si el cambio es mayor → SAT parcial.',doc:'Registro de pruebas post-cambio, cierre del MOC'},
  ];
  return(<div>
    <div className="sec-title">Gestión del Cambio (MOC) en SIS</div>
    <div className="sec-sub">IEC 61511 §17 — Todo cambio al SIS requiere un proceso formal de MOC</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">¿Por qué el MOC es crítico?</div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1',marginBottom:8}}>
            Los cambios no gestionados al SIS son una de las principales causas de degradación del SIL. Un cambio aparentemente pequeño puede alterar la lógica, el PFDavg o la cobertura del proof test sin que nadie lo detecte.
          </p>
          {[
            {err:'Reemplazar un sensor por "uno equivalente"',imp:'El nuevo sensor puede tener λ_DU diferente — el PFDavg cambia'},
            {err:'Cambiar el setpoint en campo',imp:'Puede invalidar el resultado del LOPA original'},
            {err:'Modificar la lógica para resolver una alarma molesta',imp:'Puede eliminar una SIF sin intención'},
          ].map((e,i)=>(
            <div key={i} style={{padding:'5px 0',borderBottom:'1px solid #1e3a5f22'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#ef4444'}}>✗ {e.err}</div>
              <div style={{fontSize:9,color:'#64748b',marginTop:1}}>→ {e.imp}</div>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Proceso MOC — 6 pasos</div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>
            {mocSteps.map((s,i)=>(
              <button key={i} onClick={()=>setStep(i)}
                style={{background:step===i?'#3b82f6':'transparent',color:step===i?'#fff':'#64748b',border:'1px solid #1e3a5f',borderRadius:4,padding:'3px 8px',cursor:'pointer',fontSize:9,fontWeight:700}}>
                {i+1}
              </button>
            ))}
          </div>
          <div style={{background:'#060a14',borderRadius:8,padding:10,borderLeft:'3px solid #3b82f6'}}>
            <div style={{fontSize:12,fontWeight:700,color:'#3b82f6',marginBottom:5}}>{mocSteps[step].t}</div>
            <p style={{fontSize:11,color:'#cbd5e1',lineHeight:1.5,marginBottom:6}}>{mocSteps[step].d}</p>
            <div style={{display:'flex',gap:5,alignItems:'flex-start'}}>
              <span style={{color:'#22c55e',fontSize:10,fontWeight:700,flexShrink:0}}>DOC:</span>
              <span style={{fontSize:10,color:'#86efac'}}>{mocSteps[step].doc}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const areas=[
    {area:'Documentación del SIS',items:['SRS actualizado con todos los cambios','P&IDs y diagramas lógicos as-built','Cálculos de PFDavg vigentes','Certificados SIL de dispositivos en uso','Registros de todos los proof tests realizados'],color:'#3b82f6'},
    {area:'Registros operativos',items:['Log de bypasses (inicio, fin, autorización)','Registro de demandas al SIS (trips reales)','Historial de fallas y acciones correctivas','Registros de inspecciones y mantenimiento','Informes de desviaciones del SRS'],color:'#22c55e'},
    {area:'Gestión del ciclo de vida',items:['MOCs aprobados y cerrados','Revalidaciones SIL documentadas','Evaluaciones de cambio menores','Contratos y responsabilidades del SIS','Plan de descomisionamiento vigente'],color:'#f59e0b'},
  ];
  const [sel,setSel]=useState(0);
  return(<div>
    <div className="sec-title">Auditoría de Seguridad Funcional</div>
    <div className="sec-sub">¿Qué busca un auditor de IEC 61511 cuando visita tu planta?</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">Objetivo de la auditoría</div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1',marginBottom:8}}>
            Una auditoría de seguridad funcional verifica que el SIS sigue cumpliendo los requisitos del SRS durante toda su vida operativa. No es una inspección puntual — evalúa el <strong>sistema de gestión</strong>.
          </p>
          <div className="def-box">
            <span style={{color:'#3b82f6',fontWeight:700}}>IEC 61511 §5.2:</span> La organización debe demostrar competencia en seguridad funcional. Esto incluye auditorías periódicas independientes del SIS.
          </div>
          <div style={{marginTop:8,fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:6}}>Frecuencia recomendada:</div>
          {[
            {tipo:'Auditoría interna',frec:'Anual — por el equipo de ingeniería SIS'},
            {tipo:'Auditoría funcional',frec:'Cada 3–5 años — por tercero independiente'},
            {tipo:'Auditoría de certificación',frec:'Según requerimientos regulatorios locales'},
          ].map((a,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid #1e3a5f22',fontSize:11}}>
              <span style={{color:'#cbd5e1'}}>{a.tipo}</span>
              <span style={{color:'#3b82f6',fontSize:10}}>{a.frec}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Dossier de seguridad — qué debe contener</div>
          <div style={{display:'flex',gap:5,marginBottom:8}}>
            {areas.map((a,i)=>(
              <button key={i} onClick={()=>setSel(i)}
                style={{flex:1,background:sel===i?a.color+'22':'transparent',color:sel===i?a.color:'#64748b',border:`1px solid ${sel===i?a.color:a.color+'33'}`,borderRadius:5,padding:'4px 0',cursor:'pointer',fontSize:9,fontWeight:700,transition:'all .2s'}}>
                {a.area.split(' ').slice(0,2).join(' ')}
              </button>
            ))}
          </div>
          <div style={{fontSize:11,fontWeight:700,color:areas[sel].color,marginBottom:7}}>{areas[sel].area}</div>
          {areas[sel].items.map((it,i)=>(
            <div key={i} style={{display:'flex',gap:6,padding:'4px 0',borderBottom:'1px solid #1e3a5f22',alignItems:'flex-start'}}>
              <span style={{color:areas[sel].color,flexShrink:0,fontSize:11}}>✓</span>
              <span style={{fontSize:11,color:'#cbd5e1'}}>{it}</span>
            </div>
          ))}
          <div className="def-box" style={{marginTop:8,borderColor:areas[sel].color}}>
            El dossier de seguridad es un requisito de IEC 61511. Debe estar disponible en todo momento para auditorías y debe actualizarse con cada MOC.
          </div>
        </div>
      </div>
    </div>
  </div>);
}

const scenes=[
  {id:1,label:'Gestión del Cambio (MOC)',comp:<Scene1/>},
  {id:2,label:'Auditorías y dossier',comp:<Scene2/>},
];
function App(){
  const [active,setActive]=useState(1);
  const scene=scenes.find(s=>s.id===active);
  return(
    <div className="slide">
      <div className="topbar">
        <div>
          <div className="topbar-title">IEC 61511 — Seguridad Funcional en la Industria de Proceso</div>
          <div className="topbar-sub">Módulo 6 · Lección 6.3 — Auditorías y gestión del cambio (MOC)</div>
        </div>
        <div className="scene-badge">{active}/{scenes.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          {scenes.map(s=>(
            <div key={s.id} className={'nav-item'+(active===s.id?' active':'')} onClick={()=>setActive(s.id)}>{s.id}. {s.label}</div>
          ))}
        </div>
        <div className="main">{scene.comp}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
