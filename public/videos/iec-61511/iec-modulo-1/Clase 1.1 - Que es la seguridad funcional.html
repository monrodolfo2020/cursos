<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 1.1 — ¿Qué es la seguridad funcional?</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.blue{color:#3b82f6;}.cyan{color:#22d3ee;}.green{color:#22c55e;}.red{color:#ef4444;}.amber{color:#f59e0b;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0a0f1e,#0f1a35);border-bottom:2px solid #3b82f6;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#3b82f622;border:1px solid #3b82f655;color:#3b82f6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e3a5f;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;line-height:1.3;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:#3b82f610;font-weight:600;}
.main{flex:1;padding:16px 22px;overflow-y:auto;overflow-x:hidden;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:#0d1425;}
.main::-webkit-scrollbar-thumb{background:#3b82f644;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e3a5f;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#3b82f6;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 7px 7px 0;padding:10px 14px;margin:7px 0;font-size:12px;line-height:1.6;}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin:2px;}
.tag-blue{background:#1e40af44;color:#93c5fd;border:1px solid #1e40af66;}
.tag-green{background:#14532d44;color:#86efac;border:1px solid #14532d66;}
.tag-red{background:#7f1d1d44;color:#fca5a5;border:1px solid #7f1d1d66;}
.tag-amber{background:#78350f44;color:#fcd34d;border:1px solid #78350f66;}
.pill{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;align-items:center;gap:4px;}
.pill-blue{background:#1e3a8a55;color:#93c5fd;border:1px solid #3b82f644;}
.step{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid #1e3a5f;}
.step:last-child{border-bottom:none;}
.step-n{width:24px;height:24px;border-radius:50%;background:#3b82f6;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-body{font-size:12px;line-height:1.6;color:#cbd5e1;}
.step-title{font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:2px;}
.quiz-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;border:1px solid #1e3a5f;cursor:pointer;margin:5px 0;font-size:12px;transition:all .15s;}
.quiz-opt:hover{border-color:#3b82f655;background:#3b82f608;}
.quiz-opt.correct{border-color:#22c55e;background:#14532d33;color:#86efac;}
.quiz-opt.wrong{border-color:#ef4444;background:#7f1d1d33;color:#fca5a5;}
.btn-blue{background:#3b82f6;color:#fff;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;}
.btn-blue:hover{background:#2563eb;}
.info-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1e3a5f11;font-size:12px;}
.accent-num{font-size:28px;font-weight:800;color:#3b82f6;line-height:1;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const concepts=[
    {icon:'⚙️',term:'Seguridad',def:'Ausencia de riesgo inaceptable. No significa riesgo cero — significa que el riesgo residual está dentro de límites tolerables definidos por la sociedad.'},
    {icon:'🔧',term:'Funcional',def:'Relativo a la función de un sistema. La seguridad funcional depende del correcto funcionamiento de sistemas eléctricos, electrónicos o programables (E/E/PE).'},
    {icon:'🛡️',term:'Seguridad Funcional',def:'La parte de la seguridad global que depende del correcto funcionamiento del equipo y sistemas de control de seguridad en respuesta a sus entradas.'},
  ];
  return(<div>
    <div className="sec-title">¿Qué es la Seguridad Funcional?</div>
    <div className="sec-sub">Módulo 1 · Lección 1.1 — IEC 61511 / SAFEBK-RM003A</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        {concepts.map((c,i)=>(
          <div key={i} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <span style={{fontSize:18}}>{c.icon}</span>
              <span className="card-h" style={{margin:0}}>{c.term}</span>
            </div>
            <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1'}}>{c.def}</p>
          </div>
        ))}
        <div className="def-box">
          <span className="blue" style={{fontWeight:700}}>IEC 61511 Cláusula 3.49:</span><br/>
          <em>"La parte de la seguridad general relativa al equipo bajo control (EUC) y el sistema de control EUC que depende del correcto funcionamiento de los sistemas E/E/PE relacionados con la seguridad y otros sistemas reductores de riesgo."</em>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">El Triángulo de Seguridad</div>
          <div style={{textAlign:'center',padding:'10px 0'}}>
            <svg width="220" height="180" viewBox="0 0 220 180">
              <polygon points="110,10 210,170 10,170" fill="none" stroke="#3b82f6" strokeWidth="2"/>
              <polygon points="110,50 170,150 50,150" fill="#3b82f622" stroke="#3b82f644" strokeWidth="1"/>
              <polygon points="110,90 150,150 70,150" fill="#22c55e22" stroke="#22c55e44" strokeWidth="1"/>
              <text x="110" y="35" textAnchor="middle" fill="#3b82f6" fontSize="11" fontWeight="700">Seguridad Intrínseca</text>
              <text x="110" y="80" textAnchor="middle" fill="#60a5fa" fontSize="10">Seguridad Funcional</text>
              <text x="110" y="130" textAnchor="middle" fill="#22c55e" fontSize="10">Procedimientos</text>
              <text x="110" y="165" textAnchor="middle" fill="#94a3b8" fontSize="9">Capas de Protección</text>
            </svg>
          </div>
          <p style={{fontSize:11,color:'#94a3b8',lineHeight:1.5}}>
            La seguridad se logra por capas: primero el diseño intrínseco, luego sistemas instrumentados y finalmente procedimientos operativos.
          </p>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">¿Por qué "funcional"?</div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1'}}>
            Se llama "funcional" porque la seguridad <strong>depende de que el equipo funcione correctamente</strong> cuando se le demanda.
            Un sensor que falla en silencio puede no detectar una condición peligrosa. Un PLC con firmware defectuoso puede no ejecutar la acción de seguridad.
            La norma IEC 61511 nos da el marco para asegurar que estos sistemas funcionen cuando más se los necesita.
          </p>
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const cadena=[
    {label:'Peligro (Hazard)',desc:'Fuente de daño potencial. Ej: reactor con reacción exotérmica a alta presión.',color:'#ef4444'},
    {label:'Evento Iniciador',desc:'Lo que activa el peligro. Ej: pérdida de refrigeración, válvula bloqueada.',color:'#f97316'},
    {label:'Falla de Protecciones',desc:'Las barreras no actúan. Ej: alarma ignorada, SIS fuera de servicio.',color:'#f59e0b'},
    {label:'Evento Peligroso',desc:'Materialización del peligro. Ej: sobrepresión en reactor.',color:'#ef4444'},
    {label:'Consecuencia',desc:'El daño real. Ej: explosión, liberación tóxica, incendio.',color:'#dc2626'},
  ];
  const accidentes=[
    {año:'1974',lugar:'Flixborough, UK',causa:'Falla de bypass en reactor ciclohexano',victimas:'28 muertos'},
    {año:'1984',lugar:'Bhopal, India',causa:'Falla de sistema de seguridad — liberación de MIC',victimas:'+3,000 muertos'},
    {año:'1988',lugar:'Piper Alpha, UK',causa:'Falla de sistema contra incendio y ESD',victimas:'167 muertos'},
    {año:'2005',lugar:'Texas City, USA',causa:'Overflow de fraccionadora sin alarma efectiva',victimas:'15 muertos'},
  ];
  return(<div>
    <div className="sec-title">¿Por qué ocurren los accidentes?</div>
    <div className="sec-sub">Cadena de eventos y falla de barreras de seguridad</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">La Cadena Causal</div>
          {cadena.map((c,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:c.color,flexShrink:0}}/>
              <div style={{flex:1}}>
                <span style={{fontSize:12,fontWeight:700,color:c.color}}>{c.label}: </span>
                <span style={{fontSize:11,color:'#94a3b8'}}>{c.desc}</span>
              </div>
            </div>
          ))}
        </div>
        <div className="def-box" style={{marginTop:8}}>
          <span className="blue" style={{fontWeight:700}}>Conclusión clave:</span> El accidente industrial es generalmente el resultado de <em>múltiples fallas simultáneas</em> de barreras de seguridad. La seguridad funcional es una de esas barreras.
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Accidentes que cambiaron la industria</div>
          {accidentes.map((a,i)=>(
            <div key={i} style={{display:'grid',gridTemplateColumns:'50px 1fr',gap:8,padding:'6px 0',borderBottom:'1px solid #1e3a5f11'}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:'#3b82f6'}}>{a.año}</div>
                <div style={{fontSize:9,color:'#64748b'}}>{a.lugar}</div>
              </div>
              <div>
                <div style={{fontSize:11,color:'#cbd5e1',lineHeight:1.4}}>{a.causa}</div>
                <div className="tag tag-red" style={{marginTop:2}}>{a.victimas}</div>
              </div>
            </div>
          ))}
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">Lección aprendida</div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1'}}>
            Cada uno de estos accidentes reveló que los sistemas de seguridad <strong>existían</strong> pero <strong>no funcionaron</strong> cuando se necesitaban.
            Esto llevó al desarrollo de normas específicas para garantizar la integridad de los sistemas de seguridad instrumentados.
          </p>
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  const historia=[
    {año:'1974',hito:'Flixborough — UK comienza a regular sistemas de presión'},
    {año:'1984',hito:'Bhopal — la ONU impulsa convenios de seguridad química'},
    {año:'1992',hito:'OSHA PSM 29 CFR 1910.119 — gestión de la seguridad de procesos (USA)'},
    {año:'1996',hito:'IEC 61508 Ed.1 — primera norma de seguridad funcional genérica (E/E/PE)'},
    {año:'2000',hito:'ISA S84 — estándar específico para SIS en industria de proceso'},
    {año:'2003',hito:'IEC 61511 Ed.1 — norma específica para la industria de proceso'},
    {año:'2010',hito:'IEC 61508 Ed.2 — revisión mayor con énfasis en software'},
    {año:'2016',hito:'IEC 61511 Ed.2 — actualización con nuevos requisitos de ciberseguridad'},
  ];
  return(<div>
    <div className="sec-title">Historia y Evolución Normativa</div>
    <div className="sec-sub">Del accidente industrial a la norma IEC 61511</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">Línea del Tiempo</div>
          <div style={{position:'relative',paddingLeft:16}}>
            <div style={{position:'absolute',left:5,top:0,bottom:0,width:2,background:'#1e3a5f'}}/>
            {historia.map((h,i)=>(
              <div key={i} style={{position:'relative',paddingLeft:16,marginBottom:8}}>
                <div style={{position:'absolute',left:-11,top:4,width:8,height:8,borderRadius:'50%',background:'#3b82f6'}}/>
                <span style={{fontSize:11,fontWeight:700,color:'#3b82f6'}}>{h.año} </span>
                <span style={{fontSize:11,color:'#94a3b8'}}>{h.hito}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">La Familia Normativa</div>
          <div style={{textAlign:'center',padding:'8px 0'}}>
            <div style={{background:'#1e3a8a44',border:'2px solid #3b82f6',borderRadius:8,padding:'8px 16px',marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,color:'#3b82f6'}}>IEC 61508</div>
              <div style={{fontSize:10,color:'#94a3b8'}}>Norma genérica — todos los sectores</div>
            </div>
            <div style={{fontSize:11,color:'#64748b',marginBottom:4}}>↓ Derivadas</div>
            <div className="grid3">
              {[
                {norm:'IEC 61511',sector:'Industria de Proceso'},
                {norm:'IEC 62061',sector:'Maquinaria'},
                {norm:'EN 50128',sector:'Ferroviario'},
              ].map((n,i)=>(
                <div key={i} style={{background:'#0a1628',border:'1px solid #1e3a5f',borderRadius:6,padding:'6px 8px',textAlign:'center'}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#60a5fa'}}>{n.norm}</div>
                  <div style={{fontSize:9,color:'#64748b'}}>{n.sector}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="def-box" style={{marginTop:8}}>
            <span className="blue" style={{fontWeight:700}}>Clave:</span> IEC 61511 es la norma hija de IEC 61508 para la industria de proceso. Si usas IEC 61511, cumples con IEC 61508.
          </div>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">¿Qué regula IEC 61511?</div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1'}}>
            Aplica a toda la <strong>industria de proceso</strong>: refinerías, plantas petroquímicas, plantas químicas, almacenamiento de gas natural licuado (GNL), oleoductos, plantas de papel, industria farmacéutica y cualquier instalación con procesos continuos o semicontinuos que puedan causar daño catastrófico.
          </p>
        </div>
      </div>
    </div>
  </div>);
}

function Scene4(){
  const diffs=[
    {label:'BPCS',full:'Basic Process Control System',icon:'⚙️',desc:'Sistema de control de proceso normal. Mantiene variables en setpoint. PID, lazos de control, DCS. NO está diseñado para seguridad.',color:'#3b82f6'},
    {label:'SIS',full:'Safety Instrumented System',icon:'🛡️',desc:'Sistema diseñado EXCLUSIVAMENTE para seguridad. Actúa SOLO cuando el BPCS falla o no puede mantener condiciones seguras. Independiente del BPCS.',color:'#22c55e'},
  ];
  return(<div>
    <div className="sec-title">BPCS vs SIS — El Rol de la Instrumentación</div>
    <div className="sec-sub">Diferencia fundamental entre control de proceso y seguridad</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        {diffs.map((d,i)=>(
          <div key={i} className="card" style={{borderLeft:`3px solid ${d.color}`,marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <span style={{fontSize:20}}>{d.icon}</span>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:d.color}}>{d.label}</div>
                <div style={{fontSize:10,color:'#64748b'}}>{d.full}</div>
              </div>
            </div>
            <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1'}}>{d.desc}</p>
          </div>
        ))}
        <div className="card">
          <div className="card-h">Regla de oro IEC 61511</div>
          <div className="def-box">
            El SIS debe ser <strong>independiente</strong> del BPCS para poder actuar cuando el BPCS falla. No pueden compartir sensores, lógica ni alimentación eléctrica sin una evaluación de independencia.
          </div>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Capas de Protección en un proceso real</div>
          {[
            {n:1,label:'BPCS — Control normal',color:'#3b82f6',desc:'Lazo PID, controladores, válvulas de proceso'},
            {n:2,label:'Alarmas — Alertas al operador',color:'#6366f1',desc:'HIAH, LIAL — el operador interviene'},
            {n:3,label:'SIS — Acción automática de seguridad',color:'#22c55e',desc:'Tripeo, cierre de válvula ESD, paro de emergencia'},
            {n:4,label:'Protección física — PSV, discos',color:'#f59e0b',desc:'Válvulas de alivio, discos de ruptura'},
            {n:5,label:'Contención — Diques, muros',color:'#ef4444',desc:'Última barrera antes de impacto externo'},
          ].map((l,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:'1px solid #1e3a5f22'}}>
              <div style={{width:22,height:22,borderRadius:'50%',background:l.color,color:'#fff',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{l.n}</div>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:l.color}}>{l.label}</div>
                <div style={{fontSize:10,color:'#64748b'}}>{l.desc}</div>
              </div>
            </div>
          ))}
        </div>
        <div className="def-box" style={{marginTop:8}}>
          <span className="blue" style={{fontWeight:700}}>Concepto clave:</span> La seguridad funcional (SIS) es la Capa 3. Actúa cuando las Capas 1 y 2 no lograron evitar la condición peligrosa.
        </div>
      </div>
    </div>
  </div>);
}

function Scene5(){
  const [current,setCurrent]=useState(0);
  const [answered,setAnswered]=useState({});
  const qs=[
    {q:'¿Qué significa "funcional" en "seguridad funcional"?',
     opts:['Que el sistema es fácil de usar','Que la seguridad depende del correcto funcionamiento del equipo','Que aplica solo a funciones administrativas','Que requiere un técnico funcional'],
     correct:1,exp:'La seguridad funcional depende del correcto funcionamiento de sistemas E/E/PE. Si el equipo no funciona, la seguridad no se logra.'},
    {q:'¿Qué relación existe entre IEC 61508 e IEC 61511?',
     opts:['Son normas independientes sin relación','IEC 61511 es la norma genérica e IEC 61508 la específica','IEC 61511 es la norma hija de IEC 61508 para la industria de proceso','IEC 61508 aplica solo para maquinaria'],
     correct:2,exp:'IEC 61511 es la norma derivada (hija) de IEC 61508 especialmente para la industria de proceso: refinerías, plantas químicas, petroquímicas.'},
    {q:'Un SIS y un BPCS, ¿pueden compartir el mismo PLC?',
     opts:['Sí, siempre que sea un PLC moderno','Sí, si se programan en módulos separados','No, deben ser independientes según IEC 61511','Solo si el fabricante lo permite'],
     correct:2,exp:'IEC 61511 requiere independencia entre el SIS y el BPCS. No pueden compartir lógica ni sensores sin una evaluación formal de independencia.'},
    {q:'¿Qué accidente impulsó el desarrollo de normas de seguridad funcional para la industria de proceso?',
     opts:['Challenger 1986','Bhopal 1984 y Piper Alpha 1988','Three Mile Island 1979','Chernobyl 1986'],
     correct:1,exp:'Bhopal (1984, liberación de MIC con +3000 muertos) y Piper Alpha (1988, falla de ESD con 167 muertos) fueron los principales impulsores de IEC 61511.'},
  ];
  function answer(qi,oi){
    if(answered[qi]!==undefined)return;
    setAnswered(p=>({...p,[qi]:oi}));
  }
  const q=qs[current];
  const ans=answered[current];
  const score=Object.keys(answered).filter(k=>answered[k]===qs[k].correct).length;
  return(<div>
    <div className="sec-title">Quiz — Lección 1.1</div>
    <div className="sec-sub">Verifica tu comprensión antes de continuar</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:12,color:'#94a3b8'}}>Pregunta {current+1} de {qs.length}</span>
            <span style={{fontSize:12,fontWeight:700,color:'#22c55e'}}>{score}/{Object.keys(answered).length} correctas</span>
          </div>
          <p style={{fontSize:13,fontWeight:600,color:'#e2e8f0',lineHeight:1.5,marginBottom:12}}>{q.q}</p>
          {q.opts.map((o,i)=>(
            <div key={i} className={'quiz-opt'+(ans===i?(i===q.correct?' correct':' wrong'):(ans!==undefined&&i===q.correct?' correct':''))}
                 onClick={()=>answer(current,i)}>
              <span style={{width:20,height:20,border:'1px solid #3b82f644',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#3b82f6',flexShrink:0}}>
                {String.fromCharCode(65+i)}
              </span>
              <span>{o}</span>
            </div>
          ))}
          {ans!==undefined&&(
            <div className="def-box" style={{marginTop:8}}>
              <span style={{fontWeight:700,color:ans===q.correct?'#22c55e':'#ef4444'}}>{ans===q.correct?'✓ Correcto':'✗ Incorrecto'}</span>
              <p style={{marginTop:4,fontSize:11,color:'#cbd5e1'}}>{q.exp}</p>
            </div>
          )}
          <div style={{display:'flex',gap:8,marginTop:10}}>
            {current>0&&<button className="btn-blue" style={{background:'transparent',border:'1px solid #3b82f644',color:'#94a3b8'}} onClick={()=>setCurrent(p=>p-1)}>← Anterior</button>}
            {current<qs.length-1&&<button className="btn-blue" onClick={()=>setCurrent(p=>p+1)}>Siguiente →</button>}
          </div>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Resumen de la Lección</div>
          {[
            'La seguridad funcional depende del correcto funcionamiento de sistemas E/E/PE.',
            'IEC 61511 es la norma específica para la industria de proceso, derivada de IEC 61508.',
            'El SIS debe ser independiente del BPCS para garantizar su disponibilidad.',
            'Las capas de protección forman una defensa en profundidad contra accidentes.',
            'Accidentes históricos (Bhopal, Piper Alpha, Texas City) impulsaron el desarrollo normativo.',
          ].map((p,i)=>(
            <div key={i} style={{display:'flex',gap:8,padding:'6px 0',borderBottom:'1px solid #1e3a5f22',fontSize:12,color:'#cbd5e1'}}>
              <span style={{color:'#3b82f6',fontWeight:700,flexShrink:0}}>✓</span>
              <span>{p}</span>
            </div>
          ))}
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">Próxima lección</div>
          <p style={{fontSize:12,color:'#cbd5e1',lineHeight:1.6}}>
            En la <strong>Clase 1.2</strong> estudiaremos la estructura de IEC 61511: sus tres partes, requisitos principales y cómo se aplica a un proyecto real de seguridad de procesos.
          </p>
        </div>
      </div>
    </div>
  </div>);
}

const scenes=[
  {id:1,label:'Definición y contexto',comp:<Scene1/>},
  {id:2,label:'¿Por qué ocurren accidentes?',comp:<Scene2/>},
  {id:3,label:'Historia normativa',comp:<Scene3/>},
  {id:4,label:'BPCS vs SIS',comp:<Scene4/>},
  {id:5,label:'Quiz de comprensión',comp:<Scene5/>},
];

function App(){
  const [active,setActive]=useState(1);
  const scene=scenes.find(s=>s.id===active);
  return(
    <div className="slide">
      <div className="topbar">
        <div>
          <div className="topbar-title">IEC 61511 — Seguridad Funcional en la Industria de Proceso</div>
          <div className="topbar-sub">Módulo 1 · Lección 1.1 — ¿Qué es la seguridad funcional?</div>
        </div>
        <div className="scene-badge">{active}/{scenes.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          {scenes.map(s=>(
            <div key={s.id} className={'nav-item'+(active===s.id?' active':'')} onClick={()=>setActive(s.id)}>
              {s.id}. {s.label}
            </div>
          ))}
        </div>
        <div className="main">{scene.comp}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
