<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 1.3 — Terminología: SIS, SIF, SIL, PFD</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.blue{color:#3b82f6;}.green{color:#22c55e;}.amber{color:#f59e0b;}.red{color:#ef4444;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0a0f1e,#0f1a35);border-bottom:2px solid #3b82f6;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#3b82f622;border:1px solid #3b82f655;color:#3b82f6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e3a5f;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:#3b82f610;font-weight:600;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.main{flex:1;padding:16px 22px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:#3b82f644;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e3a5f;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#3b82f6;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 7px 7px 0;padding:10px 14px;margin:7px 0;font-size:12px;line-height:1.6;}
.big-term{font-size:32px;font-weight:900;color:#3b82f6;letter-spacing:2px;}
.quiz-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;border:1px solid #1e3a5f;cursor:pointer;margin:5px 0;font-size:12px;transition:all .15s;}
.quiz-opt:hover{border-color:#3b82f655;background:#3b82f608;}
.quiz-opt.correct{border-color:#22c55e;background:#14532d33;color:#86efac;}
.quiz-opt.wrong{border-color:#ef4444;background:#7f1d1d33;color:#fca5a5;}
.btn-blue{background:#3b82f6;color:#fff;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#0f1729;color:#3b82f6;padding:7px 10px;text-align:left;border-bottom:1px solid #1e3a5f;font-size:10px;text-transform:uppercase;}
td{padding:6px 10px;border-bottom:1px solid #0f1729;color:#cbd5e1;}
tr:hover td{background:#ffffff05;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  return(<div>
    <div className="sec-title">SIS — Sistema Instrumentado de Seguridad</div>
    <div className="sec-sub">Safety Instrumented System · IEC 61511 §3.2.67</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div style={{textAlign:'center',padding:'8px 0 12px'}}>
            <div className="big-term">SIS</div>
            <div style={{fontSize:11,color:'#64748b',marginTop:2}}>Safety Instrumented System</div>
          </div>
          <div className="def-box">
            Sistema compuesto de sensores, logic solvers y elementos finales cuya función es llevar al equipo bajo control (EUC) a un estado seguro cuando se detectan condiciones peligrosas predefinidas.
          </div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1',marginTop:8}}>
            Un SIS implementa una o más <strong>Funciones Instrumentadas de Seguridad (SIF)</strong>. El SIS es el sistema físico completo; las SIF son las funciones individuales que ejecuta.
          </p>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">Componentes de un SIS</div>
          {[
            {comp:'Sensores / Transmisores',role:'Detectan la condición peligrosa (presión alta, temperatura alta, nivel alto)'},
            {comp:'Logic Solver (PLC SIS)',role:'Evalúa las entradas y decide si ejecutar la función de seguridad'},
            {comp:'Elementos Finales',role:'Ejecutan la acción de seguridad (cierre de válvula ESD, paro de bomba)'},
          ].map((c,i)=>(
            <div key={i} style={{display:'flex',gap:8,padding:'6px 0',borderBottom:'1px solid #1e3a5f22'}}>
              <span style={{color:'#3b82f6',fontWeight:700,fontSize:16,flexShrink:0}}>›</span>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:'#e2e8f0'}}>{c.comp}</div>
                <div style={{fontSize:10,color:'#64748b'}}>{c.role}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Ejemplo real: SIS en una caldera industrial</div>
          <div style={{background:'#060a14',borderRadius:8,padding:12,marginBottom:8}}>
            <div style={{fontSize:11,color:'#94a3b8',marginBottom:8}}>Escenario: presión de vapor excesiva</div>
            {[
              {n:1,comp:'Sensor',detail:'PT-1001: transmisor de presión de vapor (4-20 mA, SIL 2)'},
              {n:2,comp:'Logic Solver',detail:'PLC-SIS: evalúa PT-1001 > 18 bar → activa SIF'},
              {n:3,comp:'Elemento Final',detail:'XV-1001: válvula ESD cierra suministro de combustible'},
            ].map((e,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <div style={{width:22,height:22,borderRadius:'50%',background:'#3b82f6',color:'#fff',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{e.n}</div>
                <div>
                  <span style={{fontSize:11,fontWeight:700,color:'#60a5fa'}}>{e.comp}: </span>
                  <span style={{fontSize:11,color:'#94a3b8'}}>{e.detail}</span>
                </div>
              </div>
            ))}
          </div>
          <div className="def-box">
            <span className="blue" style={{fontWeight:700}}>Resultado:</span> Si la presión supera 18 bar, el SIS cierra automáticamente el combustible — sin intervención del operador.
          </div>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">SIS vs BPCS — Comparación rápida</div>
          <table>
            <thead><tr><th>Característica</th><th>BPCS</th><th>SIS</th></tr></thead>
            <tbody>
              {[['Propósito','Control normal','Seguridad'],['Activación','Continua','Solo en demanda'],['Independencia','—','Requerida de BPCS'],['Certificación','No requerida','SIL requerida'],['Prueba periódica','Operativa','Proof test']].map((r,i)=>(
                <tr key={i}><td>{r[0]}</td><td style={{color:'#94a3b8'}}>{r[1]}</td><td style={{color:'#22c55e',fontWeight:600}}>{r[2]}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const sifs=[
    {nombre:'PAHH → ESD caldera',tipo:'ESD',sensor:'PT-1001 (presión vapor)',ls:'PLC-SIS',ef:'XV-1001 (válvula combustible)'},
    {nombre:'TAHH → Trip reactor',tipo:'ESD',sensor:'TT-2001 (temperatura reactor)',ls:'PLC-SIS',ef:'XV-2001 (válvula feed) + bomba OFF'},
    {nombre:'LAHH → Pump shutoff',tipo:'ESD',sensor:'LT-3001 (nivel tanque)',ls:'Relé de seguridad',ef:'M-3001 (bomba OFF)'},
  ];
  return(<div>
    <div className="sec-title">SIF — Función Instrumentada de Seguridad</div>
    <div className="sec-sub">Safety Instrumented Function · IEC 61511 §3.2.65</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div style={{textAlign:'center',padding:'8px 0 12px'}}>
            <div className="big-term">SIF</div>
            <div style={{fontSize:11,color:'#64748b',marginTop:2}}>Safety Instrumented Function</div>
          </div>
          <div className="def-box">
            Función de seguridad con un nivel de integridad de seguridad (SIL) requerido para lograr o mantener un estado seguro del EUC respecto a un evento peligroso específico.
          </div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#cbd5e1',marginTop:8}}>
            Cada SIF responde a <strong>UN escenario de peligro específico</strong>. Una sola planta puede tener decenas de SIF implementadas en el mismo SIS.
          </p>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">Anatomía de una SIF</div>
          {[
            {f:'Causa de activación (causa)',v:'Condición medida que excede el setpoint de seguridad'},
            {f:'Acción de seguridad (efecto)',v:'Qué hace el SIS cuando detecta la causa'},
            {f:'Estado seguro',v:'Condición del proceso que elimina o reduce el peligro'},
            {f:'Tiempo de respuesta',v:'Tiempo máximo desde detección hasta estado seguro'},
            {f:'SIL objetivo',v:'Nivel de integridad requerido para esa SIF específica'},
          ].map((r,i)=>(
            <div key={i} style={{display:'flex',gap:6,padding:'5px 0',borderBottom:'1px solid #1e3a5f22',fontSize:11}}>
              <span style={{color:'#3b82f6',fontWeight:700,minWidth:160,flexShrink:0}}>{r.f}:</span>
              <span style={{color:'#94a3b8'}}>{r.v}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Ejemplos de SIF en industria de proceso</div>
          {sifs.map((s,i)=>(
            <div key={i} style={{background:'#060a14',borderRadius:6,padding:'8px 10px',marginBottom:6}}>
              <div style={{fontSize:12,fontWeight:700,color:'#3b82f6',marginBottom:4}}>{s.nombre} <span style={{fontSize:10,fontWeight:400,color:'#64748b'}}>({s.tipo})</span></div>
              <div style={{fontSize:10,color:'#94a3b8'}}>Sensor: {s.sensor}</div>
              <div style={{fontSize:10,color:'#94a3b8'}}>LS: {s.ls}</div>
              <div style={{fontSize:10,color:'#94a3b8'}}>EF: {s.ef}</div>
            </div>
          ))}
        </div>
        <div className="def-box" style={{marginTop:8}}>
          <span className="blue" style={{fontWeight:700}}>Relación SIS/SIF:</span> El SIS es el contenedor; las SIF son las funciones. Un SIS puede tener 5, 20 o 50 SIF, cada una con su propio SIL objetivo.
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  const silData=[
    {sil:'SIL 1',pfd:'≥ 10⁻² a < 10⁻¹',rrf:'10 – 100',ejemplo:'Paro de bomba por nivel alto'},
    {sil:'SIL 2',pfd:'≥ 10⁻³ a < 10⁻²',rrf:'100 – 1000',ejemplo:'ESD de reactor químico'},
    {sil:'SIL 3',pfd:'≥ 10⁻⁴ a < 10⁻³',rrf:'1,000 – 10,000',ejemplo:'HIPPS en gasoducto de alta presión'},
    {sil:'SIL 4',pfd:'≥ 10⁻⁵ a < 10⁻⁴',rrf:'10,000 – 100,000',ejemplo:'Nuclear (IEC 61508, no IEC 61511)'},
  ];
  const colors=['#22c55e','#3b82f6','#f59e0b','#ef4444'];
  return(<div>
    <div className="sec-title">SIL — Nivel de Integridad de Seguridad</div>
    <div className="sec-sub">Safety Integrity Level · Los 4 niveles discretos de IEC 61511</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div style={{textAlign:'center',padding:'4px 0 10px'}}>
            <div className="big-term">SIL</div>
            <div style={{fontSize:11,color:'#64748b',marginTop:2}}>Safety Integrity Level</div>
          </div>
          <div className="def-box">
            Nivel discreto (1 a 4) que especifica los requisitos de integridad de seguridad de las funciones de seguridad que se van a asignar a los sistemas instrumentados de seguridad.
          </div>
          <p style={{fontSize:12,color:'#cbd5e1',lineHeight:1.6,marginTop:8}}>
            A mayor SIL, <strong>menor probabilidad de falla</strong> y <strong>mayor reducción de riesgo</strong>. SIL 4 raramente aplica en la industria de proceso (aplica en nuclear).
          </p>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">¿Cómo se determina el SIL?</div>
          {['HAZOP identifica el escenario peligroso','LOPA calcula la frecuencia no mitigada del escenario','Se determina el riesgo tolerable del proceso','La diferencia define el Factor de Reducción de Riesgo (RRF)','El RRF define el SIL objetivo de la SIF'].map((s,i)=>(
            <div key={i} style={{display:'flex',gap:8,padding:'5px 0',borderBottom:'1px solid #1e3a5f22',fontSize:11,color:'#cbd5e1'}}>
              <span style={{color:'#3b82f6',fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{s}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Tabla SIL — PFDavg y RRF</div>
          <table>
            <thead><tr><th>SIL</th><th>PFDavg</th><th>RRF</th><th>Ejemplo de uso</th></tr></thead>
            <tbody>
              {silData.map((r,i)=>(
                <tr key={i}>
                  <td><span style={{fontWeight:700,color:colors[i]}}>{r.sil}</span></td>
                  <td style={{fontFamily:'monospace',fontSize:10}}>{r.pfd}</td>
                  <td style={{fontFamily:'monospace',color:'#60a5fa'}}>{r.rrf}</td>
                  <td style={{fontSize:10,color:'#94a3b8'}}>{r.ejemplo}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="def-box" style={{marginTop:8}}>
            <span className="blue" style={{fontWeight:700}}>RRF = 1/PFDavg</span><br/>
            Si PFDavg = 0.01 → RRF = 100 → SIL 2<br/>
            Si PFDavg = 0.001 → RRF = 1000 → SIL 3
          </div>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">¿Por qué solo hasta SIL 4 en procesos?</div>
          <p style={{fontSize:12,color:'#cbd5e1',lineHeight:1.6}}>
            En la industria de proceso, SIL 3 es el máximo práctico. SIL 4 requiere una confiabilidad tan alta que <strong>actualmente no es técnicamente alcanzable</strong> con un solo SIS. Para SIL 4, se requieren sistemas independientes redundantes y es dominio de la industria nuclear.
          </p>
        </div>
      </div>
    </div>
  </div>);
}

function Scene4(){
  const [tI, setTI]=useState(8760);
  const lambda_DU=1e-6;
  const pfd=(lambda_DU*tI/2).toFixed(6);
  const rrf=Math.round(1/parseFloat(pfd));
  const sil=parseFloat(pfd)<1e-4?'SIL 3':parseFloat(pfd)<1e-3?'SIL 2':parseFloat(pfd)<1e-2?'SIL 1':'< SIL 1';
  return(<div>
    <div className="sec-title">PFD — Probabilidad de Falla en Demanda</div>
    <div className="sec-sub">Probability of Failure on Demand — la métrica cuantitativa del SIL</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div style={{textAlign:'center',padding:'4px 0 10px'}}>
            <div className="big-term">PFD</div>
            <div style={{fontSize:11,color:'#64748b',marginTop:2}}>Probability of Failure on Demand</div>
          </div>
          <div className="def-box">
            Probabilidad de que el sistema SIS falle al responder a una demanda (al ser requerido para actuar). Se calcula como el promedio en el tiempo: <strong>PFDavg</strong>.
          </div>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div className="card-h">Tipos de fallas relevantes</div>
          {[
            {tipo:'λ_DU',nombre:'Dangerous Undetected',desc:'Falla peligrosa no detectada — la más crítica. Causa PFD elevada.'},
            {tipo:'λ_DD',nombre:'Dangerous Detected',desc:'Falla peligrosa detectada — el SIS reconoce la falla y actúa.'},
            {tipo:'λ_SU',nombre:'Safe Undetected',desc:'Falla segura no detectada — puede causar falsos trips.'},
            {tipo:'λ_SD',nombre:'Safe Detected',desc:'Falla segura detectada — el sistema se pone en estado seguro.'},
          ].map((f,i)=>(
            <div key={i} style={{padding:'5px 0',borderBottom:'1px solid #1e3a5f22'}}>
              <span style={{fontFamily:'monospace',fontSize:11,color:'#3b82f6',fontWeight:700}}>{f.tipo} </span>
              <span style={{fontSize:11,fontWeight:600,color:'#e2e8f0'}}>{f.nombre}: </span>
              <span style={{fontSize:10,color:'#64748b'}}>{f.desc}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Fórmula PFDavg (1oo1 simplificada)</div>
          <div style={{background:'#060a14',border:'1px solid #3b82f633',borderRadius:8,padding:12,textAlign:'center',fontFamily:'monospace',fontSize:14,color:'#60a5fa',margin:'8px 0'}}>
            PFDavg ≈ λ_DU × TI / 2
          </div>
          <div style={{fontSize:11,color:'#94a3b8',marginBottom:12,lineHeight:1.5}}>
            <strong className="blue">λ_DU</strong> = tasa de falla peligrosa no detectada (fallas/hora)<br/>
            <strong className="blue">TI</strong> = intervalo de prueba (horas)
          </div>
          <div className="card-h">Calculadora interactiva</div>
          <div style={{marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginBottom:4}}>
              <span>Intervalo de prueba TI</span>
              <span className="blue" style={{fontWeight:700}}>{tI.toLocaleString()} h ({(tI/8760).toFixed(1)} años)</span>
            </div>
            <input type="range" min="720" max="26280" step="720" value={tI} onChange={e=>setTI(+e.target.value)}
              style={{WebkitAppearance:'none',width:'100%',height:4,background:'#1e3a5f',borderRadius:2,outline:'none'}}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#475569',marginTop:2}}>
              <span>1 mes</span><span>3 años</span>
            </div>
          </div>
          <div style={{background:'#060a14',borderRadius:8,padding:10,fontSize:12}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              <div><span style={{color:'#64748b'}}>λ_DU: </span><span style={{fontFamily:'monospace',color:'#60a5fa'}}>1×10⁻⁶ /h</span></div>
              <div><span style={{color:'#64748b'}}>TI: </span><span style={{fontFamily:'monospace',color:'#60a5fa'}}>{tI} h</span></div>
              <div><span style={{color:'#64748b'}}>PFDavg: </span><span style={{fontFamily:'monospace',color:'#f59e0b',fontWeight:700}}>{pfd}</span></div>
              <div><span style={{color:'#64748b'}}>RRF: </span><span style={{fontFamily:'monospace',color:'#22c55e',fontWeight:700}}>{rrf}</span></div>
            </div>
            <div style={{marginTop:8,textAlign:'center'}}>
              <span style={{fontSize:14,fontWeight:700,color:parseFloat(pfd)<1e-3?'#22c55e':parseFloat(pfd)<1e-2?'#3b82f6':'#ef4444'}}>→ {sil}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function Scene5(){
  const terms=[
    {acr:'EUC',full:'Equipment Under Control',def:'El equipo, proceso o máquina que el SIS protege. Ej: reactor, caldera, compresor.'},
    {acr:'IPL',full:'Independent Protection Layer',def:'Capa de protección independiente que reduce el riesgo. Puede incluir BPCS, alarmas, SIS, PSV.'},
    {acr:'HIPPS',full:'High Integrity Pressure Protection System',def:'SIS especializado en protección de alta presión, a menudo reemplaza válvulas de alivio.'},
    {acr:'MOC',full:'Management of Change',def:'Proceso formal para gestionar cambios en el SIS sin comprometer la integridad de seguridad.'},
    {acr:'FSM',full:'Functional Safety Management',def:'Sistema de gestión que garantiza la correcta aplicación del ciclo de vida de seguridad.'},
    {acr:'FMEDA',full:'Failure Modes, Effects and Diagnostic Analysis',def:'Análisis de modos de falla usado para determinar tasas λ_DD, λ_DU de dispositivos.'},
    {acr:'DC',full:'Diagnostic Coverage',def:'Fracción de fallas peligrosas detectadas por diagnósticos automáticos. DC = λ_DD/(λ_DD+λ_DU).'},
    {acr:'CCF',full:'Common Cause Failure',def:'Falla de múltiples elementos por una causa común — la principal amenaza a la redundancia.'},
  ];
  return(<div>
    <div className="sec-title">Glosario Esencial IEC 61511</div>
    <div className="sec-sub">Términos clave que aparecerán en todo el curso</div>
    <div className="grid2" style={{gap:8}}>
      {terms.map((t,i)=>(
        <div key={i} className="card" style={{padding:'10px 12px',display:'flex',gap:10,alignItems:'flex-start'}}>
          <div style={{background:'#1e3a8a',color:'#93c5fd',borderRadius:5,padding:'3px 8px',fontSize:11,fontWeight:700,flexShrink:0,minWidth:55,textAlign:'center'}}>{t.acr}</div>
          <div>
            <div style={{fontSize:10,color:'#64748b',marginBottom:2}}>{t.full}</div>
            <div style={{fontSize:11,color:'#cbd5e1',lineHeight:1.4}}>{t.def}</div>
          </div>
        </div>
      ))}
    </div>
  </div>);
}

const scenes=[
  {id:1,label:'SIS — Sistema completo',comp:<Scene1/>},
  {id:2,label:'SIF — Función individual',comp:<Scene2/>},
  {id:3,label:'SIL — Nivel de integridad',comp:<Scene3/>},
  {id:4,label:'PFD — Prob. de falla',comp:<Scene4/>},
  {id:5,label:'Glosario esencial',comp:<Scene5/>},
];
function App(){
  const [active,setActive]=useState(1);
  const scene=scenes.find(s=>s.id===active);
  return(
    <div className="slide">
      <div className="topbar">
        <div>
          <div className="topbar-title">IEC 61511 — Seguridad Funcional en la Industria de Proceso</div>
          <div className="topbar-sub">Módulo 1 · Lección 1.3 — Terminología: SIS, SIF, SIL, PFD</div>
        </div>
        <div className="scene-badge">{active}/{scenes.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          {scenes.map(s=>(
            <div key={s.id} className={'nav-item'+(active===s.id?' active':'')} onClick={()=>setActive(s.id)}>{s.id}. {s.label}</div>
          ))}
        </div>
        <div className="main">{scene.comp}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
