<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 3.2 — Métodos de determinación de SIL</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0a0f1e,#0f1a35);border-bottom:2px solid #3b82f6;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#3b82f622;border:1px solid #3b82f655;color:#3b82f6;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e3a5f;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:#3b82f610;font-weight:600;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.main{flex:1;padding:16px 22px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:#3b82f644;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e3a5f;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#3b82f6;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 7px 7px 0;padding:10px 14px;margin:7px 0;font-size:12px;line-height:1.6;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#0f1729;color:#3b82f6;padding:6px 8px;text-align:left;border-bottom:1px solid #1e3a5f;font-size:10px;text-transform:uppercase;}
td{padding:5px 8px;border-bottom:1px solid #0f1729;color:#cbd5e1;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const metodos=[
    {nombre:'Matriz de Riesgo',tipo:'Cualitativo',pros:'Rápido, fácil de entender, adecuado para proyectos pequeños',contras:'Subjetivo, no cuantifica el riesgo, no da crédito exacto a IPL','uso':'Screening inicial, proyectos simples, evaluación rápida'},
    {nombre:'Grafo de Riesgo',tipo:'Semi-cualitativo',pros:'Considera múltiples parámetros, estructura sistemática, IEC 61511 Parte 3',contras:'Subjetivo en la asignación de parámetros, puede ser conservador o no conservador','uso':'Procesos medianos, cuando LOPA no es posible por falta de datos de frecuencia'},
    {nombre:'LOPA',tipo:'Semi-cuantitativo',pros:'Cuantificado, considera créditos de IPL, más objetivo, CCPS estándar',contras:'Requiere datos de frecuencia, más tiempo, puede ser conservador','uso':'Industria de proceso estándar — el método preferido por IEC 61511'},
    {nombre:'QRA completo (FTA/ETA)',tipo:'Cuantitativo',pros:'Más completo, considera interdependencias, árbol de falla detallado',contras:'Muy costoso en tiempo y recursos, requiere datos extensos','uso':'Plantas de alta consecuencia (GNL, nuclear), proyectos con SIL 3+'},
  ];
  return(<div>
    <div className="sec-title">Métodos de Determinación de SIL</div>
    <div className="sec-sub">IEC 61511 Parte 3 — cuatro enfoques con diferente nivel de rigor</div>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {metodos.map((m,i)=>(
        <div key={i} className="card" style={{padding:'10px 14px'}}>
          <div style={{display:'grid',gridTemplateColumns:'150px 1fr 1fr 1fr',gap:12,alignItems:'start'}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:'#3b82f6'}}>{m.nombre}</div>
              <span style={{fontSize:9,background:'#1e3a8a44',color:'#93c5fd',padding:'2px 6px',borderRadius:4,display:'inline-block',marginTop:2}}>{m.tipo}</span>
            </div>
            <div>
              <div style={{fontSize:9,color:'#22c55e',fontWeight:700,marginBottom:3}}>✓ VENTAJAS</div>
              <p style={{fontSize:10,color:'#94a3b8',lineHeight:1.4}}>{m.pros}</p>
            </div>
            <div>
              <div style={{fontSize:9,color:'#ef4444',fontWeight:700,marginBottom:3}}>✗ LIMITACIONES</div>
              <p style={{fontSize:10,color:'#94a3b8',lineHeight:1.4}}>{m.contras}</p>
            </div>
            <div>
              <div style={{fontSize:9,color:'#f59e0b',fontWeight:700,marginBottom:3}}>CUÁNDO USARLO</div>
              <p style={{fontSize:10,color:'#94a3b8',lineHeight:1.4}}>{m.uso}</p>
            </div>
          </div>
        </div>
      ))}
    </div>
    <div className="def-box">
      <span style={{color:'#3b82f6',fontWeight:700}}>Recomendación IEC 61511 Parte 3:</span> Para SIL 2 y SIL 3, se recomienda usar LOPA u otro método cuantitativo. La matriz de riesgo sola no es suficiente para estos niveles en proyectos de alto impacto.
    </div>
  </div>);
}

function Scene2(){
  const [freq,setFreq]=useState(1);
  const [P1,setP1]=useState(1);
  const [P2,setP2]=useState(2);
  const [P3,setP3]=useState(2);
  const grafoSIL={
    '111':'SIL —','112':'SIL —','121':'SIL —','122':'SIL 1','211':'SIL —','212':'SIL 1',
    '221':'SIL 1','222':'SIL 2','231':'SIL 2','232':'SIL 3','311':'SIL —','312':'SIL 1',
    '321':'SIL 1','322':'SIL 2','331':'SIL 2','332':'SIL 3',
  };
  const key=`${freq}${P1}${P2}`;
  const result=grafoSIL[key]||'SIL —';
  const silColor={'SIL 3':'#f59e0b','SIL 2':'#3b82f6','SIL 1':'#22c55e','SIL —':'#64748b'}[result];
  return(<div>
    <div className="sec-title">Grafo de Riesgo — IEC 61511 Parte 3</div>
    <div className="sec-sub">Método semi-cualitativo para determinar el SIL objetivo</div>
    <div className="grid2" style={{gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">Parámetros del Grafo</div>
          {[
            {label:'Frecuencia del evento iniciador',param:'F',val:freq,set:setFreq,opts:[{v:1,l:'F1: ≤ 1/año'},{v:2,l:'F2: > 1/año'}]},
            {label:'Probabilidad de no evitar la consecuencia',param:'P',val:P1,set:setP1,opts:[{v:1,l:'P1: Posible evitar'},{v:2,l:'P2: Imposible evitar'}]},
            {label:'Consecuencia / Severidad',param:'W',val:P2,set:setP2,opts:[{v:1,l:'W1: Menor (daño ambiental)'},{v:2,l:'W2: Fatalidad única'},{v:3,l:'W3: Fatalidades múltiples'}]},
          ].map((p,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{fontSize:11,color:'#94a3b8',marginBottom:4}}>{p.param}: {p.label}</div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {p.opts.map((o,j)=>(
                  <button key={j} onClick={()=>p.set(o.v)}
                    style={{background:p.val===o.v?'#3b82f6':'transparent',color:p.val===o.v?'#fff':'#94a3b8',border:'1px solid #1e3a5f',borderRadius:5,padding:'4px 10px',cursor:'pointer',fontSize:10,transition:'all .2s'}}>
                    {o.l}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-h">SIL objetivo</div>
          <div style={{textAlign:'center',padding:'12px 0'}}>
            <div style={{fontSize:32,fontWeight:900,color:silColor}}>{result}</div>
            <div style={{fontSize:11,color:'#64748b',marginTop:4}}>Grafo de riesgo IEC 61511 Parte 3</div>
          </div>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Tabla del Grafo de Riesgo (simplificada)</div>
          <table>
            <thead><tr><th>F</th><th>P</th><th>W1</th><th>W2</th><th>W3</th></tr></thead>
            <tbody>
              {[
                {f:'F1',p:'P1',w:['—','—','SIL 1']},
                {f:'F1',p:'P2',w:['—','SIL 1','SIL 2']},
                {f:'F2',p:'P1',w:['—','SIL 1','SIL 2']},
                {f:'F2',p:'P2',w:['SIL 1','SIL 2','SIL 3']},
              ].map((r,i)=>(
                <tr key={i}>
                  <td>{r.f}</td><td>{r.p}</td>
                  {r.w.map((w,j)=>(
                    <td key={j} style={{fontWeight:700,textAlign:'center',color:w==='SIL 3'?'#f59e0b':w==='SIL 2'?'#3b82f6':w==='SIL 1'?'#22c55e':'#64748b'}}>{w}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
          <div className="def-box" style={{marginTop:8}}>
            <span style={{color:'#3b82f6',fontWeight:700}}>Limitación:</span> El grafo de riesgo no da crédito explícito a IPL existentes. LOPA es más preciso cuando existen IPL confirmadas.
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  const comp=[
    {criterio:'Objetividad',matriz:'Baja — subjetiva',grafo:'Media — semi-objetiva',lopa:'Alta — cuantificada',qra:'Muy alta'},
    {criterio:'Datos requeridos',matriz:'Muy pocos',grafo:'Pocos',lopa:'Frecuencias y PFD de IPL',qra:'Datos detallados de fallas'},
    {criterio:'Tiempo de análisis',matriz:'Horas',grafo:'Días',lopa:'Días a semanas',qra:'Semanas a meses'},
    {criterio:'Crédito a IPL existentes',matriz:'No',grafo:'Parcial',lopa:'Sí, explícito',qra:'Sí, completo'},
    {criterio:'Aceptable para SIL 3',matriz:'No',grafo:'Cuestionable',lopa:'Sí (con buena data)',qra:'Sí'},
    {criterio:'Costo',matriz:'Muy bajo',grafo:'Bajo',lopa:'Medio',qra:'Alto'},
    {criterio:'Preferido por IEC 61511',matriz:'Solo screening',grafo:'Parte 3',lopa:'Recomendado',qra:'Para alta consecuencia'},
  ];
  return(<div>
    <div className="sec-title">Comparativa de Métodos</div>
    <div className="sec-sub">¿Cuál método usar para tu proyecto?</div>
    <div className="card">
      <table>
        <thead><tr><th>Criterio</th><th>Matriz de Riesgo</th><th>Grafo de Riesgo</th><th>LOPA</th><th>QRA (FTA/ETA)</th></tr></thead>
        <tbody>
          {comp.map((r,i)=>(
            <tr key={i}>
              <td style={{fontWeight:700,color:'#e2e8f0'}}>{r.criterio}</td>
              <td style={{color:'#94a3b8'}}>{r.matriz}</td>
              <td style={{color:'#94a3b8'}}>{r.grafo}</td>
              <td style={{color:'#60a5fa',fontWeight:600}}>{r.lopa}</td>
              <td style={{color:'#94a3b8'}}>{r.qra}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
    <div className="grid2" style={{gap:10,marginTop:8}}>
      <div className="def-box">
        <span style={{color:'#3b82f6',fontWeight:700}}>Regla práctica:</span> LOPA es el método de referencia para la industria de proceso. Combina rigor cuantitativo con practicidad. IEC 61511 Parte 3 Anexo A documenta el procedimiento.
      </div>
      <div className="def-box">
        <span style={{color:'#3b82f6',fontWeight:700}}>Para proyectos pequeños:</span> La matriz de riesgo es aceptable como primer screening, pero debe ser validada por el equipo de seguridad. No es suficiente por sí sola para SIL 2-3.
      </div>
    </div>
  </div>);
}

const scenes=[
  {id:1,label:'4 métodos principales',comp:<Scene1/>},
  {id:2,label:'Grafo de riesgo interactivo',comp:<Scene2/>},
  {id:3,label:'Comparativa de métodos',comp:<Scene3/>},
];
function App(){
  const [active,setActive]=useState(1);
  const scene=scenes.find(s=>s.id===active);
  return(
    <div className="slide">
      <div className="topbar">
        <div>
          <div className="topbar-title">IEC 61511 — Seguridad Funcional en la Industria de Proceso</div>
          <div className="topbar-sub">Módulo 3 · Lección 3.2 — Métodos de determinación de SIL</div>
        </div>
        <div className="scene-badge">{active}/{scenes.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          {scenes.map(s=>(
            <div key={s.id} className={'nav-item'+(active===s.id?' active':'')} onClick={()=>setActive(s.id)}>{s.id}. {s.label}</div>
          ))}
        </div>
        <div className="main">{scene.comp}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
