<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IA para la Vida Real — Apertura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #081634; overflow: hidden; }
  #root { position: fixed; inset: 0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="ia-lib.jsx"></script>
<script type="text/babel" src="ia-scenes-a.jsx"></script>
<script type="text/babel" src="ia-scenes-b.jsx"></script>

<script type="text/babel">
const CHAPTERS = [
  { C: C1,  dur: 30, name: 'El mundo ya cambió' },
  { C: C2,  dur: 26, name: 'La IA ya está en tu vida' },
  { C: C3,  dur: 28, name: 'Rompiendo los mitos' },
  { C: C4,  dur: 24, name: 'Una nueva forma de aprender' },
  { C: C5,  dur: 24, name: 'Una nueva forma de crear' },
  { C: C6,  dur: 28, name: 'Los agentes inteligentes' },
  { C: C7,  dur: 28, name: 'Las herramientas' },
  { C: C8,  dur: 26, name: 'El poder del prompting' },
  { C: C9,  dur: 26, name: 'Tu transformación' },
  { C: C10, dur: 28, name: 'Bienvenido al futuro' },
];
let acc = 0;
const TIMED = CHAPTERS.map(c => { const o = { ...c, start: acc }; acc += c.dur; return o; });
const TOTAL = acc;

function CurrentChrome() {
  const t = useTime();
  let cur = TIMED[0];
  for (const c of TIMED) if (t >= c.start - 0.0001) cur = c;
  return <Chrome no={TIMED.indexOf(cur) + 1} total={10} title={cur.name} />;
}

function TopProgress() {
  const t = useTime();
  return (
    <div style={{ position: 'absolute', top: 46, right: 64, zIndex: 40, display: 'flex', gap: 7, alignItems: 'center' }}>
      {TIMED.map((c, i) => {
        const active = t >= c.start && t < c.start + c.dur;
        const done = t >= c.start + c.dur;
        return <div key={i} style={{ width: active ? 28 : 14, height: 3, borderRadius: 2, background: active ? IA.gold : (done ? IA.goldD : 'rgba(220,190,130,0.22)'), transition: 'width 220ms' }} />;
      })}
    </div>
  );
}

function TimecodeTagger() {
  const t = useTime();
  React.useEffect(() => {
    const root = document.getElementById('video-root');
    if (root) {
      const m = Math.floor(t / 60), sec = Math.floor(t % 60);
      root.setAttribute('data-screen-label', `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`);
    }
  }, [Math.floor(t)]);
  return null;
}

function App() {
  return (
    <Stage width={1920} height={1080} duration={TOTAL} background={IA.bg} persistKey="iavida">
      <div id="video-root" data-screen-label="00:00" style={{ position: 'absolute', inset: 0 }}>
        <GlobalBG />
        {TIMED.map((c, i) => <c.C key={i} start={c.start} dur={c.dur} />)}
        <CurrentChrome />
        <TopProgress />
        <TimecodeTagger />
      </div>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
