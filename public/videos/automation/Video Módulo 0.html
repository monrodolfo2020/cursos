<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Módulo 0 — Automatización Industrial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #070b12; overflow: hidden; }
  #root { position: fixed; inset: 0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="video-lib.jsx"></script>
<script type="text/babel" src="scenes-a.jsx"></script>
<script type="text/babel" src="scenes-b.jsx"></script>

<script type="text/babel">
const SCENES = [
  { C: Scene1,  dur: 18, name: 'Bienvenida' },
  { C: Scene2,  dur: 16, name: 'El porqué' },
  { C: Scene3,  dur: 21, name: '¿Qué es?' },
  { C: Scene4,  dur: 15, name: 'Industrias' },
  { C: Scene5,  dur: 16, name: 'Profesionales' },
  { C: Scene6,  dur: 21, name: 'Ruta del curso' },
  { C: Scene7,  dur: 14, name: 'Herramientas' },
  { C: Scene8,  dur: 18, name: 'Proyecto final' },
  { C: Scene9,  dur: 14, name: 'Tu momento' },
  { C: Scene10, dur: 16, name: 'Cierre' },
];
let acc = 0;
const TIMED = SCENES.map(s => { const o = { ...s, start: acc }; acc += s.dur; return o; });
const TOTAL = acc;

function CurrentHUD() {
  const t = useTime();
  let cur = TIMED[0];
  for (const sc of TIMED) if (t >= sc.start - 0.0001) cur = sc;
  const no = TIMED.indexOf(cur) + 1;
  return <HUDChrome sceneNo={no} sceneTotal={10} sceneName={cur.name} />;
}

// progress ticks along the top
function TopProgress() {
  const t = useTime();
  return (
    <div style={{ position: 'absolute', top: 40, right: 54, zIndex: 40, display: 'flex', gap: 6, alignItems: 'center' }}>
      {TIMED.map((sc, i) => {
        const active = t >= sc.start && t < sc.start + sc.dur;
        const done = t >= sc.start + sc.dur;
        return <div key={i} style={{ width: active ? 30 : 16, height: 3, borderRadius: 2, background: active ? T.cyan : (done ? T.cyanD : 'rgba(120,165,220,0.22)'), transition: 'width 200ms' }} />;
      })}
    </div>
  );
}

function TimecodeTagger() {
  const t = useTime();
  React.useEffect(() => {
    const root = document.getElementById('video-root');
    if (root) {
      const m = Math.floor(t / 60), sec = Math.floor(t % 60);
      root.setAttribute('data-screen-label', `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`);
    }
  }, [Math.floor(t)]);
  return null;
}

function App() {
  return (
    <Stage width={1920} height={1080} duration={TOTAL} background={T.bg} persistKey="modulo0">
      <div id="video-root" data-screen-label="00:00" style={{ position: 'absolute', inset: 0 }}>
        <GlobalBG />
        {TIMED.map((sc, i) => <sc.C key={i} start={sc.start} dur={sc.dur} />)}
        <CurrentHUD />
        <TopProgress />
        <Scanlines />
        <TimecodeTagger />
      </div>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
