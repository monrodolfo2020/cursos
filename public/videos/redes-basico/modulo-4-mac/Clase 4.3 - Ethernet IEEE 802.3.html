<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 4.3 — Ethernet IEEE 802.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#060a14;font-family:'Space Grotesk',system-ui,sans-serif;color:#e8f0fe;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#060a14,#0a1020);border-bottom:2px solid rgba(59,130,246,0.35);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#7c8db8;font-family:'IBM Plex Mono',monospace;}
.scene-badge{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#3b82f6;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:220px;background:#0a1020;border-right:1px solid rgba(59,130,246,0.12);padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:8px 14px;cursor:pointer;font-size:11px;color:#3a4a72;border-left:3px solid transparent;transition:all .2s;font-family:'IBM Plex Mono',monospace;line-height:1.4;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:rgba(59,130,246,0.07);font-weight:600;}
.nav-item:hover:not(.active){color:#e8f0fe;background:rgba(255,255,255,0.03);}
.main{flex:1;padding:18px 24px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.18);border-radius:2px;}
.sec-title{font-size:21px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#3a4a72;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;}
.card{background:#0f1628;border:1px solid rgba(59,130,246,0.14);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.card-h{font-size:11px;font-weight:600;color:#3b82f6;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const versiones=[
    {n:'10BASE5',v:'10 Mbps',m:'Coaxial grueso (500m)',y:'1980',nota:'Ethernet original (DIX). Vampiro tap. Un segmento de bus compartido. Máx 100 estaciones.'},
    {n:'10BASE2',v:'10 Mbps',m:'Coaxial delgado (185m)',y:'1985',nota:'Cheapernet. BNC T-connector. Más fácil que 10BASE5. Aún bus compartido con CSMA/CD.'},
    {n:'10BASE-T',v:'10 Mbps',m:'UTP Cat3 (100m)',y:'1990',nota:'La revolución: par trenzado con hub estrella. Colisiones siguen existiendo (hub = bus lógico).'},
    {n:'100BASE-TX',v:'100 Mbps',m:'UTP Cat5 (100m)',y:'1995',nota:'Fast Ethernet. MLT-3 coding. Par estrella con switch → full duplex posible → sin CSMA/CD.'},
    {n:'1000BASE-T',v:'1 Gbps',m:'UTP Cat5e (100m)',y:'1999',nota:'Gigabit Ethernet. 4 pares a 250 Mbps cada uno. PAM-5 encoding. Dominante en LANs hoy.'},
    {n:'10GBASE-T',v:'10 Gbps',m:'UTP Cat6a (100m)',y:'2006',nota:'10 Gigabit sobre cobre. PAM-16. Latencia ~ 2 μs. Para centros de datos y uplinks.'},
    {n:'25/40/100G',v:'25–100 Gbps',m:'Fibra óptica',y:'2010+',nota:'Data center interconnects. 100GBASE-SR4: 4 carriles ×25 Gbps sobre fibra multimodo.'},
    {n:'400G / 800G',v:'400–800 Gbps',m:'Fibra óptica',y:'2018+',nota:'Hiperscale: Google, Amazon, Meta. PAM4 sobre fibra monomodo. eCPRI en fronthaul 5G.'},
  ];
  return(<div>
    <div className="sec-title">Ethernet — Historia y Versiones</div>
    <div className="sec-sub">De 10 Mbps a 800 Gbps: 45 años de evolución sin romper compatibilidad</div>
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
        <thead>
          <tr style={{borderBottom:'2px solid rgba(59,130,246,0.3)'}}>
            {['Estándar','Velocidad','Medio','Año','Novedades'].map((h,i)=>(
              <th key={i} style={{padding:'7px 10px',color:'#3b82f6',textAlign:'left',fontFamily:'IBM Plex Mono,monospace',fontSize:9}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {versiones.map((r,i)=>(
            <tr key={i} style={{background:i%2===0?'#0f1628':'transparent',borderBottom:'1px solid rgba(59,130,246,0.06)'}}>
              <td style={{padding:'6px 10px',color:'#f97316',fontFamily:'IBM Plex Mono,monospace',fontWeight:700}}>{r.n}</td>
              <td style={{padding:'6px 10px',color:'#10b981',fontWeight:600}}>{r.v}</td>
              <td style={{padding:'6px 10px',color:'#7c8db8',fontSize:10}}>{r.m}</td>
              <td style={{padding:'6px 10px',color:'#3a4a72',fontFamily:'IBM Plex Mono,monospace'}}>{r.y}</td>
              <td style={{padding:'6px 10px',color:'#3a4a72',fontSize:10}}>{r.nota}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
    <div style={{marginTop:10,background:'rgba(59,130,246,0.06)',border:'1px solid rgba(59,130,246,0.18)',borderRadius:8,padding:'8px 14px',fontSize:11,color:'#7c8db8'}}>
      <strong style={{color:'#3b82f6'}}>Compatibilidad hacia atrás:</strong> Todas las versiones comparten el mismo formato de trama MAC. Un switch Gigabit puede conectar puertos 10/100/1000 Mbps sin problema. La velocidad se negocia automáticamente (autonegociación IEEE 802.3u).
    </div>
  </div>);
}

function Scene2(){
  return(<div>
    <div className="sec-title">Trama Ethernet y Direcciones MAC</div>
    <div className="sec-sub">El formato de trama que ha sobrevivido 45 años</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{marginBottom:10}}>
          <div className="card-h">Estructura de la trama Ethernet II (DIX)</div>
          <div style={{display:'flex',gap:3,marginBottom:8}}>
            {[{l:'PREÁMBULO\n7 bytes',c:'#3a4a72'},{l:'SFD\n1 byte',c:'#f97316'},{l:'DST MAC\n6 bytes',c:'#3b82f6'},{l:'SRC MAC\n6 bytes',c:'#3b82f6'},{l:'ETHERTYPE\n2 bytes',c:'#8b5cf6'},{l:'PAYLOAD\n46–1500 B',c:'#10b981'},{l:'FCS\nCRC-32',c:'#ef4444'}].map((b,i)=>(
              <div key={i} style={{background:b.c+'18',border:`1px solid ${b.c}44`,borderRadius:4,padding:'4px 5px',textAlign:'center',color:b.c,fontSize:9,fontWeight:700,flex:i===6?'none':'1',minWidth:i===5?80:45,whiteSpace:'pre-line',lineHeight:1.4}}>{b.l}</div>
            ))}
          </div>
          {[
            {f:'Preámbulo',v:'10101010 × 7: sincronización de reloj'},
            {f:'SFD',v:'10101011: Start Frame Delimiter'},
            {f:'DST MAC',v:'Dirección MAC destino (broadcast=FF:FF:FF:FF:FF:FF)'},
            {f:'SRC MAC',v:'Dirección MAC origen'},
            {f:'EtherType',v:'0x0800=IPv4, 0x0806=ARP, 0x86DD=IPv6, 0x8100=VLAN (802.1Q)'},
            {f:'Payload',v:'46 a 1500 bytes (relleno si < 46 para mínimo 64 bytes)'},
            {f:'FCS',v:'CRC-32 sobre DST+SRC+Type+Datos'},
          ].map(r=>(
            <div key={r.f} style={{display:'flex',gap:8,padding:'4px 0',borderBottom:'1px solid rgba(59,130,246,0.07)',fontSize:11}}>
              <span style={{color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',minWidth:80}}>{r.f}</span>
              <span style={{color:'#7c8db8'}}>{r.v}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(249,115,22,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#f97316'}}>Direcciones MAC</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#f97316',lineHeight:1.8,marginBottom:8}}>
            {`00:1A:2B:3C:4D:5E\n└─ OUI ──┘ └── NIC ──┘\n  3 bytes    3 bytes\n  (fabricante)(número)`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6}}>El bit I/G (bit 0 del primer byte): 0=unicast, 1=multicast. El bit U/L (bit 1): 0=globally unique (asignado por IEEE), 1=locally administered. Broadcast = todos FF. Los primeros 3 bytes (OUI) los asigna IEEE a cada fabricante.</div>
        </div>
        <div className="card" style={{borderColor:'rgba(16,185,129,0.2)',marginBottom:10}}>
          <div className="card-h" style={{color:'#10b981'}}>MTU y jumbo frames</div>
          {[
            {k:'MTU estándar',v:'1500 bytes'},
            {k:'Trama mínima',v:'64 bytes (40 B payload mínimo)'},
            {k:'Trama máxima',v:'1518 bytes (sin VLAN)'},
            {k:'Con 802.1Q VLAN',v:'1522 bytes (+4 B tag)'},
            {k:'Jumbo frame',v:'9000 bytes (acuerdo informal, no IEEE)'},
            {k:'Uso jumbo',v:'iSCSI, NFS, centros de datos'},
          ].map(r=>(
            <div key={r.k} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid rgba(59,130,246,0.07)',fontSize:11}}>
              <span style={{color:'#7c8db8'}}>{r.k}</span>
              <span style={{color:'#10b981',fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  return(<div>
    <div className="sec-title">Conmutación Ethernet: Hubs vs. Switches</div>
    <div className="sec-sub">La revolución del switch: fin de las colisiones en LAN</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{borderColor:'rgba(249,115,22,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#f97316'}}>Hub (concentrador) — Capa 1</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Un hub es un repetidor multipuerto: todo lo que entra por un puerto sale por todos los demás. Crea un dominio de colisión único compartido entre todos los puertos. CSMA/CD es imprescindible.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#f97316',lineHeight:1.7}}>
            {`[A]──┐\n[B]──┤ HUB ──── (todos se escuchan)\n[C]──┘\n\nSi A y B transmiten a la vez → COLISIÓN\nTodos en el mismo dominio de colisión`}
          </div>
        </div>
        <div className="card">
          <div className="card-h">Tabla de direcciones MAC del switch</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#10b981',lineHeight:1.8}}>
            {`Aprendizaje automático:\n1. PC-A (MAC=AA) envía trama por puerto 1\n2. Switch aprende: AA → puerto 1\n3. Si destino desconocido → flood (todos)\n4. Cuando B (BB) responde por puerto 3\n5. Switch aprende: BB → puerto 3\n6. Siguientes tramas A→B: solo puerto 3\n\nForwarding table (CAM table):\n MAC            Puerto  TTL\n AA:BB:CC:...   1       300s\n DD:EE:FF:...   3       300s`}
          </div>
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(16,185,129,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#10b981'}}>Switch — Capa 2</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Cada puerto del switch es su propio dominio de colisión. El switch examina la MAC destino y reenvía solo al puerto correspondiente. En full duplex (con switches): CSMA/CD no es necesario.</div>
          {[
            {f:'Dominios de colisión','v':'N puertos = N dominios'},
            {f:'Dominio de broadcast','v':'Una VLAN = un dominio broadcast'},
            {f:'Throughput','v':'N × velocidad port (no compartido)'},
            {f:'Latencia switch','v':'Cut-through: ~5 μs, Store-forward: >5 μs'},
            {f:'VLAN 802.1Q','v':'Separación lógica en mismo switch físico'},
            {f:'STP 802.1D','v':'Spanning Tree: evita bucles de switching'},
          ].map(r=>(
            <div key={r.f} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid rgba(59,130,246,0.07)',fontSize:11}}>
              <span style={{color:'#7c8db8'}}>{r.f}</span>
              <span style={{color:'#10b981',fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.v}</span>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-h">Power over Ethernet (PoE) — 802.3af/at/bt</div>
          <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6}}>El switch puede suministrar energía eléctrica a través del cable Ethernet (pares no usados o pares de datos). 802.3af: 15.4W por puerto, 802.3at (PoE+): 30W, 802.3bt (PoE++): hasta 90W. Aplicaciones: cámaras IP, teléfonos VoIP, puntos de acceso WiFi, sensores IoT. Negociación automática de potencia (LLDP-MED).</div>
        </div>
      </div>
    </div>
  </div>);
}

const SCENES=[{id:1,label:'Historia y versiones',C:Scene1},{id:2,label:'Trama y direcciones MAC',C:Scene2},{id:3,label:'Hubs vs Switches',C:Scene3}];
function App(){
  const [sc,setSc]=useState(1);
  const cur=SCENES.find(s=>s.id===sc);
  return(
    <div className="slide">
      <div className="topbar">
        <div><div className="topbar-title">Clase 4.3 — Ethernet: IEEE 802.3</div><div className="topbar-sub">Módulo 4 — La Subcapa MAC</div></div>
        <div className="scene-badge">ESCENA {sc}/{SCENES.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          <div style={{padding:'8px 14px',fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:4}}>Contenido</div>
          {SCENES.map(s=><div key={s.id} className={`nav-item${sc===s.id?' active':''}`} onClick={()=>setSc(s.id)}>{String(s.id).padStart(2,'0')} · {s.label}</div>)}
          <div style={{flex:1}}/>
          <div style={{padding:'10px 14px',borderTop:'1px solid rgba(59,130,246,0.1)'}}>
            <div style={{fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.12em',marginBottom:4}}>OBJETIVO</div>
            <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.5}}>Conocer la evolución de Ethernet, la estructura de la trama, las direcciones MAC y la diferencia entre hubs y switches.</div>
          </div>
        </div>
        <div className="main"><cur.C/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
