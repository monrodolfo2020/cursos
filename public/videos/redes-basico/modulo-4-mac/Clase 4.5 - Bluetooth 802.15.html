<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 4.5 — Bluetooth IEEE 802.15</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#060a14;font-family:'Space Grotesk',system-ui,sans-serif;color:#e8f0fe;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#060a14,#0a1020);border-bottom:2px solid rgba(59,130,246,0.35);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#7c8db8;font-family:'IBM Plex Mono',monospace;}
.scene-badge{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#3b82f6;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:220px;background:#0a1020;border-right:1px solid rgba(59,130,246,0.12);padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:8px 14px;cursor:pointer;font-size:11px;color:#3a4a72;border-left:3px solid transparent;transition:all .2s;font-family:'IBM Plex Mono',monospace;line-height:1.4;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:rgba(59,130,246,0.07);font-weight:600;}
.nav-item:hover:not(.active){color:#e8f0fe;background:rgba(255,255,255,0.03);}
.main{flex:1;padding:18px 24px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.18);border-radius:2px;}
.sec-title{font-size:21px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#3a4a72;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;}
.card{background:#0f1628;border:1px solid rgba(59,130,246,0.14);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.card-h{font-size:11px;font-weight:600;color:#3b82f6;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  const versiones=[
    {v:'1.0/1.1',y:'1999',vel:'1 Mbps',alc:'10 m',cons:'Alto',nota:'Primera versión. EDR no existía. Problemas de interoperabilidad.'},
    {v:'2.0+EDR',y:'2004',vel:'3 Mbps (EDR)',alc:'10 m',cons:'Medio',nota:'Enhanced Data Rate con π/4-DQPSK y 8DPSK. 3× velocidad.'},
    {v:'3.0+HS',y:'2009',vel:'24 Mbps (HS)',alc:'10 m',cons:'Alto',nota:'High Speed usa WiFi 802.11 para datos; BT para control/pareo.'},
    {v:'4.0 (BLE)',y:'2010',vel:'1 Mbps',alc:'100 m',cons:'Muy bajo',nota:'Bluetooth Low Energy (LE). GFSK, canales 2 MHz. IoT, beacons.'},
    {v:'4.2',y:'2014',vel:'1 Mbps',alc:'100 m',cons:'Muy bajo',nota:'IPv6 sobre BLE (6LoWPAN). Privacidad de dirección mejorada.'},
    {v:'5.0',y:'2016',vel:'2 Mbps / 125 kbps',alc:'400 m',cons:'Bajo',nota:'LE 2M PHY (velocidad ×2). LE Coded (rango ×4). Advertising ext.'},
    {v:'5.2/5.3',y:'2020',vel:'2 Mbps',alc:'400 m',cons:'Muy bajo',nota:'LE Audio (LC3 codec). Auracast broadcast. Connected isochronous.'},
  ];
  return(<div>
    <div className="sec-title">Bluetooth: IEEE 802.15.1 y BLE</div>
    <div className="sec-sub">La tecnología de redes de área personal más ubicua del mundo</div>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,marginBottom:10}}>
      <thead>
        <tr style={{borderBottom:'2px solid rgba(59,130,246,0.3)'}}>
          {['Versión','Año','Velocidad','Alcance','Consumo','Novedades'].map((h,i)=>(
            <th key={i} style={{padding:'7px 10px',color:'#3b82f6',textAlign:'left',fontFamily:'IBM Plex Mono,monospace',fontSize:9}}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {versiones.map((r,i)=>(
          <tr key={i} style={{background:i%2===0?'#0f1628':'transparent',borderBottom:'1px solid rgba(59,130,246,0.06)'}}>
            <td style={{padding:'6px 10px',color:'#f97316',fontFamily:'IBM Plex Mono,monospace',fontWeight:700}}>{r.v}</td>
            <td style={{padding:'6px 10px',color:'#3a4a72'}}>{r.y}</td>
            <td style={{padding:'6px 10px',color:'#10b981',fontWeight:600}}>{r.vel}</td>
            <td style={{padding:'6px 10px',color:'#7c8db8'}}>{r.alc}</td>
            <td style={{padding:'6px 10px',color:r.cons.includes('Muy')&&r.cons.includes('bajo')?'#10b981':r.cons==='Bajo'?'#3b82f6':r.cons==='Medio'?'#f97316':'#ef4444',fontSize:10}}>{r.cons}</td>
            <td style={{padding:'6px 10px',color:'#3a4a72',fontSize:10}}>{r.nota}</td>
          </tr>
        ))}
      </tbody>
    </table>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div className="card" style={{borderColor:'rgba(249,115,22,0.25)'}}>
        <div className="card-h" style={{color:'#f97316'}}>FHSS — Frequency Hopping Spread Spectrum</div>
        <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6}}>Bluetooth Classic usa 79 canales de 1 MHz en la banda 2.4 GHz (2402–2480 MHz). Salta entre canales 1600 veces/segundo siguiendo una secuencia pseudoaleatoria coordinada por el maestro de la piconet. Esto reduce interferencias con WiFi y otros dispositivos 2.4 GHz.</div>
      </div>
      <div className="card" style={{borderColor:'rgba(59,130,246,0.25)'}}>
        <div className="card-h">BLE — 40 canales de 2 MHz</div>
        <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6}}>Bluetooth LE usa 40 canales de 2 MHz. Canales 37, 38, 39 son para advertising (publicidad/discovery). Los otros 37 son para datos. Adaptive Frequency Hopping evita los canales ocupados por WiFi. Ideal para sensores, wearables, beacons.</div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  return(<div>
    <div className="sec-title">Arquitectura Bluetooth: Piconet y Scatternet</div>
    <div className="sec-sub">Cómo se organizan los dispositivos Bluetooth</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{borderColor:'rgba(249,115,22,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#f97316'}}>Piconet</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Una piconet es la unidad básica de Bluetooth. Un maestro (master) y hasta 7 esclavos activos (255 en modo parked). El maestro controla la secuencia de FHSS y el reloj. Los esclavos se sincronizan al maestro.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#f97316',lineHeight:1.9}}>
            {`       [MAESTRO]\n      /    |    \\\n   [E1]  [E2]  [E3] (activos)\n   [P1]  [P2]        (parked)\n\nMaestro: fija reloj y secuencia FHSS\nEsclavos: responden en slots asignados\nAcceso: TDD (Time Division Duplex)`}
          </div>
        </div>
        <div className="card">
          <div className="card-h">Tipos de enlace</div>
          {[
            {t:'SCO — Synchronous Connection Oriented',c:'#3b82f6',d:'Reserva slots periódicos para voz. Latencia constante. 64 kbps (ej. auriculares telefónicos). No retransmite si hay error.'},
            {t:'ACL — Asynchronous Connection Less',c:'#10b981',d:'Datos best-effort. Usa slots no reservados por SCO. Retransmite errores. Para transferencia de archivos, HID (teclado, ratón).'},
            {t:'eSCO — Extended SCO',c:'#8b5cf6',d:'Versión mejorada de SCO. Permite retransmisión limitada. Para audio HQ (mSBC: 16 kHz) y manos libres.'},
          ].map((r,i)=>(
            <div key={i} style={{padding:'6px 0',borderBottom:'1px solid rgba(59,130,246,0.07)'}}>
              <div style={{fontSize:11,fontWeight:700,color:r.c,marginBottom:3}}>{r.t}</div>
              <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.4}}>{r.d}</div>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(16,185,129,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#10b981'}}>Scatternet</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Un dispositivo puede ser maestro en una piconet y esclavo en otra, formando un scatternet. Esto permite extender el rango y conectar múltiples piconets.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#10b981',lineHeight:1.9}}>
            {`Piconet 1:  [M1]───[B]───[E1a]\nPiconet 2:       [B]───[M2]───[E2a]\n\nB = nodo puente (bridge)\nB es esclavo de M1 y M2 simultáneamente\nPermite comunicación entre piconets`}
          </div>
        </div>
        <div className="card">
          <div className="card-h">Pila de protocolos Bluetooth</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#3b82f6',lineHeight:1.9}}>
            {`┌────────────────────────────────┐\n│  Perfil: A2DP, HFP, HID, SPP   │ App\n├────────────────────────────────┤\n│  OBEX │ SDP │ RFCOMM │ BNEP    │ L2CAP\n├────────────────────────────────┤\n│  HCI — Host Controller Interface│\n├────────────────────────────────┤\n│  LMP (Link Manager Protocol)   │ Controller\n├────────────────────────────────┤\n│  Baseband (FHSS, slots, MAC)   │\n└────────────────────────────────┘`}
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  const techs=[
    {n:'Bluetooth Classic',vel:'1–3 Mbps',alc:'10–100 m',cons:'~30 mW activo',usos:'Auriculares, altavoces, teclados, ratones, teléfono manos libres',proto:'A2DP (audio), HFP (voz), HID (input)'},
    {n:'BLE (Bluetooth LE)',vel:'0.125–2 Mbps',alc:'10–400 m',cons:'~1–15 mW',usos:'Beacons, sensores IoT, wearables, glucómetros, llaves digitales',proto:'GATT (perfil genérico), ATT, GAP'},
    {n:'Bluetooth 5 LE Coded',vel:'125–500 kbps',alc:'Hasta 1 km',cons:'Muy bajo',usos:'Smart city sensors, tracking assets, industrial IoT',proto:'BLE extendido con corrección de errores FEC'},
    {n:'Auracast (BT 5.2+)',vel:'≤2 Mbps',alc:'Edificio',cons:'Bajo',usos:'TV en salas de espera con subtítulos, iglesias, estadios, audífonos',proto:'LE Audio (LC3 codec), Broadcast Isochronous'},
    {n:'Mesh BT (SIG Mesh)',vel:'≤1 Mbps',alc:'Red mallada',cons:'Muy bajo',usos:'Iluminación inteligente, sensores industriales, automatización hogar',proto:'BLE flooding/relay, Groups, Publish-Subscribe'},
    {n:'Zigbee (802.15.4)',vel:'250 kbps',alc:'10–100 m',cons:'Extremadamente bajo',usos:'Domótica (Matter), sensores industriales, smart metering',proto:'IEEE 802.15.4 PHY/MAC + Zigbee PRO'},
  ];
  return(<div>
    <div className="sec-title">Bluetooth y WPAN: Ecosistema Completo</div>
    <div className="sec-sub">Bluetooth Classic, BLE, y estándares WPAN (802.15.x)</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
      {techs.map((t,i)=>(
        <div key={i} className="card" style={{borderColor:i%3===0?'rgba(59,130,246,0.25)':i%3===1?'rgba(16,185,129,0.2)':'rgba(139,92,246,0.2)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
            <div style={{fontSize:13,fontWeight:700,color:'#e8f0fe'}}>{t.n}</div>
            <span style={{fontSize:10,color:'#10b981',fontFamily:'IBM Plex Mono,monospace',background:'rgba(16,185,129,0.1)',padding:'2px 6px',borderRadius:4}}>{t.vel}</span>
          </div>
          <div style={{display:'flex',gap:12,marginBottom:5,fontSize:10,fontFamily:'IBM Plex Mono,monospace'}}>
            <span style={{color:'#3b82f6'}}>{t.alc}</span>
            <span style={{color:'#f97316'}}>{t.cons}</span>
          </div>
          <div style={{fontSize:11,color:'#7c8db8',marginBottom:4,lineHeight:1.4}}>{t.usos}</div>
          <div style={{fontSize:10,color:'#3a4a72',fontStyle:'italic'}}>{t.proto}</div>
        </div>
      ))}
    </div>
    <div style={{background:'rgba(59,130,246,0.06)',border:'1px solid rgba(59,130,246,0.18)',borderRadius:8,padding:'8px 14px',fontSize:11,color:'#7c8db8'}}>
      <strong style={{color:'#3b82f6'}}>WPAN vs WLAN:</strong> Bluetooth (802.15.1) y Zigbee (802.15.4) son WPAN (Personal Area Network): rango corto, bajo consumo, optimizados para dispositivos personales e IoT. WiFi (802.11) es WLAN: mayor velocidad y rango, mayor consumo, optimizado para acceso a Internet. Se complementan: un smartphone usa BT para auriculares y WiFi para streaming de video.
    </div>
  </div>);
}

const SCENES=[{id:1,label:'Versiones y FHSS',C:Scene1},{id:2,label:'Piconet y arquitectura',C:Scene2},{id:3,label:'BLE, Mesh y WPAN',C:Scene3}];
function App(){
  const [sc,setSc]=useState(1);
  const cur=SCENES.find(s=>s.id===sc);
  return(
    <div className="slide">
      <div className="topbar">
        <div><div className="topbar-title">Clase 4.5 — Bluetooth y WPAN: IEEE 802.15</div><div className="topbar-sub">Módulo 4 — La Subcapa MAC</div></div>
        <div className="scene-badge">ESCENA {sc}/{SCENES.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          <div style={{padding:'8px 14px',fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:4}}>Contenido</div>
          {SCENES.map(s=><div key={s.id} className={`nav-item${sc===s.id?' active':''}`} onClick={()=>setSc(s.id)}>{String(s.id).padStart(2,'0')} · {s.label}</div>)}
          <div style={{flex:1}}/>
          <div style={{padding:'10px 14px',borderTop:'1px solid rgba(59,130,246,0.1)'}}>
            <div style={{fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.12em',marginBottom:4}}>OBJETIVO</div>
            <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.5}}>Comprender Bluetooth Classic y BLE, la arquitectura de piconet/scatternet y la familia de estándares WPAN 802.15.</div>
          </div>
        </div>
        <div className="main"><cur.C/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
