<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 4.2 — Protocolos ALOHA y CSMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#060a14;font-family:'Space Grotesk',system-ui,sans-serif;color:#e8f0fe;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#060a14,#0a1020);border-bottom:2px solid rgba(59,130,246,0.35);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#7c8db8;font-family:'IBM Plex Mono',monospace;}
.scene-badge{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#3b82f6;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:220px;background:#0a1020;border-right:1px solid rgba(59,130,246,0.12);padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:8px 14px;cursor:pointer;font-size:11px;color:#3a4a72;border-left:3px solid transparent;transition:all .2s;font-family:'IBM Plex Mono',monospace;line-height:1.4;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:rgba(59,130,246,0.07);font-weight:600;}
.nav-item:hover:not(.active){color:#e8f0fe;background:rgba(255,255,255,0.03);}
.main{flex:1;padding:18px 24px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.18);border-radius:2px;}
.sec-title{font-size:21px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#3a4a72;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;}
.card{background:#0f1628;border:1px solid rgba(59,130,246,0.14);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.card-h{font-size:11px;font-weight:600;color:#3b82f6;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  return(<div>
    <div className="sec-title">ALOHA: El Primer Protocolo de Acceso Aleatorio</div>
    <div className="sec-sub">Universidad de Hawaii, 1970: el origen de las redes inalámbricas modernas</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{borderColor:'rgba(249,115,22,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#f97316'}}>ALOHA puro</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Cada estación transmite cuando tiene datos. Si hay colisión (silencio del ACK), espera un tiempo aleatorio y retransmite. El tiempo aleatorio evita retransmisiones sincronizadas.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#f97316',lineHeight:1.8,marginBottom:8}}>
            {`Throughput S = G × e^(-2G)\n\nSmax = 1/(2e) ≈ 0.184 (18.4%)\nse alcanza cuando G = 0.5\n\nG = carga ofrecida al canal\nS = throughput real\n\nSi G > 0.5: colisiones destruyen todo`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8'}}>Período de vulnerabilidad: 2T (una trama entera antes y después). Una trama "nueva" puede chocar con el inicio O el final de otra.</div>
        </div>
        <div className="card">
          <div className="card-h">Backoff exponencial</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7}}>Tras una colisión, se espera entre 0 y 2ᵏ−1 slots antes de retransmitir (k = número de intentos fallidos). Esto reduce la probabilidad de una segunda colisión. Tras 10 intentos (k=10), k se congela. Tras 16 intentos: error reportado a la capa superior.</div>
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(59,130,246,0.25)',marginBottom:10}}>
          <div className="card-h">ALOHA ranurado (Slotted ALOHA)</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>El tiempo se divide en ranuras (slots) de igual duración. Las estaciones solo pueden transmitir al inicio de un slot. Reduce el período de vulnerabilidad de 2T a T.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#3b82f6',lineHeight:1.8,marginBottom:8}}>
            {`Throughput S = G × e^(-G)\n\nSmax = 1/e ≈ 0.368 (36.8%)\nse alcanza cuando G = 1.0\n\nDoble que ALOHA puro!\nPero requiere sincronización global`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8'}}>Usado en: sistemas satelitales (VSAT), RFID, redes celulares para canal de acceso inicial (PRACH en LTE/5G).</div>
        </div>
        <div className="card">
          <div className="card-h">Comparativa de throughput</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#10b981',lineHeight:1.9}}>
            {`Protocolo        Smax    Vuln.   Sinc?\nALOHA puro       18.4%   2T      No\nSlotted ALOHA    36.8%   T       Sí\nCSMA 1-persist.  ~50%    τ       No\nCSMA no-persist. ~80%    τ       No\nCSMA/CD          ~100%   2τ      No\n\nτ = tiempo de propagación (mucho < T)`}
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const variantes=[
    {n:'1-persistente',c:'#f97316',
     desc:'Si canal libre: transmite INMEDIATAMENTE (probabilidad 1). Si canal ocupado: espera y transmite en cuanto se libera.',
     pros:['Mínima latencia cuando canal libre'],
     contras:['Si dos esperan: colisión garantizada al liberarse'],
     uso:'Ethernet original (colisiones frecuentes en carga alta)'},
    {n:'No persistente',c:'#3b82f6',
     desc:'Si canal libre: transmite. Si canal ocupado: espera tiempo ALEATORIO y vuelve a escuchar.',
     pros:['Reduce colisiones','Mejor throughput que 1-persistente'],
     contras:['Mayor latencia (esperas innecesarias cuando canal libre)'],
     uso:'Más eficiente que 1-persistente en carga media'},
    {n:'p-persistente',c:'#10b981',
     desc:'Si canal libre: transmite con probabilidad p, espera un slot con probabilidad (1-p). Si canal ocupado: espera al siguiente slot.',
     pros:['Ajustable: menor p = menos colisiones','Balance entre latencia y colisiones'],
     contras:['Requiere conocer N (usuarios activos) para elegir p óptima'],
     uso:'802.11 WiFi (variante adaptativa en EDCA)'},
  ];
  return(<div>
    <div className="sec-title">CSMA — Carrier Sense Multiple Access</div>
    <div className="sec-sub">"Escucha antes de hablar": la mejora fundamental sobre ALOHA</div>
    <div style={{background:'rgba(59,130,246,0.06)',border:'1px solid rgba(59,130,246,0.18)',borderRadius:8,padding:'10px 14px',marginBottom:12}}>
      <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.6}}>En CSMA, antes de transmitir se detecta si el canal está en uso (carrier sense). Si está ocupado, se aplica una política de espera. Esto reduce drásticamente las colisiones respecto a ALOHA, pero no las elimina: la señal tarda τ en propagarse, y dos nodos lejanos pueden no "oírse" todavía cuando ambos deciden transmitir.</div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
      {variantes.map((v,i)=>(
        <div key={i} className="card" style={{borderColor:v.c+'33'}}>
          <div style={{fontSize:13,fontWeight:700,color:v.c,marginBottom:6}}>CSMA {v.n}</div>
          <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.55,marginBottom:8}}>{v.desc}</div>
          {v.pros.map((p,j)=><div key={j} style={{fontSize:10,color:'#10b981',padding:'1px 0'}}>+ {p}</div>)}
          {v.contras.map((c,j)=><div key={j} style={{fontSize:10,color:'#ef4444',padding:'1px 0'}}>− {c}</div>)}
          <div style={{fontSize:10,color:v.c,marginTop:6,fontFamily:'IBM Plex Mono,monospace'}}>{v.uso}</div>
        </div>
      ))}
    </div>
    <div className="card" style={{borderColor:'rgba(239,68,68,0.25)'}}>
      <div className="card-h" style={{color:'#ef4444'}}>CSMA/CD — Collision Detection (Ethernet)</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.65}}>Además de escuchar antes de transmitir, el nodo monitorea el canal DURANTE la transmisión. Si detecta colisión (señal diferente a la enviada), detiene inmediatamente y envía una señal de interferencia (jam signal 32 bits) para asegurar que todos detecten la colisión.</div>
        <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#ef4444',lineHeight:1.7}}>
          {`Requerimiento mínimo de trama:\nTrama mín > 2 × τ × velocidad\n\nEthernet 10 Mbps, 2500 m:\n2τ = 51.2 μs\nTrama mín = 10⁷×51.2×10⁻⁶ = 512 bits = 64 bytes\n\nPor eso Ethernet tiene trama mínima de 64 bytes`}
        </div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  return(<div>
    <div className="sec-title">CSMA/CA y Protocolos por Turnos</div>
    <div className="sec-sub">Evitar colisiones (WiFi) y protocolos sin colisiones (Token)</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{borderColor:'rgba(59,130,246,0.25)',marginBottom:10}}>
          <div className="card-h">CSMA/CA — Collision Avoidance (WiFi 802.11)</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>En inalámbrico, la detección de colisión (CD) es impráctica: la señal propia enmascara la señal recibida. Por eso WiFi usa CSMA/CA: intentar EVITAR las colisiones.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#3b82f6',lineHeight:1.8,marginBottom:8}}>
            {`1. Esperar DIFS (Distributed IFS)\n2. Si libre: elegir backoff aleatorio [0, CW]\n3. Decrementar contador mientras canal libre\n4. Cuando llega a 0: transmitir\n5. Esperar ACK (timeout → retransmitir)\n6. Si colisión: duplicar CW (backoff exp.)\n\nCW = Contention Window (crece exponenc.)`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8'}}>IFS (InterFrame Space) crea prioridades: SIFS &lt; PIFS &lt; DIFS. ACK usa SIFS para responder antes de que nadie más transmita.</div>
        </div>
        <div className="card">
          <div className="card-h">Problema del nodo oculto</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#8b5cf6',lineHeight:1.7}}>
            {`A ──────► AP ◄────── B\n  (A y B no se escuchan entre sí)\n\nSolución: RTS/CTS\nA envía RTS al AP\nAP responde CTS (broadcast)\nB escucha CTS → calla durante NAV\nA transmite sin colisión con B`}
          </div>
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(16,185,129,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#10b981'}}>Protocolos por turnos: Token Ring</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>Un token (ficha) circula por el anillo. Solo el nodo que tiene el token puede transmitir. Sin colisiones posibles. Eficiencia cercana al 100% en carga alta.</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#10b981',lineHeight:1.8,marginBottom:8}}>
            {`[A]→[B]→[C]→[D]→[A]\n\nToken llega a A → A transmite trama\nTrama circula por B,C,D (copian si es para ellos)\nTrama regresa a A → A la retira\nA pasa el token al siguiente\n\nToken Holding Time (THT) limita uso`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8'}}>IEEE 802.5 (Token Ring, IBM). Hoy reemplazado por Ethernet conmutado (switches eliminar colisiones sin token). FDDI (100 Mbps, fibra) usó Token Ring hasta los 2000s.</div>
        </div>
        <div className="card">
          <div className="card-h">Comparativa protocolos MAC aleatorios</div>
          {[
            {p:'ALOHA puro',th:'18%',lat:'Baja (sin espera)',uso:'Satelital simple'},
            {p:'Slotted ALOHA',th:'37%',lat:'Slot boundary',uso:'PRACH LTE/5G'},
            {p:'CSMA 1-persist',th:'~50%',lat:'Muy baja',uso:'Ethernet original'},
            {p:'CSMA/CD',th:'~90%',lat:'Baja + jam',uso:'Ethernet IEEE 802.3'},
            {p:'CSMA/CA',th:'~60–80%',lat:'DIFS+backoff',uso:'WiFi IEEE 802.11'},
          ].map((r,i)=>(
            <div key={i} style={{display:'grid',gridTemplateColumns:'1.5fr 50px 1fr 1fr',gap:6,padding:'5px 0',borderBottom:'1px solid rgba(59,130,246,0.07)',fontSize:11,alignItems:'center'}}>
              <span style={{color:'#e8f0fe',fontWeight:600}}>{r.p}</span>
              <span style={{color:'#10b981',fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.th}</span>
              <span style={{color:'#3a4a72',fontSize:10}}>{r.lat}</span>
              <span style={{color:'#3b82f6',fontSize:10}}>{r.uso}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>);
}

const SCENES=[{id:1,label:'ALOHA puro y ranurado',C:Scene1},{id:2,label:'CSMA y CSMA/CD',C:Scene2},{id:3,label:'CSMA/CA y Token Ring',C:Scene3}];
function App(){
  const [sc,setSc]=useState(1);
  const cur=SCENES.find(s=>s.id===sc);
  return(
    <div className="slide">
      <div className="topbar">
        <div><div className="topbar-title">Clase 4.2 — Protocolos de Acceso Múltiple: ALOHA y CSMA</div><div className="topbar-sub">Módulo 4 — La Subcapa MAC</div></div>
        <div className="scene-badge">ESCENA {sc}/{SCENES.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          <div style={{padding:'8px 14px',fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:4}}>Contenido</div>
          {SCENES.map(s=><div key={s.id} className={`nav-item${sc===s.id?' active':''}`} onClick={()=>setSc(s.id)}>{String(s.id).padStart(2,'0')} · {s.label}</div>)}
          <div style={{flex:1}}/>
          <div style={{padding:'10px 14px',borderTop:'1px solid rgba(59,130,246,0.1)'}}>
            <div style={{fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.12em',marginBottom:4}}>OBJETIVO</div>
            <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.5}}>Comprender los protocolos ALOHA, CSMA, CSMA/CD y CSMA/CA, su eficiencia y aplicaciones en Ethernet y WiFi.</div>
          </div>
        </div>
        <div className="main"><cur.C/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
