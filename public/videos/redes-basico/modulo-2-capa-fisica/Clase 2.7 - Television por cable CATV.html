<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 2.7 — Televisión por Cable CATV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#060a14;font-family:'Space Grotesk',system-ui,sans-sei-serif;color:#e8f0fe;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#060a14,#0a1020);border-bottom:2px solid rgba(59,130,246,0.35);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#7c8db8;font-family:'IBM Plex Mono',monospace;}
.scene-badge{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#3b82f6;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:220px;background:#0a1020;border-right:1px solid rgba(59,130,246,0.12);padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:8px 14px;cursor:pointer;font-size:11px;color:#3a4a72;border-left:3px solid transparent;transition:all .2s;font-family:'IBM Plex Mono',monospace;line-height:1.4;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:rgba(59,130,246,0.07);font-weight:600;}
.nav-item:hover:not(.active){color:#e8f0fe;background:rgba(255,255,255,0.03);}
.main{flex:1;padding:18px 24px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.18);border-radius:2px;}
.sec-title{font-size:21px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#3a4a72;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;}
.card{background:#0f1628;border:1px solid rgba(59,130,246,0.14);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.card-h{font-size:11px;font-weight:600;color:#3b82f6;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  return(<div>
    <div className="sec-title">La Red HFC: Hybrid Fiber-Coaxial</div>
    <div className="sec-sub">La infraestructura de cable que lleva Internet al hogar</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{marginBottom:10}}>
          <div className="card-h">Arquitectura HFC</div>
          <div style={{fontSize:11,fontFamily:'IBM Plex Mono,monospace',color:'#3b82f6',background:'#060a14',borderRadius:6,padding:'10px',lineHeight:2}}>
            {`[Headend (cabecera)]\n    │ fibra óptica (trunk)\n[Fiber Node] ◄── 1 nodo: ~500 hogares\n    │ coaxial (distribución)\n[Amplificador coaxial] ←── cada ~500 m\n    │\n[Splitter de barrio]\n    │\n[Cable Modem del hogar]\n    │\n[Router doméstico / PC]`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6,marginTop:8}}>El headend agrega TV por satélite, internet y VoIP. La fibra lleva las señales hasta el nodo de fibra. Desde ahí, el coaxial distribuye a los hogares. Los amplificadores son unidireccionales en redes antiguas (problema para internet de subida).</div>
        </div>
        <div className="card">
          <div className="card-h">El cable coaxial</div>
          {[
            {p:'Impedancia',v:'75 Ω (a diferencia de 50 Ω en redes)'},
            {p:'Espectro usable',v:'5–1000 MHz (DOCSIS 3.1) / hasta 1.2 GHz'},
            {p:'Canal de TV',v:'6 MHz (EEUU) / 8 MHz (Europa)'},
            {p:'Atenuación',v:'Aumenta con frecuencia y distancia'},
            {p:'Amplificadores',v:'Cada 500 m, añaden ruido acumulativo'},
          ].map(r=>(
            <div key={r.p} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid rgba(59,130,246,0.07)',fontSize:11}}>
              <span style={{color:'#7c8db8'}}>{r.p}</span>
              <span style={{color:'#e8f0fe',fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.v}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card" style={{marginBottom:10}}>
          <div className="card-h">Espectro de frecuencias HFC</div>
          <div style={{fontSize:11,fontFamily:'IBM Plex Mono,monospace',background:'#060a14',borderRadius:6,padding:'10px',lineHeight:1.9}}>
            <div style={{color:'#ef4444'}}>{'5–85 MHz    ← UPSTREAM (subida DOCSIS 3.x)'}</div>
            <div style={{color:'#f97316'}}>{'108–750 MHz ← TV analógica + digital (MPEG)'}</div>
            <div style={{color:'#3b82f6'}}>{'750–860 MHz ← DOWNSTREAM datos (DOCSIS 3.0)'}</div>
            <div style={{color:'#10b981'}}>{'108–1218 MHz← DOWNSTREAM full (DOCSIS 3.1)'}</div>
            <div style={{color:'#8b5cf6'}}>{'5–204 MHz   ← UPSTREAM ampliado (DOCSIS 3.1)'}</div>
          </div>
          <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.5,marginTop:8}}>El espectro compartido es bidireccional pero asimétrico. Las redes antiguas tenían poco espectro de subida (5–42 MHz) — problema para el trabajo desde casa y streaming en vivo.</div>
        </div>
        <div className="card">
          <div className="card-h">Medio compartido — implicaciones</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7}}>A diferencia de la fibra GPON donde cada usuario tiene su onda, el coaxial comparte el ancho de banda entre todos los usuarios del nodo. En horas pico, la velocidad se degrada. Solución: dividir nodos (más fibra, menos usuarios/nodo) o migrar a DOCSIS 3.1/4.0.</div>
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const docsis=[
    {v:'DOCSIS 1.0',año:1997,down:'40 Mbps',up:'10 Mbps',canal:'6 MHz',mod:'QAM-64',nota:'Primera versión. Un canal por sentido.'},
    {v:'DOCSIS 2.0',año:2001,down:'40 Mbps',up:'30 Mbps',canal:'6 MHz',mod:'QAM-256 (↓)',nota:'Mejora uplink: S-CDMA para reducir ruido impulsivo.'},
    {v:'DOCSIS 3.0',año:2006,down:'1 Gbps',up:'200 Mbps',canal:'Canal bonding',mod:'QAM-256',nota:'Channel bonding: 32 canales ↓, 8 canales ↑. Permite Gbps.'},
    {v:'DOCSIS 3.1',año:2013,down:'10 Gbps',up:'1–2 Gbps',canal:'OFDM 192 MHz',mod:'4096-QAM',nota:'OFDM como LTE. Canal único de 192 MHz (↓) / 96 MHz (↑). Capacidad enorme.'},
    {v:'DOCSIS 4.0',año:2020,down:'10 Gbps',up:'6 Gbps',canal:'OFDM extendido',mod:'4096-QAM',nota:'Full Duplex o Extended Spectrum. Simétrico Gbps objetivo. Reutiliza coaxial existente.'},
  ];
  return(<div>
    <div className="sec-title">Estándar DOCSIS: Evolución e Internet por Cable</div>
    <div className="sec-sub">Data Over Cable Service Interface Specification</div>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,marginBottom:12}}>
      <thead>
        <tr style={{borderBottom:'2px solid rgba(59,130,246,0.3)'}}>
          {['Versión','Año','Downstream','Upstream','Tecnología canal','Modulación','Novedades'].map((h,i)=>(
            <th key={i} style={{padding:'8px 8px',color:'#3b82f6',textAlign:'left',fontFamily:'IBM Plex Mono,monospace',fontSize:9}}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {docsis.map((d,i)=>(
          <tr key={i} style={{background:i%2===0?'#0f1628':'transparent',borderBottom:'1px solid rgba(59,130,246,0.06)'}}>
            <td style={{padding:'7px 8px',color:'#f97316',fontWeight:700,fontFamily:'IBM Plex Mono,monospace'}}>{d.v}</td>
            <td style={{padding:'7px 8px',color:'#3a4a72'}}>{d.año}</td>
            <td style={{padding:'7px 8px',color:'#10b981',fontWeight:600}}>{d.down}</td>
            <td style={{padding:'7px 8px',color:'#3b82f6',fontWeight:600}}>{d.up}</td>
            <td style={{padding:'7px 8px',color:'#7c8db8',fontSize:10}}>{d.canal}</td>
            <td style={{padding:'7px 8px',color:'#8b5cf6',fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{d.mod}</td>
            <td style={{padding:'7px 8px',color:'#3a4a72',fontSize:10,fontStyle:'italic'}}>{d.nota}</td>
          </tr>
        ))}
      </tbody>
    </table>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div className="card" style={{borderColor:'rgba(249,115,22,0.2)'}}>
        <div className="card-h" style={{color:'#f97316'}}>Cable Modem — CMTS y CM</div>
        <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.65}}>El CMTS (Cable Modem Termination System) en el headend gestiona miles de cable modems. Protocolo MAC: TDMA con reserva de slots. El CM del hogar pide slots de subida al CMTS (Request → Grant). CMTS asigna slots evitando colisiones. Similar a DOCSIS TDM.</div>
      </div>
      <div className="card" style={{borderColor:'rgba(59,130,246,0.25)'}}>
        <div className="card-h">Seguridad en redes cable</div>
        <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.65}}>Todos los vecinos comparten el mismo segmento coaxial → un CM puede escuchar el tráfico de otros. BPI+ (Baseline Privacy Interface): cifra el tráfico entre CM y CMTS con AES-128. También autentica el CM con certificado X.509 para evitar modems no autorizados.</div>
      </div>
    </div>
  </div>);
}

function Scene3(){
  const comp=[
    {t:'Último tramo',ftth:'Fibra óptica hasta el hogar',hfc:'Coaxial compartido ~500 usuarios',dsl:'Par cobre (bucle local)'},
    {t:'Downstream pico',ftth:'1–10 Gbps (XGS-PON)',hfc:'DOCSIS 3.1: hasta 10 Gbps',dsl:'ADSL2+: 24 Mbps, VDSL2: 100 Mbps'},
    {t:'Upstream pico',ftth:'1–10 Gbps (simétrico)',hfc:'DOCSIS 3.1: 1–2 Gbps',dsl:'ADSL2+: 3.5 Mbps, VDSL2: 50 Mbps'},
    {t:'Latencia',ftth:'1–5 ms',hfc:'5–15 ms',dsl:'10–30 ms'},
    {t:'Compartición',ftth:'No (cada usuario su propia λ)',hfc:'Sí — nodo 500 vecinos',dsl:'No (par dedicado)'},
    {t:'Limitación distancia',ftth:'Ninguna práctica',hfc:'Amplificadores cada 500 m',dsl:'Velocidad decrece con distancia'},
    {t:'Coste despliegue',ftth:'Alto (cavar + fibra)',hfc:'Medio (coaxial existente)',dsl:'Bajo (cobre existente)'},
    {t:'Tecnología futura',ftth:'25G-PON, 50G-PON',hfc:'DOCSIS 4.0, Full Duplex',dsl:'G.fast, XG-FAST (500 Mbps < 50 m)'},
  ];
  return(<div>
    <div className="sec-title">FTTH vs. HFC vs. DSL: Comparativa de Acceso</div>
    <div className="sec-sub">Las tres tecnologías que compiten en el último kilómetro</div>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,marginBottom:12}}>
      <thead>
        <tr style={{borderBottom:'2px solid rgba(59,130,246,0.3)'}}>
          {['Característica','FTTH (fibra)','HFC (cable)','xDSL (cobre)'].map((h,i)=>(
            <th key={i} style={{padding:'8px 10px',color:['#7c8db8','#10b981','#f97316','#3b82f6'][i],textAlign:'left',fontFamily:'IBM Plex Mono,monospace',fontSize:9}}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {comp.map((r,i)=>(
          <tr key={i} style={{background:i%2===0?'#0f1628':'transparent',borderBottom:'1px solid rgba(59,130,246,0.06)'}}>
            <td style={{padding:'7px 10px',color:'#e8f0fe',fontWeight:600}}>{r.t}</td>
            <td style={{padding:'7px 10px',color:'#10b981',fontSize:10}}>{r.ftth}</td>
            <td style={{padding:'7px 10px',color:'#f97316',fontSize:10}}>{r.hfc}</td>
            <td style={{padding:'7px 10px',color:'#3b82f6',fontSize:10}}>{r.dsl}</td>
          </tr>
        ))}
      </tbody>
    </table>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div className="card" style={{borderColor:'rgba(16,185,129,0.2)'}}>
        <div className="card-h" style={{color:'#10b981'}}>Tendencia global: "Fiber is King"</div>
        <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6}}>Países líderes (Corea, Japón, Suecia) superan el 80% de penetración FTTH. UE mandató 1 Gbps para todos en 2030. El cable está migrando a DOCSIS 4.0 para competir simétricamente. DSL irá desapareciendo a medida que avanza la fibra.</div>
      </div>
      <div className="card" style={{borderColor:'rgba(59,130,246,0.25)'}}>
        <div className="card-h">TV y convergencia</div>
        <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6}}>La TV lineal (canales en tiempo real) coexiste con IPTV (unicast bajo demanda) y OTT (Netflix, YouTube sobre IP pura). Hoy el 60% del tráfico downstream en HFC es video. Los operadores de cable son esencialmente ISPs que también ofrecen TV para amortizar su infraestructura.</div>
      </div>
    </div>
  </div>);
}

const SCENES=[{id:1,label:'Arquitectura HFC',C:Scene1},{id:2,label:'DOCSIS — Internet por cable',C:Scene2},{id:3,label:'FTTH vs HFC vs DSL',C:Scene3}];
function App(){
  const [sc,setSc]=useState(1);
  const cur=SCENES.find(s=>s.id===sc);
  return(
    <div className="slide">
      <div className="topbar">
        <div><div className="topbar-title">Clase 2.7 — Televisión por Cable y Redes HFC</div><div className="topbar-sub">Módulo 2 — La Capa Física</div></div>
        <div className="scene-badge">ESCENA {sc}/{SCENES.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          <div style={{padding:'8px 14px',fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:4}}>Contenido</div>
          {SCENES.map(s=><div key={s.id} className={`nav-item${sc===s.id?' active':''}`} onClick={()=>setSc(s.id)}>{String(s.id).padStart(2,'0')} · {s.label}</div>)}
          <div style={{flex:1}}/>
          <div style={{padding:'10px 14px',borderTop:'1px solid rgba(59,130,246,0.1)'}}>
            <div style={{fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.12em',marginBottom:4}}>OBJETIVO</div>
            <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.5}}>Entender la arquitectura HFC, el estándar DOCSIS y comparar las tecnologías de acceso de banda ancha al hogar.</div>
          </div>
        </div>
        <div className="main"><cur.C/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
