<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 3.5 — Protocolo HDLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#060a14;font-family:'Space Grotesk',system-ui,sans-serif;color:#e8f0fe;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#060a14,#0a1020);border-bottom:2px solid rgba(59,130,246,0.35);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#7c8db8;font-family:'IBM Plex Mono',monospace;}
.scene-badge{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#3b82f6;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:220px;background:#0a1020;border-right:1px solid rgba(59,130,246,0.12);padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:8px 14px;cursor:pointer;font-size:11px;color:#3a4a72;border-left:3px solid transparent;transition:all .2s;font-family:'IBM Plex Mono',monospace;line-height:1.4;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:rgba(59,130,246,0.07);font-weight:600;}
.nav-item:hover:not(.active){color:#e8f0fe;background:rgba(255,255,255,0.03);}
.main{flex:1;padding:18px 24px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.18);border-radius:2px;}
.sec-title{font-size:21px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#3a4a72;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;}
.card{background:#0f1628;border:1px solid rgba(59,130,246,0.14);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.card-h{font-size:11px;font-weight:600;color:#3b82f6;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;}
</style></head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  return(<div>
    <div className="sec-title">HDLC — High-Level Data Link Control</div>
    <div className="sec-sub">El protocolo ISO que inspiró todos los protocolos modernos de capa 2</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{marginBottom:10}}>
          <div className="card-h">Contexto e historia</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7,marginBottom:8}}>HDLC (ISO 13239) deriva de SDLC (IBM, 1975). Fue el estándar de facto para WAN en los años 80–90. Muchos protocolos modernos son variantes: LAPB (X.25), LAPD (ISDN), LAPM (V.42), PPP usa encuadre similar.</div>
          </div>
        <div className="card" style={{borderColor:'rgba(249,115,22,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#f97316'}}>Estructura de la trama HDLC</div>
          <div style={{display:'flex',gap:3,marginBottom:8}}>
            {[{l:'FLAG\n01111110',c:'#f97316',w:60},{l:'DIRECCIÓN\n8/16 bits',c:'#3b82f6',w:70},{l:'CONTROL\n8/16 bits',c:'#8b5cf6',w:70},{l:'DATOS\nVariable',c:'#10b981',w:100},{l:'FCS\nCRC-16/32',c:'#ef4444',w:65},{l:'FLAG\n01111110',c:'#f97316',w:60}].map((b,i)=>(
              <div key={i} style={{background:b.c+'18',border:`1px solid ${b.c}44`,borderRadius:4,padding:'4px 6px',textAlign:'center',color:b.c,fontSize:9,fontWeight:700,minWidth:b.w,whiteSpace:'pre-line',lineHeight:1.4}}>{b.l}</div>
            ))}
          </div>
          <div style={{fontSize:11,color:'#7c8db8',lineHeight:1.6}}>El encuadre usa flags 0x7E (01111110) con bit stuffing: después de 5 unos consecutivos se inserta un cero. El receptor elimina el cero insertado automáticamente.</div>
        </div>
        <div className="card">
          <div className="card-h">Configuraciones HDLC</div>
          {[
            {m:'NRM — Normal Response Mode',d:'Maestro-esclavo. Solo el maestro puede iniciar. Usado en terminales conectadas a mainframe.'},
            {m:'ABM — Asynchronous Balanced Mode',d:'Par a par. Cualquiera puede iniciar transmisión. Modo más usado: X.25, PPP, ISDN.'},
            {m:'ARM — Asynchronous Response Mode',d:'El esclavo puede iniciar sin permiso. Poco común en la práctica.'},
          ].map((r,i)=>(
            <div key={i} style={{padding:'6px 0',borderBottom:'1px solid rgba(59,130,246,0.07)'}}>
              <div style={{fontSize:11,fontWeight:700,color:'#3b82f6',marginBottom:3}}>{r.m}</div>
              <div style={{fontSize:11,color:'#3a4a72'}}>{r.d}</div>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(139,92,246,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#8b5cf6'}}>Campo de control — Tres tipos de trama</div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:'#10b981',marginBottom:4}}>I-frame (Information)</div>
            <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:10,background:'#060a14',borderRadius:4,padding:'6px',color:'#10b981',lineHeight:1.6}}>{`Bit 0: 0\nN(S): seq# trama enviada (3 bits)\nP/F: Poll/Final bit\nN(R): próximo seq# esperado (ACK implícito)`}</div>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:'#3b82f6',marginBottom:4}}>S-frame (Supervisory)</div>
            <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:10,background:'#060a14',borderRadius:4,padding:'6px',color:'#3b82f6',lineHeight:1.6}}>{`Bits 0,1: 10\nTipo: RR (Receive Ready), RNR, REJ, SREJ\nN(R): número de confirmación\nSin datos, solo control de flujo/error`}</div>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:'#f97316',marginBottom:4}}>U-frame (Unnumbered)</div>
            <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:10,background:'#060a14',borderRadius:4,padding:'6px',color:'#f97316',lineHeight:1.6}}>{`Bits 0,1: 11\nSABM: Set ABM (establece conexión)\nUA: Unnumbered ACK\nDISC: Disconnect\nFRMR: Frame Reject`}</div>
          </div>
        </div>
        <div className="card">
          <div className="card-h">Establecimiento y cierre de conexión</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#3b82f6',lineHeight:1.8}}>
            {`A                          B\n├── SABM (Connectar ABM) ──►│\n│◄── UA (Unnumbered ACK) ────│\n├── I(0,0) ─────────────────►│\n│◄── I(0,1) ─────────────────│\n│         (datos...)         │\n├── DISC (desconectar) ─────►│\n│◄── UA ──────────────────────│`}
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const derivados=[
    {n:'LAPB',full:'Link Access Protocol, Balanced',uso:'X.25 (WAN paquetes)',modo:'ABM',notas:'El protocolo de capa 2 de X.25. Usa ventanas de 3 bits (mod 8) o 7 bits (mod 128). Muy robusto para enlaces WAN ruidosos de los años 80.'},
    {n:'LAPD',full:'Link Access Protocol, D-channel',uso:'ISDN (Red digital)',modo:'ABM',notas:'Protocolo del canal D de ISDN para señalización. TEI (Terminal Endpoint Identifier) y SAPI (Service Access Point Identifier) en el campo dirección. Aún activo en DSL y algunos sistemas.'},
    {n:'LAPM',full:'Link Access Protocol for Modems',uso:'Módems V.42',modo:'ABM',notas:'Añade corrección de errores y compresión en módems dial-up. MNP4/MNP5 era el alternativo. Velocidades: hasta 33.6 kbps con V.34 + compresión V.42bis.'},
    {n:'LLC 802.2',full:'Logical Link Control',uso:'IEEE 802 (Ethernet, WiFi)',modo:'ABM/no-conn',notas:'Capa LLC sobre MAC. Tipos: 1 (sin conexión), 2 (con conexión), 3 (ack sin conexión). Hoy prácticamente transparente; Ethernet usa directamente IP sobre MAC.'},
    {n:'Frame Relay',full:'Frame Relay (simplificado)',uso:'WAN empresarial',modo:'DLCI',notas:'HDLC simplificado sin control de errores ni flujo en la nube. Solo detección (CRC). DE y FECN/BECN para congestión. Reemplazado por MPLS y Metro Ethernet.'},
    {n:'PPP',full:'Point-to-Point Protocol',uso:'Internet dial-up, WAN',modo:'LCP/NCP',notas:'Sucesor de SLIP. Usa encuadre similar a HDLC. Tiene LCP para establecer enlace y NCPs (IPCP, IPX, etc.) para cada protocolo de red. Sigue vivo en PPPoE (DSL).'},
  ];
  return(<div>
    <div className="sec-title">Protocolos Derivados de HDLC</div>
    <div className="sec-sub">La familia HDLC: protocolos que revolucionaron las WAN</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      {derivados.map((d,i)=>(
        <div key={i} className="card" style={{borderColor:i%3===0?'rgba(59,130,246,0.25)':i%3===1?'rgba(249,115,22,0.2)':'rgba(16,185,129,0.2)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
            <div style={{fontSize:14,fontWeight:700,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace'}}>{d.n}</div>
            <span style={{fontSize:10,color:'#3a4a72',background:'rgba(59,130,246,0.08)',padding:'2px 6px',borderRadius:4}}>{d.modo}</span>
          </div>
          <div style={{fontSize:11,color:'#f97316',marginBottom:4}}>{d.full} — <span style={{color:'#7c8db8'}}>{d.uso}</span></div>
          <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.55}}>{d.notas}</div>
        </div>
      ))}
    </div>
  </div>);
}

function Scene3(){
  return(<div>
    <div className="sec-title">Operación de HDLC: Flujo de Tramas</div>
    <div className="sec-sub">Ejemplos de intercambio de tramas I, S y U</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div>
        <div className="card" style={{marginBottom:10}}>
          <div className="card-h">Transferencia normal (W=4)</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#3b82f6',lineHeight:1.8}}>
            {`A                           B\n├── I(0,0) ─────────────────►│\n├── I(1,0) ─────────────────►│\n├── I(2,0) ─────────────────►│\n├── I(3,0) ─────────────────►│\n│◄── RR(4) ──────────────────│ ACK 0,1,2,3\n├── I(4,4) ─────────────────►│\n├── I(5,4) ─────────────────►│\n│◄── RR(6) ──────────────────│ ACK 4,5`}
          </div>
          <div style={{fontSize:11,color:'#7c8db8',marginTop:6}}>I(N(S), N(R)): N(S)=seq enviado, N(R)=próximo esperado (ACK implícito de todos los anteriores).</div>
        </div>
        <div className="card">
          <div className="card-h">Control de flujo con RNR</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#f97316',lineHeight:1.8}}>
            {`A                           B\n├── I(0,0) ─────────────────►│\n├── I(1,0) ─────────────────►│\n│◄── RNR(2) ─────────────────│ ← PARA!\n│ (A detiene transmisión)    │\n│◄── RR(2) ──────────────────│ ← CONTINÚA\n├── I(2,0) ─────────────────►│\nRNR = Receive Not Ready`}
          </div>
        </div>
      </div>
      <div>
        <div className="card" style={{borderColor:'rgba(239,68,68,0.25)',marginBottom:10}}>
          <div className="card-h" style={{color:'#ef4444'}}>Recuperación de errores con REJ</div>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,background:'#060a14',borderRadius:6,padding:'10px',color:'#ef4444',lineHeight:1.8}}>
            {`A                           B\n├── I(0,0) ─────────────────►│ ok\n├── I(1,0) ─────────────────►│ ok\n├── I(2,0) ──────── ERROR ───│ CRC fail!\n├── I(3,0) ─────────────────►│ descartada\n│◄── REJ(2) ─────────────────│ Go-Back-2\n├── I(2,0) ─────────────────►│ retransmite desde 2\n├── I(3,0) ─────────────────►│ retransmite 3\n│◄── RR(4) ──────────────────│ ok`}
          </div>
        </div>
        <div className="card" style={{borderColor:'rgba(16,185,129,0.2)'}}>
          <div className="card-h" style={{color:'#10b981'}}>Legado de HDLC</div>
          <div style={{fontSize:12,color:'#7c8db8',lineHeight:1.7}}>HDLC definió los conceptos que usan todos los protocolos de capa 2 modernos: tramas con delimitadores, numeración de secuencia, ventanas deslizantes, ACK/NAK, control de flujo por retroalimentación. Aunque Ethernet hoy no usa confiabilidad en capa 2, WiFi (MSDU reordering) y LTE (AM RLC mode) usan variantes del mismo concepto.</div>
        </div>
      </div>
    </div>
  </div>);
}

const SCENES=[{id:1,label:'HDLC: estructura',C:Scene1},{id:2,label:'Protocolos derivados',C:Scene2},{id:3,label:'Flujo de tramas',C:Scene3}];
function App(){
  const [sc,setSc]=useState(1);
  const cur=SCENES.find(s=>s.id===sc);
  return(
    <div className="slide">
      <div className="topbar">
        <div><div className="topbar-title">Clase 3.5 — Protocolo HDLC</div><div className="topbar-sub">Módulo 3 — Capa de Enlace</div></div>
        <div className="scene-badge">ESCENA {sc}/{SCENES.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          <div style={{padding:'8px 14px',fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:4}}>Contenido</div>
          {SCENES.map(s=><div key={s.id} className={`nav-item${sc===s.id?' active':''}`} onClick={()=>setSc(s.id)}>{String(s.id).padStart(2,'0')} · {s.label}</div>)}
          <div style={{flex:1}}/>
          <div style={{padding:'10px 14px',borderTop:'1px solid rgba(59,130,246,0.1)'}}>
            <div style={{fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.12em',marginBottom:4}}>OBJETIVO</div>
            <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.5}}>Conocer la estructura del protocolo HDLC, sus tipos de tramas, configuraciones y los protocolos derivados que lo sucedieron.</div>
          </div>
        </div>
        <div className="main"><cur.C/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
