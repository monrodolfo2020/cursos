<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 1.3 — Software de red: capas, protocolos y servicios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#060a14;font-family:'Space Grotesk',system-ui,sans-serif;color:#e8f0fe;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#060a14,#0a1020);border-bottom:2px solid rgba(59,130,246,0.35);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#3b82f6;}
.topbar-sub{font-size:11px;color:#7c8db8;font-family:'IBM Plex Mono',monospace;}
.scene-badge{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#3b82f6;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:220px;background:#0a1020;border-right:1px solid rgba(59,130,246,0.12);padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:8px 14px;cursor:pointer;font-size:11px;color:#3a4a72;border-left:3px solid transparent;transition:all .2s;font-family:'IBM Plex Mono',monospace;line-height:1.4;}
.nav-item.active{color:#3b82f6;border-left-color:#3b82f6;background:rgba(59,130,246,0.07);font-weight:600;}
.nav-item:hover:not(.active){color:#e8f0fe;background:rgba(255,255,255,0.03);}
.main{flex:1;padding:18px 24px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.18);border-radius:2px;}
.sec-title{font-size:21px;font-weight:700;color:#3b82f6;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#3a4a72;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.card{background:#0f1628;border:1px solid rgba(59,130,246,0.14);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.card-h{font-size:11px;font-weight:600;color:#3b82f6;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;}
.def-box{background:#060a14;border-left:3px solid #3b82f6;border-radius:0 8px 8px 0;padding:11px 16px;margin:8px 0;font-size:12px;line-height:1.65;}
.row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(59,130,246,0.08);align-items:flex-start;}
.row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  return(<div>
    <div className="sec-title">Jerarquías de Protocolos — Arquitectura en Capas</div>
    <div className="sec-sub">El principio de diseño más importante de las redes</div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">¿Por qué capas?</div>
          <p style={{fontSize:12,lineHeight:1.65,color:'#7c8db8',marginBottom:8}}>
            Diseñar un sistema de comunicación completo es extremadamente complejo. La solución de los ingenieros de redes fue la misma que se usa en la construcción de grandes sistemas: <strong style={{color:'#e8f0fe'}}>dividir el problema en capas</strong> independientes, donde cada capa resuelve un subproblema específico.
          </p>
          <div className="def-box">
            <strong style={{color:'#3b82f6'}}>Principio de capas:</strong> Cada capa N ofrece servicios a la capa N+1 usando los servicios de la capa N-1. La capa N en una máquina se comunica virtualmente con la capa N en la otra máquina usando el protocolo de la capa N.
          </div>
          <div className="card-h" style={{marginTop:10}}>Ventajas del diseño en capas</div>
          {[
            'Divide la complejidad en partes manejables',
            'Cada capa puede evolucionar independientemente',
            'Facilita la interoperabilidad entre fabricantes',
            'Permite reemplazar una implementación sin afectar las otras',
            'Facilita el diagnóstico de problemas: aislar en qué capa falla',
          ].map((r,i)=>(
            <div key={i} className="row">
              <span style={{color:'#3b82f6',flexShrink:0}}>▸</span>
              <span style={{fontSize:12,color:'#7c8db8'}}>{r}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Conceptos clave: protocolo, servicio e interfaz</div>
          {[
            {t:'Protocolo',d:'Acuerdo entre dos entidades del mismo nivel (misma capa) sobre cómo comunicarse. Define el formato de mensajes, el orden y las acciones ante cada situación. Ej: HTTP, TCP, IP, Ethernet.'},
            {t:'Servicio',d:'Lo que una capa ofrece a la capa superior. Es la API que expone: las operaciones que puede realizar. La capa no necesita saber cómo la capa inferior implementa sus servicios.'},
            {t:'Interfaz (SAP)',d:'Punto de acceso al servicio (Service Access Point). Conjunto de operaciones y parámetros que definen cómo la capa N+1 accede a los servicios de la capa N.'},
            {t:'PDU (Protocol Data Unit)',d:'Unidad de datos de un protocolo. Cada capa agrega su cabecera (header) y a veces pie (trailer) a los datos recibidos de la capa superior. Ejemplo: trama (frame) en enlace, segmento en transporte, paquete en red.'},
            {t:'Encapsulación',d:'Al bajar por las capas en el emisor, cada capa agrega sus cabeceras. Al subir en el receptor, cada capa elimina su cabecera y procesa la información. Los datos originales quedan intactos en el núcleo.'},
          ].map((r,i)=>(
            <div key={i} className="row">
              <div><span style={{fontSize:12,fontWeight:700,color:'#3b82f6'}}>{r.t}: </span><span style={{fontSize:12,color:'#7c8db8'}}>{r.d}</span></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>);
}

function Scene2(){
  const capas=[
    {n:5,nombre:'Aplicación',color:'#f97316',pdu:'Mensaje',ejem:'HTTP, FTP, SMTP, DNS, DHCP',desc:'Proporciona servicios de red directamente a las aplicaciones del usuario. Define protocolos de alto nivel para transferencia de archivos, correo, web, etc.'},
    {n:4,nombre:'Transporte',color:'#8b5cf6',pdu:'Segmento / Datagrama',ejem:'TCP, UDP, SCTP',desc:'Transfiere datos de extremo a extremo (end-to-end) entre procesos en hosts. Ofrece entrega confiable (TCP) o no confiable (UDP), control de flujo y congestión.'},
    {n:3,nombre:'Red',color:'#3b82f6',pdu:'Paquete / Datagrama IP',ejem:'IP, ICMP, ARP, OSPF, BGP',desc:'Determina la ruta que siguen los paquetes desde origen hasta destino a través de múltiples routers. Gestiona el direccionamiento lógico (IP) y el enrutamiento.'},
    {n:2,nombre:'Enlace de Datos',color:'#10b981',pdu:'Trama (Frame)',ejem:'Ethernet, WiFi, PPP, HDLC',desc:'Transfiere tramas entre nodos adyacentes en el mismo enlace. Gestiona detección/corrección de errores, control de flujo y acceso al medio (subcapa MAC).'},
    {n:1,nombre:'Física',color:'#7c8db8',pdu:'Bit / Símbolo',ejem:'Cable UTP, fibra, radio (802.11)',desc:'Transmite bits crudos sobre el medio físico. Define voltajes, frecuencias, tasas de datos, conectores y procedimientos de sincronización de bits.'},
  ];
  return(<div>
    <div className="sec-title">Modelo TCP/IP — Las 5 Capas de Internet</div>
    <div className="sec-sub">El modelo práctico que usa Internet y casi todas las redes modernas</div>
    <div style={{display:'grid',gridTemplateColumns:'auto 1fr 1fr 1fr 1fr',gap:8,alignItems:'center',marginBottom:4}}>
      <div/>
      {['Capa','PDU','Protocolos','Función'].map((h,i)=>(
        <div key={i} style={{fontSize:10,color:'#3a4a72',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.08em',padding:'4px 8px',borderBottom:'2px solid rgba(59,130,246,0.3)'}}>{h}</div>
      ))}
    </div>
    {capas.map((c,i)=>(
      <div key={i} style={{display:'grid',gridTemplateColumns:'auto 1fr 1fr 1fr 1fr',gap:8,alignItems:'start',marginBottom:6}}>
        <div style={{width:28,height:28,borderRadius:'50%',background:c.color,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'IBM Plex Mono,monospace',fontSize:14,fontWeight:700,color:'#060a14',flexShrink:0}}>{c.n}</div>
        <div style={{background:'#0f1628',borderLeft:`3px solid ${c.color}`,borderRadius:'0 8px 8px 0',padding:'7px 12px'}}>
          <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:13,fontWeight:700,color:c.color}}>{c.nombre}</div>
        </div>
        <div style={{background:'#0f1628',borderRadius:6,padding:'7px 10px',fontSize:11,color:'#e8f0fe',fontFamily:'IBM Plex Mono,monospace'}}>{c.pdu}</div>
        <div style={{background:'#0f1628',borderRadius:6,padding:'7px 10px',fontSize:11,color:'#7c8db8',fontFamily:'IBM Plex Mono,monospace'}}>{c.ejem}</div>
        <div style={{background:'#0f1628',borderRadius:6,padding:'7px 10px',fontSize:11,color:'#7c8db8',lineHeight:1.45}}>{c.desc}</div>
      </div>
    ))}
  </div>);
}

function Scene3(){
  const servicios=[
    {t:'Orientado a conexión (CO)',color:'#3b82f6',desc:'El servicio simula el funcionamiento de una llamada telefónica: antes de transferir datos se establece una conexión, luego se transfieren los datos y finalmente se libera la conexión. La conexión garantiza que los datos llegan en orden y sin errores.',ej:'TCP en la capa de transporte, circuitos virtuales en ATM y Frame Relay',analog:'Llamada telefónica: marcar → hablar → colgar'},
    {t:'Sin conexión (CL)',color:'#10b981',desc:'El servicio simula el correo postal: cada mensaje (paquete/datagrama) viaja de forma independiente, puede tomar rutas distintas y puede llegar en desorden o no llegar. No hay establecimiento de conexión previo.',ej:'UDP en la capa de transporte, IP en la capa de red, correo postal',analog:'Carta postal: escribir → enviar → puede extraviarse'},
  ];
  const qos=[
    {p:'Confiabilidad',d:'¿Se garantiza la entrega de todos los datos sin pérdida? TCP garantiza; UDP no.'},
    {p:'Velocidad (throughput)',d:'Tasa mínima garantizada de transferencia de datos en bits/segundo.'},
    {p:'Retardo (delay)',d:'Tiempo máximo garantizado desde emisión hasta recepción. Crítico en VoIP y gaming.'},
    {p:'Jitter',d:'Variación del retardo entre paquetes sucesivos. Crítico para streaming y VoIP.'},
    {p:'Seguridad',d:'Cifrado, autenticación e integridad de los datos en tránsito.'},
  ];
  return(<div>
    <div className="sec-title">Tipos de Servicios y Calidad</div>
    <div className="sec-sub">Servicios orientados vs. sin conexión y parámetros QoS</div>
    <div className="grid2">
      <div>
        {servicios.map((s,i)=>(
          <div key={i} className="card" style={{borderColor:s.color+'33',marginBottom:10}}>
            <div style={{fontSize:14,fontWeight:700,color:s.color,marginBottom:8}}>{s.t}</div>
            <p style={{fontSize:12,lineHeight:1.65,color:'#7c8db8',marginBottom:8}}>{s.desc}</p>
            <div style={{fontSize:11,color:'#3a4a72',marginBottom:4}}><span style={{color:s.color,fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>EJEMPLOS: </span>{s.ej}</div>
            <div style={{fontSize:11,color:'#3a4a72'}}><span style={{color:s.color,fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>ANALOGÍA: </span>{s.analog}</div>
          </div>
        ))}
      </div>
      <div>
        <div className="card">
          <div className="card-h">Parámetros de Calidad de Servicio (QoS)</div>
          <p style={{fontSize:12,lineHeight:1.6,color:'#7c8db8',marginBottom:10}}>
            Los servicios de red pueden ofrecer distintas garantías sobre la calidad de la entrega. Cuando la red garantiza ciertos parámetros de calidad, se habla de QoS (Quality of Service).
          </p>
          {qos.map((q,i)=>(
            <div key={i} className="row">
              <span style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,fontWeight:700,color:'#3b82f6',flexShrink:0,width:120}}>{q.p}</span>
              <span style={{fontSize:12,color:'#7c8db8'}}>{q.d}</span>
            </div>
          ))}
          <div style={{marginTop:10,background:'rgba(59,130,246,0.07)',borderRadius:6,padding:'8px 12px',fontSize:12,color:'#7c8db8',lineHeight:1.6}}>
            <strong style={{color:'#3b82f6'}}>Best-effort vs. garantizado:</strong> Internet clásico usa un modelo "best-effort" — se intenta entregar los datos pero no se garantiza nada. Las redes de telecomunicaciones modernas agregan mecanismos de QoS (DiffServ, IntServ, MPLS) para garantizar parámetros a aplicaciones críticas.
          </div>
        </div>
      </div>
    </div>
  </div>);
}

const SCENES=[{id:1,label:'Arquitectura en capas',C:Scene1},{id:2,label:'Modelo TCP/IP (5 capas)',C:Scene2},{id:3,label:'Tipos de servicios y QoS',C:Scene3}];
function App(){
  const [sc,setSc]=useState(1);
  const cur=SCENES.find(s=>s.id===sc);
  return(
    <div className="slide">
      <div className="topbar">
        <div><div className="topbar-title">Clase 1.3 — Software de red: capas, protocolos y servicios</div><div className="topbar-sub">Módulo 1 — Introducción · Redes de Computadoras</div></div>
        <div className="scene-badge">ESCENA {sc}/{SCENES.length}</div>
      </div>
      <div className="content">
        <div className="sidebar">
          <div style={{padding:'8px 14px',fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:4}}>Contenido</div>
          {SCENES.map(s=><div key={s.id} className={`nav-item${sc===s.id?' active':''}`} onClick={()=>setSc(s.id)}>{String(s.id).padStart(2,'0')} · {s.label}</div>)}
          <div style={{flex:1}}/>
          <div style={{padding:'10px 14px',borderTop:'1px solid rgba(59,130,246,0.1)'}}>
            <div style={{fontSize:10,color:'#3b82f6',fontFamily:'IBM Plex Mono,monospace',letterSpacing:'.12em',marginBottom:4}}>OBJETIVO</div>
            <div style={{fontSize:11,color:'#3a4a72',lineHeight:1.5}}>Comprender la arquitectura en capas, los conceptos de protocolo, servicio e interfaz, y los tipos de servicios de red.</div>
          </div>
        </div>
        <div className="main"><cur.C/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
