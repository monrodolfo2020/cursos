<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 1.4 – Dimensionamiento Cv y Características</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.gold{color:#f59e0b;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0f1729,#1a2540);border-bottom:2px solid #f59e0b;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#f59e0b;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#f59e0b22;border:1px solid #f59e0b55;color:#f59e0b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e2d4a;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;line-height:1.3;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.nav-item.active{color:#f59e0b;border-left-color:#f59e0b;background:#f59e0b10;font-weight:600;}
.main{flex:1;padding:16px 22px;overflow-y:auto;overflow-x:hidden;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:#0d1425;}
.main::-webkit-scrollbar-thumb{background:#f59e0b44;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#f59e0b;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e2d4a;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.formula-box{background:#060a14;border:1px solid #f59e0b33;border-radius:7px;padding:9px 13px;font-family:monospace;font-size:13px;color:#fcd34d;text-align:center;margin:7px 0;}
.btn-gold{background:#f59e0b;color:#080c18;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;}
.btn-gold:hover{background:#d97706;}
.btn-outline{background:transparent;border:1px solid #f59e0b55;color:#f59e0b;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;}
.btn-outline:hover{background:#f59e0b22;}
.btn-outline.active{background:#f59e0b33;border-color:#f59e0b;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#1e2d4a;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#f59e0b;border-radius:50%;cursor:pointer;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#0f1729;color:#f59e0b;padding:6px 9px;text-align:left;border-bottom:1px solid #1e2d4a;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
td{padding:5px 9px;border-bottom:1px solid #0f1729;color:#cbd5e1;}
tr:hover td{background:#ffffff05;}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin:2px;}
.tag-green{background:#14532d44;color:#86efac;border:1px solid #14532d66;}
.tag-amber{background:#78350f44;color:#fcd34d;border:1px solid #78350f66;}
.tag-red{background:#7f1d1d44;color:#fca5a5;border:1px solid #7f1d1d66;}
.tag-blue{background:#1e3a5f44;color:#93c5fd;border:1px solid #1e3a5f66;}
.quiz-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;border:1px solid #1e2d4a;cursor:pointer;margin:4px 0;font-size:12px;transition:all .15s;}
.quiz-opt:hover{border-color:#f59e0b55;background:#f59e0b08;}
.quiz-opt.correct{border-color:#22c55e;background:#14532d33;color:#86efac;}
.quiz-opt.wrong{border-color:#ef4444;background:#7f1d1d33;color:#fca5a5;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

/* ── SCENE 1: El coeficiente Cv ───────────────────────────── */
function Scene1(){
  const [cv,setCv]=useState(50);
  const [dp,setDp]=useState(25);
  const [sg,setSg]=useState(1.0);
  const q=cv*Math.sqrt(dp/sg); // gpm
  return(<div>
    <div className="sec-title">El coeficiente de dimensionamiento Cv</div>
    <div className="sec-sub">Capacidad de caudal · q = Cv·√(ΔP/SG) · Relación Cv ↔ Kv · Normativa ISA/IEC 60534</div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">¿Qué es el Cv?</div>
          <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.6,marginBottom:8}}>
            El <b style={{color:'#f59e0b'}}>Cv</b> es el coeficiente que cuantifica la capacidad de caudal de
            una válvula. Por definición, <b>Cv = 1</b> deja pasar <b>1 galón/min de agua</b> con una caída de
            presión de <b>1 psi</b>. A mayor Cv, mayor capacidad.
          </div>
          <div className="formula-box">q = Cv · √(ΔP / SG)</div>
          <div style={{fontSize:10,color:'#64748b',lineHeight:1.5}}>
            q = caudal (gpm) · ΔP = caída de presión (psi) · SG = gravedad específica del líquido. El
            equivalente métrico es <b className="gold">Kv</b> (m³/h con 1 bar): Cv ≈ 1,156 · Kv.
          </div>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h">Marco normativo</div>
          <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.55}}>
            En 1967 la ISA constituyó un comité que desarrolló las ecuaciones estándar de dimensionamiento,
            adoptadas luego como American National Standard y armonizadas por la IEC en la serie
            <b className="gold"> IEC 60534</b>. Hoy son la base universal del cálculo de válvulas para
            líquidos y gases.
          </div>
        </div>
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Calculadora de caudal (líquido)</div>
        <div style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#64748b',marginBottom:2}}>
            <span>Cv de la válvula</span><span style={{color:'#f59e0b'}}>{cv}</span>
          </div>
          <input type="range" min="1" max="200" step="1" value={cv} onChange={e=>setCv(+e.target.value)}/>
        </div>
        <div style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#64748b',marginBottom:2}}>
            <span>ΔP caída de presión</span><span style={{color:'#f59e0b'}}>{dp} psi</span>
          </div>
          <input type="range" min="1" max="100" step="1" value={dp} onChange={e=>setDp(+e.target.value)}/>
        </div>
        <div style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#64748b',marginBottom:2}}>
            <span>SG (gravedad específica)</span><span style={{color:'#f59e0b'}}>{sg.toFixed(2)}</span>
          </div>
          <input type="range" min="0.5" max="1.5" step="0.05" value={sg} onChange={e=>setSg(+e.target.value)}/>
        </div>
        <div style={{background:'#060a14',borderRadius:8,padding:14,textAlign:'center'}}>
          <div style={{fontSize:30,fontWeight:700,color:'#f59e0b',fontFamily:'monospace'}}>{q.toFixed(0)}</div>
          <div style={{fontSize:11,color:'#64748b'}}>caudal estimado (gpm)</div>
        </div>
        <div style={{fontSize:9.5,color:'#64748b',marginTop:8,lineHeight:1.4}}>
          Nota: válida para flujo turbulento NO estrangulado. Cerca del flujo choked esta relación deja de
          ser lineal con √ΔP (ver Clase 1.5).
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 2: Características de flujo ───────────────────────── */
function Scene2(){
  const [pos,setPos]=useState(50);
  const f={
    qa:(x)=>Math.min(1,Math.sqrt(x/100)*1.0+x/100*0), // apertura rápida ~ sqrt
    lin:(x)=>x/100,
    eq:(x)=>Math.pow(50,x/100-1), // equiporcentual R=50
  };
  const mk=(fn)=>{const p=[];for(let x=0;x<=100;x+=2){p.push([30+x*2.0,160-fn(x)*130]);}return 'M'+p.map(q=>q[0].toFixed(1)+','+q[1].toFixed(1)).join(' L');};
  return(<div>
    <div className="sec-title">Características de flujo inherentes</div>
    <div className="sec-sub">Apertura rápida · Lineal · Equiporcentual · Caudal vs. carrera a ΔP constante</div>
    <div className="grid2">
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Curvas características (ΔP constante)</div>
        <svg width="100%" viewBox="0 0 250 185">
          <rect width="250" height="185" fill="#060a14" rx="6"/>
          <line x1="30" y1="20" x2="30" y2="160" stroke="#1e2d4a"/>
          <line x1="30" y1="160" x2="235" y2="160" stroke="#1e2d4a"/>
          <text x="6" y="95" fill="#64748b" fontSize="8" transform="rotate(-90 10 95)">Caudal %</text>
          <text x="125" y="178" textAnchor="middle" fill="#64748b" fontSize="8">Carrera %</text>
          <path d={mk(f.qa)} fill="none" stroke="#ef4444" strokeWidth="2"/>
          <path d={mk(f.lin)} fill="none" stroke="#22c55e" strokeWidth="2"/>
          <path d={mk(f.eq)} fill="none" stroke="#3b82f6" strokeWidth="2"/>
          {/* marker carrera */}
          <line x1={30+pos*2.0} y1="20" x2={30+pos*2.0} y2="160" stroke="#f59e0b" strokeWidth="1" strokeDasharray="3,2"/>
          <circle cx={30+pos*2.0} cy={160-f.qa(pos)*130} r="3" fill="#ef4444"/>
          <circle cx={30+pos*2.0} cy={160-f.lin(pos)*130} r="3" fill="#22c55e"/>
          <circle cx={30+pos*2.0} cy={160-f.eq(pos)*130} r="3" fill="#3b82f6"/>
        </svg>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#64748b',margin:'6px 0 2px'}}>
          <span>Carrera de la válvula</span><span style={{color:'#f59e0b'}}>{pos}%</span>
        </div>
        <input type="range" min="0" max="100" step="1" value={pos} onChange={e=>setPos(+e.target.value)}/>
        <div style={{display:'flex',justifyContent:'space-around',marginTop:8,fontSize:10}}>
          <span style={{color:'#ef4444'}}>● Apertura rápida: {(f.qa(pos)*100).toFixed(0)}%</span>
          <span style={{color:'#22c55e'}}>● Lineal: {(f.lin(pos)*100).toFixed(0)}%</span>
          <span style={{color:'#3b82f6'}}>● Iso-%: {(f.eq(pos)*100).toFixed(0)}%</span>
        </div>
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">¿Cuándo usar cada característica?</div>
        <div style={{marginBottom:8}}>
          <span className="tag tag-red">Apertura rápida</span>
          <div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5,marginTop:3}}>
            Máximo caudal con poca carrera. Para servicios <b>on/off</b> y sistemas de seguridad/alivio que
            deben abrir rápido.
          </div>
        </div>
        <div style={{marginBottom:8}}>
          <span className="tag tag-green">Lineal</span>
          <div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5,marginTop:3}}>
            Caudal proporcional a la carrera; <b>ganancia constante</b>. Para control de <b>nivel de
            líquido</b> y lazos donde la mayor parte de la ΔP cae en la válvula.
          </div>
        </div>
        <div>
          <span className="tag tag-blue">Equiporcentual (iso-%)</span>
          <div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5,marginTop:3}}>
            Iguales incrementos de carrera producen iguales <b>porcentajes</b> de cambio de caudal. La más
            común: compensa la pérdida de ΔP en la válvula al aumentar el caudal en líneas largas.
          </div>
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 3: Inherente vs instalada / autoridad ───────────── */
function Scene3(){
  const [auth,setAuth]=useState(0.5); // autoridad = dPvalv/dPtotal a max caudal
  // ganancia instalada: con iso-% y baja autoridad tiende a lineal
  const mk=(fn)=>{const p=[];for(let x=0;x<=100;x+=2){p.push([30+x*2.0,160-fn(x)*130]);}return 'M'+p.map(q=>q[0].toFixed(1)+','+q[1].toFixed(1)).join(' L');};
  const inh=(x)=>Math.pow(50,x/100-1);
  const inst=(x)=>{const fi=inh(x);return fi/Math.sqrt(auth+(1-auth)*fi*fi);};
  return(<div>
    <div className="sec-title">Característica instalada y autoridad de válvula</div>
    <div className="sec-sub">La ΔP de la válvula varía con el caudal · Autoridad = ΔPválvula / ΔPtotal · Distorsión de la curva</div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">El concepto de autoridad</div>
          <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.6,marginBottom:8}}>
            En planta, la caída de presión total se reparte entre la válvula y el resto del sistema
            (tubería, intercambiadores). Al abrir más la válvula, cae menos presión en ella y más en la
            línea: la <b style={{color:'#f59e0b'}}>autoridad</b> es la fracción de ΔP que toma la válvula a
            caudal máximo.
          </div>
          <div className="formula-box" style={{fontSize:12}}>Autoridad = ΔP_válvula(máx) / ΔP_total</div>
          <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.5}}>
            Una <b>autoridad baja</b> (&lt;0,25) deforma la curva inherente: una característica iso-% tiende a
            comportarse como lineal, y una lineal se "satura" pronto. Se busca autoridad ≥ 0,25–0,5 para
            conservar la característica deseada.
          </div>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h">Objetivo: ganancia instalada estable</div>
          <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.5}}>
            La regla práctica busca una <b className="gold">ganancia instalada entre 0,5 y 2,0</b> en todo el
            rango. Elegir iso-% cuando la autoridad es baja, y lineal cuando la válvula toma casi toda la ΔP.
          </div>
        </div>
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Curva inherente vs. instalada (iso-%)</div>
        <svg width="100%" viewBox="0 0 250 185">
          <rect width="250" height="185" fill="#060a14" rx="6"/>
          <line x1="30" y1="20" x2="30" y2="160" stroke="#1e2d4a"/>
          <line x1="30" y1="160" x2="235" y2="160" stroke="#1e2d4a"/>
          <text x="6" y="95" fill="#64748b" fontSize="8" transform="rotate(-90 10 95)">Caudal %</text>
          <text x="125" y="178" textAnchor="middle" fill="#64748b" fontSize="8">Carrera %</text>
          <path d={mk(inh)} fill="none" stroke="#3b82f6" strokeWidth="2" strokeDasharray="4,3"/>
          <path d={mk(inst)} fill="none" stroke="#f59e0b" strokeWidth="2"/>
          <text x="150" y="50" fill="#3b82f6" fontSize="8">inherente</text>
          <text x="60" y="60" fill="#f59e0b" fontSize="8">instalada</text>
        </svg>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#64748b',margin:'6px 0 2px'}}>
          <span>Autoridad de la válvula</span><span style={{color:'#f59e0b'}}>{(auth*100).toFixed(0)}%</span>
        </div>
        <input type="range" min="0.1" max="1" step="0.05" value={auth} onChange={e=>setAuth(+e.target.value)}/>
        <div style={{fontSize:10,color:auth>=0.5?'#22c55e':auth>=0.25?'#fcd34d':'#ef4444',marginTop:6,fontWeight:600}}>
          {auth>=0.5?'✓ Autoridad alta: la curva instalada conserva la forma iso-%':
           auth>=0.25?'~ Autoridad media: ligera distorsión hacia lineal':
           '✗ Autoridad baja: la iso-% se aplana, se pierde control a baja apertura'}
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 4: Clases de fuga (leakage) ─────────────────────── */
function Scene4(){
  return(<div>
    <div className="sec-title">Clases de fuga del asiento</div>
    <div className="sec-sub">Normativa ISA/IEC (ANSI/FCI 70-2 · IEC 60534-4) · Cierre permitido por clase</div>
    <table>
      <thead><tr><th>Clase</th><th>Fuga máxima permitida</th><th>Aplicación típica</th></tr></thead>
      <tbody>
        <tr><td><b className="gold">I</b></td><td>No se prueba (acordada usuario–proveedor)</td><td>Control donde el cierre no es crítico</td></tr>
        <tr><td><b className="gold">II</b></td><td>0,5 % de la capacidad nominal</td><td>Cierre comercial estándar</td></tr>
        <tr><td><b className="gold">III</b></td><td>0,1 % de la capacidad nominal</td><td>Cierre mejorado</td></tr>
        <tr><td><b className="gold">IV</b></td><td>0,01 % de la capacidad nominal</td><td>Metal-metal de buena calidad</td></tr>
        <tr><td><b className="gold">V</b></td><td>0,0005 ml/min por pulgada de orificio por psi</td><td>Servicio severo, balance de calor</td></tr>
        <tr><td><b className="gold">VI</b></td><td>Burbujas/min según diámetro (asiento blando)</td><td>Cierre hermético (tight shut-off)</td></tr>
      </tbody>
    </table>
    <div className="grid2" style={{marginTop:9}}>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Clase VI — burbujas por minuto (referencia)</div>
        <table>
          <thead><tr><th>Puerto (pulg)</th><th>ml/min</th><th>Burbujas/min</th></tr></thead>
          <tbody>
            <tr><td>1</td><td>0,15</td><td>1</td></tr>
            <tr><td>2</td><td>0,45</td><td>3</td></tr>
            <tr><td>4</td><td>1,70</td><td>11</td></tr>
            <tr><td>6</td><td>4,00</td><td>27</td></tr>
            <tr><td>8</td><td>6,75</td><td>45</td></tr>
          </tbody>
        </table>
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Claves para seleccionar la clase</div>
        {['La clase IV (metal) es el estándar habitual en válvulas de globo.',
          'La clase VI requiere asiento blando (PTFE/elastómero) — no apto para alta T.',
          'Mayor clase = más costo y a veces más fricción/empuje de cierre.',
          'No sobre-especificar: una clase VI donde basta una IV encarece sin beneficio.',
        ].map((r,i)=>(
          <div key={i} style={{display:'flex',gap:6,marginBottom:5}}>
            <span style={{color:'#f59e0b',fontSize:10,flexShrink:0}}>▸</span>
            <span style={{fontSize:10,color:'#94a3b8',lineHeight:1.45}}>{r}</span>
          </div>
        ))}
      </div>
    </div>
  </div>);
}

/* ── SCENE 5: Quiz ─────────────────────────────────────────── */
const quizData=[
  {q:'Por definición, una válvula con Cv = 1 deja pasar:',opts:['1 m³/h de agua con 1 bar','1 galón/min de agua con 1 psi de caída','1 litro/s con 1 kPa','100 gpm con 10 psi'],ans:1},
  {q:'En la fórmula q = Cv·√(ΔP/SG), si la ΔP se cuadruplica (sin choked), el caudal:',opts:['Se cuadruplica','Se duplica','Se mantiene','Se reduce a la mitad'],ans:1},
  {q:'¿Qué característica de flujo da caudal proporcional a la carrera y ganancia constante?',opts:['Apertura rápida','Lineal','Equiporcentual','Logarítmica inversa'],ans:1},
  {q:'La característica equiporcentual se prefiere cuando:',opts:['La válvula toma casi toda la ΔP del sistema','Buena parte de la ΔP se pierde en la línea y varía con el caudal','Solo se necesita on/off','Se controla nivel con ΔP constante'],ans:1},
  {q:'La "autoridad" de una válvula se define como:',opts:['Su Cv máximo','ΔP de la válvula a caudal máximo / ΔP total del sistema','La rangeabilidad','El par del actuador'],ans:1},
  {q:'Con autoridad baja (<0,25), una característica inherente iso-% se comporta instalada como:',opts:['Apertura rápida','Aproximadamente lineal / aplanada','Idéntica a la inherente','On/off'],ans:1},
  {q:'La característica de apertura rápida es adecuada para:',opts:['Control fino de nivel','Servicios on/off y de seguridad que abren rápido','Compensar pérdidas de línea','Control de temperatura lento'],ans:1},
  {q:'La clase de fuga IV permite una fuga máxima de:',opts:['0,5% de la capacidad nominal','0,1% de la capacidad nominal','0,01% de la capacidad nominal','Cero absoluto'],ans:2},
  {q:'La clase de fuga VI (tight shut-off) normalmente requiere:',opts:['Asiento metal-metal','Asiento blando (PTFE/elastómero)','No tener actuador','Doble jaula'],ans:1},
  {q:'Las ecuaciones estándar de dimensionamiento de válvulas fueron desarrolladas y armonizadas por:',opts:['Solo el fabricante','ISA y luego la serie IEC 60534','La norma ATEX','El código ASME B31.3'],ans:1},
];
function SceneQuiz(){
  const [qi,setQi]=useState(0);
  const [sel,setSel]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const q=quizData[qi];
  const choose=(i)=>{
    if(sel!==null)return;
    setSel(i);
    if(i===q.ans)setScore(s=>s+1);
    setTimeout(()=>{
      if(qi+1>=quizData.length)setDone(true);
      else{setQi(qi+1);setSel(null);}
    },1200);
  };
  if(done)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:16}}>
    <div style={{fontSize:56}}>{score>=8?'🏆':score>=6?'🎯':'📚'}</div>
    <div style={{fontSize:28,fontWeight:700,color:'#f59e0b'}}>{score}/{quizData.length} correctas</div>
    <div style={{fontSize:14,color:'#94a3b8',textAlign:'center',maxWidth:400}}>
      {score>=8?'Excelente. Dominas el dimensionamiento Cv y la selección de característica.':score>=6?'Buen nivel. Repasa autoridad y clases de fuga.':'Repasa Cv, características de flujo y autoridad.'}
    </div>
    <button className="btn-gold" onClick={()=>{setQi(0);setSel(null);setScore(0);setDone(false);}}>Reintentar</button>
  </div>);
  return(<div>
    <div className="sec-title">Quiz — Dimensionamiento Cv y Características</div>
    <div className="sec-sub">Pregunta {qi+1} de {quizData.length}</div>
    <div style={{display:'flex',gap:4,marginBottom:14}}>
      {quizData.map((_,i)=><div key={i} style={{height:4,flex:1,borderRadius:2,background:i<qi?'#22c55e':i===qi?'#f59e0b':'#1e2d4a'}}/>)}
    </div>
    <div className="card" style={{padding:'16px 18px',marginBottom:12}}>
      <div style={{fontSize:14,color:'#f1f5f9',fontWeight:500,lineHeight:1.5}}>{q.q}</div>
    </div>
    {q.opts.map((o,i)=>{
      let cls='quiz-opt';
      if(sel!==null){if(i===q.ans)cls+=' correct';else if(i===sel&&i!==q.ans)cls+=' wrong';}
      return(<div key={i} className={cls} onClick={()=>choose(i)}>
        <div style={{width:22,height:22,borderRadius:'50%',border:'1px solid #1e2d4a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,flexShrink:0}}>{String.fromCharCode(65+i)}</div>
        {o}
      </div>);
    })}
    <div style={{marginTop:12,fontSize:11,color:'#475569'}}>Puntuación actual: {score}/{qi}</div>
  </div>);
}

const SCENES=[
  {id:1,label:'1. El coeficiente Cv',comp:Scene1},
  {id:2,label:'2. Características de flujo',comp:Scene2},
  {id:3,label:'3. Autoridad e instalada',comp:Scene3},
  {id:4,label:'4. Clases de fuga',comp:Scene4},
  {id:5,label:'5. Quiz',comp:SceneQuiz},
];
function App(){
  const [scene,setScene]=useState(1);
  const S=SCENES.find(s=>s.id===scene);
  const Comp=S.comp;
  return(<div className="slide">
    <div className="topbar">
      <div>
        <div className="topbar-title">Clase 1.4 — Dimensionamiento Cv y Características</div>
        <div className="topbar-sub">Coeficiente Cv/Kv · Característica de flujo · Autoridad · Ganancia instalada · Clases de fuga ISA/IEC</div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {scene>1&&<button className="btn-outline" onClick={()=>setScene(s=>s-1)}>← Anterior</button>}
        {scene<SCENES.length&&<button className="btn-gold" onClick={()=>setScene(s=>s+1)}>Siguiente →</button>}
        <span className="scene-badge">{scene}/{SCENES.length}</span>
      </div>
    </div>
    <div className="content">
      <div className="sidebar">
        <div style={{fontSize:9,color:'#334155',fontWeight:700,padding:'0 12px 6px',textTransform:'uppercase',letterSpacing:1}}>Contenido</div>
        {SCENES.map(s=>(
          <div key={s.id} className={`nav-item${scene===s.id?' active':''}`} onClick={()=>setScene(s.id)}>{s.label}</div>
        ))}
      </div>
      <div className="main"><Comp/></div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
