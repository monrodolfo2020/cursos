<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 1.5 – Cavitación, Ruido y Accesorios</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.gold{color:#f59e0b;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0f1729,#1a2540);border-bottom:2px solid #f59e0b;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#f59e0b;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#f59e0b22;border:1px solid #f59e0b55;color:#f59e0b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e2d4a;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;line-height:1.3;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.nav-item.active{color:#f59e0b;border-left-color:#f59e0b;background:#f59e0b10;font-weight:600;}
.main{flex:1;padding:16px 22px;overflow-y:auto;overflow-x:hidden;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:#0d1425;}
.main::-webkit-scrollbar-thumb{background:#f59e0b44;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#f59e0b;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e2d4a;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.formula-box{background:#060a14;border:1px solid #f59e0b33;border-radius:7px;padding:9px 13px;font-family:monospace;font-size:13px;color:#fcd34d;text-align:center;margin:7px 0;}
.btn-gold{background:#f59e0b;color:#080c18;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;}
.btn-gold:hover{background:#d97706;}
.btn-outline{background:transparent;border:1px solid #f59e0b55;color:#f59e0b;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;}
.btn-outline:hover{background:#f59e0b22;}
.btn-outline.active{background:#f59e0b33;border-color:#f59e0b;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#1e2d4a;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#f59e0b;border-radius:50%;cursor:pointer;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#0f1729;color:#f59e0b;padding:6px 9px;text-align:left;border-bottom:1px solid #1e2d4a;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
td{padding:5px 9px;border-bottom:1px solid #0f1729;color:#cbd5e1;}
tr:hover td{background:#ffffff05;}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin:2px;}
.tag-green{background:#14532d44;color:#86efac;border:1px solid #14532d66;}
.tag-amber{background:#78350f44;color:#fcd34d;border:1px solid #78350f66;}
.tag-red{background:#7f1d1d44;color:#fca5a5;border:1px solid #7f1d1d66;}
.tag-blue{background:#1e3a5f44;color:#93c5fd;border:1px solid #1e3a5f66;}
.quiz-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;border:1px solid #1e2d4a;cursor:pointer;margin:4px 0;font-size:12px;transition:all .15s;}
.quiz-opt:hover{border-color:#f59e0b55;background:#f59e0b08;}
.quiz-opt.correct{border-color:#22c55e;background:#14532d33;color:#86efac;}
.quiz-opt.wrong{border-color:#ef4444;background:#7f1d1d33;color:#fca5a5;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

/* ── SCENE 1: Vena contracta y flujo estrangulado ──────────── */
function Scene1(){
  const [p2,setP2]=useState(60);
  const pv=20; // presión de vapor
  const vc=Math.max(5,p2-25); // presión en vena contracta (simplificado)
  const estado= vc<pv ? (p2>pv?'CAVITACIÓN':'VAPORIZACIÓN') : 'FLUJO NORMAL';
  const color= estado==='FLUJO NORMAL'?'#22c55e':estado==='CAVITACIÓN'?'#ef4444':'#f59e0b';
  return(<div>
    <div className="sec-title">Vena contracta y flujo estrangulado</div>
    <div className="sec-sub">Perfil de presión · Presión de vapor Pv · ΔP de estrangulamiento · Normativa ISA/IEC 60534</div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">¿Qué ocurre dentro de la válvula?</div>
          <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.6,marginBottom:8}}>
            Al estrecharse el paso, el fluido acelera y su presión cae a un mínimo en la
            <b style={{color:'#f59e0b'}}> vena contracta</b> (punto de máxima velocidad y mínima presión).
            Luego la presión se recupera parcialmente aguas abajo, pero nunca alcanza P1.
          </div>
          <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.5}}>
            Si la presión en la vena contracta cae por debajo de la <b className="gold">presión de vapor
            (Pv)</b>, se forman burbujas de vapor → empieza el <b>flujo estrangulado (choked)</b>: más ΔP
            ya no aumenta el caudal.
          </div>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h">Perfil de presión (simulador)</div>
          <svg width="100%" viewBox="0 0 260 120">
            <rect width="260" height="120" fill="#060a14" rx="6"/>
            <line x1="20" y1="100" x2="245" y2="100" stroke="#1e2d4a"/>
            {/* linea Pv */}
            <line x1="20" y1={100-pv} x2="245" y2={100-pv} stroke="#a78bfa" strokeWidth="1" strokeDasharray="4,2"/>
            <text x="200" y={100-pv-2} fill="#a78bfa" fontSize="7">Pv</text>
            {/* perfil */}
            <path d={`M20,${100-80} C80,${100-80} 100,${100-vc} 130,${100-vc} C160,${100-vc} 180,${100-p2} 245,${100-p2}`} fill="none" stroke={color} strokeWidth="2.2"/>
            <text x="22" y="14" fill="#64748b" fontSize="7">P1</text>
            <circle cx="130" cy={100-vc} r="3" fill={color}/>
            <text x="110" y={100-vc+14} fill={color} fontSize="7">vena contracta</text>
          </svg>
        </div>
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Simulador — presión aguas abajo P2</div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#64748b',margin:'4px 0 2px'}}>
          <span>P2 (presión de salida)</span><span style={{color:'#f59e0b'}}>{p2}</span>
        </div>
        <input type="range" min="10" max="85" step="1" value={p2} onChange={e=>setP2(+e.target.value)}/>
        <div style={{background:'#060a14',borderRadius:8,padding:14,textAlign:'center',marginTop:10}}>
          <div style={{fontSize:22,fontWeight:700,color}}>{estado}</div>
          <div style={{fontSize:10,color:'#64748b',marginTop:4}}>
            Vena contracta ≈ {vc} · Pv = {pv}
          </div>
        </div>
        <div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5,marginTop:10}}>
          {estado==='FLUJO NORMAL'&&'La presión en la vena contracta se mantiene por encima de Pv: no hay formación de vapor.'}
          {estado==='VAPORIZACIÓN'&&'P2 ≤ Pv: las burbujas NO colapsan, el fluido sale como mezcla líquido-vapor (flashing). Daño por erosión.'}
          {estado==='CAVITACIÓN'&&'Vena contracta < Pv pero P2 > Pv: las burbujas colapsan violentamente dentro de la válvula. Daño severo + ruido + vibración.'}
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 2: Cavitación vs vaporización ───────────────────── */
function Scene2(){
  return(<div>
    <div className="sec-title">Cavitación vs. vaporización (flashing)</div>
    <div className="sec-sub">Dos fenómenos distintos · Daño característico · Estrategias de mitigación</div>
    <table>
      <thead><tr><th>Aspecto</th><th>Vaporización (flashing)</th><th>Cavitación</th></tr></thead>
      <tbody>
        <tr><td><b className="gold">Condición</b></td><td>P2 ≤ Pv (la salida queda bajo Pv)</td><td>Vena contracta &lt; Pv pero P2 &gt; Pv</td></tr>
        <tr><td><b className="gold">Burbujas</b></td><td>NO colapsan — salen como vapor</td><td>Colapsan (implosionan) dentro de la válvula</td></tr>
        <tr><td><b className="gold">Daño</b></td><td>Erosión: superficie lisa y pulida</td><td>Picado áspero y carbonizado (como gravilla)</td></tr>
        <tr><td><b className="gold">Ruido/vibración</b></td><td>Moderado</td><td>Severo (suena como piedras pasando)</td></tr>
        <tr><td><b className="gold">¿Se puede evitar?</b></td><td>No: depende de P2 y Pv del proceso, no de la válvula</td><td>Sí: con internos que controlan la presión</td></tr>
        <tr><td><b className="gold">Estrategia</b></td><td>Material duro, válvula de ángulo, dirigir el flujo</td><td>Internos multietapa, aumentar P2, jaulas anti-cavitación</td></tr>
      </tbody>
    </table>
    <div className="grid2" style={{marginTop:9}}>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Mitigar el flashing (no se puede eliminar)</div>
        {['Materiales de máxima dureza (estelita, endurecido)','Reducir el número de cambios de dirección del fluido',
          'Válvula de ángulo de vástago deslizante (paso directo)','Reducir la velocidad de flujo erosivo'].map((r,i)=>(
          <div key={i} style={{display:'flex',gap:6,marginBottom:5}}>
            <span style={{color:'#f59e0b',fontSize:10,flexShrink:0}}>▸</span>
            <span style={{fontSize:10,color:'#94a3b8',lineHeight:1.45}}>{r}</span>
          </div>
        ))}
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Combatir la cavitación</div>
        {['Internos multietapa que reparten la ΔP en pasos','Aumentar P2 (orificio aguas abajo, ubicación más baja)',
          'Jaulas anti-cavitación (trim especial)','Seleccionar válvula de baja recuperación de presión'].map((r,i)=>(
          <div key={i} style={{display:'flex',gap:6,marginBottom:5}}>
            <span style={{color:'#22c55e',fontSize:10,flexShrink:0}}>▸</span>
            <span style={{fontSize:10,color:'#94a3b8',lineHeight:1.45}}>{r}</span>
          </div>
        ))}
      </div>
    </div>
  </div>);
}

/* ── SCENE 3: Ruido ────────────────────────────────────────── */
function Scene3(){
  const [stages,setStages]=useState(1);
  const baseNoise=105;
  const noise=Math.max(72, baseNoise - (stages-1)*8);
  return(<div>
    <div className="sec-title">Predicción y control de ruido</div>
    <div className="sec-sub">Ruido aerodinámico vs. hidrodinámico · Normativa ISA/IEC 60534-8 · Trim de baja emisión sonora</div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">Dos tipos de ruido</div>
          <div style={{marginBottom:8}}>
            <span className="tag tag-blue">Aerodinámico</span>
            <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.5,marginTop:3}}>
              Generado por gas/vapor a alta velocidad. Es el más común y se predice con IEC 60534-8-3
              (termodinámica + aerodinámica + datos empíricos). Puede superar 100 dBA.
            </div>
          </div>
          <div>
            <span className="tag tag-amber">Hidrodinámico</span>
            <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.5,marginTop:3}}>
              Asociado a líquidos, normalmente ligado a la <b>cavitación</b>. Se describe como "piedras
              pasando por el conducto". Controlarlo suele significar controlar la cavitación.
            </div>
          </div>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h">Estrategias de control de ruido</div>
          {['Trim multietapa: divide la caída de presión en saltos pequeños',
            'Difusores y placas de orificios aguas abajo',
            'Aislamiento acústico de tubería y aumento de espesor de pared',
            'Limitar la velocidad de salida (Mach) en el cuerpo'].map((r,i)=>(
            <div key={i} style={{display:'flex',gap:6,marginBottom:5}}>
              <span style={{color:'#f59e0b',fontSize:10,flexShrink:0}}>▸</span>
              <span style={{fontSize:10,color:'#94a3b8',lineHeight:1.45}}>{r}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Efecto del trim multietapa</div>
        <svg width="100%" viewBox="0 0 240 150">
          <rect width="240" height="150" fill="#060a14" rx="6"/>
          <line x1="30" y1="20" x2="30" y2="120" stroke="#1e2d4a"/>
          <line x1="30" y1="120" x2="220" y2="120" stroke="#1e2d4a"/>
          {/* barra de ruido */}
          <rect x="80" y={120-(noise-70)*2} width="80" height={(noise-70)*2} rx="3"
            fill={noise>95?'#ef4444':noise>85?'#f59e0b':'#22c55e'}/>
          <text x="120" y={120-(noise-70)*2-5} textAnchor="middle" fill="#e2e8f0" fontSize="12" fontWeight="700">{noise} dBA</text>
          <line x1="30" y1={120-(85-70)*2} x2="220" y2={120-(85-70)*2} stroke="#fcd34d" strokeWidth="0.7" strokeDasharray="3,2"/>
          <text x="180" y={120-(85-70)*2-3} fill="#fcd34d" fontSize="7">límite 85 dBA</text>
        </svg>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#64748b',margin:'8px 0 2px'}}>
          <span>Número de etapas del trim</span><span style={{color:'#f59e0b'}}>{stages}</span>
        </div>
        <input type="range" min="1" max="5" step="1" value={stages} onChange={e=>setStages(+e.target.value)}/>
        <div style={{fontSize:10,color:noise<=85?'#22c55e':'#ef4444',marginTop:6,fontWeight:600}}>
          {noise<=85?'✓ Por debajo del límite de exposición ocupacional (85 dBA)':'✗ Excede 85 dBA: requiere más etapas o atenuación adicional'}
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 4: Posicionadores y accesorios ──────────────────── */
function Scene4(){
  const acc=[
    ['Posicionador neumático','Compara la posición real con la señal y ajusta el aire al actuador (tobera/aleta).'],
    ['Posicionador I/P analógico','Convierte 4-20 mA en señal neumática proporcional para el posicionador.'],
    ['Controlador de válvula digital (DVC)','Basado en microprocesador: diagnóstico, comunicación bidireccional (HART/FF), PST.'],
    ['Transductor I/P','Convierte corriente en presión de aire para el actuador.'],
    ['Amplificador de volumen','Acelera la respuesta de actuadores grandes aportando más caudal de aire.'],
    ['Limit switches / solenoides','Confirman posición y permiten venteo rápido en aplicaciones de seguridad.'],
  ];
  const [sel,setSel]=useState(0);
  return(<div>
    <div className="sec-title">Posicionadores y accesorios</div>
    <div className="sec-sub">Control de posición preciso · Diagnóstico digital · Comunicación HART/Fieldbus</div>
    <div className="grid2">
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Accesorios principales</div>
        {acc.map(([t,d],i)=>(
          <div key={t} onClick={()=>setSel(i)}
            style={{padding:'8px 11px',borderRadius:7,marginBottom:5,cursor:'pointer',
            background:sel===i?'#f59e0b14':'#060a14',border:sel===i?'1px solid #f59e0b66':'1px solid #1e2d4a'}}>
            <div style={{fontSize:11,color:sel===i?'#f59e0b':'#cbd5e1',fontWeight:sel===i?600:500}}>{t}</div>
            {sel===i&&<div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5,marginTop:3}}>{d}</div>}
          </div>
        ))}
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">¿Por qué un posicionador digital (DVC)?</div>
        {[['Diagnóstico en línea','Detecta fricción, fuga de aire, desviación de carrera, calidad del aire'],
          ['Comunicación bidireccional','HART / FOUNDATION Fieldbus: configuración y datos remotos'],
          ['Mejor precisión','Compensa fricción y banda muerta → menor variabilidad'],
          ['Prueba de recorrido parcial (PST)','Mueve la válvula ESD parcialmente sin parar el proceso'],
          ['Firmas de válvula','Tendencias para mantenimiento predictivo'],
        ].map(([t,d])=>(
          <div key={t} style={{display:'flex',gap:8,marginBottom:6,alignItems:'flex-start'}}>
            <div style={{width:5,background:'#f59e0b',alignSelf:'stretch',borderRadius:2,flexShrink:0}}/>
            <div><div style={{fontSize:10.5,color:'#f59e0b',fontWeight:600}}>{t}</div><div style={{fontSize:9.5,color:'#64748b'}}>{d}</div></div>
          </div>
        ))}
      </div>
    </div>
  </div>);
}

/* ── SCENE 5: SIS y válvulas de seguridad ─────────────────── */
function Scene5(){
  return(<div>
    <div className="sec-title">La válvula en sistemas de seguridad (SIS)</div>
    <div className="sec-sub">Válvulas ESD/aislamiento · Modo de falla por resorte · FMEDA · Prueba de recorrido parcial (PST)</div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">Válvula de control vs. válvula de seguridad</div>
          <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.6,marginBottom:8}}>
            Dentro de los lazos de proceso también hay válvulas de <b style={{color:'#f59e0b'}}>venteo de
            emergencia, bloqueo y aislamiento (ESD)</b>. Normalmente son de apertura/cierre (on/off) que
            llevan el proceso a un estado seguro ante una emergencia, gobernadas por el SIS.
          </div>
          <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.5}}>
            El actuador de <b className="gold">acción simple con retorno por resorte</b> aporta el modo de
            falla inherente: ante emergencia o pérdida de aire, el resorte lleva la válvula a la posición
            segura.
          </div>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h">FMEDA — métrica de fiabilidad</div>
          <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.5}}>
            El <b className="gold">Análisis de Modos de Fallo, Efectos y Diagnósticos (FMEDA)</b> aporta una
            métrica para cada componente: permite diseñar el SIS al nivel de reducción de riesgo deseado
            (SIL). Si la válvula puede fallar y no situarse en estado seguro, su tasa de fallo peligroso debe
            cuantificarse y compensarse con pruebas.
          </div>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Prueba de recorrido parcial (PST)</div>
          <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.5,marginBottom:8}}>
            La <b className="gold">PST (Partial Stroke Test)</b> desplaza la válvula de seguridad solo una
            parte de su carrera (típ. 10-15%) y la devuelve, moviendo los componentes mecánicos
            <b> sin interrumpir</b> el proceso. El DVC ejecuta la PST, diagnostica problemas y emite alertas
            si la prueba falla.
          </div>
          <div style={{background:'#060a14',borderRadius:6,padding:'9px 12px'}}>
            <div style={{fontSize:10,color:'#f59e0b',fontWeight:700,marginBottom:5}}>Beneficios de la PST</div>
            {['Detecta válvulas pegadas entre pruebas completas',
              'Aumenta la cobertura diagnóstica sin parar la planta',
              'Permite extender el intervalo de proof test',
              'Documenta automáticamente cada ejecución'].map((r,i)=>(
              <div key={i} style={{display:'flex',gap:5,marginBottom:4}}>
                <span style={{color:'#22c55e',fontSize:10,flexShrink:0}}>✓</span>
                <span style={{fontSize:9.5,color:'#94a3b8'}}>{r}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h">Puente con el curso de Seguridad Funcional</div>
          <div style={{fontSize:10,color:'#64748b',lineHeight:1.5}}>
            La válvula ESD suele ser el componente que más contribuye al PFDavg de un lazo SIS. Estos
            conceptos (FMEDA, PST, proof testing, SIL) se desarrollan en profundidad en el curso de
            <b className="gold"> Seguridad Funcional SIL — IEC 61508/61511</b>.
          </div>
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 6: Quiz ─────────────────────────────────────────── */
const quizData=[
  {q:'La vena contracta es el punto donde el fluido tiene:',opts:['Máxima presión y mínima velocidad','Mínima presión y máxima velocidad','Presión igual a P1','Caudal cero'],ans:1},
  {q:'El flujo estrangulado (choked) ocurre cuando:',opts:['Aumentar la ΔP ya no aumenta el caudal','La válvula está cerrada','El caudal es proporcional a √ΔP','La presión de vapor es cero'],ans:0},
  {q:'La cavitación se distingue de la vaporización en que:',opts:['No produce ruido','Las burbujas colapsan dentro de la válvula (P2 > Pv)','Solo ocurre en gases','No causa daño'],ans:1},
  {q:'¿Por qué la vaporización (flashing) no se puede "evitar" con la válvula?',opts:['Porque depende de P2 y Pv del proceso, no de la válvula','Porque siempre hay cavitación','Porque la válvula no tiene asiento','Porque el Cv es infinito'],ans:0},
  {q:'El daño por cavitación tiene aspecto:',opts:['Liso y pulido','Áspero y picado, como gravilla','Inexistente','Idéntico al de la corrosión química'],ans:1},
  {q:'El ruido hidrodinámico está habitualmente asociado a:',opts:['Gas a baja velocidad','La cavitación','El cierre lento','La empaquetadura'],ans:1},
  {q:'Un trim multietapa controla el ruido aerodinámico al:',opts:['Aumentar la velocidad del gas','Repartir la caída de presión en saltos pequeños','Cerrar la válvula','Eliminar el actuador'],ans:1},
  {q:'La función principal de un posicionador es:',opts:['Medir el caudal','Asegurar que la posición real de la válvula corresponde a la señal','Generar el set-point','Sustituir al controlador'],ans:1},
  {q:'Una ventaja clave del controlador de válvula digital (DVC) es:',opts:['No necesita aire','Diagnóstico en línea y comunicación bidireccional (HART/FF)','Eliminar la fricción físicamente','Aumentar el Cv'],ans:1},
  {q:'La prueba de recorrido parcial (PST) de una válvula ESD:',opts:['Cierra la válvula completamente y para el proceso','Mueve la válvula 10-15% sin interrumpir el proceso','Solo se hace en parada de planta','Reemplaza al FMEDA'],ans:1},
];
function SceneQuiz(){
  const [qi,setQi]=useState(0);
  const [sel,setSel]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const q=quizData[qi];
  const choose=(i)=>{
    if(sel!==null)return;
    setSel(i);
    if(i===q.ans)setScore(s=>s+1);
    setTimeout(()=>{
      if(qi+1>=quizData.length)setDone(true);
      else{setQi(qi+1);setSel(null);}
    },1200);
  };
  if(done)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:16}}>
    <div style={{fontSize:56}}>{score>=8?'🏆':score>=6?'🎯':'📚'}</div>
    <div style={{fontSize:28,fontWeight:700,color:'#f59e0b'}}>{score}/{quizData.length} correctas</div>
    <div style={{fontSize:14,color:'#94a3b8',textAlign:'center',maxWidth:400}}>
      {score>=8?'Excelente. Completaste el curso de Válvulas de Control con dominio sólido.':score>=6?'Buen nivel. Repasa cavitación y accesorios.':'Repasa vena contracta, cavitación, ruido y posicionadores.'}
    </div>
    <button className="btn-gold" onClick={()=>{setQi(0);setSel(null);setScore(0);setDone(false);}}>Reintentar</button>
  </div>);
  return(<div>
    <div className="sec-title">Quiz — Cavitación, Ruido y Accesorios</div>
    <div className="sec-sub">Pregunta {qi+1} de {quizData.length}</div>
    <div style={{display:'flex',gap:4,marginBottom:14}}>
      {quizData.map((_,i)=><div key={i} style={{height:4,flex:1,borderRadius:2,background:i<qi?'#22c55e':i===qi?'#f59e0b':'#1e2d4a'}}/>)}
    </div>
    <div className="card" style={{padding:'16px 18px',marginBottom:12}}>
      <div style={{fontSize:14,color:'#f1f5f9',fontWeight:500,lineHeight:1.5}}>{q.q}</div>
    </div>
    {q.opts.map((o,i)=>{
      let cls='quiz-opt';
      if(sel!==null){if(i===q.ans)cls+=' correct';else if(i===sel&&i!==q.ans)cls+=' wrong';}
      return(<div key={i} className={cls} onClick={()=>choose(i)}>
        <div style={{width:22,height:22,borderRadius:'50%',border:'1px solid #1e2d4a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,flexShrink:0}}>{String.fromCharCode(65+i)}</div>
        {o}
      </div>);
    })}
    <div style={{marginTop:12,fontSize:11,color:'#475569'}}>Puntuación actual: {score}/{qi}</div>
  </div>);
}

const SCENES=[
  {id:1,label:'1. Vena contracta',comp:Scene1},
  {id:2,label:'2. Cavitación vs flashing',comp:Scene2},
  {id:3,label:'3. Ruido',comp:Scene3},
  {id:4,label:'4. Posicionadores',comp:Scene4},
  {id:5,label:'5. SIS y PST',comp:Scene5},
  {id:6,label:'6. Quiz',comp:SceneQuiz},
];
function App(){
  const [scene,setScene]=useState(1);
  const S=SCENES.find(s=>s.id===scene);
  const Comp=S.comp;
  return(<div className="slide">
    <div className="topbar">
      <div>
        <div className="topbar-title">Clase 1.5 — Cavitación, Ruido y Accesorios</div>
        <div className="topbar-sub">Vena contracta · Cavitación vs flashing · Ruido aero/hidrodinámico · Posicionadores DVC · SIS y PST</div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {scene>1&&<button className="btn-outline" onClick={()=>setScene(s=>s-1)}>← Anterior</button>}
        {scene<SCENES.length&&<button className="btn-gold" onClick={()=>setScene(s=>s+1)}>Siguiente →</button>}
        <span className="scene-badge">{scene}/{SCENES.length}</span>
      </div>
    </div>
    <div className="content">
      <div className="sidebar">
        <div style={{fontSize:9,color:'#334155',fontWeight:700,padding:'0 12px 6px',textTransform:'uppercase',letterSpacing:1}}>Contenido</div>
        {SCENES.map(s=>(
          <div key={s.id} className={`nav-item${scene===s.id?' active':''}`} onClick={()=>setScene(s.id)}>{s.label}</div>
        ))}
      </div>
      <div className="main"><Comp/></div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
