<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 1.5 – Comparación y Matemáticas</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.gold{color:#f59e0b;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0f1729,#1a2540);border-bottom:2px solid #f59e0b;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#f59e0b;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#f59e0b22;border:1px solid #f59e0b55;color:#f59e0b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:215px;background:#0d1425;border-right:1px solid #1e2d4a;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;line-height:1.3;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.nav-item.active{color:#f59e0b;border-left-color:#f59e0b;background:#f59e0b10;font-weight:600;}
.main{flex:1;padding:16px 22px;overflow-y:auto;overflow-x:hidden;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:#0d1425;}
.main::-webkit-scrollbar-thumb{background:#f59e0b44;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#f59e0b;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e2d4a;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.formula-box{background:#060a14;border:1px solid #f59e0b33;border-radius:7px;padding:9px 13px;font-family:'Consolas',monospace;font-size:12px;color:#fcd34d;margin:7px 0;}
.btn-gold{background:#f59e0b;color:#080c18;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;}
.btn-gold:hover{background:#d97706;}
.btn-outline{background:transparent;border:1px solid #f59e0b55;color:#f59e0b;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;}
.btn-outline:hover{background:#f59e0b22;}
.btn-outline.active{background:#f59e0b33;border-color:#f59e0b;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#0f1729;color:#f59e0b;padding:6px 9px;text-align:left;border-bottom:1px solid #1e2d4a;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
td{padding:5px 9px;border-bottom:1px solid #0f1729;color:#cbd5e1;}
tr:hover td{background:#ffffff05;}
.code{font-family:'Consolas',monospace;}
.quiz-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;border:1px solid #1e2d4a;cursor:pointer;margin:4px 0;font-size:12px;transition:all .15s;}
.quiz-opt:hover{border-color:#f59e0b55;background:#f59e0b08;}
.quiz-opt.correct{border-color:#22c55e;background:#14532d33;color:#86efac;}
.quiz-opt.wrong{border-color:#ef4444;background:#7f1d1d33;color:#fca5a5;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

/* ── SCENE 1: Instrucciones de comparación ────────────────── */
function Scene1(){
  const cmp=[
    ['EQU','Equal','A = B','#86efac'],
    ['NEQ','Not Equal','A ≠ B','#86efac'],
    ['GRT','Greater Than','A > B','#93c5fd'],
    ['GEQ','Greater or Equal','A ≥ B','#93c5fd'],
    ['LES','Less Than','A < B','#fca5a5'],
    ['LEQ','Less or Equal','A ≤ B','#fca5a5'],
    ['LIM','Limit Test','Lim.inf ≤ A ≤ Lim.sup','#fcd34d'],
    ['MEQ','Masked Equal','A enmascarado = B','#c4b5fd'],
  ];
  return(<div>
    <div className="sec-title">Instrucciones de comparación</div>
    <div className="sec-sub">Son instrucciones de ENTRADA: dan verdadero/falso y habilitan el resto del rung</div>
    <div className="card" style={{marginBottom:9}}>
      <table>
        <thead><tr><th>Mnem.</th><th>Nombre</th><th>Verdadero si…</th></tr></thead>
        <tbody>
          {cmp.map(([m,n,c,col])=>(
            <tr key={m}><td className="code" style={{color:col,fontWeight:700}}>{m}</td><td>{n}</td><td className="code">{c}</td></tr>
          ))}
        </tbody>
      </table>
    </div>
    <div className="grid2">
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">LIM — comparación de rango</div>
        <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.55}}>
          <b className="gold">LIM</b> comprueba si un valor está dentro de un rango en una sola instrucción.
          Perfecto para una ventana de operación: <span className="code">LIM(20, Temp, 80)</span> es verdadero
          si Temp está entre 20 y 80.
        </div>
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Ejemplo de alarma de nivel</div>
        <div className="formula-box" style={{marginBottom:0}}>GEQ  Nivel_Tanque  90.0<br/>  → OTL Alarma_Alto<br/><br/>LES  Nivel_Tanque  10.0<br/>  → OTL Alarma_Bajo</div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 2: Instrucciones matemáticas ───────────────────── */
function Scene2(){
  const math=[
    ['ADD','Add','Dest = A + B'],
    ['SUB','Subtract','Dest = A − B'],
    ['MUL','Multiply','Dest = A × B'],
    ['DIV','Divide','Dest = A ÷ B'],
    ['MOD','Modulo','Dest = resto de A ÷ B'],
    ['SQR','Square Root','Dest = √A'],
    ['NEG','Negate','Dest = −A'],
    ['ABS','Absolute','Dest = |A|'],
    ['CPT','Compute','Dest = expresión libre'],
  ];
  return(<div>
    <div className="sec-title">Instrucciones matemáticas</div>
    <div className="sec-sub">Son instrucciones de SALIDA: calculan y guardan el resultado en un tag destino</div>
    <div className="grid2">
      <div className="card" style={{marginBottom:0}}>
        <table>
          <thead><tr><th>Mnem.</th><th>Nombre</th><th>Operación</th></tr></thead>
          <tbody>
            {math.map(([m,n,o])=>(<tr key={m}><td className="code gold" style={{fontWeight:700}}>{m}</td><td>{n}</td><td className="code">{o}</td></tr>))}
          </tbody>
        </table>
      </div>
      <div>
        <div className="card">
          <div className="card-h">CPT — la calculadora libre</div>
          <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.55,marginBottom:6}}>
            <b className="gold">CPT</b> (Compute) evalúa una expresión completa en una sola instrucción, con
            paréntesis, varios operadores y funciones. Sustituye a una cadena de ADD/MUL.
          </div>
          <div className="formula-box" style={{marginBottom:0}}>CPT  Caudal<br/>  := (Delta_P * K) / Densidad</div>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h">Trabaja en REAL para no perder decimales</div>
          <div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5}}>
            Una DIV entre enteros (DINT) trunca los decimales. Para porcentajes, escalados y físicas usa tags
            <b className="gold"> REAL</b>.
          </div>
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 3: Calculadora CPT interactiva ─────────────────── */
function Scene3(){
  const [dp,setDp]=useState(50);
  const [k,setK]=useState(2.5);
  const [dens,setDens]=useState(1.0);
  const caudal=(dp*k)/dens;
  return(<div>
    <div className="sec-title">Ejemplo práctico: cálculo de caudal con CPT</div>
    <div className="sec-sub">Caudal := (Delta_P × K) / Densidad · Ajusta las entradas y observa el resultado REAL</div>
    <div className="grid2">
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Entradas (tags REAL)</div>
        {[['Delta_P (mbar)',dp,setDp,0,200,1],['K (constante)',k,setK,0,10,0.1],['Densidad',dens,setDens,0.5,2,0.05]].map(([l,v,set,mn,mx,st])=>(
          <div key={l} style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10.5,color:'#94a3b8',marginBottom:4}}>
              <span>{l}</span><span className="code gold">{Number(v).toFixed(2)}</span>
            </div>
            <input type="range" min={mn} max={mx} step={st} value={v} onChange={e=>set(parseFloat(e.target.value))}
              style={{width:'100%',accentColor:'#f59e0b'}}/>
          </div>
        ))}
        <div className="formula-box" style={{marginBottom:0}}>CPT Caudal := (Delta_P * K) / Densidad</div>
      </div>
      <div className="card" style={{marginBottom:0,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center'}}>
        <div className="card-h" style={{alignSelf:'flex-start'}}>Resultado calculado</div>
        <div style={{fontSize:46,fontWeight:700,color:'#f59e0b',margin:'10px 0'}}>{caudal.toFixed(1)}</div>
        <div style={{fontSize:12,color:'#64748b',marginBottom:18}}>Caudal (unidades de proceso)</div>
        <div style={{width:'100%',height:24,background:'#060a14',borderRadius:12,overflow:'hidden',border:'1px solid #1e2d4a'}}>
          <div style={{height:'100%',width:Math.min(caudal/500*100,100)+'%',background:'linear-gradient(90deg,#f59e0b,#fcd34d)',transition:'width .15s'}}/>
        </div>
        <div style={{fontSize:9.5,color:'#64748b',marginTop:14,textAlign:'center',lineHeight:1.5}}>
          Si Densidad fuera 0, el controlador generaría un fallo de división por cero. Valídalo antes con una comparación.
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 4: Banderas de estado matemático ───────────────── */
function Scene4(){
  return(<div>
    <div className="sec-title">Banderas de estado y conversiones</div>
    <div className="sec-sub">Overflow, conversión de tipos y el redondeo · Detalles que evitan resultados erróneos</div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">Banderas de estado matemático (S:)</div>
          <table>
            <thead><tr><th>Bandera</th><th>Se activa si…</th></tr></thead>
            <tbody>
              <tr><td className="code" style={{color:'#fca5a5'}}>S:V</td><td>Overflow: resultado fuera del rango del tipo</td></tr>
              <tr><td className="code" style={{color:'#fcd34d'}}>S:Z</td><td>Zero: resultado = 0</td></tr>
              <tr><td className="code" style={{color:'#93c5fd'}}>S:N</td><td>Negative: resultado negativo</td></tr>
              <tr><td className="code" style={{color:'#86efac'}}>S:C</td><td>Carry: acarreo en la operación</td></tr>
            </tbody>
          </table>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h" style={{color:'#fca5a5'}}>⚠ Overflow</div>
          <div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5}}>
            Si sumas dos DINT grandes y superas 2 147 483 647, hay overflow y el resultado se "envuelve" a negativo.
            Dimensiona bien el tipo o usa REAL.
          </div>
        </div>
      </div>
      <div>
        <div className="card">
          <div className="card-h">Conversión entre tipos</div>
          <div style={{fontSize:10.5,color:'#94a3b8',lineHeight:1.55,marginBottom:6}}>
            Al mover (MOV) un <b className="gold">REAL</b> a un <b className="gold">DINT</b>, el valor se
            <b> redondea</b> al entero más próximo (no se trunca). 7.6 → 8; 7.4 → 7.
          </div>
          <div className="formula-box" style={{marginBottom:0}}>MOV  7.6 (REAL) → Contador (DINT)<br/>  Resultado: 8</div>
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h" style={{color:'#86efac'}}>✓ Escalado analógico típico</div>
          <div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5,marginBottom:5}}>
            Convertir 0–32767 (crudo) a 0–100 % de ingeniería:
          </div>
          <div className="formula-box" style={{marginBottom:0}}>CPT  PV := (Crudo / 32767.0) * 100.0</div>
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 5: Quiz ─────────────────────────────────────────── */
const quizData=[
  {q:'Las instrucciones de comparación (EQU, GRT, LES) son de tipo:',opts:['Salida','Entrada (dan verdadero/falso)','Temporización','Conteo'],ans:1},
  {q:'¿Qué instrucción verifica si A es mayor o igual que B?',opts:['GRT','GEQ','LEQ','NEQ'],ans:1},
  {q:'Para comprobar si un valor está dentro de un rango con UNA instrucción se usa:',opts:['EQU','LIM','MOD','SQR'],ans:1},
  {q:'¿Qué hace MOD (Modulo)?',opts:['Multiplica','Devuelve el resto de una división','Saca raíz cuadrada','Niega el valor'],ans:1},
  {q:'La instrucción CPT (Compute) permite:',opts:['Solo sumar dos números','Evaluar una expresión completa con paréntesis y funciones','Comparar bits','Crear tags'],ans:1},
  {q:'Una división entre dos DINT (enteros):',opts:['Conserva decimales','Trunca los decimales','Da error siempre','Devuelve REAL'],ans:1},
  {q:'¿Qué bandera de estado se activa con un overflow?',opts:['S:Z','S:V','S:N','S:C'],ans:1},
  {q:'Al mover (MOV) un REAL 7.6 a un DINT, el resultado es:',opts:['7','8','7.6','0'],ans:1},
  {q:'Para escalar 0–32767 a 0–100% sin perder precisión conviene usar tags:',opts:['BOOL','SINT','REAL','TIMER'],ans:2},
  {q:'Las instrucciones matemáticas (ADD, MUL) son de tipo:',opts:['Entrada','Salida (guardan el resultado en un destino)','Comparación','Bit'],ans:1},
];
function SceneQuiz(){
  const [qi,setQi]=useState(0);const [sel,setSel]=useState(null);const [score,setScore]=useState(0);const [done,setDone]=useState(false);
  const q=quizData[qi];
  const choose=(i)=>{if(sel!==null)return;setSel(i);if(i===q.ans)setScore(s=>s+1);setTimeout(()=>{if(qi+1>=quizData.length)setDone(true);else{setQi(qi+1);setSel(null);}},1200);};
  if(done)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:16}}>
    <div style={{fontSize:56}}>{score>=8?'🏆':score>=6?'🎯':'📚'}</div>
    <div style={{fontSize:28,fontWeight:700,color:'#f59e0b'}}>{score}/{quizData.length} correctas</div>
    <div style={{fontSize:14,color:'#94a3b8',textAlign:'center',maxWidth:400}}>{score>=8?'Excelente. Dominas comparación, matemáticas y escalado.':score>=6?'Buen nivel. Repasa CPT, overflow y conversiones de tipo.':'Repasa las comparaciones, ADD/SUB/MUL/DIV/CPT y el escalado analógico.'}</div>
    <button className="btn-gold" onClick={()=>{setQi(0);setSel(null);setScore(0);setDone(false);}}>Reintentar</button>
  </div>);
  return(<div>
    <div className="sec-title">Quiz — Comparación y Matemáticas</div>
    <div className="sec-sub">Pregunta {qi+1} de {quizData.length}</div>
    <div style={{display:'flex',gap:4,marginBottom:14}}>{quizData.map((_,i)=><div key={i} style={{height:4,flex:1,borderRadius:2,background:i<qi?'#22c55e':i===qi?'#f59e0b':'#1e2d4a'}}/>)}</div>
    <div className="card" style={{padding:'16px 18px',marginBottom:12}}><div style={{fontSize:14,color:'#f1f5f9',fontWeight:500,lineHeight:1.5}}>{q.q}</div></div>
    {q.opts.map((o,i)=>{let cls='quiz-opt';if(sel!==null){if(i===q.ans)cls+=' correct';else if(i===sel&&i!==q.ans)cls+=' wrong';}return(<div key={i} className={cls} onClick={()=>choose(i)}><div style={{width:22,height:22,borderRadius:'50%',border:'1px solid #1e2d4a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,flexShrink:0}}>{String.fromCharCode(65+i)}</div>{o}</div>);})}
    <div style={{marginTop:12,fontSize:11,color:'#475569'}}>Puntuación actual: {score}/{qi}</div>
  </div>);
}

const SCENES=[
  {id:1,label:'1. Comparación',comp:Scene1},
  {id:2,label:'2. Matemáticas',comp:Scene2},
  {id:3,label:'3. Calculadora CPT',comp:Scene3},
  {id:4,label:'4. Banderas y conversión',comp:Scene4},
  {id:5,label:'5. Quiz',comp:SceneQuiz},
];
function App(){
  const [scene,setScene]=useState(1);const S=SCENES.find(s=>s.id===scene);const Comp=S.comp;
  return(<div className="slide">
    <div className="topbar">
      <div><div className="topbar-title">Clase 1.5 — Comparación y Matemáticas</div>
      <div className="topbar-sub">EQU · NEQ · GEQ · LES · LIM · MEQ · ADD · SUB · MUL · DIV · MOD · CPT · Banderas S:</div></div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {scene>1&&<button className="btn-outline" onClick={()=>setScene(s=>s-1)}>← Anterior</button>}
        {scene<SCENES.length&&<button className="btn-gold" onClick={()=>setScene(s=>s+1)}>Siguiente →</button>}
        <span className="scene-badge">{scene}/{SCENES.length}</span>
      </div>
    </div>
    <div className="content">
      <div className="sidebar">
        <div style={{fontSize:9,color:'#334155',fontWeight:700,padding:'0 12px 6px',textTransform:'uppercase',letterSpacing:1}}>Contenido</div>
        {SCENES.map(s=>(<div key={s.id} className={`nav-item${scene===s.id?' active':''}`} onClick={()=>setScene(s.id)}>{s.label}</div>))}
      </div>
      <div className="main"><Comp/></div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
