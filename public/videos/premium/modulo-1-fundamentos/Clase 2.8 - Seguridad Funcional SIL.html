<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>Clase 2.8 — Seguridad Funcional SIL</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080c18;color:#e2e8f0;font-family:'Segoe UI',sans-serif;width:1280px;height:720px;overflow:hidden}
  .slide{width:1280px;height:720px;display:flex;flex-direction:column}
  .hdr{background:linear-gradient(135deg,#0f172a,#1e293b);border-bottom:3px solid #f59e0b;padding:18px 48px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .hdr-title{font-size:22px;font-weight:700;color:#f59e0b}
  .hdr-sub{font-size:13px;color:#94a3b8}
  .badge{background:#f59e0b22;border:1px solid #f59e0b55;color:#f59e0b;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .content{flex:1;overflow:hidden;padding:24px 48px}
  .nav{display:flex;gap:12px;justify-content:center;padding:14px;background:#0a0f1e;border-top:1px solid #1e293b;flex-shrink:0}
  .btn{padding:10px 28px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
  .btn-gold{background:#f59e0b;color:#000}.btn-gold:hover{background:#fbbf24}.btn-gold:disabled{opacity:.4;cursor:not-allowed}
  .btn-outline{background:transparent;border:1px solid #334155;color:#94a3b8}.btn-outline:hover{border-color:#f59e0b;color:#f59e0b}.btn-outline:disabled{opacity:.3;cursor:not-allowed}
  .dots{display:flex;gap:8px;align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;background:#1e293b;transition:all .3s;cursor:pointer}
  .dot.active{background:#f59e0b;width:24px;border-radius:4px}
  .card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px}
  .card-gold{border-color:#f59e0b44;background:#f59e0b08}
  .card h3{color:#f59e0b;font-size:14px;margin-bottom:10px}
  .formula{background:#020817;border:1px solid #f59e0b44;border-radius:8px;padding:8px 14px;font-family:monospace;font-size:14px;color:#fbbf24;text-align:center;margin:6px 0}
  .tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;margin:2px}
  .tag-blue{background:#1e40af33;color:#60a5fa;border:1px solid #1e40af55}
  .tag-green{background:#15803d33;color:#4ade80;border:1px solid #15803d55}
  .tag-red{background:#991b1b33;color:#f87171;border:1px solid #991b1b55}
  .tag-yellow{background:#f59e0b22;color:#fbbf24;border:1px solid #f59e0b44}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#0a0f1e;color:#f59e0b;padding:7px 10px;text-align:left;border-bottom:2px solid #f59e0b44}
  td{padding:6px 10px;border-bottom:1px solid #1e293b;color:#cbd5e1}
  tr:hover td{background:#0f172a}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

function Scene1(){
  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:14}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card card-gold">
        <h3>🛡️ Seguridad Funcional — IEC 61508 / 61511</h3>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.7}}>
          <p><strong style={{color:'#f59e0b'}}>IEC 61508:</strong> Norma madre — Seguridad funcional de sistemas eléctricos/electrónicos/programables relacionados con la seguridad.</p>
          <br/>
          <p><strong style={{color:'#60a5fa'}}>IEC 61511:</strong> Aplicación sectorial para la industria de proceso (petroquímica, gas, química, agua).</p>
          <br/>
          <p>Objetivo: asegurar que los <strong style={{color:'#4ade80'}}>SIS (Safety Instrumented Systems)</strong> reducen el riesgo a un nivel tolerable.</p>
          <br/>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <span className="tag tag-yellow">SIS</span>
            <span className="tag tag-blue">SIF</span>
            <span className="tag tag-green">SIL</span>
            <span className="tag tag-red">PFD</span>
            <span className="tag tag-yellow">LOPA</span>
          </div>
        </div>
      </div>
      <div className="card">
        <h3>⚠️ Capas de Protección (IPL)</h3>
        <div style={{fontSize:12,color:'#94a3b8'}}>
          <p style={{marginBottom:8}}>El proceso tiene múltiples capas independientes de protección:</p>
          {[
            {n:'BPCS (Control básico)',c:'#60a5fa',d:'Control normal del proceso. No cuenta como SIS.'},
            {n:'Alarmas y respuesta operador',c:'#f59e0b',d:'Alerta al operador. Requiere acción manual.'},
            {n:'SIS/SIF',c:'#4ade80',d:'Actuación automática independiente del BPCS.'},
            {n:'Dispositivos físicos (PSV)',c:'#c084fc',d:'Válvulas de seguridad, discos de ruptura.'},
            {n:'Dique/contención',c:'#f87171',d:'Barrera física final. Contiene el peor caso.'},
          ].map((x,i)=>(
            <div key={i} style={{display:'flex',gap:10,alignItems:'center',marginBottom:6,
              background:'#020817',padding:8,borderRadius:6,borderLeft:`3px solid ${x.c}`}}>
              <div style={{fontWeight:700,color:x.c,fontSize:12,width:180,flexShrink:0}}>{x.n}</div>
              <div style={{fontSize:11,color:'#64748b'}}>{x.d}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
      {[
        {t:'SIS',d:'Safety Instrumented System. El sistema completo de seguridad: sensores + lógica + actuadores.',c:'#f59e0b'},
        {t:'SIF',d:'Safety Instrumented Function. Una función de seguridad específica dentro del SIS.',c:'#60a5fa'},
        {t:'SIL',d:'Safety Integrity Level. Nivel de integridad de seguridad (1 a 4). Mide la confiabilidad de la SIF.',c:'#4ade80'},
        {t:'LOPA',d:'Layer Of Protection Analysis. Análisis de capas para determinar el SIL requerido.',c:'#c084fc'},
      ].map(x=>(
        <div key={x.t} style={{background:'#0a0f1e',border:`1px solid ${x.c}44`,borderRadius:8,padding:10}}>
          <div style={{fontWeight:700,color:x.c,fontSize:13,marginBottom:4}}>{x.t}</div>
          <div style={{fontSize:11,color:'#64748b',lineHeight:1.5}}>{x.d}</div>
        </div>
      ))}
    </div>
  </div>
  );
}

function Scene2(){
  const [sil,setSil]=useState(2);
  const data=[
    {sil:1,PFD:'≥10⁻² a <10⁻¹',RRF:'10 a 100',riesgo:'Bajo',color:'#4ade80',desc:'Reducción del riesgo de 10x a 100x.'},
    {sil:2,PFD:'≥10⁻³ a <10⁻²',RRF:'100 a 1000',riesgo:'Medio',color:'#f59e0b',desc:'Reducción 100x a 1000x. El más común en proceso.'},
    {sil:3,PFD:'≥10⁻⁴ a <10⁻³',RRF:'1000 a 10000',riesgo:'Alto',color:'#f87171',desc:'Reducción 1000x a 10000x. Nuclear, offshore.'},
    {sil:4,PFD:'≥10⁻⁵ a <10⁻⁴',RRF:'10000 a 100000',riesgo:'Muy alto',color:'#dc2626',desc:'Reducción 10000x+. Reactores nucleares. Muy raro.'},
  ];
  const d=data.find(x=>x.sil===sil);

  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:14}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card card-gold">
        <h3>📊 Niveles de Integridad de Seguridad (SIL)</h3>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.7,marginBottom:12}}>
          <p>El SIL se determina por el riesgo a reducir. Se expresa en términos de:</p>
          <br/>
          <div className="formula">PFD = Probabilidad de Falla bajo Demanda</div>
          <div style={{fontSize:11,color:'#64748b',textAlign:'center',marginBottom:8}}>PFD = 1/RRF donde RRF = Risk Reduction Factor</div>
          <p>PFD es la probabilidad de que el sistema de seguridad falle al ser demandado.</p>
          <br/>
          <p>Para una SIF con sensor + lógica + actuador:</p>
          <div className="formula">PFD_total = PFD_sensor + PFD_logic + PFD_actuador</div>
        </div>
      </div>
      <div className="card">
        <h3>🎚️ Calculadora SIL</h3>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {[1,2,3,4].map(s=>(
            <button key={s} onClick={()=>setSil(s)}
              style={{flex:1,padding:'10px 0',borderRadius:8,border:`2px solid ${sil===s?data[s-1].color:'#1e293b'}`,
                background:sil===s?data[s-1].color+'22':'#0a0f1e',
                color:sil===s?data[s-1].color:'#64748b',cursor:'pointer',fontWeight:700,fontSize:16}}>
              SIL {s}
            </button>
          ))}
        </div>
        {d&&<>
          <div style={{background:d.color+'11',border:`2px solid ${d.color}`,borderRadius:12,padding:16}}>
            <div style={{fontSize:20,fontWeight:700,color:d.color,marginBottom:8}}>SIL {d.sil} — Riesgo {d.riesgo}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div style={{background:'#020817',borderRadius:6,padding:10,textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:700,color:'#fbbf24'}}>{d.PFD}</div>
                <div style={{fontSize:11,color:'#64748b'}}>PFD (Prob. Falla Demanda)</div>
              </div>
              <div style={{background:'#020817',borderRadius:6,padding:10,textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:700,color:'#60a5fa'}}>{d.RRF}</div>
                <div style={{fontSize:11,color:'#64748b'}}>RRF (Factor Reducción Riesgo)</div>
              </div>
            </div>
            <div style={{fontSize:12,color:'#94a3b8'}}>{d.desc}</div>
          </div>
        </>}
      </div>
    </div>
    <div className="card">
      <h3>📐 Tabla SIL completa</h3>
      <table>
        <thead>
          <tr><th>SIL</th><th>PFD</th><th>RRF</th><th>Aplicación típica</th><th>Redundancia</th></tr>
        </thead>
        <tbody>
          {[
            ['1','10⁻² a 10⁻¹','10 a 100','Planta química pequeña, HVAC','1oo1'],
            ['2','10⁻³ a 10⁻²','100 a 1000','Refinería, petroquímica, gas','1oo2 o 2oo3'],
            ['3','10⁻⁴ a 10⁻³','1000 a 10000','Plataforma offshore, LNG','2oo3 o 1oo2D'],
            ['4','10⁻⁵ a 10⁻⁴','10000 a 100000','Nuclear (reactor)','Alta redundancia'],
          ].map(r=>(
            <tr key={r[0]}>
              <td style={{fontWeight:700,color:['#4ade80','#f59e0b','#f87171','#dc2626'][+r[0]-1]}}>SIL {r[0]}</td>
              <td style={{fontFamily:'monospace',color:'#fbbf24'}}>{r[1]}</td>
              <td style={{color:'#60a5fa'}}>{r[2]}</td>
              <td style={{color:'#94a3b8'}}>{r[3]}</td>
              <td><span className="tag tag-blue">{r[4]}</span></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </div>
  );
}

function Scene3(){
  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:14}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card card-gold">
        <h3>🔁 Arquitecturas de redundancia (IEC 61508)</h3>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.7}}>
          <p>Notación MooN: M out of N — cuántos votan de cuántos totales.</p>
          <br/>
          {[
            {a:'1oo1',sil:'SIL 1',d:'Un sensor, un voto. Si falla → acción segura. PFD alto, disponibilidad baja.','c':'#60a5fa'},
            {a:'1oo2',sil:'SIL 2-3',d:'Dos sensores, actúa si cualquiera detecta. Menos fallos no detectados. Mayor disponibilidad.','c':'#4ade80'},
            {a:'2oo2',sil:'SIL 1',d:'Ambos deben activar. Alta disponibilidad (menos falsas alarmas). Mayor PFD.','c':'#f59e0b'},
            {a:'2oo3',sil:'SIL 2-3',d:'Tres sensores, actúa si 2 de 3 concuerdan. Balance óptimo seguridad/disponibilidad.','c':'#c084fc'},
            {a:'1oo2D',sil:'SIL 3',d:'Dos sensores con diagnóstico. Detecta fallos ocultos. PFD muy bajo.','c':'#f87171'},
          ].map(x=>(
            <div key={x.a} style={{display:'flex',gap:10,marginBottom:6}}>
              <span style={{fontFamily:'monospace',fontWeight:700,color:x.c,width:60,flexShrink:0}}>{x.a}</span>
              <span className="tag tag-yellow" style={{flexShrink:0,height:22}}>{x.sil}</span>
              <span style={{fontSize:11,color:'#64748b'}}>{x.d}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <h3>🔬 Diagnóstico y cobertura (DC)</h3>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.7}}>
          <p><strong style={{color:'#f59e0b'}}>Diagnostic Coverage (DC):</strong> porcentaje de fallos peligrosos que el autodiagnóstico detecta.</p>
          <br/>
          <div className="formula">DC = λ_DD / (λ_DD + λ_DU)</div>
          <div style={{fontSize:11,color:'#64748b',textAlign:'center',marginBottom:10}}>λ_DD: tasa fallo peligroso detectado / λ_DU: no detectado</div>
          <table style={{fontSize:12}}>
            <thead><tr><th>DC (%)</th><th>Clasificación</th><th>Efecto</th></tr></thead>
            <tbody>
              <tr><td>&lt;60%</td><td>Ninguno</td><td style={{color:'#f87171'}}>Sin crédito DC</td></tr>
              <tr><td>60-90%</td><td>Bajo</td><td style={{color:'#f59e0b'}}>PFD moderado</td></tr>
              <tr><td>90-99%</td><td>Medio</td><td style={{color:'#60a5fa'}}>PFD reducido</td></tr>
              <tr><td>≥99%</td><td>Alto</td><td style={{color:'#4ade80'}}>PFD muy bajo</td></tr>
            </tbody>
          </table>
          <div style={{marginTop:10,background:'#020817',padding:8,borderRadius:6}}>
            <strong style={{color:'#f59e0b'}}>Proof Test:</strong> prueba manual periódica que detecta fallos ocultos (λ_DU).
            Frecuencia típica: 1 vez por año. Aumenta el DC efectivo.
          </div>
        </div>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
      <div className="card">
        <h3>📋 HAZOP</h3>
        <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.6}}>
          <p><strong style={{color:'#f59e0b'}}>Hazard and Operability Study:</strong></p><br/>
          <p>Técnica sistemática de análisis de peligros. Un equipo multidisciplinario examina desviaciones del proceso usando palabras guía:</p>
          <div style={{marginTop:6}}>
            {['NO, MENOS, MÁS, TAMBIÉN, PARTE DE, REVERSO, OTRO QUE'].map(p=>(
              <span key={p} className="tag tag-blue" style={{margin:'2px 2px'}}>{p}</span>
            ))}
          </div>
          <p style={{marginTop:6}}>Identifica causas, consecuencias y salvaguardas existentes.</p>
        </div>
      </div>
      <div className="card">
        <h3>📊 LOPA</h3>
        <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.6}}>
          <p><strong style={{color:'#f59e0b'}}>Layer of Protection Analysis:</strong></p><br/>
          <p>Cuantifica el riesgo residual comparando la frecuencia del evento iniciador con la reducción de cada IPL.</p><br/>
          <div className="formula" style={{fontSize:11}}>F_mitigado = F_init × ∏(PFD_IPL)</div>
          <p style={{marginTop:6}}>Si F_mitigado &gt; F_tolerable → se requiere un SIS con SIL determinado.</p>
        </div>
      </div>
      <div className="card">
        <h3>🏭 Ciclo de vida del SIS</h3>
        <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.7}}>
          {['Análisis de riesgo (HAZOP/LOPA)','Asignación SIL','Diseño del SIS (SRS)','Instalación y puesta en marcha','Validación y prueba de aceptación','Operación y mantenimiento','Proof test periódico','Modificación y descomisión'].map((s,i)=>(
            <div key={i} style={{display:'flex',gap:8,alignItems:'center',marginBottom:3}}>
              <div style={{width:18,height:18,borderRadius:'50%',background:'#f59e0b',color:'#000',fontWeight:700,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{i+1}</div>
              <div style={{fontSize:11}}>{s}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>
  );
}

function Scene4(){
  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:14}}>
    <div className="card card-gold" style={{padding:14}}>
      <div style={{fontSize:13,color:'#94a3b8'}}>
        <strong style={{color:'#f59e0b'}}>Áreas peligrosas ATEX / NEC 505:</strong> clasificación de zonas donde pueden existir atmósferas explosivas
        (gases, vapores, nieblas o polvos) y equipos adecuados para cada zona.
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,flex:1}}>
      <div className="card">
        <h3>🔥 Clasificación de Zonas (Gas/Vapor)</h3>
        <table>
          <thead><tr><th>ATEX</th><th>NEC</th><th>Descripción</th></tr></thead>
          <tbody>
            <tr>
              <td style={{color:'#f87171',fontWeight:700}}>Zona 0</td>
              <td style={{color:'#f87171'}}>Div 1</td>
              <td>Atmósfera explosiva <strong>continua</strong> (&gt;1000 h/año). Interior de depósitos.</td>
            </tr>
            <tr>
              <td style={{color:'#f59e0b',fontWeight:700}}>Zona 1</td>
              <td style={{color:'#f59e0b'}}>Div 1</td>
              <td>Atmósfera explosiva en operación <strong>normal</strong> (10-1000 h/año).</td>
            </tr>
            <tr>
              <td style={{color:'#4ade80',fontWeight:700}}>Zona 2</td>
              <td style={{color:'#4ade80'}}>Div 2</td>
              <td>Atmósfera explosiva <strong>improbable</strong> en operación normal (&lt;10 h/año).</td>
            </tr>
          </tbody>
        </table>
        <div style={{marginTop:12}}>
          <h3 style={{marginBottom:8}}>💨 Clasificación de Zonas (Polvo)</h3>
          <table>
            <thead><tr><th>Zona</th><th>Descripción</th></tr></thead>
            <tbody>
              <tr><td style={{color:'#f87171'}}>Zona 20</td><td>Nube de polvo combustible continua. Interior silos, molinos.</td></tr>
              <tr><td style={{color:'#f59e0b'}}>Zona 21</td><td>Nube de polvo en operación normal.</td></tr>
              <tr><td style={{color:'#4ade80'}}>Zona 22</td><td>Nube de polvo improbable en operación normal.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div className="card">
        <h3>⚡ Tipos de protección ATEX</h3>
        <table>
          <thead><tr><th>Código</th><th>Tipo</th><th>Zona</th><th>Descripción</th></tr></thead>
          <tbody>
            {[
              ['Ex d','Envolvente antideflagrante','0,1,2','Contiene la explosión interna. Llama no sale al exterior.'],
              ['Ex e','Seguridad aumentada','1,2','Construcción robusta. Previene chispas y calor excesivo.'],
              ['Ex i','Seguridad intrínseca','0,1,2','Energía insuficiente para encender la atmósfera. HART.'],
              ['Ex n','No incendiario','2 solo','Para zona 2. Sin arco ni superficie caliente.'],
              ['Ex p','Presurización','1,2','Gas limpio interno. Atmósfera explosiva no entra.'],
              ['Ex m','Encapsulado','1,2','Componentes sellados en resina. Sin contacto con atmósfera.'],
            ].map(r=>(
              <tr key={r[0]}>
                <td style={{fontFamily:'monospace',fontWeight:700,color:'#f59e0b'}}>{r[0]}</td>
                <td style={{color:'#cbd5e1'}}>{r[1]}</td>
                <td><span className="tag tag-blue">{r[2]}</span></td>
                <td style={{color:'#64748b',fontSize:11}}>{r[3]}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{marginTop:10,background:'#020817',padding:8,borderRadius:6,fontSize:12,color:'#94a3b8'}}>
          <strong style={{color:'#f59e0b'}}>Seguridad Intrínseca (Ex i):</strong> El método más seguro para instrumentación (4-20 mA HART).
          La barrera zener o galvánica limita corriente y tensión. Compatible con zona 0.
        </div>
      </div>
    </div>
  </div>
  );
}

const QUIZ=[
  {q:'¿Qué norma aplica seguridad funcional a la industria de proceso?',opts:['IEC 61508','IEC 61511','ISO 9001','ATEX 2014/34/EU'],ans:1},
  {q:'¿Qué PFD corresponde a SIL 2?',opts:['10⁻¹ a 10⁻²','10⁻² a 10⁻³','10⁻³ a 10⁻²','10⁻⁴ a 10⁻³'],ans:2},
  {q:'La arquitectura 2oo3 significa:',opts:['2 de 3 sensores deben detectar para actuar','Actúa si cualquiera de 3 detecta','Actúa solo si los 3 detectan','2 activos de 3 disponibles'],ans:0},
  {q:'¿Qué es el Proof Test?',opts:['Test de presión del proceso','Prueba periódica manual que detecta fallos ocultos (DU)','Calibración del sensor','Test de la señal 4-20 mA'],ans:1},
  {q:'Una zona ATEX 0 corresponde a:',opts:['Atmósfera explosiva improbable','Atmósfera explosiva en operación normal','Atmósfera explosiva continua (>1000 h/año)','Zona sin riesgo'],ans:2},
  {q:'El tipo de protección Ex i (seguridad intrínseca) limita:',opts:['La presión del fluido','La energía eléctrica para evitar encendido','La temperatura de proceso','El acceso de operadores'],ans:1},
  {q:'LOPA se usa para:',opts:['Calibrar instrumentos','Determinar el SIL requerido analizando capas de protección','Diseñar P&IDs','Seleccionar válvulas de control'],ans:1},
  {q:'¿Qué es el BPCS?',opts:['Sistema de seguridad instrumentada','Sistema básico de control del proceso','Barrier Protection Control System','Basic Process Calibration Standard'],ans:1},
  {q:'Un SIF es:',opts:['El sistema SIS completo','Una función específica de seguridad dentro del SIS','El nivel SIL de la planta','La frecuencia del proof test'],ans:1},
  {q:'¿Qué zona ATEX admite el tipo de protección Ex d (antideflagrante)?',opts:['Solo zona 2','Solo zona 0','Zonas 1 y 2','Todas las zonas 0,1,2'],ans:3},
];
function Scene5(){
  const [ans,setAns]=useState(Array(QUIZ.length).fill(null));
  const [show,setShow]=useState(false);
  const score=ans.filter((a,i)=>a===QUIZ[i].ans).length;
  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{flex:1,overflowY:'auto',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,paddingRight:4}}>
      {!show?QUIZ.map((q,i)=>(
        <div key={i} className="card" style={{padding:12}}>
          <div style={{fontSize:11,color:'#64748b',marginBottom:4}}>P.{i+1}</div>
          <div style={{fontSize:12,color:'#cbd5e1',marginBottom:8,lineHeight:1.4}}>{q.q}</div>
          {q.opts.map((o,j)=>(
            <button key={j} onClick={()=>{const a=[...ans];a[i]=j;setAns(a);}}
              style={{display:'block',width:'100%',textAlign:'left',padding:'5px 10px',borderRadius:5,
                border:`1px solid ${ans[i]===j?'#f59e0b':'#1e293b'}`,background:ans[i]===j?'#f59e0b22':'#0a0f1e',
                color:ans[i]===j?'#fbbf24':'#64748b',cursor:'pointer',fontSize:11,marginBottom:3}}>{o}</button>
          ))}
        </div>
      )):QUIZ.map((q,i)=>(
        <div key={i} className="card" style={{padding:12,borderColor:ans[i]===q.ans?'#4ade8044':'#f8717144'}}>
          <div style={{fontSize:11,color:ans[i]===q.ans?'#4ade80':'#f87171',marginBottom:3}}>{ans[i]===q.ans?'✅':'❌'}</div>
          <div style={{fontSize:11,color:'#cbd5e1',marginBottom:4}}>{q.q}</div>
          <div style={{fontSize:11,color:'#4ade80'}}>✓ {q.opts[q.ans]}</div>
        </div>
      ))}
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0 0'}}>
      <div style={{fontSize:13,color:'#94a3b8'}}>
        Respondidas: <strong style={{color:'#fbbf24'}}>{ans.filter(a=>a!==null).length}/10</strong>
        {show&&<span style={{marginLeft:16,color:score>=8?'#4ade80':'#f87171',fontWeight:700}}>Puntuación: {score}/10</span>}
      </div>
      {!show?(<button className="btn btn-gold" disabled={ans.filter(a=>a!==null).length<10} onClick={()=>setShow(true)}>Ver resultados</button>)
        :(<button className="btn btn-outline" onClick={()=>{setAns(Array(QUIZ.length).fill(null));setShow(false);}}>Reintentar</button>)}
    </div>
  </div>
  );
}

const SCENES=[
  {id:1,title:'SIS, SIF y Capas de Protección (IPL)',sub:'IEC 61508 / 61511, conceptos clave, BPCS vs SIS',comp:Scene1},
  {id:2,title:'SIL — Niveles de Integridad',sub:'PFD, RRF, tabla SIL 1-4, calculadora interactiva',comp:Scene2},
  {id:3,title:'Arquitecturas, HAZOP y LOPA',sub:'MooN, DC, proof test, ciclo de vida SIS',comp:Scene3},
  {id:4,title:'Áreas Peligrosas ATEX / NEC',sub:'Zonas 0/1/2, tipos Ex d/e/i/p, seguridad intrínseca',comp:Scene4},
  {id:5,title:'Test de Evaluación',sub:'10 preguntas sobre seguridad funcional SIL y ATEX',comp:Scene5},
];

function App(){
  const [sc,setSc]=useState(0);
  const S=SCENES[sc]; const Comp=S.comp;
  return(
  <div className="slide">
    <div className="hdr">
      <div>
        <div className="hdr-title">2.8 — Seguridad Funcional SIL y ATEX</div>
        <div className="hdr-sub">{S.title} · {S.sub}</div>
      </div>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <span className="badge">PRO</span>
        <span style={{fontSize:12,color:'#64748b'}}>{sc+1}/{SCENES.length}</span>
      </div>
    </div>
    <div className="content"><Comp/></div>
    <div className="nav">
      <button className="btn btn-outline" disabled={sc===0} onClick={()=>setSc(s=>s-1)}>← Anterior</button>
      <div className="dots">{SCENES.map((_,i)=>(<div key={i} className={`dot${sc===i?' active':''}`} onClick={()=>setSc(i)}/>))}</div>
      <button className="btn btn-gold" disabled={sc===SCENES.length-1} onClick={()=>setSc(s=>s+1)}>Siguiente →</button>
    </div>
  </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
