<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=1280"/>
<title>Clase 2.2 — Medición de Caudal</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0}#root{width:1280px;height:720px}</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const BG='#080c18',CARD='#111827',BORDER='#1e3a5f';
const GOLD='#f59e0b',CYAN='#22d3ee',GREEN='#4ade80',RED='#f87171',VIOLET='#a78bfa',ORANGE='#fb923c';

const QUIZ=[
  {q:'La fórmula de caudal volumétrico con placa orificio es Q = K√H. ¿Qué representa H?',opts:['La altura del fluido','La presión diferencial creada por el elemento','La velocidad del fluido','La densidad del fluido'],correct:1},
  {q:'¿Cuál es la exactitud típica de una placa orificio bien instalada?',opts:['±0.1%','±0.5%','±1% a ±2%','±5%'],correct:2},
  {q:'El tubo Venturi tiene una pérdida de carga del orden de:',opts:['50-80% del ΔP','10-20% del ΔP','0% — sin pérdida','100% del ΔP'],correct:1},
  {q:'¿Qué principio físico usa el medidor electromagnético (magnético)?',opts:['Bernoulli','Ley de Faraday — tensión inducida en fluido conductor','Efecto Coriolis','Presión diferencial'],correct:1},
  {q:'¿Para qué fluidos NO sirve el caudalímetro magnético?',opts:['Agua','Lodos','Fluidos no conductores (aceite, hidrocarburos)','Ácidos diluidos'],correct:2},
  {q:'El medidor de vórtex funciona detectando:',opts:['Presión diferencial','Frecuencia de desprendimiento de vórtices (Strouhal)','Campo magnético inducido','Fuerza de Coriolis'],correct:1},
  {q:'El medidor Coriolis mide directamente:',opts:['Caudal volumétrico','Caudal másico y densidad','Velocidad del fluido','Presión diferencial'],correct:1},
  {q:'¿Cuántos diámetros de tubería recta se requieren aguas arriba de una placa orificio (típicamente)?',opts:['2 a 5 D','5 a 10 D','16 a 44 D','100 D'],correct:2},
  {q:'El rotámetro (área variable) mide el caudal por:',opts:['ΔP constante, área variable','Velocidad inducida electromagnéticamente','Frecuencia de vórtices','Fuerza de Coriolis'],correct:0},
  {q:'¿Qué medidor de caudal se recomienda para gases naturales y vapores?',opts:['Magnético','Placa orificio con transmisor DP o vórtex','Rotámetro','Coriolis siempre'],correct:1},
];

function Title({icon,color,title,sub}){return(<div style={{textAlign:'center',marginBottom:4}}><div style={{fontSize:28}}>{icon}</div><div style={{fontSize:30,fontWeight:800,color:'#fff'}}>{title}</div><div style={{fontSize:13,color:'#64748b',marginTop:4}}>{sub}</div><div style={{width:50,height:3,background:color,borderRadius:2,margin:'8px auto 0'}}/></div>);}
function IB({color,title,children}){return(<div style={{background:'#0a1628',border:`1px solid ${color}44`,borderRadius:10,padding:'12px 16px'}}><div style={{fontSize:11,color,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>{title}</div><div style={{fontSize:12,color:'#cbd5e1',lineHeight:1.7}}>{children}</div></div>);}

/* SCENE 1 — INTRO */
function S1(){
  const [tick,setTick]=useState(0);
  useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),600);return()=>clearInterval(id);},[]);
  const meters=[
    {icon:'🔲',name:'Placa Orificio',sub:'ΔP — ISO 5167',c:GOLD},
    {icon:'🌀',name:'Tubo Venturi',sub:'ΔP baja pérdida',c:CYAN},
    {icon:'📊',name:'Rotámetro',sub:'Área variable',c:GREEN},
    {icon:'🧲',name:'Magnético',sub:'Ley Faraday',c:VIOLET},
    {icon:'🌪️',name:'Vórtex',sub:'Strouhal f=K·v',c:ORANGE},
    {icon:'⚖️',name:'Coriolis',sub:'Masa directa',c:RED},
  ];
  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative'}}>
      <div style={{position:'absolute',top:44,textAlign:'center'}}>
        <div style={{fontSize:12,letterSpacing:4,color:GOLD,textTransform:'uppercase',marginBottom:6}}>Módulo 2 · Clase 2.2</div>
        <div style={{fontSize:48,fontWeight:800,color:'#fff',lineHeight:1.1}}>Medición de Caudal</div>
        <div style={{fontSize:16,color:'#94a3b8',marginTop:10}}>Q = K√ΔP · Bernoulli · Faraday · Strouhal · Coriolis</div>
      </div>
      <PipeAnim tick={tick}/>
      <div style={{position:'absolute',bottom:40,display:'flex',gap:16}}>
        {meters.map((m,i)=>(
          <div key={i} style={{background:CARD,border:`1px solid ${m.c}33`,borderRadius:10,padding:'10px 14px',textAlign:'center',minWidth:130}}>
            <div style={{fontSize:22}}>{m.icon}</div>
            <div style={{fontSize:11,fontWeight:700,color:m.c,marginTop:4}}>{m.name}</div>
            <div style={{fontSize:10,color:'#64748b'}}>{m.sub}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
function PipeAnim({tick}){
  const particles=Array.from({length:8},(_,i)=>i);
  return(
    <svg width={900} height={200} style={{marginTop:60}}>
      <rect x={50} y={80} width={800} height={40} rx={5} fill={CARD} stroke='#1e3a5f' strokeWidth={2}/>
      {/* orifice plate */}
      <rect x={440} y={72} width={8} height={56} rx={2} fill={GOLD}/>
      <rect x={440} y={86} width={8} height={28} rx={1} fill={BG}/>
      {/* P1 P2 taps */}
      <line x1={420} y1={100} x2={420} y2={60} stroke={CYAN} strokeWidth={1.5}/>
      <line x1={480} y1={100} x2={480} y2={60} stroke={GREEN} strokeWidth={1.5}/>
      <text x={420} y={55} fill={CYAN} fontSize={11} textAnchor='middle'>P1</text>
      <text x={480} y={55} fill={GREEN} fontSize={11} textAnchor='middle'>P2</text>
      {/* DP arrow */}
      <text x={450} y={48} fill={GOLD} fontSize={10} textAnchor='middle'>ΔP = P1-P2</text>
      {/* particles */}
      {particles.map(i=>{
        const base=(i/8)*800+50;
        const cx=((base+tick*18)%800)+50;
        return <circle key={i} cx={cx} cy={100} r={5} fill={CYAN} opacity={0.7}/>;
      })}
      <text x={450} y={150} fill='#475569' fontSize={12} textAnchor='middle'>Q = K √ΔP</text>
      <text x={450} y={168} fill='#334155' fontSize={10} textAnchor='middle'>Bernoulli: v²/2 + P/ρ + gz = cte</text>
    </svg>
  );
}

/* SCENE 2 — PLACA ORIFICIO */
function S2(){
  const [beta,setBeta]=useState(0.6);
  const [dp,setDp]=useState(100);
  const [rho,setRho]=useState(1000);
  const D=100; // mm
  const d=beta*D;
  const E=1/Math.sqrt(1-Math.pow(beta,4));
  const Cd=0.6;
  const Qv=Cd*E*(Math.PI/4)*Math.pow(d/1000,2)*Math.sqrt(2*dp*100/rho)*3600; // m³/h
  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',padding:'30px 70px'}}>
      <Title icon='🔲' color={GOLD} title='Placa Orificio (Diafragma)' sub='El elemento DP más usado en la industria — ISO 5167'/>
      <div style={{display:'flex',gap:40,marginTop:20,width:'100%',flex:1}}>
        <div style={{flex:1}}>
          <IB color={GOLD} title='Principio'>La placa perforada crea un estrechamiento. La diferencia de presión antes y después (ΔP) es proporcional al <b style={{color:GOLD}}>cuadrado del caudal</b>: <b>Q = K√ΔP</b>. El elemento primario más simple, económico y normalizado.</IB>
          <div style={{marginTop:14,background:'#0a1628',border:`1px solid ${GOLD}33`,borderRadius:8,padding:'12px 14px'}}>
            <div style={{fontSize:11,color:GOLD,fontWeight:700,marginBottom:8}}>FÓRMULA ISO 5167</div>
            <div style={{fontFamily:'monospace',fontSize:13,color:'#e2e8f0',lineHeight:1.8}}>
              Qv = Cd · E · (π/4) · d² · √(2ΔP/ρ)<br/>
              β = d/D (relación de diámetros: 0.2–0.75)<br/>
              E = 1/√(1−β⁴) coef. velocidad acercamiento<br/>
              Cd ≈ 0.6 (coef. descarga)
            </div>
          </div>
          <div style={{marginTop:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[
              {k:'Exactitud',v:'±1% a ±2% del span'},
              {k:'Rangeabilidad',v:'3:1 a 5:1'},
              {k:'Pérdida carga',v:'40-90% del ΔP'},
              {k:'Tramo recto',v:'16-44 D aguas arriba'},
              {k:'Norma',v:'ISO 5167 / ASME MFC-3M'},
              {k:'Fluidos',v:'Líquidos, gases, vapores'},
            ].map((r,i)=>(
              <div key={i} style={{background:CARD,border:`1px solid ${GOLD}33`,borderRadius:8,padding:'8px 10px'}}>
                <div style={{fontSize:10,color:GOLD,fontWeight:700}}>{r.k}</div>
                <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{r.v}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{width:400}}>
          <div style={{background:CARD,border:`2px solid ${GOLD}`,borderRadius:12,padding:20,marginBottom:14}}>
            <div style={{fontSize:12,color:GOLD,fontWeight:700,marginBottom:12,textTransform:'uppercase'}}>Calculadora Interactiva</div>
            {[
              {l:'β = d/D (relación diámetros)',val:beta,set:setBeta,min:0.2,max:0.75,step:0.01},
              {l:'ΔP (mbar)',val:dp,set:setDp,min:10,max:500,step:5},
              {l:'ρ densidad fluido (kg/m³)',val:rho,set:setRho,min:1,max:1500,step:10},
            ].map((f,i)=>(
              <div key={i} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginBottom:4}}>
                  <span>{f.l}</span><span style={{color:GOLD,fontWeight:700}}>{f.val}</span>
                </div>
                <input type='range' min={f.min} max={f.max} step={f.step} value={f.val}
                  onChange={e=>f.set(+e.target.value)} style={{width:'100%',accentColor:GOLD}}/>
              </div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[
              {l:'Diámetro orificio',v:`${d.toFixed(1)} mm`,c:CYAN},
              {l:'Diámetro tubería',v:`${D} mm`,c:'#94a3b8'},
              {l:'E (vel. acercamiento)',v:E.toFixed(4),c:GREEN},
              {l:'Qv calculado',v:`${Qv.toFixed(2)} m³/h`,c:GOLD},
            ].map((r,i)=>(
              <div key={i} style={{background:'#0a1628',border:`1px solid ${r.c}33`,borderRadius:8,padding:'10px',textAlign:'center'}}>
                <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase'}}>{r.l}</div>
                <div style={{fontSize:16,fontWeight:800,color:r.c,marginTop:4}}>{r.v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* SCENE 3 — VENTURI Y TOBERA */
function S3(){
  const [sel,setSel]=useState(0);
  const items=[
    {name:'Tubo Venturi',icon:'🌀',color:CYAN,
     loss:'10-20% del ΔP',acc:'±0.75%',cost:'Alto (×20 placa)',range:'Qv hasta 60% más que placa',
     desc:'Convergente + garganta cilíndrica + divergente. La recuperación de presión es excelente porque el divergente convierte energía cinética en presión. Ideal para fluidos con sólidos en suspensión.',
     pros:['Mínima pérdida de carga','Alta exactitud (±0.75%)','Permite sólidos en suspensión','Larga vida útil'],
     cons:['Alto costo de fabricación','Mayor longitud de instalación']},
    {name:'Tobera',icon:'🔧',color:GREEN,
     loss:'30-40% del ΔP',acc:'±1%',cost:'Medio',range:'Gases y vapores a alta velocidad',
     desc:'Similar al Venturi pero sin divergente. Mejor que la placa orificio en fluidos de alta velocidad. Perfil redondeado reduce la contracción de la vena fluida.',
     pros:['Mejor que placa en gas/vapor','Más robusta que placa orificio','Menor contracción de vena'],
     cons:['Pérdida de carga mayor que Venturi','Costo mayor que placa']},
    {name:'Cono en V / Cuña',icon:'🔺',color:ORANGE,
     loss:'Variable según β',acc:'±0.5%',cost:'Medio-alto',range:'Fluidos viscosos, lodos, corrosivos',
     desc:'Elementos para fluidos difíciles. El cono en V centra el perfil de velocidades reduciendo la longitud de tramo recto requerida. La cuña funciona bien con fluidos sucios.',
     pros:['Excelente para fluidos viscosos','Solo 0-3D tramo recto','Alta rangeabilidad 10:1'],
     cons:['Menor normalización ISO','Calibración específica por modelo']},
  ];
  const it=items[sel];
  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',padding:'30px 70px'}}>
      <Title icon='🌀' color={CYAN} title='Venturi, Tobera y Variantes' sub='Elementos de presión diferencial de alta exactitud'/>
      <div style={{display:'flex',gap:10,marginTop:16}}>
        {items.map((it,i)=>(
          <button key={i} onClick={()=>setSel(i)}
            style={{padding:'8px 20px',borderRadius:20,border:`2px solid ${it.color}`,
              background:sel===i?it.color:'transparent',color:sel===i?BG:it.color,
              fontWeight:700,fontSize:12,cursor:'pointer'}}>
            {it.icon} {it.name}
          </button>
        ))}
      </div>
      <div style={{display:'flex',gap:36,marginTop:18,width:'100%',flex:1}}>
        <div style={{flex:1}}>
          <div style={{background:CARD,border:`2px solid ${it.color}`,borderRadius:12,padding:20,marginBottom:14,animation:'fadeIn 0.2s'}}>
            <div style={{fontSize:18,fontWeight:800,color:it.color,marginBottom:10}}>{it.icon} {it.name}</div>
            <div style={{fontSize:13,color:'#cbd5e1',lineHeight:1.7,marginBottom:12}}>{it.desc}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[{k:'Pérdida carga',v:it.loss},{k:'Exactitud',v:it.acc},{k:'Costo relativo',v:it.cost},{k:'Aplicación',v:it.range}].map((r,i)=>(
                <div key={i} style={{background:'#0a1628',borderRadius:6,padding:'8px 10px'}}>
                  <div style={{fontSize:10,color:'#64748b'}}>{r.k}</div>
                  <div style={{fontSize:12,fontWeight:700,color:it.color}}>{r.v}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:12}}>
            <div style={{flex:1,background:CARD,border:`1px solid ${GREEN}33`,borderRadius:8,padding:'12px 14px'}}>
              <div style={{fontSize:11,color:GREEN,fontWeight:700,marginBottom:6}}>✅ Ventajas</div>
              {it.pros.map((p,i)=><div key={i} style={{fontSize:11,color:'#cbd5e1',paddingLeft:8,borderLeft:`2px solid ${GREEN}`,marginBottom:4}}>{p}</div>)}
            </div>
            <div style={{flex:1,background:CARD,border:`1px solid ${RED}33`,borderRadius:8,padding:'12px 14px'}}>
              <div style={{fontSize:11,color:RED,fontWeight:700,marginBottom:6}}>⚠️ Desventajas</div>
              {it.cons.map((c,i)=><div key={i} style={{fontSize:11,color:'#cbd5e1',paddingLeft:8,borderLeft:`2px solid ${RED}`,marginBottom:4}}>{c}</div>)}
            </div>
          </div>
        </div>
        <div style={{width:340}}>
          <VenturiDiagram sel={sel} color={it.color}/>
          <div style={{marginTop:12,background:'#0a1628',border:`1px solid ${BORDER}`,borderRadius:8,padding:'12px 14px'}}>
            <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:8}}>COMPARATIVA PÉRDIDA DE CARGA</div>
            {[
              {n:'Placa orificio',loss:70,c:GOLD},
              {n:'Tobera',loss:38,c:GREEN},
              {n:'Tubo Venturi',loss:15,c:CYAN},
            ].map((r,i)=>(
              <div key={i} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginBottom:3}}>
                  <span>{r.n}</span><span style={{color:r.c}}>{r.loss}%</span>
                </div>
                <div style={{height:6,background:'#1e3a5f',borderRadius:3}}>
                  <div style={{height:6,borderRadius:3,background:r.c,width:`${r.loss}%`}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}}`}</style>
    </div>
  );
}
function VenturiDiagram({sel,color}){
  const paths=[
    // Venturi
    'M 20,80 L 100,80 Q 140,80 160,95 L 190,95 Q 210,95 230,80 L 320,80 L 320,120 L 230,120 Q 210,120 190,105 L 160,105 Q 140,120 100,120 L 20,120 Z',
    // Nozzle
    'M 20,80 L 100,80 Q 140,80 165,95 L 165,105 Q 140,120 100,120 L 20,120 Z',
    // Cone in V
    'M 20,80 L 320,80 L 320,120 L 20,120 Z',
  ];
  return(
    <div style={{background:CARD,border:`2px solid ${color}`,borderRadius:12,padding:16}}>
      <svg width={320} height={160}>
        <path d={paths[sel]} fill={`${color}22`} stroke={color} strokeWidth={2}/>
        {sel===2&&<polygon points='170,85 170,115 220,100' fill={color} opacity={0.6}/>}
        <text x={170} y={148} fill='#64748b' fontSize={10} textAnchor='middle'>
          {['Perfil Venturi','Tobera sin divergente','Cono en V centrado'][sel]}
        </text>
        {/* flow arrows */}
        {[50,90,130].map((x,i)=>(
          <line key={i} x1={x} y1={100} x2={x+25} y2={100} stroke={color} strokeWidth={1.5} markerEnd='url(#arr)'/>
        ))}
        <defs><marker id='arr' markerWidth='5' markerHeight='5' refX='2.5' refY='2.5' orient='auto'><path d='M0,0 L5,2.5 L0,5z' fill={color}/></marker></defs>
      </svg>
    </div>
  );
}

/* SCENE 4 — ROTÁMETRO */
function S4(){
  const [pct,setPct]=useState(50);
  const h=(pct/100)*200; // float height px
  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',padding:'30px 70px'}}>
      <Title icon='📊' color={GREEN} title='Rotámetro — Área Variable' sub='ΔP constante, área de paso variable — caudal proporcional a la posición del flotador'/>
      <div style={{display:'flex',gap:48,marginTop:20,width:'100%',flex:1,alignItems:'flex-start'}}>
        <div style={{flex:1}}>
          <IB color={GREEN} title='Principio'>Tubo cónico vertical con un flotador libre. El fluido sube por el tubo y el flotador se eleva hasta que el área anular entre flotador y tubo es suficiente para que <b>ΔP = peso flotador / área</b>. La posición del flotador indica el caudal.</IB>
          <div style={{marginTop:14,background:'#0a1628',border:`1px solid ${GREEN}33`,borderRadius:8,padding:'12px 14px'}}>
            <div style={{fontSize:11,color:GREEN,fontWeight:700,marginBottom:6}}>ECUACIÓN DE EQUILIBRIO</div>
            <div style={{fontFamily:'monospace',fontSize:13,color:'#e2e8f0',lineHeight:1.8}}>
              ΔP · A_anular = (ρ_flot − ρ_fluid) · V_flot · g<br/>
              Q = Cd · A_anular · √(2ΔP/ρ_fluid)<br/>
              A_anular aumenta con la posición del flotador
            </div>
          </div>
          <div style={{marginTop:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[
              {k:'Exactitud',v:'±1% a ±2% del fondo de escala'},
              {k:'Rangeabilidad',v:'10:1 hasta 20:1'},
              {k:'Pérdida de carga',v:'Constante — peso flotador/área'},
              {k:'Material tubo',v:'Vidrio, acrílico, acero inox, PVC'},
              {k:'Fluidos',v:'Líquidos y gases limpios'},
              {k:'Conexión',v:'Local — no requiere energía'},
            ].map((r,i)=>(
              <div key={i} style={{background:CARD,border:`1px solid ${GREEN}33`,borderRadius:8,padding:'8px 10px'}}>
                <div style={{fontSize:10,color:GREEN,fontWeight:700}}>{r.k}</div>
                <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{r.v}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{width:380,display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
          {/* Rotameter visual */}
          <div style={{background:CARD,border:`2px solid ${GREEN}`,borderRadius:12,padding:16,width:280,display:'flex',justifyContent:'center'}}>
            <svg width={100} height={260}>
              {/* tapered tube */}
              <path d='M 30,10 L 20,240 L 80,240 L 70,10 Z' fill={`${GREEN}11`} stroke={GREEN} strokeWidth={2}/>
              {/* fluid fill */}
              <path d={`M ${30+(260-h)*10/260},${260-h} L 20,240 L 80,240 L ${70-(260-h)*10/260},${260-h} Z`}
                fill={`${CYAN}33`} style={{transition:'all 0.1s'}}/>
              {/* float */}
              <ellipse cx={50} cy={260-h} rx={14} ry={8} fill={GREEN} opacity={0.9} style={{transition:'cy 0.1s'}}/>
              {/* scale */}
              {[0,25,50,75,100].map(p=>(
                <g key={p}>
                  <line x1={82} y1={240-p*2} x2={90} y2={240-p*2} stroke='#334155' strokeWidth={1}/>
                  <text x={95} y={244-p*2} fill='#64748b' fontSize={8}>{p}%</text>
                </g>
              ))}
              {/* flow arrows */}
              <line x1={50} y1={255} x2={50} y2={245} stroke={CYAN} strokeWidth={2}/>
              <text x={50} y={258} fill={CYAN} fontSize={8} textAnchor='middle'>Q↑</text>
            </svg>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,width:'100%'}}>

/* SCENE 5 — MAGNÉTICO */

    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',padding:'30px 70px'}}>

        <div style={{flex:1}}>
          <IB color={VIOLET} title='Ley de Faraday'>Al mover un conductor (fluido) a través de un campo magnético B, se induce una FEM proporcional a la velocidad: <b style={{color:VIOLET}}>E = B · D · v</b>. Los electrodos en la pared detectan esta tensión de milivoltios.</IB>

/* SCENE 8 — TEST */
function S8(){
  const [idx,setIdx]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const q=QUIZ[idx];
  const pick=(i)=>{
    if(chosen!==null)return;
    setChosen(i);
    if(i===q.correct)setScore(s=>s+1);
    setTimeout(()=>{if(idx+1<QUIZ.length){setIdx(i=>i+1);setChosen(null);}else setDone(true);},1400);
  };
  if(done){
    const pct=Math.round(score/QUIZ.length*100);
    return(<div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}}>
      <div style={{fontSize:72}}>{pct>=90?'🥇':pct>=70?'🥈':pct>=50?'🥉':'📚'}</div>
      <div style={{fontSize:42,fontWeight:800,color:'#fff'}}>{score}/{QUIZ.length}</div>
      <div style={{fontSize:22,color:GOLD}}>{pct}% correcto</div>
      <button onClick={()=>{setIdx(0);setChosen(null);setScore(0);setDone(false);}}
        style={{marginTop:16,padding:'12px 32px',borderRadius:24,background:GOLD,color:BG,fontWeight:800,fontSize:15,border:'none',cursor:'pointer'}}>
        Repetir Test
      </button>
    </div>);
  }
  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 120px',gap:20}}>
      <div style={{fontSize:13,color:GOLD,letterSpacing:3,textTransform:'uppercase'}}>Evaluación · Clase 2.2</div>
      <div style={{width:'100%',height:6,background:'#1e3a5f',borderRadius:3}}>
        <div style={{height:6,borderRadius:3,background:GOLD,width:`${(idx/QUIZ.length)*100}%`,transition:'width 0.4s'}}/>
      </div>
      <div style={{fontSize:11,color:'#475569',alignSelf:'flex-end'}}>{idx+1}/{QUIZ.length}</div>
      <div style={{fontSize:20,fontWeight:700,color:'#fff',textAlign:'center',lineHeight:1.5,maxWidth:820}}>{q.q}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,width:'100%',maxWidth:820}}>
        {q.opts.map((o,i)=>{
          let bg=CARD,border=BORDER,color='#cbd5e1';
          if(chosen!==null){if(i===q.correct){bg='#14532d';border=GREEN;color=GREEN;}else if(i===chosen){bg='#450a0a';border=RED;color=RED;}}
          return(<div key={i} onClick={()=>pick(i)} style={{background:bg,border:`2px solid ${border}`,borderRadius:10,padding:'14px 18px',cursor:chosen===null?'pointer':'default',color,fontSize:13,transition:'all 0.2s'}}>
            <span style={{color:GOLD,fontWeight:800,marginRight:8}}>{['A','B','C','D'][i]}.</span>{o}
          </div>);
        })}
      </div>
      <div style={{fontSize:12,color:'#475569'}}>Puntuación: {score} pts</div>
    </div>
  );
}

          {SCENES.map((s,i)=>(
            <button key={i} onClick={()=>setScene(i)}
              style={{padding:'4px 10px',borderRadius:6,fontSize:10,background:scene===i?GOLD:'transparent',color:scene===i?BG:'#64748b',border:`1px solid ${scene===i?GOLD:BORDER}`,cursor:'pointer',fontWeight:scene===i?700:400,whiteSpace:'nowrap'}}>
              {i+1}. {s.label}
            </button>
          ))}
        </div>
        <button onClick={()=>setScene(s=>Math.min(SCENES.length-1,s+1))} disabled={scene===SCENES.length-1}
          style={{padding:'5px 14px',borderRadius:6,background:scene===SCENES.length-1?'#1e3a5f':GOLD,color:scene===SCENES.length-1?'#475569':BG,border:'none',cursor:scene===SCENES.length-1?'default':'pointer',fontWeight:700,fontSize:12}}>Siguiente →</button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
