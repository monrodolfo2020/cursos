<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>Clase 2.4 — Medición de Temperatura</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080c18;color:#e2e8f0;font-family:'Segoe UI',sans-serif;width:1280px;height:720px;overflow:hidden}
  .gold{color:#f59e0b}
  .slide{width:1280px;height:720px;position:relative;display:flex;flex-direction:column}
  .hdr{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-bottom:3px solid #f59e0b;padding:18px 48px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .hdr-title{font-size:22px;font-weight:700;color:#f59e0b}
  .hdr-sub{font-size:13px;color:#94a3b8}
  .badge{background:#f59e0b22;border:1px solid #f59e0b55;color:#f59e0b;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .content{flex:1;overflow:hidden;padding:28px 48px}
  .nav{display:flex;gap:12px;justify-content:center;padding:14px;background:#0a0f1e;border-top:1px solid #1e293b;flex-shrink:0}
  .btn{padding:10px 28px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
  .btn-gold{background:#f59e0b;color:#000}
  .btn-gold:hover{background:#fbbf24}
  .btn-outline{background:transparent;border:1px solid #334155;color:#94a3b8}
  .btn-outline:hover{border-color:#f59e0b;color:#f59e0b}
  .dots{display:flex;gap:8px;align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;background:#1e293b;transition:all .3s;cursor:pointer}
  .dot.active{background:#f59e0b;width:24px;border-radius:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;height:100%}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:18px}
  .card-gold{border-color:#f59e0b44;background:#f59e0b08}
  .card h3{color:#f59e0b;font-size:15px;margin-bottom:10px}
  .formula{background:#020817;border:1px solid #f59e0b44;border-radius:8px;padding:12px 18px;font-family:monospace;font-size:16px;color:#fbbf24;text-align:center;margin:8px 0}
  .tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;margin:3px}
  .tag-blue{background:#1e40af33;color:#60a5fa;border:1px solid #1e40af55}
  .tag-green{background:#15803d33;color:#4ade80;border:1px solid #15803d55}
  .tag-red{background:#991b1b33;color:#f87171;border:1px solid #991b1b55}
  .tag-yellow{background:#f59e0b22;color:#fbbf24;border:1px solid #f59e0b44}
  .tag-purple{background:#6d28d955;color:#c084fc;border:1px solid #6d28d955}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#0a0f1e;color:#f59e0b;padding:8px 12px;text-align:left;border-bottom:2px solid #f59e0b44}
  td{padding:7px 12px;border-bottom:1px solid #1e293b;color:#cbd5e1}
  tr:hover td{background:#0f172a}
  .slider-row{display:flex;align-items:center;gap:12px;margin:8px 0}
  .slider-row label{width:160px;font-size:12px;color:#94a3b8}
  .slider-row input[type=range]{flex:1;accent-color:#f59e0b}
  .slider-row span{width:80px;text-align:right;font-size:13px;color:#fbbf24;font-weight:600}
  .result-box{background:#020817;border:2px solid #f59e0b;border-radius:10px;padding:14px;text-align:center;margin-top:10px}
  .result-big{font-size:28px;font-weight:700;color:#f59e0b}
  .result-label{font-size:12px;color:#64748b;margin-top:2px}
  .tab-bar{display:flex;gap:4px;margin-bottom:16px}
  .tab{padding:7px 18px;border-radius:6px 6px 0 0;border:1px solid #1e293b;border-bottom:none;cursor:pointer;font-size:13px;font-weight:600;background:#0a0f1e;color:#64748b;transition:all .2s}
  .tab.active{background:#0f172a;color:#f59e0b;border-color:#f59e0b44}
  .progress{height:6px;background:#1e293b;border-radius:3px;overflow:hidden;margin-top:6px}
  .progress-bar{height:100%;background:#f59e0b;border-radius:3px;transition:width .4s}
  .quiz-opt{display:block;width:100%;text-align:left;padding:10px 16px;border-radius:8px;border:1px solid #1e293b;background:#0a0f1e;color:#cbd5e1;cursor:pointer;margin-bottom:8px;font-size:13px;transition:all .2s}
  .quiz-opt:hover{border-color:#f59e0b;color:#fbbf24}
  .quiz-opt.correct{border-color:#4ade80;background:#15803d22;color:#4ade80}
  .quiz-opt.wrong{border-color:#f87171;background:#991b1b22;color:#f87171}
  svg text{font-family:'Segoe UI',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

/* ─── ESCENAS ─────────────────────────────────────────────────────── */

function Scene1(){
  const [temp,setTemp]=useState(25);
  const r_ohm=(100*(1+0.00385*temp)).toFixed(2);
  const mA=(4+(temp-0)/(400)*16).toFixed(2);
  const pct=((temp+50)/(400+50)*100).toFixed(0);

  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:18}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
      <div className="card card-gold">
        <h3>🌡️ La Variable más medida</h3>
        <p style={{fontSize:13,color:'#94a3b8',lineHeight:1.6}}>
          La temperatura es la variable de proceso más medida en la industria. Afecta propiedades físicas,
          químicas, velocidades de reacción, viscosidades y condiciones de seguridad.
        </p>
        <div style={{marginTop:12,display:'flex',flexWrap:'wrap',gap:6}}>
          {['Petroquímica','Alimentos','Farmacia','Metalurgia','Energía'].map(s=>(
            <span key={s} className="tag tag-yellow">{s}</span>
          ))}
        </div>
      </div>
      <div className="card">
        <h3>📐 Escalas de temperatura</h3>
        <table><tbody>
          <tr><td>Celsius (°C)</td><td style={{color:'#60a5fa'}}>Referencia agua 0–100°C</td></tr>
          <tr><td>Kelvin (K)</td><td style={{color:'#4ade80'}}>T(K) = T(°C) + 273.15</td></tr>
          <tr><td>Fahrenheit (°F)</td><td style={{color:'#f87171'}}>T(°F) = T(°C)×9/5+32</td></tr>
          <tr><td>Rankine (°R)</td><td style={{color:'#c084fc'}}>T(°R) = T(K)×9/5</td></tr>
        </tbody></table>
      </div>
      <div className="card">
        <h3>⚙️ Principios físicos</h3>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.8}}>
          <div><span className="tag tag-blue">Resistivo</span> R varía con T (RTD, termistor)</div>
          <div><span className="tag tag-green">Termoeléctrico</span> FEM por unión de metales</div>
          <div><span className="tag tag-red">Radiación</span> Energía IR emitida</div>
          <div><span className="tag tag-yellow">Expansión</span> Bimetálico, líquido en tubo</div>
          <div><span className="tag tag-purple">Óptico</span> Interferometría, fluorescencia</div>
        </div>
      </div>
    </div>
    <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:12,padding:18}}>
      <div style={{marginBottom:10,fontSize:14,fontWeight:600,color:'#f59e0b'}}>⚡ Simulador RTD Pt100 — Ley de Callendar-Van Dusen simplificada</div>
      <div className="slider-row">
        <label>Temperatura (°C)</label>
        <input type="range" min={-50} max={400} value={temp} onChange={e=>setTemp(+e.target.value)}/>
        <span>{temp} °C</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginTop:12}}>
        <div className="result-box">
          <div className="result-big">{r_ohm} Ω</div>
          <div className="result-label">Resistencia Pt100 (R = 100·(1 + α·T))</div>
        </div>
        <div className="result-box" style={{borderColor:'#60a5fa'}}>
          <div className="result-big" style={{color:'#60a5fa'}}>{mA} mA</div>
          <div className="result-label">Señal 4-20 mA (span -50…400 °C)</div>
        </div>
        <div className="result-box" style={{borderColor:'#4ade80'}}>
          <div className="result-big" style={{color:'#4ade80'}}>{pct} %</div>
          <div className="result-label">Porcentaje de rango</div>
        </div>
      </div>
    </div>
  </div>
  );
}

function Scene2(){
  const [tab,setTab]=useState('pt100');
  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div className="tab-bar">
      {[['pt100','RTD Pt100'],['pt1000','Pt1000'],['ni100','Ni100'],['cu10','Cu10']].map(([k,l])=>(
        <div key={k} className={`tab${tab===k?' active':''}`} onClick={()=>setTab(k)}>{l}</div>
      ))}
    </div>
    <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
      {tab==='pt100'&&<>
        <div className="card card-gold">
          <h3>🔬 RTD Pt100 — Platino</h3>
          <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.7}}>
            <p>El RTD (<em>Resistance Temperature Detector</em>) de platino es el sensor de temperatura
            más preciso y estable de la industria. A 0 °C tiene exactamente <strong style={{color:'#fbbf24'}}>100 Ω</strong>.</p>
            <br/>
            <p><strong style={{color:'#f59e0b'}}>Coeficiente α = 0,00385 Ω/Ω/°C</strong> (norma IEC 60751)</p>
            <br/>
            <p>Rango: <strong style={{color:'#fbbf24'}}>-200 °C a +850 °C</strong></p>
            <p>Exactitud típica: <strong style={{color:'#4ade80'}}>±0,1 °C clase A / ±0,3 °C clase B</strong></p>
          </div>
        </div>
        <div className="card">
          <h3>📊 Tabla de resistencias Pt100</h3>
          <table><thead><tr><th>T (°C)</th><th>R (Ω)</th><th>Δ vs 0°C</th></tr></thead>
          <tbody>
            {[[-200,18.52],[-100,60.26],[0,100],[100,138.51],[200,175.86],[300,212.05],[400,247.09],[500,280.98],[600,313.71],[850,390.48]].map(([t,r])=>(
              <tr key={t}><td>{t}</td><td style={{color:'#fbbf24'}}>{r}</td><td style={{color:t>=0?'#4ade80':'#f87171'}}>{(r-100).toFixed(2)}</td></tr>
            ))}
          </tbody></table>
        </div>
      </>}
      {tab==='pt1000'&&<>
        <div className="card card-gold">
          <h3>🔬 RTD Pt1000</h3>
          <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.7}}>
            <p>Mismo platino, pero bobinado con mayor resistencia nominal: <strong style={{color:'#fbbf24'}}>1000 Ω a 0 °C</strong>.</p><br/>
            <p><strong>Ventaja:</strong> Mayor señal de salida → menos sensible a ruido e impedancia de cable.</p><br/>
            <p><strong>Uso típico:</strong> HVAC, climatización, refrigeración industrial donde el cable puede ser largo.</p><br/>
            <p>α = 0,00385 Ω/Ω/°C (mismo que Pt100)</p><br/>
            <p>R(T) = 1000 × (1 + 0,00385 × T)</p>
          </div>
        </div>
        <div className="card">
          <h3>⚖️ Pt100 vs Pt1000</h3>
          <table><thead><tr><th>Parámetro</th><th>Pt100</th><th>Pt1000</th></tr></thead>
          <tbody>
            <tr><td>R a 0°C</td><td>100 Ω</td><td>1000 Ω</td></tr>
            <tr><td>ΔR por °C</td><td>0,385 Ω</td><td>3,85 Ω</td></tr>
            <tr><td>Error cable</td><td>Mayor</td><td><span className="tag tag-green">Menor</span></td></tr>
            <tr><td>Resolución ADC</td><td>Estándar</td><td><span className="tag tag-green">Mayor</span></td></tr>
            <tr><td>Aplicación</td><td>Proceso industrial</td><td>HVAC, Lab</td></tr>
          </tbody></table>
        </div>
      </>}
      {tab==='ni100'&&<>
        <div className="card card-gold">
          <h3>🔬 RTD Ni100 — Níquel</h3>
          <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.7}}>
            <p>Sensor de níquel: <strong style={{color:'#fbbf24'}}>100 Ω a 0 °C</strong>.</p><br/>
            <p><strong style={{color:'#f59e0b'}}>α = 0,00617 Ω/Ω/°C</strong> — mayor sensibilidad que platino.</p><br/>
            <p><strong>Rango:</strong> -60 °C a +180 °C (más limitado que Pt)</p><br/>
            <p><strong>Ventaja:</strong> Mayor ΔR/°C → mejor resolución en rangos cortos.</p><br/>
            <p><strong>Desventaja:</strong> Menos lineal, rango reducido, menor estabilidad.</p><br/>
            <p><strong>Uso típico:</strong> Climatización, industria de proceso ligero.</p>
          </div>
        </div>
        <div className="card">
          <h3>📐 Comparativa de sensibilidad</h3>
          {[['Pt100','0.385 Ω/°C','#60a5fa',38],['Pt1000','3.85 Ω/°C','#f59e0b',100],['Ni100','0.617 Ω/°C','#4ade80',62],['Cu10','0.043 Ω/°C','#f87171',10]].map(([n,v,c,w])=>(
            <div key={n} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                <span style={{color:'#cbd5e1'}}>{n}</span><span style={{color:c}}>{v}</span>
              </div>
              <div className="progress"><div className="progress-bar" style={{width:w+'%',background:c}}/></div>
            </div>
          ))}
        </div>
      </>}
      {tab==='cu10'&&<>
        <div className="card card-gold">
          <h3>🔬 Cu10 — Cobre</h3>
          <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.7}}>
            <p>Sensor de cobre con <strong style={{color:'#fbbf24'}}>10 Ω a 0 °C</strong>.</p><br/>
            <p><strong style={{color:'#f59e0b'}}>α = 0,00427 Ω/Ω/°C</strong></p><br/>
            <p><strong>Rango:</strong> -50 °C a +150 °C</p><br/>
            <p><strong>Ventaja:</strong> Muy lineal en su rango, bajo costo.</p><br/>
            <p><strong>Desventaja:</strong> Baja resistencia → muy sensible a resistencia de cable. Requiere conexión 3 ó 4 hilos.</p><br/>
            <p><strong>Uso histórico:</strong> Devanados de motores, transformadores. Hoy reemplazado por Pt100.</p>
          </div>
        </div>
        <div className="card">
          <h3>🔌 Configuraciones de conexión RTD</h3>
          <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.8}}>
            <div style={{marginBottom:10,padding:8,background:'#020817',borderRadius:6}}>
              <span className="tag tag-red">2 hilos</span> Error de cable incluido. Solo rangos cortos o cables &lt;3m. Error típico: 0,5–2°C.
            </div>
            <div style={{marginBottom:10,padding:8,background:'#020817',borderRadius:6}}>
              <span className="tag tag-yellow">3 hilos</span> Compensa resistencia de cable (un hilo adicional de referencia). Estándar industrial.
            </div>
            <div style={{padding:8,background:'#020817',borderRadius:6}}>
              <span className="tag tag-green">4 hilos</span> Eliminación total del efecto del cable. Laboratorio y alta precisión.
            </div>
          </div>
        </div>
      </>}
    </div>
  </div>
  );
}

function Scene3(){
  const tipos=[
    {name:'J',mat:'Hierro/Constantán',rango:'-40 a 750°C',sens:'52 µV/°C',color:'#60a5fa',uso:'Ambientes reductores',nota:'Hierro se oxida >500°C'},
    {name:'K',mat:'Cromega/Alumel',rango:'-200 a 1260°C',sens:'41 µV/°C',color:'#f59e0b',uso:'Uso general industrial',nota:'Más popular del mundo'},
    {name:'T',mat:'Cobre/Constantán',rango:'-200 a 350°C',sens:'43 µV/°C',color:'#4ade80',uso:'Criógenica y alimentos',nota:'Muy estable y lineal'},
    {name:'E',mat:'Cromega/Constantán',rango:'-200 a 900°C',sens:'68 µV/°C',color:'#c084fc',uso:'Mayor sensibilidad',nota:'Mejor para bajas T'},
    {name:'R',mat:'Pt87Rh13/Platino',rango:'0 a 1600°C',sens:'10 µV/°C',color:'#f87171',uso:'Altas temperaturas',nota:'Laboratorio / patrón'},
    {name:'S',mat:'Pt90Rh10/Platino',rango:'0 a 1600°C',sens:'10 µV/°C',color:'#fb923c',uso:'Horno fundición',nota:'Punto fijo del oro'},
  ];
  const [sel,setSel]=useState('K');
  const t=tipos.find(x=>x.name===sel);

  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:16}}>
    <div className="card card-gold" style={{padding:14}}>
      <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.5}}>
        <strong style={{color:'#f59e0b'}}>Efecto Seebeck (1821): </strong>
        Al unir dos metales distintos y calentar la unión, se genera una FEM proporcional a la temperatura.
        <span className="tag tag-yellow" style={{marginLeft:8}}>E = α·ΔT</span>
        donde α es el coeficiente termoeléctrico (µV/°C).
        Requiere <strong style={{color:'#fbbf24'}}>compensación de junta fría</strong> (junta de referencia a temperatura conocida).
      </div>
    </div>
    <div style={{flex:1,display:'grid',gridTemplateColumns:'2fr 1fr',gap:16}}>
      <div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {tipos.map(x=>(
            <button key={x.name} onClick={()=>setSel(x.name)}
              style={{padding:'6px 14px',borderRadius:6,border:`2px solid ${sel===x.name?x.color:'#1e293b'}`,
                background:sel===x.name?x.color+'22':'#0a0f1e',color:sel===x.name?x.color:'#64748b',cursor:'pointer',fontWeight:700,fontSize:13}}>
              Tipo {x.name}
            </button>
          ))}
        </div>
        <div className="card" style={{borderColor:t.color+'55',background:t.color+'08'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
            <div><span style={{color:'#64748b'}}>Materiales:</span><br/><strong style={{color:t.color}}>{t.mat}</strong></div>
            <div><span style={{color:'#64748b'}}>Rango:</span><br/><strong style={{color:'#fbbf24'}}>{t.rango}</strong></div>
            <div><span style={{color:'#64748b'}}>Sensibilidad:</span><br/><strong style={{color:t.color}}>{t.sens}</strong></div>
            <div><span style={{color:'#64748b'}}>Uso típico:</span><br/><strong style={{color:'#cbd5e1'}}>{t.uso}</strong></div>
            <div style={{gridColumn:'1/-1',background:'#020817',padding:8,borderRadius:6}}>
              <span style={{color:'#64748b'}}>Nota: </span><span style={{color:'#94a3b8'}}>{t.nota}</span>
            </div>
          </div>
        </div>
        <div className="card" style={{marginTop:12}}>
          <h3>⚠️ Leyes fundamentales</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,fontSize:12,color:'#94a3b8'}}>
            <div style={{background:'#020817',padding:8,borderRadius:6}}>
              <strong style={{color:'#f59e0b'}}>Ley de circuito homogéneo:</strong><br/>
              Un termopar de metal uniforme no genera FEM aunque haya gradiente de T.
            </div>
            <div style={{background:'#020817',padding:8,borderRadius:6}}>
              <strong style={{color:'#60a5fa'}}>Ley del metal intermedio:</strong><br/>
              Un tercer metal en el circuito no afecta la FEM si sus dos uniones están a la misma T.
            </div>
          </div>
        </div>
      </div>
      <div className="card">
        <h3>🌡️ Compensación junta fría</h3>
        <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.7}}>
          <p>El instrumento mide:</p>
          <div className="formula" style={{fontSize:14}}>E_total = E_hot - E_cold</div>
          <p>Para obtener T_proceso necesitamos conocer T de la junta fría:</p>
          <br/>
          <div style={{background:'#020817',padding:8,borderRadius:6,marginBottom:8}}>
            <strong style={{color:'#60a5fa'}}>Compensación electrónica:</strong><br/>
            Sensor interno (NTC/Pt100) en el terminal del transmisor mide T ambiente y suma la corrección.
          </div>
          <div style={{background:'#020817',padding:8,borderRadius:6,marginBottom:8}}>
            <strong style={{color:'#4ade80'}}>Cable de extensión:</strong><br/>
            Cables con el mismo coeficiente termoeléctrico que llevan la junta fría al instrumento.
          </div>
          <div style={{background:'#020817',padding:8,borderRadius:6}}>
            <strong style={{color:'#f59e0b'}}>Baño de hielo (lab):</strong><br/>
            Junta de referencia en mezcla agua/hielo a 0 °C exacto. Patrón de calibración.
          </div>
        </div>
      </div>
    </div>
  </div>
  );
}

function Scene4(){
  const [R0,setR0]=useState(10000);
  const [B,setB]=useState(3977);
  const [T,setT]=useState(25);
  const T_K=T+273.15;
  const Rt=(R0*Math.exp(B*(1/T_K - 1/298.15))).toFixed(0);

  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:16}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card card-gold">
        <h3>🔬 Termistores NTC</h3>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.6}}>
          <p><em>Negative Temperature Coefficient</em>: resistencia <strong style={{color:'#f87171'}}>disminuye</strong> al aumentar la temperatura.</p>
          <br/>
          <div className="formula">R(T) = R₀ · e^(B·(1/T - 1/T₀))</div>
          <br/>
          <p>Materiales: óxidos de metales (Mn, Ni, Co, Cu, Fe) sinterizados.</p>
          <br/>
          <p><strong>Sensibilidad:</strong> muy alta (10x mayor que Pt100) en rango estrecho.</p>
          <br/>
          <p><strong>Rango típico:</strong> -50 °C a +150 °C</p>
          <p><strong>Exactitud:</strong> ±0,1 °C con calibración individual</p>
          <p><strong>Aplicaciones:</strong> medicinal, HVAC, electrónica, automóvil</p>
        </div>
      </div>

        <div className="slider-row">
          <label>Constante B (K)</label>
          <input type="range" min={2000} max={6000} step={50} value={B} onChange={e=>setB(+e.target.value)}/>

        </div>

          <label>Temperatura (°C)</label>
          <input type="range" min={-50} max={150} value={T} onChange={e=>setT(+e.target.value)}/>
          <span>{T} °C</span>
        </div>
        <div className="result-box">
          <div className="result-big">{Rt} Ω</div>
          <div className="result-label">Resistencia NTC a {T}°C</div>
        </div>
        <div style={{marginTop:8,fontSize:11,color:'#475569',textAlign:'center'}}>
          R = {(R0/1000).toFixed(0)}k · e^({B}·(1/{T_K.toFixed(1)} - 1/298.15))
        </div>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card">
        <h3>🔴 Termistores PTC</h3>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.6}}>
          <p><em>Positive Temperature Coefficient</em>: resistencia <strong style={{color:'#4ade80'}}>aumenta</strong> con la temperatura.</p>
          <br/>
          <p>Dos tipos principales:</p>
          <div style={{background:'#020817',padding:8,borderRadius:6,marginBottom:8,marginTop:4}}>
            <strong style={{color:'#60a5fa'}}>PTC Silistor:</strong> semiconductor de silicio. Respuesta lineal. Rango -60°C a +150°C. Para medición.
          </div>
          <div style={{background:'#020817',padding:8,borderRadius:6}}>
            <strong style={{color:'#f59e0b'}}>PTC Switching:</strong> cerámica de titanato de bario (BaTiO₃). Resistencia salta varios órdenes en temperatura de Curie (~120°C). Para <strong>protección de motores</strong>.
          </div>
        </div>
      </div>
      <div className="card">
        <h3>⚖️ Comparativa de sensores resistivos</h3>
        <table><thead><tr><th>Sensor</th><th>Sensibilidad</th><th>Rango</th><th>Uso</th></tr></thead>
        <tbody>
          <tr><td style={{color:'#60a5fa'}}>Pt100</td><td>0.385 Ω/°C</td><td>-200→850°C</td><td>Proceso</td></tr>
          <tr><td style={{color:'#4ade80'}}>Pt1000</td><td>3.85 Ω/°C</td><td>-200→850°C</td><td>HVAC</td></tr>
          <tr><td style={{color:'#f87171'}}>NTC 10k</td><td>~500 Ω/°C</td><td>-50→150°C</td><td>Médico/Auto</td></tr>
          <tr><td style={{color:'#c084fc'}}>PTC Si</td><td>~70 Ω/°C</td><td>-60→150°C</td><td>Control</td></tr>
          <tr><td style={{color:'#f59e0b'}}>PTC BaTiO₃</td><td>Millones/°C</td><td>Curie±10°C</td><td>Protección</td></tr>
        </tbody></table>
      </div>
    </div>
  </div>
  );
}

function PirometerSVG({emis,T}){
  const energy=(emis*5.67e-8*Math.pow(T+273.15,4)/1000).toFixed(1);
  return(
  <svg width="100%" height="220" viewBox="0 0 500 220">
    <rect width={500} height={220} fill="#020817" rx={8}/>

    <text x={60} y={200} textAnchor="middle" fill="#94a3b8" fontSize={11}>Objeto</text>
    {/* Ondas IR */}
    {[0,1,2,3,4].map(i=>(
      <path key={i} d={`M ${110+i*28} 100 Q ${115+i*28} 80, ${120+i*28} 100 Q ${125+i*28} 120, ${130+i*28} 100`}

    <text x={325} y={130} textAnchor="middle" fill="#94a3b8" fontSize={11}>IR</text>
    {/* Display */}
    <rect x={410} y={80} width={80} height={60} rx={6} fill="#020817" stroke="#4ade80" strokeWidth={1}/>

    </div>
    )}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0 0'}}>
      <div style={{fontSize:14,color:'#94a3b8'}}>
        Respondidas: <strong style={{color:'#fbbf24'}}>{ans.filter(a=>a!==null).length}/{QUIZ.length}</strong>
        {show&&<span style={{marginLeft:16,color:score>=8?'#4ade80':'#f87171',fontWeight:700}}>
          Puntuación: {score}/10 ({score>=8?'¡Aprobado!':'Repasar'})
        </span>}
      </div>
      {!show?(
        <button className="btn btn-gold" disabled={ans.filter(a=>a!==null).length<QUIZ.length}
          onClick={()=>setShow(true)}>Ver resultados</button>
      ):(
        <button className="btn btn-outline" onClick={()=>{setAns(Array(QUIZ.length).fill(null));setShow(false);}}>
          Reintentar
        </button>
      )}
    </div>
  </div>
  );
}

const SCENES=[
  {id:1,title:'Introducción y Simulador Pt100',sub:'Escalas, principios físicos y RTD básico',comp:Scene1},
  {id:2,title:'RTDs — Pt100, Pt1000, Ni100, Cu10',sub:'Tipos, tablas, conexiones 2/3/4 hilos',comp:Scene2},
  {id:3,title:'Termopares — J, K, T, E, R, S',sub:'Efecto Seebeck, tipos, compensación de junta fría',comp:Scene3},
  {id:4,title:'Termistores NTC y PTC',sub:'Calculadora NTC, comparativa, protección de motores',comp:Scene4},
  {id:5,title:'Pirometría de Radiación',sub:'Stefan-Boltzmann, emisividad, tipos de pirómetros',comp:Scene5},
  {id:6,title:'Sensores Mecánicos',sub:'Bimetálico, bulbo-capilar, expansión térmica',comp:Scene6},
  {id:7,title:'Tabla de Selección',sub:'Comparativa completa: rango, exactitud, costo, aplicación',comp:Scene7},
  {id:8,title:'Test de Evaluación',sub:'10 preguntas sobre medición de temperatura',comp:Scene8},
];

function App(){
  const [sc,setSc]=useState(0);
  const S=SCENES[sc];
  const Comp=S.comp;

  return(
  <div className="slide">
    <div className="hdr">
      <div>
        <div className="hdr-title">2.4 — Medición de Temperatura</div>
        <div className="hdr-sub">{S.title} · {S.sub}</div>
      </div>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <span className="badge">PRO</span>
        <span style={{fontSize:12,color:'#64748b'}}>{sc+1}/{SCENES.length}</span>
      </div>
    </div>
    <div className="content"><Comp/></div>
    <div className="nav">
      <button className="btn btn-outline" disabled={sc===0} onClick={()=>setSc(s=>s-1)}>← Anterior</button>
      <div className="dots">
        {SCENES.map((_,i)=>(
          <div key={i} className={`dot${sc===i?' active':''}`} onClick={()=>setSc(i)}/>
        ))}
      </div>
      <button className="btn btn-gold" disabled={sc===SCENES.length-1} onClick={()=>setSc(s=>s+1)}>Siguiente →</button>
    </div>
  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
