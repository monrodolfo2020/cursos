<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>Clase 3.0 — SCADA y DCS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080c18;color:#e2e8f0;font-family:'Segoe UI',sans-serif;width:1280px;height:720px;overflow:hidden}
  .slide{width:1280px;height:720px;display:flex;flex-direction:column}
  .hdr{background:linear-gradient(135deg,#0f172a,#1e293b);border-bottom:3px solid #f59e0b;padding:18px 48px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .hdr-title{font-size:22px;font-weight:700;color:#f59e0b}
  .hdr-sub{font-size:13px;color:#94a3b8}
  .badge{background:#f59e0b22;border:1px solid #f59e0b55;color:#f59e0b;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .content{flex:1;overflow:hidden;padding:24px 48px}
  .nav{display:flex;gap:12px;justify-content:center;padding:14px;background:#0a0f1e;border-top:1px solid #1e293b;flex-shrink:0}
  .btn{padding:10px 28px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
  .btn-gold{background:#f59e0b;color:#000}.btn-gold:hover{background:#fbbf24}.btn-gold:disabled{opacity:.4;cursor:not-allowed}
  .btn-outline{background:transparent;border:1px solid #334155;color:#94a3b8}.btn-outline:hover{border-color:#f59e0b;color:#f59e0b}.btn-outline:disabled{opacity:.3;cursor:not-allowed}
  .dots{display:flex;gap:8px;align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;background:#1e293b;transition:all .3s;cursor:pointer}
  .dot.active{background:#f59e0b;width:24px;border-radius:4px}
  .card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px}
  .card-gold{border-color:#f59e0b44;background:#f59e0b08}
  .card h3{color:#f59e0b;font-size:14px;margin-bottom:10px}
  .tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;margin:2px}
  .tag-blue{background:#1e40af33;color:#60a5fa;border:1px solid #1e40af55}
  .tag-green{background:#15803d33;color:#4ade80;border:1px solid #15803d55}
  .tag-red{background:#991b1b33;color:#f87171;border:1px solid #991b1b55}
  .tag-yellow{background:#f59e0b22;color:#fbbf24;border:1px solid #f59e0b44}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#0a0f1e;color:#f59e0b;padding:7px 10px;text-align:left;border-bottom:2px solid #f59e0b44}
  td{padding:6px 10px;border-bottom:1px solid #1e293b;color:#cbd5e1}
  tr:hover td{background:#0f172a}
  .alarm{animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* SCENE 1 — SCADA vs DCS vs PLC */
function Scene1(){
  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:14}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
      {[
        {t:'SCADA',sub:'Supervisory Control and Data Acquisition',c:'#f59e0b',pts:['Supervisión geográficamente distribuida','Comunicación WAN/radio/celular','RTUs remotas en campo','Datos históricos centralizados','Ideal: agua, gas, energía eléctrica'],vendors:['Ignition','WinCC OA','Wonderware','iFIX']},
        {t:'DCS',sub:'Distributed Control System',c:'#60a5fa',pts:['Control continuo distribuido en el campo','Controladores redundantes','Alta disponibilidad (99,999%)','Integrado: E/S, control, HMI, historian','Ideal: petroquímica, farmacia, pulpa/papel'],vendors:['DeltaV (Emerson)','Honeywell Experion','ABB 800xA','Yokogawa CENTUM']},
        {t:'PLC + SCADA',sub:'Programmable Logic Controller',c:'#4ade80',pts:['Control lógico y secuencial','Programación IEC 61131-3','Escalable y económico','Comunicación con SCADA por Modbus/PROFINET','Ideal: manufactura, empaque, máquinas'],vendors:['Siemens S7','Allen-Bradley','Schneider M340','Omron NX']},
      ].map(x=>(
        <div key={x.t} className="card" style={{borderColor:`${x.c}44`}}>
          <div style={{fontWeight:700,color:x.c,fontSize:16,marginBottom:2}}>{x.t}</div>
          <div style={{fontSize:11,color:'#64748b',marginBottom:10}}>{x.sub}</div>
          {x.pts.map(p=><div key={p} style={{fontSize:12,color:'#94a3b8',marginBottom:3}}>• {p}</div>)}
          <div style={{marginTop:10,display:'flex',flexWrap:'wrap',gap:4}}>
            {x.vendors.map(v=><span key={v} style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:x.c+'22',color:x.c,border:`1px solid ${x.c}44`}}>{v}</span>)}
          </div>
        </div>
      ))}
    </div>
    <div className="card card-gold" style={{padding:14}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,fontSize:12}}>
        <div>
          <div style={{color:'#f59e0b',fontWeight:700,marginBottom:4}}>📍 Cuándo usar SCADA</div>
          <div style={{color:'#94a3b8'}}>Procesos distribuidos en km o países. Énfasis en supervisión y adquisición de datos. Operadores remotos.</div>
        </div>
        <div>
          <div style={{color:'#60a5fa',fontWeight:700,marginBottom:4}}>🏭 Cuándo usar DCS</div>
          <div style={{color:'#94a3b8'}}>Procesos continuos y críticos. Alta integración E/S-control-HMI. Disponibilidad &gt;99%. Petroquímica.</div>
        </div>
        <div>
          <div style={{color:'#4ade80',fontWeight:700,marginBottom:4}}>⚙️ Cuándo usar PLC+SCADA</div>
          <div style={{color:'#94a3b8'}}>Control discreto, secuencias, máquinas. Presupuesto limitado. Amplia disponibilidad de integradores.</div>
        </div>
        <div>
          <div style={{color:'#c084fc',fontWeight:700,marginBottom:4}}>🔀 Sistemas híbridos</div>
          <div style={{color:'#94a3b8'}}>Muchas plantas usan DCS para proceso continuo + PLCs para empaque/utilidades + SCADA para supervisión total.</div>
        </div>
      </div>
    </div>
  </div>
  );
}

/* SCENE 2 — Mini SCADA simulado */
function Scene2(){
  const [running,setRunning]=useState(false);
  const [T,setT]=useState(65.2);
  const [P,setP]=useState(2.1);
  const [F,setF]=useState(48.3);
  const [L,setL]=useState(72.1);
  const [alarms,setAlarms]=useState([]);
  const timer=useRef(null);

  useEffect(()=>{
    if(running){
      timer.current=setInterval(()=>{
        setT(v=>{const nv=+(v+(-0.5+Math.random())).toFixed(1);if(nv>85){setAlarms(a=>[{id:Date.now(),msg:'ALTA TEMPERATURA: '+nv+'°C',c:'#f87171'},...a.slice(0,4)]);}return Math.max(50,Math.min(100,nv));});
        setP(v=>+(v+(-0.05+Math.random()*0.1)).toFixed(2));
        setF(v=>+(v+(-1+Math.random()*2)).toFixed(1));
        setL(v=>{const nv=+(v+(-0.5+Math.random())).toFixed(1);if(nv<30){setAlarms(a=>[{id:Date.now(),msg:'NIVEL BAJO: '+nv+'%',c:'#f59e0b'},...a.slice(0,4)]);}return Math.max(10,Math.min(95,nv));});
      },800);
    } else {
      clearInterval(timer.current);
    }
    return()=>clearInterval(timer.current);
  },[running]);

  function gauge(val,min,max,unit,color,warn){
    const pct=(val-min)/(max-min)*100;
    const alert=val>warn;
    return(
      <div style={{background:'#020817',border:`2px solid ${alert?'#f87171':color}`,borderRadius:12,padding:14,textAlign:'center'}}>
        <div style={{fontSize:26,fontWeight:700,color:alert?'#f87171':color}}>{val}</div>
        <div style={{fontSize:12,color:'#64748b'}}>{unit}</div>
        <div style={{height:6,background:'#1e293b',borderRadius:3,margin:'8px 0',overflow:'hidden'}}>
          <div style={{height:'100%',width:pct+'%',background:alert?'#f87171':color,borderRadius:3,transition:'width .5s'}}/>
        </div>
        {alert&&<div style={{fontSize:10,color:'#f87171',fontWeight:700}} className="alarm">⚠ ALARMA</div>}
      </div>
    );
  }

  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:14}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{fontSize:14,color:'#94a3b8'}}>
        <span style={{color:running?'#4ade80':'#f87171',fontWeight:700}}>●</span> {running?'EN LÍNEA — datos simulados':'DETENIDO'}
      </div>
      <button onClick={()=>setRunning(r=>!r)}
        style={{padding:'8px 20px',borderRadius:8,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,
          background:running?'#991b1b':'#15803d',color:'#fff'}}>
        {running?'⏹ Detener':'▶ Iniciar simulación'}
      </button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
      {gauge(T,0,150,'Temperatura (°C)','#f59e0b',85)}
      {gauge(P,0,10,'Presión (bar)','#60a5fa',8)}
      {gauge(F,0,100,'Caudal (m³/h)','#4ade80',95)}
      {gauge(L,0,100,'Nivel (%)','#c084fc',20)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <div className="card">
        <h3>🚨 Gestión de Alarmas (ISA-18.2)</h3>
        <div style={{height:130,overflowY:'auto'}}>
          {alarms.length===0&&<div style={{color:'#334155',fontSize:12,textAlign:'center',paddingTop:40}}>Sin alarmas activas</div>}
          {alarms.map((a,i)=>(
            <div key={a.id} style={{display:'flex',gap:10,alignItems:'center',padding:'6px 8px',
              background:'#020817',borderLeft:`3px solid ${a.c}`,marginBottom:4,borderRadius:4}}>
              <span style={{color:a.c,fontSize:11,fontWeight:700}} className={i===0?'alarm':''}>{a.msg}</span>
              <span style={{color:'#475569',fontSize:10,marginLeft:'auto'}}>
                {new Date(a.id).toLocaleTimeString()}
              </span>
            </div>
          ))}
        </div>
        {alarms.length>0&&<button onClick={()=>setAlarms([])} style={{marginTop:6,padding:'4px 12px',borderRadius:4,border:'1px solid #334155',background:'transparent',color:'#94a3b8',cursor:'pointer',fontSize:11}}>Reconocer todas</button>}
      </div>
      <div className="card">
        <h3>📋 Componentes de un SCADA moderno</h3>
        <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.8}}>
          {[
            ['Tag database','Almacena todos los puntos de datos (tags). Metadata: EU, rango, alarmas.',c:'#f59e0b'],
            ['Historian','Base de datos de series de tiempo. Trending histórico y reports.',c:'#60a5fa'],
            ['HMI/Sinópticos','Pantallas gráficas del proceso. Navegación jerárquica.',c:'#4ade80'],
            ['Gestión de alarmas','ISA-18.2: prioridades, supresión, journal, KPIs de alarmas.',c:'#c084fc'],
            ['Sistema de reportes','PDF automáticos por turno, shift, batch. Cumplimiento 21CFR.',c:'#f87171'],
          ].map(x=>(
            <div key={x[0]} style={{display:'flex',gap:8,marginBottom:4}}>
              <span style={{color:x.c,fontWeight:700,width:120,flexShrink:0,fontSize:11}}>{x[0]}</span>
              <span style={{fontSize:11,color:'#64748b'}}>{x[1]}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>
  );
}

/* SCENE 3 — DCS */
function Scene3(){
  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%',gap:14}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card card-gold">
        <h3>🏭 Arquitectura de un DCS</h3>
        <svg width="100%" height="220" viewBox="0 0 500 220">
          <rect width={500} height={220} fill="#020817" rx={6}/>
          {/* Nivel ERP */}
          <rect x={150} y={8} width={200} height={28} rx={4} fill="#f59e0b22" stroke="#f59e0b" strokeWidth={1}/>
          <text x={250} y={26} textAnchor="middle" fill="#f59e0b" fontSize={11}>ERP / MES (SAP)</text>
          {/* Nivel DCS Servers */}
          <rect x={60} y={50} width={380} height={28} rx={4} fill="#60a5fa22" stroke="#60a5fa" strokeWidth={1}/>
          <text x={250} y={68} textAnchor="middle" fill="#60a5fa" fontSize={11}>Servidores DCS / Historian / Ingeniería</text>
          {/* HMI */}
          <rect x={20} y={90} width={130} height={28} rx={4} fill="#4ade8022" stroke="#4ade80" strokeWidth={1}/>
          <text x={85} y={108} textAnchor="middle" fill="#4ade80" fontSize={10}>HMI Operador</text>
          <rect x={180} y={90} width={140} height={28} rx={4} fill="#4ade8022" stroke="#4ade80" strokeWidth={1}/>
          <text x={250} y={108} textAnchor="middle" fill="#4ade80" fontSize={10}>Estación Ingeniería</text>
          <rect x={350} y={90} width={130} height={28} rx={4} fill="#4ade8022" stroke="#4ade80" strokeWidth={1}/>
          <text x={415} y={108} textAnchor="middle" fill="#4ade80" fontSize={10}>HMI Redundante</text>
          {/* Controladores */}
          <rect x={20} y={135} width={130} height={28} rx={4} fill="#c084fc22" stroke="#c084fc" strokeWidth={1}/>
          <text x={85} y={153} textAnchor="middle" fill="#c084fc" fontSize={10}>Controlador A</text>
          <rect x={350} y={135} width={130} height={28} rx={4} fill="#c084fc22" stroke="#c084fc" strokeWidth={1}/>
          <text x={415} y={153} textAnchor="middle" fill="#c084fc" fontSize={10}>Controlador B (RDT)</text>
          {/* E/S */}
          <rect x={20} y={180} width={130} height={28} rx={4} fill="#f8717122" stroke="#f87171" strokeWidth={1}/>
          <text x={85} y={198} textAnchor="middle" fill="#f87171" fontSize={10}>Módulos E/S campo</text>
          <rect x={350} y={180} width={130} height={28} rx={4} fill="#f8717122" stroke="#f87171" strokeWidth={1}/>
          <text x={415} y={198} textAnchor="middle" fill="#f87171" fontSize={10}>Módulos E/S campo</text>
          {/* Conexiones */}
          <line x1={250} y1={36} x2={250} y2={50} stroke="#94a3b8" strokeWidth={1}/>
          {[85,250,415].map(x=><line key={x} x1={x} y1={78} x2={x} y2={90} stroke="#94a3b8" strokeWidth={1}/>)}
          {[85,415].map(x=><line key={x} x1={x} y1={118} x2={x} y2={135} stroke="#94a3b8" strokeWidth={1}/>)}
          {[85,415].map(x=><line key={x} x1={x} y1={163} x2={x} y2={180} stroke="#94a3b8" strokeWidth={1}/>)}
          {/* Redundancia */}
          <line x1={150} y1={149} x2={350} y2={149} stroke="#fbbf24" strokeWidth={1.5} strokeDasharray="4,3"/>
          <text x={250} y={145} textAnchor="middle" fill="#fbbf24" fontSize={9}>Failover activo-activo</text>
        </svg>
      </div>
      <div className="card">
        <h3>⚡ Redundancia en DCS</h3>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.7}}>
          {[
            {t:'Controlador redundante',d:'Par activo-standby. Cambio en &lt;100ms sin interrupción del proceso.',c:'#c084fc'},
            {t:'Fuente de alimentación',d:'Doble fuente con UPS. Cambio automático en &lt;20ms.',c:'#f59e0b'},
            {t:'Red de control',d:'Anillo redundante o doble estrella. Recuperación automática.',c:'#60a5fa'},
            {t:'Módulos E/S',d:'E/S redundantes en procesos críticos. Cableado 1:1 o bus.',c:'#4ade80'},
            {t:'Historian redundante',d:'Mirror en tiempo real. Sin pérdida de datos en fallo.',c:'#f87171'},
          ].map(x=>(
            <div key={x.t} style={{display:'flex',gap:8,marginBottom:8,background:'#020817',padding:8,borderRadius:6,borderLeft:`3px solid ${x.c}`}}>
              <div>
                <div style={{fontWeight:600,color:x.c,fontSize:12}}>{x.t}</div>
                <div style={{fontSize:11,color:'#64748b'}}>{x.d}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
      <div className="card">
        <h3>📊 KPIs de alarmas — ISA-18.2</h3>
        <table><thead><tr><th>Métrica</th><th>Objetivo</th></tr></thead>
        <tbody>
          {[['Alarmas/operador/hora','≤10 (promedio)'],['Pico máximo','≤100 en 10 min'],['Flooding (stand-up)','≤10 en 1 min'],['Alarmas suprimidas','≤5% total'],['Tiempo respuesta operador','≤10 min promedio']].map(([m,o])=>(
            <tr key={m}><td style={{fontSize:11}}>{m}</td><td style={{color:'#4ade80',fontWeight:600}}>{o}</td></tr>
          ))}
        </tbody></table>
      </div>
      <div className="card">
        <h3>🔒 Ciberseguridad IT/OT</h3>
        <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.7}}>
          <div>• <strong style={{color:'#f59e0b'}}>Segmentación:</strong> IT, DMZ, OT separadas</div>
          <div>• <strong style={{color:'#60a5fa'}}>Firewall industrial:</strong> solo puertos necesarios</div>
          <div>• <strong style={{color:'#4ade80'}}>VLAN:</strong> aislamiento lógico de redes</div>
          <div>• <strong style={{color:'#c084fc'}}>Parchado:</strong> validado en ambiente de pruebas</div>
          <div>• <strong style={{color:'#f87171'}}>IEC 62443:</strong> ciberseguridad industrial</div>
          <div>• Acceso remoto solo por jump server VPN</div>
        </div>
      </div>
      <div className="card">
        <h3>📈 Tendencias Industria 4.0</h3>
        <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.7}}>
          <div>• <strong style={{color:'#f59e0b'}}>Edge computing:</strong> procesamiento en campo, menor latencia</div>
          <div>• <strong style={{color:'#60a5fa'}}>Digital Twin:</strong> gemelo digital del proceso</div>
          <div>• <strong style={{color:'#4ade80'}}>Cloud SCADA:</strong> Ignition Edge + nube (AWS, Azure)</div>
          <div>• <strong style={{color:'#c084fc'}}>AI/ML:</strong> detección de anomalías, mantenimiento predictivo</div>
          <div>• <strong style={{color:'#f87171'}}>Open Process Automation (OPA):</strong> DCS no propietario</div>
        </div>
      </div>
    </div>
  </div>
  );
}

const QUIZ=[
  {q:'¿Cuál es la principal diferencia entre SCADA y DCS?',opts:['SCADA no tiene HMI','SCADA es para supervisión distribuida geográficamente; DCS para control continuo centralizado','DCS usa solo PLCs','SCADA no puede hacer control PID'],ans:1},
  {q:'¿Qué norma regula la gestión de alarmas industriales?',opts:['IEC 61508','ISA-18.2','ISA-5.1','ISO/IEC 17025'],ans:1},
  {q:'¿Cuántas alarmas por operador por hora establece ISA-18.2 como objetivo promedio?',opts:['≤5','≤10','≤50','≤100'],ans:1},
  {q:'En un DCS, el cambio de controlador redundante activo-standby ocurre en:',opts:['&gt;1 segundo','&lt;100 ms','Exactamente 500 ms','5 minutos'],ans:1},
  {q:'¿Qué es el Historian en un sistema SCADA/DCS?',opts:['El manual del operador','Base de datos de series de tiempo con variables del proceso','El software de ingeniería','El sistema de alarmas'],ans:1},
  {q:'La norma de ciberseguridad industrial es:',opts:['IEC 62443','ISO 27001','ATEX 2014','ISA-95'],ans:0},
  {q:'¿Qué significa DCS?',opts:['Digital Control System','Distributed Control System','Dual Controller SCADA','Direct Control Station'],ans:1},
  {q:'¿Qué es un Digital Twin?',opts:['Un sistema SCADA en la nube','Un modelo virtual del proceso en tiempo real con datos reales','Un tipo de protocolo industrial','Una pantalla HMI duplicada'],ans:1},
  {q:'ISA-95 define la arquitectura de:',opts:['Calibración de instrumentos','La pirámide de automatización: campo, control, SCADA, MES, ERP','El sistema de alarmas','Las redes PROFIBUS'],ans:1},
  {q:'Edge computing en IIoT significa:',opts:['Procesar datos solo en la nube','Computación en el borde (campo), cerca del proceso, baja latencia','Un protocolo de comunicación','Un tipo de sensor IoT'],ans:1},
];
function Scene4(){
  const [ans,setAns]=useState(Array(QUIZ.length).fill(null));
  const [show,setShow]=useState(false);
  const score=ans.filter((a,i)=>a===QUIZ[i].ans).length;
  return(
  <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{flex:1,overflowY:'auto',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,paddingRight:4}}>
      {!show?QUIZ.map((q,i)=>(
        <div key={i} className="card" style={{padding:12}}>
          <div style={{fontSize:11,color:'#64748b',marginBottom:4}}>P.{i+1}</div>
          <div style={{fontSize:12,color:'#cbd5e1',marginBottom:8,lineHeight:1.4}}>{q.q}</div>
          {q.opts.map((o,j)=>(
            <button key={j} onClick={()=>{const a=[...ans];a[i]=j;setAns(a);}}
              style={{display:'block',width:'100%',textAlign:'left',padding:'5px 10px',borderRadius:5,
                border:`1px solid ${ans[i]===j?'#f59e0b':'#1e293b'}`,background:ans[i]===j?'#f59e0b22':'#0a0f1e',
                color:ans[i]===j?'#fbbf24':'#64748b',cursor:'pointer',fontSize:11,marginBottom:3}}>{o}</button>
          ))}
        </div>
      )):QUIZ.map((q,i)=>(
        <div key={i} className="card" style={{padding:12,borderColor:ans[i]===q.ans?'#4ade8044':'#f8717144'}}>
          <div style={{fontSize:11,color:ans[i]===q.ans?'#4ade80':'#f87171',marginBottom:3}}>{ans[i]===q.ans?'✅':'❌'}</div>
          <div style={{fontSize:11,color:'#cbd5e1',marginBottom:4}}>{q.q}</div>
          <div style={{fontSize:11,color:'#4ade80'}}>✓ {q.opts[q.ans]}</div>
        </div>
      ))}
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0 0'}}>
      <div style={{fontSize:13,color:'#94a3b8'}}>
        Respondidas: <strong style={{color:'#fbbf24'}}>{ans.filter(a=>a!==null).length}/10</strong>
        {show&&<span style={{marginLeft:16,color:score>=8?'#4ade80':'#f87171',fontWeight:700}}>Puntuación: {score}/10 🏆</span>}
      </div>
      {!show?(<button className="btn btn-gold" disabled={ans.filter(a=>a!==null).length<10} onClick={()=>setShow(true)}>Ver resultados</button>)
        :(<button className="btn btn-outline" onClick={()=>{setAns(Array(QUIZ.length).fill(null));setShow(false);}}>Reintentar</button>)}
    </div>
  </div>
  );
}

const SCENES=[
  {id:1,title:'SCADA vs DCS vs PLC+SCADA',sub:'Diferencias, aplicaciones, fabricantes líderes',comp:Scene1},
  {id:2,title:'Mini SCADA Simulado',sub:'Dashboard en vivo, alarmas ISA-18.2, componentes',comp:Scene2},
  {id:3,title:'Arquitectura DCS y Tendencias',sub:'Redundancia, ciberseguridad, Industria 4.0, Digital Twin',comp:Scene3},
  {id:4,title:'Test de Evaluación',sub:'10 preguntas sobre SCADA, DCS y supervisión industrial',comp:Scene4},
];

function App(){
  const [sc,setSc]=useState(0);
  const S=SCENES[sc]; const Comp=S.comp;
  return(
  <div className="slide">
    <div className="hdr">
      <div>
        <div className="hdr-title">3.0 — SCADA y DCS</div>
        <div className="hdr-sub">{S.title} · {S.sub}</div>
      </div>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <span className="badge">PRO</span>
        <span style={{fontSize:12,color:'#64748b'}}>{sc+1}/{SCENES.length}</span>
      </div>
    </div>
    <div className="content"><Comp/></div>
    <div className="nav">
      <button className="btn btn-outline" disabled={sc===0} onClick={()=>setSc(s=>s-1)}>← Anterior</button>
      <div className="dots">{SCENES.map((_,i)=>(<div key={i} className={`dot${sc===i?' active':''}`} onClick={()=>setSc(i)}/>))}</div>
      <button className="btn btn-gold" disabled={sc===SCENES.length-1} onClick={()=>setSc(s=>s+1)}>Siguiente →</button>
    </div>
  </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
