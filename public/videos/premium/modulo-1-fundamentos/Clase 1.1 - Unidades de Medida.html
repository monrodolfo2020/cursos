<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clase 1.1 PRO — Unidades de Medida en Instrumentación Industrial</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #080c18; color: #f0f0f0; }

    @keyframes fadeIn   { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    @keyframes slideR   { from { opacity: 0; transform: translateX(-24px); } to { opacity: 1; transform: none; } }
    @keyframes slideL   { from { opacity: 0; transform: translateX(24px);  } to { opacity: 1; transform: none; } }
    @keyframes pop      { from { opacity: 0; transform: scale(.85); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse    { 0%,100%{opacity:1;} 50%{opacity:.5;} }
    @keyframes shimmer  { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    @keyframes scanline { 0%{top:-10%;} 100%{top:110%;} }
    @keyframes countUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    @keyframes arrowAnim{ 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }

    .fade    { animation: fadeIn .55s ease both; }
    .slideR  { animation: slideR .5s ease both; }
    .slideL  { animation: slideL .5s ease both; }
    .pop     { animation: pop .4s cubic-bezier(.34,1.56,.64,1) both; }

    .gold  { color: #f59e0b; }
    .cyan  { color: #22d3ee; }
    .green { color: #4ade80; }
    .red   { color: #f87171; }

    /* Grid lines background */
    .grid-bg {
      background-color: #080c18;
      background-image:
        linear-gradient(rgba(245,158,11,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(245,158,11,.2);
      border-radius: 12px;
      padding: 16px 20px;
    }

    /* Tag badge */
    .badge {
      display: inline-block;
      background: rgba(245,158,11,.15);
      border: 1px solid rgba(245,158,11,.4);
      color: #f59e0b;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 20px;
      padding: 3px 12px;
    }

    /* Progress bar */
    .prog-track { height: 3px; background: rgba(255,255,255,.08); border-radius: 2px; overflow: hidden; }
    .prog-fill  { height: 100%; background: linear-gradient(90deg,#f59e0b,#fbbf24); border-radius: 2px; transition: width .4s ease; }

    /* Conversion arrow */
    .arr { animation: arrowAnim 1.2s ease-in-out infinite; display: inline-block; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: rgba(245,158,11,.15); color: #f59e0b; font-size: 11px; letter-spacing:.05em; text-transform:uppercase; padding:8px 12px; text-align:left; }
    td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.06); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.03); }
    .td-val { color: #fbbf24; font-weight: 600; font-family: monospace; font-size: 13px; }

    /* Gauge animation */
    @keyframes gaugeAnim { from{stroke-dashoffset:251} to{stroke-dashoffset:var(--end)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── DATA ─────────────────────────────────────────────────────────────────── */
const SI_BASE = [
  { sym:"m",   name:"Metro",    qty:"Longitud",           color:"#22d3ee", icon:"📏" },
  { sym:"kg",  name:"Kilogramo",qty:"Masa",               color:"#4ade80", icon:"⚖️" },
  { sym:"s",   name:"Segundo",  qty:"Tiempo",             color:"#a78bfa", icon:"⏱" },
  { sym:"A",   name:"Amperio",  qty:"Corriente eléctrica",color:"#f59e0b", icon:"⚡" },
  { sym:"K",   name:"Kelvin",   qty:"Temperatura",        color:"#f87171", icon:"🌡" },
  { sym:"mol", name:"Mol",      qty:"Cantidad de sustancia",color:"#34d399",icon:"🧪" },
  { sym:"cd",  name:"Candela",  qty:"Intensidad luminosa",color:"#fbbf24", icon:"💡" },
];

const SI_DERIVED = [
  { sym:"Pa",  name:"Pascal",   qty:"Presión",      base:"kg/(m·s²)",  key:true  },
  { sym:"N",   name:"Newton",   qty:"Fuerza",       base:"kg·m/s²",    key:true  },
  { sym:"J",   name:"Joule",    qty:"Energía",      base:"N·m",        key:false },
  { sym:"W",   name:"Watt",     qty:"Potencia",     base:"J/s",        key:false },
  { sym:"V",   name:"Voltio",   qty:"Tensión",      base:"W/A",        key:true  },
  { sym:"Hz",  name:"Hertz",    qty:"Frecuencia",   base:"1/s",        key:false },
  { sym:"Ω",   name:"Ohm",      qty:"Resistencia",  base:"V/A",        key:false },
];

const IMPERIAL = [
  { sym:"in",  name:"Pulgada",     qty:"Longitud",    note:"Std. en tuberías y válvulas" },
  { sym:"ft",  name:"Pie",         qty:"Longitud",    note:"1 ft = 12 in" },
  { sym:"lb",  name:"Libra-masa",  qty:"Masa",        note:"Fuerza y masa comparten nombre" },
  { sym:"psi", name:"Lb/in²",      qty:"Presión",     note:"La más común en campo (EE.UU.)" },
  { sym:"HP",  name:"Caballo fuerza",qty:"Potencia",  note:"Motores y compresores" },
  { sym:"°F",  name:"Fahrenheit",  qty:"Temperatura", note:"Procesos y catálogos americanos" },
  { sym:"BTU", name:"Brit. Thermal Unit",qty:"Energía",note:"Hornos, calderas, HVAC" },
];

const CONV_LENGTH = [
  { from:"1 in",   to:"25.4 mm",      to2:"0.0254 m"   },
  { from:"1 ft",   to:"304.8 mm",     to2:"0.3048 m"   },
  { from:"1 m",    to:"39.37 in",     to2:"3.2808 ft"  },
];

const CONV_PRESSURE = [
  { unit:"1 bar",  pa:"100 000 Pa",  psi:"14.504 psi", atm:"0.9869 atm", kPa:"100 kPa"  },
  { unit:"1 psi",  pa:"6 894.76 Pa", psi:"—",          atm:"0.068 atm",  kPa:"6.895 kPa"},
  { unit:"1 atm",  pa:"101 325 Pa",  psi:"14.696 psi", atm:"—",          kPa:"101.3 kPa"},
  { unit:"1 kPa",  pa:"1 000 Pa",    psi:"0.145 psi",  atm:"0.0099 atm", kPa:"—"        },
];

/* ─── PLAYBACK BAR ─────────────────────────────────────────────────────────── */
function PlayBar({ scene, total, onPrev, onNext, onGo }) {
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0,
      background:'rgba(8,12,24,.92)', borderTop:'1px solid rgba(245,158,11,.2)',
      padding:'8px 16px', display:'flex', alignItems:'center', gap:12, zIndex:99
    }}>
      <button onClick={onPrev} disabled={scene===0}
        style={{ background:'none', border:'1px solid rgba(245,158,11,.4)', color:'#f59e0b',
          borderRadius:8, padding:'4px 12px', cursor:scene===0?'not-allowed':'pointer',
          opacity:scene===0?.4:1, fontSize:16, transition:'all .2s' }}>‹</button>

      <div style={{ flex:1 }}>
        <div className="prog-track">
          <div className="prog-fill" style={{ width:`${((scene+1)/total)*100}%` }} />
        </div>
      </div>

      <span style={{ fontSize:12, color:'rgba(255,255,255,.5)', minWidth:50, textAlign:'center' }}>
        {scene+1} / {total}
      </span>

      <div style={{ display:'flex', gap:6 }}>
        {Array.from({length:total},(_,i)=>(
          <button key={i} onClick={()=>onGo(i)}
            style={{ width:8, height:8, borderRadius:'50%', border:'none', cursor:'pointer',
              background: i===scene ? '#f59e0b' : 'rgba(255,255,255,.2)',
              transition:'all .2s', transform: i===scene?'scale(1.3)':'none' }} />
        ))}
      </div>

      <button onClick={onNext} disabled={scene===total-1}
        style={{ background: scene===total-1?'none':'rgba(245,158,11,.15)',
          border:'1px solid rgba(245,158,11,.4)', color:'#f59e0b',
          borderRadius:8, padding:'4px 12px', cursor:scene===total-1?'not-allowed':'pointer',
          opacity:scene===total-1?.4:1, fontSize:16, transition:'all .2s' }}>›</button>
    </div>
  );
}

/* ─── SCENE 0: INTRO ────────────────────────────────────────────────────────── */
function SceneIntro() {
  return (
    <div className="grid-bg" style={{ height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', padding:32, position:'relative' }}>

      {/* Corner accent */}
      <div style={{ position:'absolute', top:0, left:0, width:120, height:120,
        background:'radial-gradient(circle at top left, rgba(245,158,11,.2), transparent 70%)' }}/>
      <div style={{ position:'absolute', bottom:60, right:0, width:200, height:200,
        background:'radial-gradient(circle at bottom right, rgba(34,211,238,.1), transparent 70%)' }}/>

      <div className="fade" style={{ textAlign:'center', maxWidth:600 }}>
        <div className="badge" style={{ marginBottom:16 }}>Módulo 1 · Clase 1.1 PRO</div>
        <h1 style={{ fontSize:'clamp(22px,4vw,36px)', fontWeight:800, lineHeight:1.2, marginBottom:16 }}>
          Unidades de Medida en<br/>
          <span className="gold">Instrumentación Industrial</span>
        </h1>
        <p style={{ color:'rgba(255,255,255,.65)', fontSize:15, lineHeight:1.7, marginBottom:28 }}>
          Un error en la interpretación de una unidad de medida puede detener una planta o causar un accidente.
          Esta clase te convierte en un instrumentista <strong style={{color:'#fbbf24'}}>"bilingüe"</strong> en sistemas de unidades.
        </p>

        {/* Stat chips */}
        <div style={{ display:'flex', gap:12, justifyContent:'center', flexWrap:'wrap' }}>
          {[
            { n:"3", label:"Sistemas de unidades" },
            { n:"20+", label:"Conversiones clave" },
            { n:"100%", label:"Aplicación en campo" },
          ].map(s=>(
            <div key={s.label} className="card pop" style={{ padding:'12px 20px', textAlign:'center', animationDelay:'.1s' }}>
              <div style={{ fontSize:22, fontWeight:800, color:'#f59e0b' }}>{s.n}</div>
              <div style={{ fontSize:11, color:'rgba(255,255,255,.5)', marginTop:2 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Real-world hook */}
      <div className="fade" style={{ marginTop:24, background:'rgba(248,113,113,.08)',
        border:'1px solid rgba(248,113,113,.3)', borderRadius:12, padding:'12px 20px',
        maxWidth:520, animationDelay:'.3s' }}>
        <p style={{ fontSize:13, color:'#fca5a5', lineHeight:1.6 }}>
          <strong>⚠ Caso real:</strong> En 1999, la NASA perdió el Mars Climate Orbiter (125 M USD)
          porque un equipo usó libras-fuerza y otro newtons. El error fue de unidades.
        </p>
      </div>
    </div>
  );
}

/* ─── SCENE 1: SI BASE UNITS ────────────────────────────────────────────────── */
function SceneSIBase() {
  const [visible, setVisible] = useState(0);
  useEffect(()=>{
    if (visible < SI_BASE.length) {
      const t = setTimeout(()=>setVisible(v=>v+1), 180);
      return ()=>clearTimeout(t);
    }
  },[visible]);

  return (
    <div className="grid-bg" style={{ height:'100%', display:'flex', flexDirection:'column', padding:'24px 24px 60px' }}>
      <div className="fade" style={{ marginBottom:16 }}>
        <div className="badge" style={{ marginBottom:8 }}>Sistema Internacional · SI</div>
        <h2 style={{ fontSize:'clamp(18px,3vw,26px)', fontWeight:700 }}>
          Las <span className="gold">7 Unidades Base</span> del SI
        </h2>
        <p style={{ fontSize:13, color:'rgba(255,255,255,.55)', marginTop:4 }}>
          Definidas por la CGPM (Conferencia General de Pesas y Medidas) · Vigente desde 2019
        </p>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))', gap:10, flex:1 }}>
        {SI_BASE.map((u,i)=>(
          <div key={u.sym} className="card"
            style={{ opacity: i<visible?1:0, transform: i<visible?'none':'translateY(12px)',
              transition:'all .35s ease', borderColor:`${u.color}44`,
              background: `linear-gradient(135deg, rgba(255,255,255,.03), ${u.color}08)` }}>
            <div style={{ fontSize:28 }}>{u.icon}</div>
            <div style={{ fontSize:28, fontWeight:900, color:u.color, fontFamily:'monospace', marginTop:4 }}>{u.sym}</div>
            <div style={{ fontSize:14, fontWeight:600, marginTop:2 }}>{u.name}</div>
            <div style={{ fontSize:11, color:'rgba(255,255,255,.45)', marginTop:4 }}>{u.qty}</div>
            {(u.sym==='m'||u.sym==='kg'||u.sym==='s'||u.sym==='A') && (
              <div style={{ marginTop:8, background:'rgba(245,158,11,.15)', borderRadius:6, padding:'2px 8px',
                fontSize:10, color:'#f59e0b', fontWeight:700, display:'inline-block' }}>★ CLAVE EN CAMPO</div>
            )}
          </div>
        ))}
      </div>

      <div className="fade" style={{ marginTop:10, background:'rgba(34,211,238,.08)',
        border:'1px solid rgba(34,211,238,.2)', borderRadius:10, padding:'10px 16px', animationDelay:'.5s' }}>
        <p style={{ fontSize:12, color:'#67e8f9' }}>
          💡 En instrumentación, las 4 más usadas son: <strong>m · kg · s · A</strong>.
          Todas las demás unidades del proceso se derivan de ellas.
        </p>
      </div>
    </div>
  );
}

/* ─── SCENE 2: SI DERIVED UNITS ─────────────────────────────────────────────── */
function SceneSIDerived() {
  return (
    <div className="grid-bg" style={{ height:'100%', display:'flex', flexDirection:'column', padding:'24px 24px 60px' }}>
      <div className="fade" style={{ marginBottom:14 }}>
        <div className="badge" style={{ marginBottom:8 }}>Sistema Internacional · SI</div>
        <h2 style={{ fontSize:'clamp(18px,3vw,26px)', fontWeight:700 }}>
          Unidades <span className="gold">Derivadas</span> Esenciales
        </h2>
        <p style={{ fontSize:13, color:'rgba(255,255,255,.55)', marginTop:4 }}>
          Se obtienen combinando las unidades base. Son las que encontrarás en cada instrumento.
        </p>
      </div>

      <div style={{ flex:1, overflowY:'auto' }}>
        <table>
          <thead>
            <tr>
              <th>Símbolo</th><th>Nombre</th><th>Magnitud</th><th>Expresión en base</th><th>Uso</th>
            </tr>
          </thead>
          <tbody>
            {SI_DERIVED.map((u,i)=>(
              <tr key={u.sym} className="slideR" style={{ animationDelay:`${i*.08}s` }}>
                <td><span style={{ fontSize:18, fontWeight:800, color: u.key?'#f59e0b':'#a78bfa', fontFamily:'monospace' }}>{u.sym}</span></td>
                <td style={{ fontWeight:600 }}>{u.name}</td>
                <td style={{ color:'rgba(255,255,255,.65)' }}>{u.qty}</td>
                <td><code style={{ background:'rgba(255,255,255,.06)', padding:'2px 8px', borderRadius:4, fontSize:12, color:'#94a3b8' }}>{u.base}</code></td>
                <td>
                  {u.key && <span style={{ background:'rgba(245,158,11,.15)', color:'#f59e0b',
                    fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:10 }}>CAMPO</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Pa breakdown */}
      <div className="fade" style={{ marginTop:12, background:'rgba(245,158,11,.07)',
        border:'1px solid rgba(245,158,11,.25)', borderRadius:10, padding:'12px 16px', animationDelay:'.4s' }}>
        <p style={{ fontSize:13, marginBottom:6 }}>
          <span className="gold" style={{ fontWeight:700 }}>Pascal — la unidad estrella de presión:</span>
        </p>
        <div style={{ display:'flex', gap:24, flexWrap:'wrap', fontSize:12, color:'rgba(255,255,255,.7)' }}>
          <span><span className="gold">1 Pa</span> = 1 N/m²</span>
          <span><span className="gold">1 kPa</span> = 1 000 Pa</span>
          <span><span className="gold">1 MPa</span> = 1 000 000 Pa</span>
          <span><span className="gold">1 bar</span> ≈ 100 000 Pa</span>
        </div>
      </div>
    </div>
  );
}

/* ─── SCENE 3: IMPERIAL SYSTEM ───────────────────────────────────────────────── */
function SceneImperial() {
  return (
    <div className="grid-bg" style={{ height:'100%', display:'flex', flexDirection:'column', padding:'24px 24px 60px' }}>
      <div className="fade" style={{ marginBottom:14 }}>
        <div style={{ display:'inline-block', background:'rgba(148,163,184,.1)', border:'1px solid rgba(148,163,184,.3)',
          color:'#94a3b8', fontSize:11, fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase',
          borderRadius:20, padding:'3px 12px', marginBottom:8 }}>Sistema Imperial · Inglés</div>
        <h2 style={{ fontSize:'clamp(18px,3vw,26px)', fontWeight:700 }}>
          El Sistema <span style={{ color:'#94a3b8' }}>Imperial / Inglés</span>
        </h2>
        <p style={{ fontSize:13, color:'rgba(255,255,255,.55)', marginTop:4 }}>
          Predomina en EE.UU. y en equipos heredados. Todo instrumentista debe conocerlo.
        </p>
      </div>

      <div style={{ flex:1, overflowY:'auto' }}>
        <table>
          <thead>
            <tr>
              <th>Símbolo</th><th>Nombre</th><th>Magnitud</th><th>Dónde lo verás en planta</th>
            </tr>
          </thead>
          <tbody>
            {IMPERIAL.map((u,i)=>(
              <tr key={u.sym} className="slideR" style={{ animationDelay:`${i*.08}s` }}>
                <td><span style={{ fontSize:18, fontWeight:800, color:'#94a3b8', fontFamily:'monospace' }}>{u.sym}</span></td>
                <td style={{ fontWeight:600 }}>{u.name}</td>
                <td style={{ color:'rgba(255,255,255,.65)' }}>{u.qty}</td>
                <td style={{ fontSize:12, color:'rgba(255,255,255,.5)' }}>{u.note}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="fade" style={{ marginTop:12, display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, animationDelay:'.5s' }}>
        <div style={{ background:'rgba(248,113,113,.08)', border:'1px solid rgba(248,113,113,.25)',
          borderRadius:10, padding:'10px 14px' }}>
          <p style={{ fontSize:12, color:'#fca5a5' }}>
            ⚠ <strong>Confusión lb:</strong> En inglés, "lb" puede ser libra-fuerza (lbf) o libra-masa (lbm).
            En presión siempre es lbf/in² = psi.
          </p>
        </div>
        <div style={{ background:'rgba(34,211,238,.06)', border:'1px solid rgba(34,211,238,.2)',
          borderRadius:10, padding:'10px 14px' }}>
          <p style={{ fontSize:12, color:'#67e8f9' }}>
            💡 La mayoría de válvulas, tuberías y transmisores americanos
            expresan el tamaño en <strong>pulgadas (in)</strong>.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ─── SCENE 4: CONVERSIONES LONGITUD + MASA ─────────────────────────────────── */
function SceneConvLengthMass() {
  const MASS = [
    { from:'1 kg', to:'2.2046 lb', inv:'0.4536 kg' },
    { from:'1 lb', to:'0.4536 kg', inv:'2.2046 lb' },
    { from:'1 t (ton)',to:'1 000 kg',inv:'2 204.6 lb'},
  ];

  return (
    <div className="grid-bg" style={{ height:'100%', display:'flex', flexDirection:'column', padding:'24px 24px 60px' }}>
      <div className="fade" style={{ marginBottom:14 }}>
        <div className="badge" style={{ marginBottom:8 }}>Conversiones</div>
        <h2 style={{ fontSize:'clamp(18px,3vw,26px)', fontWeight:700 }}>
          Longitud y <span className="gold">Masa</span>
        </h2>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, flex:1 }}>
        {/* Longitud */}
        <div>
          <div style={{ fontSize:12, fontWeight:700, color:'#22d3ee', marginBottom:10, letterSpacing:'.06em', textTransform:'uppercase' }}>
            📏 Longitud
          </div>
          {CONV_LENGTH.map((r,i)=>(
            <div key={i} className="card slideR" style={{ marginBottom:8, animationDelay:`${i*.1}s` }}>
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                <span style={{ fontFamily:'monospace', fontSize:15, fontWeight:700, color:'#94a3b8' }}>{r.from}</span>
                <span className="arr" style={{ color:'#f59e0b', fontSize:18 }}>→</span>
                <div>
                  <div className="td-val">{r.to}</div>
                  <div style={{ fontSize:11, color:'rgba(255,255,255,.4)', marginTop:1 }}>{r.to2}</div>
                </div>
              </div>
            </div>
          ))}
          <div className="card" style={{ marginTop:4, background:'rgba(34,211,238,.06)', borderColor:'rgba(34,211,238,.25)' }}>
            <p style={{ fontSize:12, color:'#67e8f9' }}>
              <strong>Dato exacto:</strong> 1 in = <span style={{ color:'#fbbf24', fontFamily:'monospace' }}>25.4 mm</span> (por definición, sin redondeo)
            </p>
          </div>
        </div>

        {/* Masa */}
        <div>
          <div style={{ fontSize:12, fontWeight:700, color:'#4ade80', marginBottom:10, letterSpacing:'.06em', textTransform:'uppercase' }}>
            ⚖️ Masa
          </div>
          {MASS.map((r,i)=>(
            <div key={i} className="card slideL" style={{ marginBottom:8, animationDelay:`${i*.1}s` }}>
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                <span style={{ fontFamily:'monospace', fontSize:15, fontWeight:700, color:'#94a3b8' }}>{r.from}</span>
                <span className="arr" style={{ color:'#f59e0b', fontSize:18 }}>→</span>
                <div>
                  <div className="td-val">{r.to}</div>
                  <div style={{ fontSize:11, color:'rgba(255,255,255,.4)', marginTop:1 }}>= {r.inv}</div>
                </div>
              </div>
            </div>
          ))}
          <div className="card" style={{ marginTop:4, background:'rgba(248,113,113,.06)', borderColor:'rgba(248,113,113,.25)' }}>
            <p style={{ fontSize:12, color:'#fca5a5' }}>
              ⚠ Masa ≠ Fuerza. 1 kg-masa no es igual a 1 kg-fuerza.

function SceneTest() {
  const [current, setCurrent]   = useState(0);
  const [selected, setSelected] = useState(null);   // índice opción elegida
  const [confirmed, setConfirmed] = useState(false); // si ya confirmó respuesta
  const [answers, setAnswers]   = useState([]);      // {qi, chosen, correct}
  const [finished, setFinished] = useState(false);

  const q = TEST_QUESTIONS[current];
  const isCorrect = selected === q.ans;
  const score = answers.filter(a => a.correct).length;

  function confirm() {
    if (selected === null) return;
    setConfirmed(true);
    setAnswers(prev => [...prev, { qi: current, chosen: selected, correct: selected === q.ans }]);
  }

  function next() {
    if (current < TEST_QUESTIONS.length - 1) {
      setCurrent(c => c + 1);
      setSelected(null);
      setConfirmed(false);
    } else {
      setFinished(true);
    }
  }

  function retry() {
    setCurrent(0);
    setSelected(null);
    setConfirmed(false);
    setAnswers([]);
    setFinished(false);
  }

  // ── Result screen ──
  if (finished) {
    const pct = Math.round((score / TEST_QUESTIONS.length) * 100);
    const [badge, color, msg] =
      pct >= 90 ? ["🏆 Experto", "#f59e0b", "¡Dominas completamente las unidades de medida!"] :
      pct >= 70 ? ["✅ Aprobado", "#4ade80", "Buen manejo del tema. Repasa los errores para consolidar."] :
      pct >= 50 ? ["📘 En proceso", "#22d3ee", "Vas por buen camino. Vuelve a revisar las conversiones."] :
                  ["🔄 Repasar", "#f87171", "Te recomendamos revisar la clase antes de continuar."];

    return (
      <div className="grid-bg" style={{ minHeight:'100%', display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center', padding:'32px 24px' }}>
        <div className="fade card" style={{ maxWidth:520, width:'100%', textAlign:'center', padding:'32px 28px' }}>
          <div style={{ fontSize:56, marginBottom:12 }}>
            {pct >= 90 ? '🏆' : pct >= 70 ? '🎯' : pct >= 50 ? '📖' : '🔄'}
          </div>
          <div style={{ fontSize:22, fontWeight:800, color, marginBottom:8 }}>{badge}</div>
          <div style={{ fontSize:48, fontWeight:900, color:'#f59e0b', lineHeight:1, marginBottom:4 }}>
            {score}<span style={{ fontSize:24, color:'rgba(255,255,255,.4)' }}>/{TEST_QUESTIONS.length}</span>
          </div>
          <div style={{ fontSize:13, color:'rgba(255,255,255,.5)', marginBottom:16 }}>{pct}% correctas</div>

          {/* Progress bar */}
          <div className="prog-track" style={{ height:8, marginBottom:20 }}>
            <div className="prog-fill" style={{ width:`${pct}%`, background: `linear-gradient(90deg, ${color}, ${color}aa)` }} />
          </div>

          <p style={{ fontSize:14, color:'rgba(255,255,255,.7)', lineHeight:1.6, marginBottom:24 }}>{msg}</p>

          {/* Per-question review */}
          <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:24, textAlign:'left' }}>
            {answers.map((a, i) => (
              <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'8px 12px',
                borderRadius:8, background: a.correct ? 'rgba(74,222,128,.08)' : 'rgba(248,113,113,.08)',
                border: `1px solid ${a.correct ? 'rgba(74,222,128,.25)' : 'rgba(248,113,113,.25)'}` }}>
                <span style={{ fontSize:16, flexShrink:0, marginTop:1 }}>{a.correct ? '✅' : '❌'}</span>
                <div>
                  <p style={{ fontSize:12, color:'rgba(255,255,255,.7)', lineHeight:1.4 }}>
                    <strong style={{ color: a.correct ? '#4ade80' : '#f87171' }}>P{i+1}.</strong>{' '}
                    {TEST_QUESTIONS[a.qi].q}
                  </p>
                  {!a.correct && (
                    <p style={{ fontSize:11, color:'rgba(255,255,255,.45)', marginTop:3 }}>
                      Respuesta correcta: <span style={{ color:'#4ade80' }}>{TEST_QUESTIONS[a.qi].opts[TEST_QUESTIONS[a.qi].ans]}</span>
                    </p>
                  )}
                </div>
              </div>
            ))}
          </div>

          <button onClick={retry}
            style={{ background:'rgba(245,158,11,.15)', border:'1px solid rgba(245,158,11,.4)',

              fontWeight:700, cursor:'pointer', transition:'all .2s' }}>
            🔁 Intentar de nuevo
          </button>
        </div>
      </div>
    );
  }

  // ── Question screen ──
  const progress = ((current) / TEST_QUESTIONS.length) * 100;

  return (
    <div className="grid-bg" style={{ minHeight:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', padding:'28px 20px' }}>

            let color = 'rgba(255,255,255,.8)';

              bg = 'rgba(245,158,11,.12)';
              border = '1px solid rgba(245,158,11,.6)';
              color = '#f59e0b';
            }
            if (confirmed) {
              if (i === q.ans) {
                bg = 'rgba(74,222,128,.12)';
                border = '1px solid rgba(74,222,128,.5)';
                color = '#4ade80';
                icon = '✅';
              } else if (selected === i) {
                bg = 'rgba(248,113,113,.12)';
                border = '1px solid rgba(248,113,113,.5)';
                color = '#f87171';
                icon = '❌';
              }
            }

            return (
              <button key={i} onClick={() => !confirmed && setSelected(i)}
                style={{ display:'flex', alignItems:'center', gap:12, textAlign:'left',
                  background:bg, border, borderRadius:10, padding:'12px 16px',
                  cursor: confirmed ? 'default' : 'pointer', transition:'all .18s',
                  color, fontSize:14, fontWeight: selected===i||confirmed?600:400,
                  width:'100%' }}>
                <span style={{ flexShrink:0, width:24, height:24, borderRadius:'50%',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  background: confirmed && i===q.ans ? 'rgba(74,222,128,.2)'
                    : confirmed && selected===i ? 'rgba(248,113,113,.2)'
                    : selected===i ? 'rgba(245,158,11,.2)' : 'rgba(255,255,255,.08)',
                  border: `1px solid ${confirmed && i===q.ans ? 'rgba(74,222,128,.4)'
                    : confirmed && selected===i ? 'rgba(248,113,113,.4)'
                    : selected===i ? 'rgba(245,158,11,.4)' : 'rgba(255,255,255,.15)'}`,
                  fontSize:11, fontWeight:700, color:'inherit' }}>
                  {icon || String.fromCharCode(65+i)}
                </span>
                {opt}
              </button>
            );
          })}
        </div>

        {/* Feedback */}
        {confirmed && (
          <div className="fade" style={{ padding:'12px 14px', borderRadius:10, marginBottom:16,
            background: isCorrect ? 'rgba(74,222,128,.08)' : 'rgba(248,113,113,.08)',
            border: `1px solid ${isCorrect ? 'rgba(74,222,128,.25)' : 'rgba(248,113,113,.25)'}` }}>
            <p style={{ fontSize:13, fontWeight:700, color: isCorrect ? '#4ade80' : '#f87171', marginBottom:4 }}>
              {isCorrect ? '¡Correcto! 🎉' : 'Incorrecto'}
            </p>
            <p style={{ fontSize:12, color:'rgba(255,255,255,.6)', lineHeight:1.55 }}>{q.exp}</p>
          </div>
        )}

        {/* Action buttons */}
        <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
          {!confirmed ? (
            <button onClick={confirm} disabled={selected === null}
              style={{ background: selected!==null ? 'rgba(245,158,11,.15)' : 'rgba(255,255,255,.04)',
                border: `1px solid ${selected!==null ? 'rgba(245,158,11,.5)' : 'rgba(255,255,255,.12)'}`,
                color: selected!==null ? '#f59e0b' : 'rgba(255,255,255,.3)',
                borderRadius:10, padding:'9px 22px', fontSize:13, fontWeight:700,
                cursor: selected!==null ? 'pointer' : 'not-allowed', transition:'all .2s' }}>
              Confirmar respuesta
            </button>
          ) : (
            <button onClick={next}
              style={{ background:'rgba(245,158,11,.2)', border:'1px solid rgba(245,158,11,.5)',
                color:'#f59e0b', borderRadius:10, padding:'9px 22px', fontSize:13,
                fontWeight:700, cursor:'pointer', transition:'all .2s' }}>
              {current < TEST_QUESTIONS.length - 1 ? 'Siguiente →' : 'Ver resultados →'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ────────────────────────────────────────────────────────────────── */
const SCENES = [
  { id:'intro',     label:'Introducción',   Component: SceneIntro       },
  { id:'si-base',   label:'SI · Unidades Base', Component: SceneSIBase  },
  { id:'si-der',    label:'SI · Derivadas', Component: SceneSIDerived   },
  { id:'imperial',  label:'Sistema Imperial', Component: SceneImperial  },
  { id:'longitud',  label:'Conversiones: Longitud y Masa', Component: SceneConvLengthMass },
  { id:'presion',   label:'Conversiones: Presión',  Component: SceneConvPressure  },
  { id:'temp',      label:'Conversiones: Temperatura', Component: SceneConvTemp  },
  { id:'resumen',   label:'Tabla Maestra',  Component: SceneResumen     },
  { id:'cierre',    label:'Cierre',         Component: SceneCierre      },
  { id:'test',      label:'Test de Evaluación', Component: SceneTest    },
];

function App() {
  const [scene, setScene] = useState(0);
  const [key,   setKey]   = useState(0);

  function goTo(i) {
    setScene(i);
    setKey(k=>k+1);
  }
  function prev() { if(scene>0) goTo(scene-1); }
  function next() { if(scene<SCENES.length-1) goTo(scene+1); }

  useEffect(()=>{
    const h = (e)=>{
      if(e.key==='ArrowRight'||e.key==='ArrowDown') next();
      if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   prev();
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[scene]);

  const { Component } = SCENES[scene];

  return (
    <div style={{ position:'relative', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* PRO badge */}
      <div style={{ position:'absolute', top:10, left:10, zIndex:100,
        background:'linear-gradient(135deg,#f59e0b,#d97706)', color:'#000',
        fontSize:10, fontWeight:900, letterSpacing:'.1em',
        padding:'3px 10px', borderRadius:20 }}>PRO</div>

      {/* Scene label */}
      <div style={{ position:'absolute', top:10, right:10, zIndex:100,
        background:'rgba(0,0,0,.5)', color:'rgba(255,255,255,.6)',
        fontSize:11, padding:'3px 10px', borderRadius:10 }}>
        {SCENES[scene].label}
      </div>

      {/* Scene */}
      <div key={key} style={{ height:'calc(100% - 48px)', overflowY:'auto' }}>
        <Component />
      </div>

      <PlayBar scene={scene} total={SCENES.length}
        onPrev={prev} onNext={next} onGo={goTo} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
