<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>Clase 2.1 — Medición de Presión</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0}
  #root{width:1280px;height:720px;position:relative}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const BG='#080c18', NAVY='#0d1428', CARD='#111827', BORDER='#1e3a5f';
const GOLD='#f59e0b', GOLD2='#fbbf24', BLUE='#3b82f6', CYAN='#22d3ee';
const GREEN='#4ade80', RED='#f87171', VIOLET='#a78bfa', ORANGE='#fb923c';

/* ─── QUIZ ───────────────────────────────────────────────────── */
const QUIZ=[
  {q:'¿Cuál es la unidad de presión del Sistema Internacional (SI)?',
   opts:['Bar','Psi','Pascal (Pa)','Atm'],correct:2},
  {q:'La presión manométrica (gauge) se mide respecto a:',
   opts:['El vacío absoluto','La presión atmosférica local','El nivel del mar','0 bar'],correct:1},
  {q:'¿Qué elemento sensible utiliza el manómetro tipo Bourdon?',
   opts:['Membrana plana','Tubo curvado de sección elíptica','Fuelle metálico','Strain gauge'],correct:1},
  {q:'Un transmisor de presión diferencial (DP) mide:',
   opts:['La presión absoluta del proceso','La diferencia de presión entre dos puntos','La presión manométrica','Solo presiones negativas'],correct:1},
  {q:'¿Cuántos Pa equivalen a 1 bar?',
   opts:['1 000 Pa','10 000 Pa','100 000 Pa','1 000 000 Pa'],correct:2},
  {q:'¿Qué tipo de presión mide un manómetro de vacío?',
   opts:['Presión manométrica positiva','Presión absoluta mayor que la atmosférica','Presión por debajo de la atmosférica','Presión diferencial'],correct:2},
  {q:'El rango típico de un transmisor de presión DP industrial es:',
   opts:['0-10 000 bar','0-10 mbar a 0-100 bar según modelo','Solo 4-20 mA','Fijo de 0-1 bar'],correct:1},
  {q:'¿Cuál es el principio de funcionamiento del manómetro de Bourdon?',
   opts:['El tubo se deforma por temperatura','El tubo tiende a enderezarse cuando aumenta la presión interior','El diafragma se dobla por diferencia de presión','El fuelle se comprime linealmente'],correct:1},
  {q:'¿Qué es la presión absoluta?',
   opts:['Presión medida por encima de la atmosférica','Presión referida al vacío perfecto (0 Pa absoluto)','Presión negativa respecto a la atmósfera','Presión diferencial entre dos tuberías'],correct:1},
  {q:'En un transmisor DP con rango 0-100 mbar, si la salida es 12 mA, la presión diferencial es:',
   opts:['50 mbar','60 mbar','50 mbar','25 mbar'],correct:1},
];

/* ─── SHARED ─────────────────────────────────────────────────── */
function SectionTitle({icon,color,title,sub}){
  return(
    <div style={{textAlign:'center',marginBottom:4}}>
      <div style={{fontSize:30,marginBottom:4}}>{icon}</div>
      <div style={{fontSize:32,fontWeight:800,color:'#fff'}}>{title}</div>
      <div style={{fontSize:14,color:'#64748b',marginTop:4}}>{sub}</div>
      <div style={{width:60,height:3,background:color,borderRadius:2,margin:'10px auto 0'}}/>
    </div>
  );
}
function InfoBox({color,title,children}){
  return(
    <div style={{background:'#0a1628',border:`1px solid ${color}44`,borderRadius:10,padding:'14px 18px'}}>
      <div style={{fontSize:12,color,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>{title}</div>
      <div style={{fontSize:13,color:'#cbd5e1',lineHeight:1.7}}>{children}</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SCENE 1 — INTRO
═══════════════════════════════════════════════════════════════ */
function SceneIntro(){
  const [tick,setTick]=useState(0);
  useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),700);return()=>clearInterval(id);},[]);

  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative'}}>
      <div style={{position:'absolute',top:48,textAlign:'center'}}>
        <div style={{fontSize:13,letterSpacing:4,color:GOLD,textTransform:'uppercase',marginBottom:8}}>Módulo 2 · Clase 2.1</div>
        <div style={{fontSize:52,fontWeight:800,color:'#fff',lineHeight:1.1}}>Medición de Presión</div>
        <div style={{fontSize:18,color:'#94a3b8',marginTop:12}}>Bourdon · Diafragma · Fuelle · Transmisores DP · Unidades</div>
      </div>

      {/* animated manometer */}
      <ManometerAnim tick={tick}/>

      <div style={{position:'absolute',bottom:48,display:'flex',gap:20}}>
        {[
          {icon:'🔵',label:'Presión Absoluta',sub:'Ref: vacío perfecto',c:CYAN},
          {icon:'🟡',label:'Presión Manométrica',sub:'Ref: atmósfera local',c:GOLD},
          {icon:'🟢',label:'Presión Diferencial',sub:'Entre dos puntos',c:GREEN},
          {icon:'🔴',label:'Vacío / Depresión',sub:'Bajo la atmosférica',c:RED},
          {icon:'🟣',label:'Presión Absoluta',sub:'Ref: vacío perfecto',c:VIOLET},
        ].map((t,i)=>(
          <div key={i} style={{background:CARD,border:`1px solid ${t.c}33`,borderRadius:10,padding:'10px 16px',textAlign:'center',minWidth:150}}>
            <div style={{fontSize:20}}>{t.icon}</div>
            <div style={{fontSize:12,fontWeight:700,color:t.c,marginTop:4}}>{t.label}</div>
            <div style={{fontSize:10,color:'#64748b'}}>{t.sub}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ManometerAnim({tick}){
  const angle=-130+((tick%40)/39)*260;
  return(
    <svg width={300} height={280} style={{marginTop:60}}>
      {/* gauge body */}
      <circle cx={150} cy={150} r={120} fill={CARD} stroke={GOLD} strokeWidth={4}/>
      <circle cx={150} cy={150} r={110} fill='none' stroke='#1e3a5f' strokeWidth={1}/>
      {/* scale marks */}
      {Array.from({length:11},(_,i)=>{
        const a=(-130+i*26)*Math.PI/180;
        const r1=95, r2=110;
        return(
          <g key={i}>
            <line x1={150+r1*Math.cos(a)} y1={150+r1*Math.sin(a)}
              x2={150+r2*Math.cos(a)} y2={150+r2*Math.sin(a)}
              stroke={GOLD} strokeWidth={i%5===0?3:1}/>
            {i%5===0&&(
              <text x={150+78*Math.cos(a)} y={154+78*Math.sin(a)}
                fill='#94a3b8' fontSize={11} textAnchor='middle'>{i*10}</text>
            )}
          </g>
        );
      })}
      {/* needle */}
      <line x1={150} y1={150}
        x2={150+80*Math.cos(angle*Math.PI/180)}
        y2={150+80*Math.sin(angle*Math.PI/180)}
        stroke={RED} strokeWidth={3} strokeLinecap='round'/>
      <circle cx={150} cy={150} r={8} fill={GOLD}/>
      {/* labels */}
      <text x={150} y={200} fill='#64748b' fontSize={11} textAnchor='middle'>bar</text>
      <text x={150} y={220} fill={GOLD} fontSize={13} fontWeight='bold' textAnchor='middle'>MANÓMETRO</text>
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SCENE 2 — TIPOS DE PRESIÓN
═══════════════════════════════════════════════════════════════ */
function SceneTipos(){
  const [sel,setSel]=useState(0);
  const tipos=[
    {id:0,name:'Presión Absoluta',abbr:'Pabs',color:CYAN,
     def:'Presión medida respecto al vacío perfecto (0 Pa). No puede ser negativa.',
     formula:'P_abs = P_man + P_atm',
     ej:'Presión en recipientes herméticos, termodinámica, vapor de agua.',
     rango:'0 a ∞ (siempre positiva)',
     instrumento:'Transmisor de presión absoluta'},
    {id:1,name:'Presión Manométrica',abbr:'Pman / Gauge',color:GOLD,
     def:'Presión medida respecto a la presión atmosférica local. Puede ser positiva o negativa.',
     formula:'P_man = P_abs − P_atm',
     ej:'Manómetros de procesos industriales, neumáticos, hidráulicos.',
     rango:'-1 bar a miles de bar',
     instrumento:'Manómetro Bourdon, transmisor gauge'},
    {id:2,name:'Presión Diferencial',abbr:'DP / ΔP',color:GREEN,
     def:'Diferencia de presión entre dos puntos del proceso. Base de la medición de caudal.',
     formula:'ΔP = P₁ − P₂',
     ej:'Placa orificio, filtros, intercambiadores, nivel por columna hidrostática.',
     rango:'0.1 mbar a 100 bar ΔP',
     instrumento:'Transmisor DP (célula de silicio o capacitivo)'},
    {id:3,name:'Vacío / Depresión',abbr:'Pvac',color:RED,
     def:'Presión por debajo de la atmosférica. Expresada como presión manométrica negativa.',
     formula:'P_vac = P_atm − P_abs',
     ej:'Bombas de vacío, evaporadores, destilación al vacío.',
     rango:'0 a 101.325 kPa (vacío perfecto)',
     instrumento:'Vacuómetro, transmisor con rango negativo'},
  ];
  const t=tipos[sel];

  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',padding:'36px 80px'}}>
      <SectionTitle icon='📐' color={CYAN} title='Tipos de Presión' sub='La referencia define el tipo — elige la correcta para cada aplicación'/>

      <div style={{display:'flex',gap:36,marginTop:24,width:'100%',flex:1}}>
        {/* selector */}
        <div style={{width:220,display:'flex',flexDirection:'column',gap:10}}>
          {tipos.map(tp=>(
            <button key={tp.id} onClick={()=>setSel(tp.id)}
              style={{padding:'14px 16px',borderRadius:10,border:`2px solid ${tp.color}`,
                background:sel===tp.id?tp.color:'transparent',
                color:sel===tp.id?BG:tp.color,
                fontWeight:700,fontSize:13,cursor:'pointer',textAlign:'left',
                transition:'all 0.2s'}}>
              <div>{tp.name}</div>
              <div style={{fontSize:10,fontWeight:400,opacity:0.8}}>{tp.abbr}</div>
            </button>
          ))}
        </div>

        {/* detail */}
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:14}}>
          <div style={{background:CARD,border:`2px solid ${t.color}`,borderRadius:12,padding:22,animation:'fadeIn 0.2s'}}>
            <div style={{fontSize:22,fontWeight:800,color:t.color,marginBottom:12}}>{t.name}</div>
            <div style={{fontSize:14,color:'#cbd5e1',lineHeight:1.8,marginBottom:14}}>{t.def}</div>
            <div style={{fontFamily:'monospace',fontSize:16,color:t.color,background:'#0a1628',padding:'10px 14px',borderRadius:6,marginBottom:12}}>
              {t.formula}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[
                {k:'Ejemplo',v:t.ej},
                {k:'Rango típico',v:t.rango},
                {k:'Instrumento',v:t.instrumento},
              ].map((r,i)=>(
                <div key={i} style={{background:'#0a1628',border:`1px solid ${t.color}22`,borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:0.8,marginBottom:4}}>{r.k}</div>
                  <div style={{fontSize:12,color:'#e2e8f0'}}>{r.v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* pressure scale diagram */}
          <PressureScale sel={sel} color={t.color}/>
        </div>
      </div>
      <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}}`}</style>
    </div>
  );
}

function PressureScale({sel,color}){
  // Visual showing absolute, atm, gauge relationship
  const atmPx=80, absPx=200;
  return(
    <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:'14px 20px',flex:1}}>
      <div style={{fontSize:11,color:'#64748b',marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>Escala de referencia</div>
      <svg width='100%' height={120}>
        {/* vacuum baseline */}
        <line x1={40} y1={100} x2={900} y2={100} stroke='#1e3a5f' strokeWidth={2}/>
        <text x={0} y={104} fill='#475569' fontSize={10}>0 (vacío)</text>
        {/* atm line */}
        <line x1={40} y1={100-atmPx} x2={900} y2={100-atmPx} stroke={GOLD} strokeWidth={1.5} strokeDasharray='6,4'/>
        <text x={0} y={100-atmPx+4} fill={GOLD} fontSize={10}>Patm</text>
        {/* abs pressure bar */}
        <rect x={100} y={100-absPx} width={60} height={absPx} fill={`${CYAN}33`} stroke={CYAN} strokeWidth={1.5} rx={3}/>
        <text x={130} y={100-absPx-6} fill={CYAN} fontSize={10} textAnchor='middle'>Pabs</text>
        {/* gauge pressure bar */}
        <rect x={220} y={100-absPx} width={60} height={absPx-atmPx} fill={`${GOLD}33`} stroke={GOLD} strokeWidth={1.5} rx={3}/>
        <text x={250} y={100-absPx-6} fill={GOLD} fontSize={10} textAnchor='middle'>Pman</text>
        <line x1={220} y1={100-atmPx} x2={280} y2={100-atmPx} stroke={GOLD} strokeWidth={2}/>
        {/* DP bar */}
        <rect x={340} y={100-absPx} width={60} height={30} fill={`${GREEN}33`} stroke={GREEN} strokeWidth={1.5} rx={3}/>
        <rect x={340} y={100-absPx+30} width={60} height={30} fill={`${GREEN}11`} stroke={`${GREEN}44`} strokeWidth={1} rx={3}/>
        <text x={370} y={100-absPx-6} fill={GREEN} fontSize={10} textAnchor='middle'>ΔP=P1-P2</text>
        {/* vacuum */}
        <rect x={460} y={100-atmPx+10} width={60} height={atmPx-10} fill={`${RED}33`} stroke={RED} strokeWidth={1.5} rx={3}/>
        <text x={490} y={100-atmPx+4} fill={RED} fontSize={10} textAnchor='middle'>Pvac</text>
        {/* labels */}
        <text x={130} y={115} fill='#64748b' fontSize={9} textAnchor='middle'>Absoluta</text>
        <text x={250} y={115} fill='#64748b' fontSize={9} textAnchor='middle'>Manométrica</text>
        <text x={370} y={115} fill='#64748b' fontSize={9} textAnchor='middle'>Diferencial</text>
        <text x={490} y={115} fill='#64748b' fontSize={9} textAnchor='middle'>Vacío</text>
      </svg>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SCENE 3 — UNIDADES DE PRESIÓN
═══════════════════════════════════════════════════════════════ */
function SceneUnidades(){
  const [from,setFrom]=useState('bar');
  const [val,setVal]=useState(1);

  // All conversions to Pa
  const toPa={
    'Pa':1,'kPa':1e3,'MPa':1e6,'bar':1e5,'mbar':100,
    'psi':6894.76,'atm':101325,'mmHg':133.322,'mmH2O':9.80665,'inH2O':249.089,'inHg':3386.39,
  };
  const units=Object.keys(toPa);
  const valPa=(val||0)*toPa[from];

  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',padding:'36px 80px'}}>
      <SectionTitle icon='📏' color={VIOLET} title='Unidades de Presión' sub='Conversión universal — una sola presión, muchas escalas'/>

      <div style={{display:'flex',gap:40,marginTop:24,width:'100%'}}>
        {/* input */}
        <div style={{width:300}}>
          <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:20}}>
            <div style={{fontSize:12,color:VIOLET,fontWeight:700,marginBottom:12,textTransform:'uppercase',letterSpacing:1}}>Convertir desde</div>
            <input type='number' value={val} onChange={e=>setVal(parseFloat(e.target.value)||0)}
              style={{width:'100%',background:'#0a1628',border:`1px solid ${BORDER}`,borderRadius:8,
                padding:'10px 14px',color:'#e2e8f0',fontSize:22,fontWeight:700,marginBottom:12}}/>
            <select value={from} onChange={e=>setFrom(e.target.value)}
              style={{width:'100%',background:'#0a1628',border:`1px solid ${BORDER}`,borderRadius:8,
                padding:'10px 14px',color:'#e2e8f0',fontSize:16}}>
              {units.map(u=><option key={u} value={u}>{u}</option>)}
            </select>
          </div>

          {/* reference card */}
          <div style={{marginTop:16,background:'#0a1628',border:`1px solid ${VIOLET}33`,borderRadius:10,padding:'12px 16px'}}>
            <div style={{fontSize:11,color:VIOLET,fontWeight:700,marginBottom:8}}>VALORES DE REFERENCIA</div>
            {[
              {l:'Presión atmosférica estándar',v:'1.01325 bar = 14.696 psi'},
              {l:'Presión vacío perfecto',v:'0 Pa absolutos'},
              {l:'1 bar',v:'≈ 10.2 m columna H₂O'},
              {l:'1 psi',v:'≈ 0.0689 bar'},
            ].map((r,i)=>(
              <div key={i} style={{borderBottom:'1px solid #1e3a5f',padding:'5px 0',fontSize:11}}>
                <div style={{color:'#64748b'}}>{r.l}</div>
                <div style={{color:'#e2e8f0',fontWeight:600}}>{r.v}</div>
              </div>
            ))}
          </div>
        </div>

        {/* results grid */}
        <div style={{flex:1}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {units.filter(u=>u!==from).map(u=>{
              const converted=valPa/toPa[u];
              const magnitude=Math.abs(converted);
              const displayVal=magnitude>=1000?converted.toExponential(4):
                               magnitude>=0.001?converted.toPrecision(6):'< 0.001';
              return(
                <div key={u} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:8,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:13,color:'#64748b',fontWeight:600}}>{u}</span>
                  <span style={{fontSize:18,fontWeight:800,color:VIOLET,fontFamily:'monospace'}}>{typeof displayVal==='string'?displayVal:Number(displayVal).toPrecision(6).replace(/\.?0+$/,'')}</span>
                </div>
              );
            })}
          </div>

          {/* equivalence visual */}
          <div style={{marginTop:16,background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:'14px 20px'}}>
            <div style={{fontSize:11,color:'#64748b',marginBottom:8,textTransform:'uppercase',letterSpacing:1}}>Jerarquía de uso industrial</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {[
                {u:'Pa',use:'Precisión / HVAC'},
                {u:'kPa',use:'Instrumentación general'},
                {u:'bar',use:'Procesos industriales'},
                {u:'psi',use:'EE.UU. / sistemas anglosajones'},
                {u:'mbar',use:'Fluidos de baja presión'},
                {u:'mmHg',use:'Medicina / vacío'},
                {u:'atm',use:'Termodinámica'},
                {u:'inH2O',use:'HVAC / filtros'},
              ].map((r,i)=>(
                <div key={i} style={{background:'#0a1628',border:`1px solid ${VIOLET}22`,borderRadius:6,padding:'6px 10px'}}>
                  <span style={{color:VIOLET,fontWeight:700,fontSize:12}}>{r.u}</span>
                  <span style={{color:'#64748b',fontSize:10,marginLeft:6}}>{r.use}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SCENE 4 — MANÓMETRO BOURDON (Interactivo)
═══════════════════════════════════════════════════════════════ */
function SceneBourdon(){
  const [pct,setPct]=useState(40);
  const maxBar=10;
  const pBar=(pct/100)*maxBar;
  // Bourdon angle: at 0% needle at -135°, at 100% at +135°
  const needleAngle=-135+(pct/100)*270;
  // tube end displacement
  const tubeTip={
    x:300+Math.cos((needleAngle-90)*Math.PI/180)*60,
    y:200+Math.sin((needleAngle-90)*Math.PI/180)*60,
  };

  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',padding:'32px 80px'}}>
      <SectionTitle icon='🔵' color={GOLD} title='Manómetro tipo Bourdon' sub='Tubo de sección elíptica — se endereza al aumentar la presión interior'/>

      <div style={{display:'flex',gap:48,marginTop:20,width:'100%',alignItems:'flex-start'}}>
        {/* left: explanation */}
        <div style={{flex:1}}>
          <InfoBox color={GOLD} title='Principio de funcionamiento'>
            El <b style={{color:GOLD}}>tubo de Bourdon</b> es un tubo metálico de sección elíptica, doblado en arco circular. Al aplicar presión interior, la sección tiende a hacerse circular, <b>enderezando el tubo</b> y desplazando su extremo libre. Este movimiento, amplificado por una cremallera y piñón, mueve la aguja indicadora.
          </InfoBox>

          <div style={{marginTop:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[
              {icon:'📐',label:'Material',v:'Latón, bronce fosfórico, acero inoxidable'},
              {icon:'📊',label:'Rango',v:'0.6 bar hasta 6000 bar'},
              {icon:'🎯',label:'Exactitud',v:'±0.5% a ±1% del fondo de escala'},
              {icon:'⚡',label:'Respuesta',v:'Instantánea (mecánica)'},
              {icon:'🌡️',label:'Temperatura',v:'-40 °C a +200 °C según material'},
              {icon:'🔧',label:'Tipos',v:'En C, helicoidal, espiral'},
            ].map((f,i)=>(
              <div key={i} style={{background:CARD,border:`1px solid ${GOLD}33`,borderRadius:8,padding:'8px 12px',display:'flex',gap:8,alignItems:'flex-start'}}>
                <span style={{fontSize:16}}>{f.icon}</span>
                <div>
                  <div style={{fontSize:10,color:GOLD,fontWeight:700}}>{f.label}</div>
                  <div style={{fontSize:11,color:'#94a3b8'}}>{f.v}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{marginTop:14,background:'#0a1628',border:`1px solid ${GOLD}33`,borderRadius:8,padding:'10px 14px'}}>
            <div style={{fontSize:11,color:GOLD,fontWeight:700,marginBottom:6}}>VARIANTES DEL TUBO</div>
            <div style={{display:'flex',gap:12}}>
              {[
                {n:'En C',sub:'0-600 bar · más común'},
                {n:'Helicoidal',sub:'Mayor sensibilidad · alta presión'},
                {n:'Espiral',sub:'Registradores · baja presión'},

function BourdonGauge({pct,pBar,maxBar}){
  const cx=160,cy=155,r=120;
  const startA=-225, endA=45; // degrees
  const needleA=startA+(pct/100)*(endA-startA);
  const toRad=a=>a*Math.PI/180;
  const marks=Array.from({length:11},(_,i)=>i);

  return(
    <svg width={320} height={280}>
      {/* outer ring */}
      <circle cx={cx} cy={cy} r={r+8} fill={CARD} stroke={GOLD} strokeWidth={3}/>
      <circle cx={cx} cy={cy} r={r} fill='#0a1628'/>
      {/* scale arc */}
      {marks.map(i=>{
        const a=startA+(i/10)*(endA-startA);
        const r1=r-8, r2=r-18;
        const isMajor=i%5===0||i===10;
        return(
          <g key={i}>
            <line
              x1={cx+r1*Math.cos(toRad(a))} y1={cy+r1*Math.sin(toRad(a))}
              x2={cx+r2*Math.cos(toRad(a))} y2={cy+r2*Math.sin(toRad(a))}
              stroke={GOLD} strokeWidth={isMajor?2.5:1.5} opacity={isMajor?1:0.5}/>
            {isMajor&&(
              <text
                x={cx+(r-28)*Math.cos(toRad(a))} y={cy+(r-28)*Math.sin(toRad(a))+4}
                fill='#e2e8f0' fontSize={10} textAnchor='middle'>
                {((i/10)*maxBar).toFixed(0)}
              </text>
            )}
          </g>
        );
      })}
      {/* colored zone */}
      {/* red zone > 80% */}
      <path d={`M ${cx+r*0.7*Math.cos(toRad(startA+(0.8)*(endA-startA)))} ${cy+r*0.7*Math.sin(toRad(startA+(0.8)*(endA-startA)))}
                L ${cx+(r-2)*Math.cos(toRad(startA+(0.8)*(endA-startA)))} ${cy+(r-2)*Math.sin(toRad(startA+(0.8)*(endA-startA)))}`}
        stroke='none'/>
      {/* needle */}
      <line
        x1={cx} y1={cy}
        x2={cx+90*Math.cos(toRad(needleA))} y2={cy+90*Math.sin(toRad(needleA))}
        stroke={RED} strokeWidth={3} strokeLinecap='round'
        style={{transition:'all 0.05s'}}/>
      {/* center cap */}
      <circle cx={cx} cy={cy} r={10} fill={GOLD}/>
      {/* reading */}
      <text x={cx} y={cy+45} fill={GOLD} fontSize={18} fontWeight='bold' textAnchor='middle'>{pBar.toFixed(1)}</text>
      <text x={cx} y={cy+58} fill='#64748b' fontSize={10} textAnchor='middle'>bar</text>
      {/* label */}
      <text x={cx} y={cy+85} fill='#94a3b8' fontSize={11} textAnchor='middle'>MANÓMETRO BOURDON</text>
      <text x={cx} y={cy-100} fill='#475569' fontSize={9} textAnchor='middle'>0 - {maxBar} bar</text>
    </svg>
  );
}

function SceneCalib(){

    {t:'Verificación "As Found"',icon:'🔍',color:GOLD,
     items:['Aplicar 5 puntos de presión: 0%, 25%, 50%, 75%, 100%','Registrar el valor indicado por el instrumento en cada punto','Calcular el error en cada punto: error = lectura – patrón','Comparar con la exactitud especificada por el fabricante','Documentar el estado inicial del instrumento']},
    {t:'Ajuste (si es necesario)',icon:'🔧',color:GREEN,
     items:['Ajuste de cero (zero): corrección en el punto 0%','Ajuste de span: corrección en el punto 100%','Para transmisores HART: ajuste vía software (LTrim, UTrim)','Para manómetros: ajuste mecánico del mecanismo de escuadra','Repetir verificación tras cada ajuste']},
    {t:'Verificación "As Left"',icon:'✅',color:VIOLET,
     items:['Repetir los 5 puntos de presión en subida y bajada','Calcular histéresis: diferencia subida–bajada','Verificar que todos los errores estén dentro del límite','Registrar los valores finales en el certificado','Sellar el instrumento y colocar etiqueta de calibración']},
    {t:'Documentación',icon:'📄',color:ORANGE,
     items:['Completar el certificado de calibración (ISO/IEC 17025)','Registrar: fecha, instrumento, patrón, operador','Incluir tabla de datos "as found" y "as left"','Calcular incertidumbre de la calibración','Archivar y actualizar sistema de gestión de calibraciones']},

  return(

      <div style={{display:'flex',gap:12,marginTop:20}}>
        {steps.map((st,i)=>(
          <button key={i} onClick={()=>setStep(i)}
            style={{flex:1,padding:'8px 10px',borderRadius:8,border:`2px solid ${step===i?st.color:BORDER}`,
              background:step===i?`${st.color}22`:'transparent',
              color:step===i?st.color:'#64748b',cursor:'pointer',fontSize:11,fontWeight:700,textAlign:'center'}}>
            <div style={{fontSize:16,marginBottom:2}}>{st.icon}</div>
            {i+1}. {st.t}

      <div style={{display:'flex',gap:32,marginTop:20,width:'100%',flex:1}}>

        <div style={{flex:1,background:CARD,border:`2px solid ${s.color}`,borderRadius:12,padding:24,animation:'fadeIn 0.2s'}}>
          <div style={{fontSize:24,marginBottom:8}}>{s.icon}</div>
          <div style={{fontSize:20,fontWeight:800,color:s.color,marginBottom:16}}>Paso {step+1}: {s.t}</div>
          {s.items.map((item,i)=>(
            <div key={i} style={{display:'flex',gap:12,marginBottom:12,alignItems:'flex-start'}}>

            <div style={{fontSize:12,color:GOLD,fontWeight:700,marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>Ejemplo hoja de datos</div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr style={{borderBottom:`2px solid ${GOLD}44`}}>
                  {['%','Patrón (bar)','Lectura (bar)','Error (bar)','Error (%)'].map((h,i)=>(
                    <th key={i} style={{padding:'4px 6px',color:GOLD,textAlign:'center',fontWeight:700}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[
                  [0,0,0.01,0.01,0.1],
                  [25,2.5,2.51,0.01,0.1],
                  [50,5.0,5.02,0.02,0.2],

          <div style={{background:'#0a1628',border:`1px solid ${GOLD}22`,borderRadius:8,padding:'12px 14px'}}>
            <div style={{fontSize:11,color:GOLD,fontWeight:700,marginBottom:6}}>PATRONES DE REFERENCIA</div>
            {[

              {p:'Manómetro patrón digital',u:'±0.025% hasta 1000 bar'},
              {p:'Calibrador multipresión HART',u:'±0.02% + comunicación HART'},
            ].map((r,i)=>(
              <div key={i} style={{borderBottom:'1px solid #1e3a5f',padding:'5px 0',fontSize:11}}>

      <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}}`}</style>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SCENE 9 — TEST
═══════════════════════════════════════════════════════════════ */
function SceneTest(){
  const [idx,setIdx]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const q=QUIZ[idx];

  const pick=(i)=>{
    if(chosen!==null)return;
    setChosen(i);
    if(i===q.correct)setScore(s=>s+1);
    setTimeout(()=>{
      if(idx+1<QUIZ.length){setIdx(i=>i+1);setChosen(null);}
      else setDone(true);
    },1400);
  };

  if(done){
    const pct=Math.round(score/QUIZ.length*100);
    const medal=pct>=90?'🥇':pct>=70?'🥈':pct>=50?'🥉':'📚';
    const msg=pct>=90?'¡Dominas la medición de presión!':pct>=70?'¡Muy bien! Repasa los detalles.':pct>=50?'Buen comienzo — estudia más.':'Revisa la clase completa.';
    return(
      <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}}>
        <div style={{fontSize:72}}>{medal}</div>
        <div style={{fontSize:42,fontWeight:800,color:'#fff'}}>{score} / {QUIZ.length}</div>
        <div style={{fontSize:22,color:GOLD}}>{pct}% correcto</div>
        <div style={{fontSize:16,color:'#94a3b8'}}>{msg}</div>
        <button onClick={()=>{setIdx(0);setChosen(null);setScore(0);setDone(false);}}
          style={{marginTop:16,padding:'12px 32px',borderRadius:24,background:GOLD,color:BG,fontWeight:800,fontSize:15,border:'none',cursor:'pointer'}}>
          Repetir Test
        </button>
      </div>
    );
  }

  return(
    <div style={{width:1280,height:720,background:BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 120px',gap:24}}>
      <div style={{fontSize:13,color:GOLD,letterSpacing:3,textTransform:'uppercase'}}>Evaluación · Clase 2.1</div>
      <div style={{width:'100%',height:6,background:'#1e3a5f',borderRadius:3}}>
        <div style={{height:6,borderRadius:3,background:GOLD,width:`${(idx/QUIZ.length)*100}%`,transition:'width 0.4s'}}/>
      </div>
      <div style={{fontSize:11,color:'#475569',alignSelf:'flex-end'}}>{idx+1} / {QUIZ.length}</div>
      <div style={{fontSize:22,fontWeight:700,color:'#fff',textAlign:'center',lineHeight:1.5,maxWidth:820}}>{q.q}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,width:'100%',maxWidth:820}}>
        {q.opts.map((o,i)=>{
          const isCorrect=i===q.correct;
          const isChosen=i===chosen;
          let bg=CARD,border=BORDER,color='#cbd5e1';
          if(chosen!==null){
            if(isCorrect){bg='#14532d';border=GREEN;color=GREEN;}
            else if(isChosen){bg='#450a0a';border=RED;color=RED;}
          }
          return(
            <div key={i} onClick={()=>pick(i)}
              style={{background:bg,border:`2px solid ${border}`,borderRadius:10,
                padding:'16px 20px',cursor:chosen===null?'pointer':'default',
                color,fontSize:14,fontWeight:500,transition:'all 0.2s',lineHeight:1.5}}>
              <span style={{color:GOLD,fontWeight:800,marginRight:10}}>{['A','B','C','D'][i]}.</span>{o}
            </div>
          );
        })}
      </div>
      <div style={{fontSize:13,color:'#475569'}}>Puntuación: {score} pts</div>
    </div>
  );
}

/* ─── NAV + APP ──────────────────────────────────────────────── */
const SCENES=[
  {label:'Intro',comp:SceneIntro},

    <div style={{width:1280,height:720,background:BG,position:'relative',overflow:'hidden'}}>

      <div style={{position:'absolute',bottom:0,left:0,right:0,

            border:'none',cursor:scene===SCENES.length-1?'default':'pointer',fontWeight:700,fontSize:12}}>
          Siguiente →
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
