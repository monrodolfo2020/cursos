<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 2.3 – Medición de Nivel</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.gold{color:#f59e0b;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0f1729 0%,#1a2540 100%);border-bottom:2px solid #f59e0b;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#f59e0b;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#f59e0b22;border:1px solid #f59e0b55;color:#f59e0b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;cursor:pointer;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e2d4a;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;line-height:1.3;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.nav-item.active{color:#f59e0b;border-left-color:#f59e0b;background:#f59e0b10;font-weight:600;}
.main{flex:1;padding:16px 22px;overflow-y:auto;overflow-x:hidden;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:#0d1425;}
.main::-webkit-scrollbar-thumb{background:#f59e0b44;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#f59e0b;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e2d4a;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.formula-box{background:#060a14;border:1px solid #f59e0b33;border-radius:7px;padding:9px 13px;font-family:monospace;font-size:13px;color:#fcd34d;text-align:center;margin:7px 0;}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.btn-gold{background:#f59e0b;color:#080c18;}
.btn-gold:hover{background:#d97706;}
.btn-outline{background:transparent;border:1px solid #f59e0b55;color:#f59e0b;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;}
.btn-outline:hover{background:#f59e0b22;}
.btn-outline.active{background:#f59e0b33;border-color:#f59e0b;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#1e2d4a;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#f59e0b;border-radius:50%;cursor:pointer;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#0f1729;color:#f59e0b;padding:6px 9px;text-align:left;border-bottom:1px solid #1e2d4a;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
td{padding:5px 9px;border-bottom:1px solid #0f1729;color:#cbd5e1;}
tr:hover td{background:#ffffff05;}
.quiz-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;border:1px solid #1e2d4a;cursor:pointer;margin:4px 0;font-size:12px;transition:all .15s;}
.quiz-opt:hover{border-color:#f59e0b55;background:#f59e0b08;}
.quiz-opt.correct{border-color:#22c55e;background:#14532d33;color:#86efac;}
.quiz-opt.wrong{border-color:#ef4444;background:#7f1d1d33;color:#fca5a5;}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin:2px;}
.tag-blue{background:#1e40af44;color:#93c5fd;border:1px solid #1e40af66;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

function Scene1(){
  const [sel,setSel]=useState('cristal');
  const techs={
    cristal:{name:'Nivel de Cristal (gauge glass)',color:'#60a5fa',
      desc:'Tubo de vidrio conectado al tanque con tres válvulas (2 de seguridad + purga). Modos: reflexión (zona líquido oscura) y transparencia (para líquidos coloreados). Válvulas de bola magnéticas cortan automáticamente ante rotura del vidrio.',
      specs:[['Presión máx.','7 bar (normal) / >70 bar (vidrio armado)'],['Temperatura','hasta 400°C'],['Exactitud','Visual / ±10 mm'],['Longitud tramo','0.3–1.5 m']],app:'Calderas, vaporizadores, tanques de proceso'},
    flotador:{name:'Flotador + Indicador Magnético (MLI)',color:'#22c55e',
      desc:'Cable/polea conectado a indicador exterior. MLI: flotador con imán permanente dentro de tubo guía; tiras fluorescentes bicolores (rojo/blanco) rotan al paso del campo magnético. Visible a distancia sin energía eléctrica.',
      specs:[['Exactitud','±0.5%'],['Repetibilidad','±0.01 a ±0.4 mm'],['Presión','hasta 25 bar (flotador) / >25 bar (MLI)'],['Uso','Tanques grandes, materias peligrosas']],app:'Refinería, almacenamiento de crudo, productos tóxicos/inflamables'},
    servo:{name:'Palpador Servooperado',color:'#f97316',
      desc:'Cinta de acero inoxidable perforada en tambor ranurado accionado por servomotor. Disco desciende hasta tocar la superficie; tensión cae → inversión de marcha. Encoder óptico transmite nivel digitalmente. Para inventario fiscal.',
      specs:[['Exactitud','±3 mm'],['Rango','1 mm a 30 m'],['Salida','4–20 mA, HART, Fieldbus'],['Uso','Inventario fiscal — tanques API 650']],app:'Terminales petrolíferas, tanques de almacenamiento fiscal'},
    magneto:{name:'Magnetoestrictivo',color:'#a78bfa',
      desc:'Pulso de corriente por tubo guía crea campo magnético → interacción con imanes del flotador genera onda torsional. Tiempo entre pulso emitido y recibido medido a 10⁻⁸ s. Sin partes mecánicas en movimiento en el proceso.',
      specs:[['Exactitud','±0.01%'],['Rango','0.1–5 m'],['Resolución','0.1 mm'],['Salida','4–20 mA HART, FOUNDATION Fieldbus']],app:'Alta precisión: dosificación, mezcla, tanques de reacción'},
  };
  const t=techs[sel];
  return(
    <div>
      <div className="sec-title">Medida Directa de Nivel</div>
      <div className="sec-sub">Nivel de cristal · Flotador · Indicador magnético · Servopalpador · Magnetoestrictivo</div>
      <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
        {Object.entries(techs).map(([k,v])=>(
          <button key={k} className={`btn-outline${sel===k?' active':''}`} onClick={()=>setSel(k)} style={{fontSize:11}}>{v.name.split('(')[0].split('+')[0].trim()}</button>
        ))}
      </div>
      <div className="grid2">
        <div>
          <div className="card">
            <div className="card-h" style={{color:t.color}}>{t.name}</div>
            <p style={{fontSize:12,color:'#94a3b8',lineHeight:1.6,marginBottom:8}}>{t.desc}</p>
            <table><tbody>{t.specs.map(([k,v],i)=>(
              <tr key={i}><td style={{color:'#64748b',width:130}}>{k}</td><td style={{color:'#fcd34d',fontWeight:600}}>{v}</td></tr>
            ))}</tbody></table>
            <div style={{marginTop:8,padding:'7px 10px',background:'#060a14',borderRadius:6,fontSize:11,color:'#94a3b8'}}>
              🏭 <b style={{color:'#cbd5e1'}}>Aplicación:</b> {t.app}
            </div>
          </div>
        </div>
        <div>
          <div className="card">
            <div className="card-h">Principio visual — {t.name.split('(')[0].trim()}</div>
            <svg width="100%" viewBox="0 0 280 280">
              {sel==='cristal'&&(<>
                <rect x="50" y="20" width="80" height="240" rx="5" fill="#0f1729" stroke="#1e2d4a" strokeWidth="2"/>
                <rect x="52" y="140" width="76" height="118" rx="3" fill="#60a5fa22"/>
                <rect x="170" y="30" width="20" height="220" rx="4" fill="#0f1729" stroke="#60a5fa" strokeWidth="2"/>
                <rect x="172" y="32" width="16" height="218" rx="3" fill="#60a5fa11"/>
                <rect x="172" y="148" width="16" height="102" rx="2" fill="#60a5fa55"/>
                <rect x="150" y="46" width="20" height="14" rx="3" fill="#f59e0b55" stroke="#f59e0b"/>
                <rect x="150" y="228" width="20" height="14" rx="3" fill="#f59e0b55" stroke="#f59e0b"/>
                <rect x="150" y="136" width="20" height="14" rx="3" fill="#ef444455" stroke="#ef4444"/>
                <line x1="90" y1="53" x2="170" y2="53" stroke="#1e2d4a" strokeWidth="3"/>
                <line x1="90" y1="235" x2="170" y2="235" stroke="#1e2d4a" strokeWidth="3"/>
                <text x="90" y="148" textAnchor="middle" fill="#f59e0b" fontSize="10">50%</text>
                <text x="198" y="48" fill="#f59e0b" fontSize="8">V. seguridad</text>
                <text x="198" y="230" fill="#f59e0b" fontSize="8">V. seguridad</text>
                <text x="198" y="145" fill="#ef4444" fontSize="8">Purga</text>
                <text x="90" y="275" textAnchor="middle" fill="#94a3b8" fontSize="9">Tanque proceso</text>
                <text x="180" y="275" textAnchor="middle" fill="#64748b" fontSize="9">Tubo vidrio</text>
              </>)}
              {sel==='flotador'&&(<>
                <rect x="30" y="30" width="120" height="200" rx="6" fill="#0f1729" stroke="#1e2d4a" strokeWidth="2"/>
                <rect x="32" y="130" width="116" height="100" rx="4" fill="#22c55e22"/>
                <ellipse cx="90" cy="128" rx="28" ry="12" fill="#22c55e44" stroke="#22c55e" strokeWidth="2"/>
                <line x1="90" y1="116" x2="90" y2="38" stroke="#94a3b8" strokeWidth="1.5"/>
                <circle cx="90" cy="38" r="6" fill="#0f1729" stroke="#f59e0b"/>
                <rect x="180" y="30" width="30" height="200" rx="4" fill="#0d1425" stroke="#22c55e" strokeWidth="1.5"/>
                <rect x="182" y="130" width="26" height="100" rx="3" fill="#22c55e33"/>
                <rect x="184" y="126" width="22" height="8" rx="2" fill="#22c55e"/>
                <text x="195" y="265" textAnchor="middle" fill="#22c55e" fontSize="8">MLI</text>
                <text x="90" y="268" textAnchor="middle" fill="#94a3b8" fontSize="9">Flotador directo</text>
                <text x="155" y="128" fill="#22c55e" fontSize="9">50%</text>
              </>)}
              {sel==='servo'&&(<>
                <circle cx="140" cy="58" r="34" fill="#0f1729" stroke="#f97316" strokeWidth="2"/>
                <text x="140" y="54" textAnchor="middle" fill="#f97316" fontSize="9">Servo</text>
                <text x="140" y="65" textAnchor="middle" fill="#f97316" fontSize="8">motor</text>
                <line x1="140" y1="92" x2="140" y2="196" stroke="#94a3b8" strokeWidth="2"/>
                <ellipse cx="140" cy="196" rx="18" ry="5" fill="#f97316" stroke="#f97316"/>
                <rect x="65" y="108" width="150" height="152" rx="6" fill="#0f1729" stroke="#1e2d4a" strokeWidth="2"/>
                <rect x="67" y="180" width="146" height="78" rx="4" fill="#3b82f622"/>
                <line x1="65" y1="196" x2="215" y2="196" stroke="#3b82f6" strokeWidth="1.5" strokeDasharray="4,3"/>
                <rect x="160" y="38" width="50" height="26" rx="4" fill="#060a14" stroke="#f59e0b55"/>
                <text x="185" y="50" textAnchor="middle" fill="#f59e0b" fontSize="9">Encoder</text>
                <text x="185" y="60" textAnchor="middle" fill="#94a3b8" fontSize="8">óptico</text>
                <text x="140" y="278" textAnchor="middle" fill="#94a3b8" fontSize="9">Exactitud ±3 mm</text>
              </>)}
              {sel==='magneto'&&(<>
                <rect x="115" y="20" width="18" height="240" rx="4" fill="#0f1729" stroke="#a78bfa" strokeWidth="2"/>
                <ellipse cx="124" cy="160" rx="20" ry="9" fill="#a78bfa33" stroke="#a78bfa" strokeWidth="2"/>
                <text x="124" y="163" textAnchor="middle" fill="#a78bfa" fontSize="9">🧲</text>
                <rect x="28" y="22" width="70" height="32" rx="4" fill="#0d1425" stroke="#a78bfa55"/>
                <text x="63" y="36" textAnchor="middle" fill="#a78bfa" fontSize="9">Pulso I</text>
                <text x="63" y="47" textAnchor="middle" fill="#64748b" fontSize="8">Transmisor</text>
                <path d="M124,165 Q100,175 124,185 Q148,195 124,205" fill="none" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="3,2"/>
                <text x="155" y="185" fill="#f59e0b" fontSize="8">Onda</text>
                <text x="155" y="195" fill="#f59e0b" fontSize="8">torsional</text>
                <rect x="28" y="240" width="70" height="26" rx="4" fill="#0d1425" stroke="#22c55e55"/>
                <text x="63" y="252" textAnchor="middle" fill="#22c55e" fontSize="9">Receptor</text>
                <text x="63" y="262" textAnchor="middle" fill="#64748b" fontSize="8">Δt → nivel</text>
                <line x1="98" y1="38" x2="115" y2="38" stroke="#a78bfa" strokeWidth="1.5" strokeDasharray="3,2"/>
                <line x1="98" y1="253" x2="115" y2="245" stroke="#22c55e" strokeWidth="1.5" strokeDasharray="3,2"/>
                <text x="196" y="160" fill="#a78bfa" fontSize="9">h = v·Δt/2</text>
                <text x="196" y="172" fill="#64748b" fontSize="8">±0.01%</text>
                <text x="124" y="278" textAnchor="middle" fill="#94a3b8" fontSize="9">Magnetoestrictivo</text>
              </>)}
            </svg>
          </div>
        </div>
      </div>
    </div>
  );
}

function Scene2(){
  const [h,setH]=useState(2.0);
  const [rho,setRho]=useState(1000);
  const [tipo,setTipo]=useState('dp');
  const P=(h*rho*9.81/1000).toFixed(3);
  const mbar=(h*rho*9.81/100).toFixed(2);
  const mwc=(h*rho/1000).toFixed(3);
  const fluidos=[['Agua',1000],['Petróleo crudo',850],['Ácido sulfúrico',1835],['Keroseno',800],['Acetona',790],['Mercurio',13600]];
  return(
    <div>
      <div className="sec-title">Medición por Presión Hidrostática</div>
      <div className="sec-sub">Manométrico sumergido · Burbujeo (purga) · Transmisor ΔP — P = h·ρ·g</div>
      <div style={{display:'flex',gap:6,marginBottom:10}}>
        {[['dp','ΔP Transmitter'],['bubbler','Burbujeo'],['sub','Manométrico sumergido']].map(([k,v])=>(
          <button key={k} className={`btn-outline${tipo===k?' active':''}`} onClick={()=>setTipo(k)}>{v}</button>
        ))}
      </div>
      <div className="grid2">
        <div>
          <div className="card">
            <div className="card-h">Calculadora hidrostática</div>
            <div className="formula-box">P = h · ρ · g</div>
            <div style={{margin:'8px 0'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginBottom:4}}>
                <span>Nivel h (m):</span><b className="gold">{h.toFixed(2)} m</b>
              </div>
              <input type="range" min="0.1" max="10" step="0.1" value={h} onChange={e=>setH(+e.target.value)}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginBottom:4,marginTop:8}}>
                <span>Densidad ρ (kg/m³):</span><b className="gold">{rho} kg/m³</b>
              </div>
              <input type="range" min="500" max="2000" step="10" value={rho} onChange={e=>setRho(+e.target.value)}/>
            </div>
            <div style={{background:'#060a14',borderRadius:8,padding:10,display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:10}}>
              {[['kPa',`${P} kPa`,'#22c55e'],['mbar',`${mbar} mbar`,'#60a5fa'],['m.c.a.',`${mwc} m`,'#fcd34d'],['psi',`${(P*0.145).toFixed(3)} psi`,'#f97316']].map(([n,v,c],i)=>(
                <div key={i} style={{textAlign:'center',padding:'6px',background:'#0f1729',borderRadius:6}}>
                  <div style={{fontSize:9,color:'#64748b'}}>{n}</div>
                  <div style={{fontSize:14,fontWeight:700,color:c}}>{v}</div>
                </div>
              ))}
            </div>
            <div className="card-h">Fluidos comunes (clic para usar)</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
              {fluidos.map(([f,r],i)=>(
                <span key={i} className="tag tag-blue" style={{cursor:'pointer'}} onClick={()=>setRho(r)}>{f}: {r}</span>
              ))}
            </div>
            <div style={{marginTop:10,fontSize:11,color:'#94a3b8',lineHeight:1.5}}>
              {tipo==='dp'?'ΔP transmitter: HP al fondo, LP al vapor/atmósfera. Supresión/elevación via HART digital.':
               tipo==='bubbler'?'Burbujeo: aire constante ~150 L/h (rotámetro+regulador). Ideal para líquidos corrosivos, viscosos o con sólidos. NO para fluidos que reaccionen con el aire.':
               'Sensor piezoresistivo sumergido en cápsula sellada. Puente Wheatstone en aceite de silicona. P = h·ρ·g. Exactitud ±0.25%.'}
            </div>
          </div>
        </div>
        <div>
          <div className="card">
            <div className="card-h">Diagrama — {tipo==='dp'?'Transmisor ΔP':tipo==='bubbler'?'Sistema Burbujeo':'Sensor sumergido'}</div>
            <svg width="100%" viewBox="0 0 280 270">
              <rect x="60" y="20" width="140" height="200" rx="6" fill="#0f1729" stroke="#1e2d4a" strokeWidth="2"/>
              <rect x="62" y={20+(200*(1-h/10))} width="136" height={200*h/10} rx="3" fill="#3b82f622"/>
              <line x1="60" y1={20+(200*(1-h/10))} x2="200" y2={20+(200*(1-h/10))} stroke="#3b82f6" strokeWidth="1.5" strokeDasharray="4,3"/>
              <line x1="210" y1={20+(200*(1-h/10))} x2="210" y2="220" stroke="#f59e0b" strokeWidth="1"/>
              <text x="222" y={20+(200*(1-h/10))+(200*h/10)/2} fill="#f59e0b" fontSize="10" fontWeight="bold">h={h.toFixed(1)}m</text>
              {tipo==='dp'&&(<>
                <rect x="8" y="200" width="52" height="36" rx="4" fill="#0d1425" stroke="#22c55e55"/>
                <text x="34" y="213" textAnchor="middle" fill="#22c55e" fontSize="8">ΔP Tx</text>
                <text x="34" y="226" textAnchor="middle" fill="#fcd34d" fontSize="9" fontWeight="bold">{mbar} mb</text>
                <line x1="60" y1="218" x2="60" y2="218" stroke="#22c55e" strokeWidth="0"/>
                <line x1="60" y1="218" x2="60" y2="218" stroke="#22c55e" strokeWidth="0"/>
                <line x1="8" y1="218" x2="60" y2="218" stroke="#22c55e" strokeWidth="2"/>
                <line x1="60" y1="28" x2="8" y2="28" stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="4,3"/>
                <text x="65" y="25" fill="#94a3b8" fontSize="8">LP (atm)</text>
                <text x="65" y="215" fill="#22c55e" fontSize="8">HP</text>
                <text x="34" y="248" textAnchor="middle" fill="#64748b" fontSize="8">4–20 mA HART</text>
              </>)}
              {tipo==='bubbler'&&(<>
                <rect x="8" y="8" width="46" height="30" rx="4" fill="#0d1425" stroke="#3b82f655"/>
                <text x="31" y="20" textAnchor="middle" fill="#3b82f6" fontSize="7">Aire</text>
                <text x="31" y="30" textAnchor="middle" fill="#64748b" fontSize="7">150 L/h</text>
                <rect x="8" y="55" width="46" height="28" rx="4" fill="#0d1425" stroke="#f59e0b55"/>
                <text x="31" y="67" textAnchor="middle" fill="#f59e0b" fontSize="7">Manóm.</text>
                <text x="31" y="77" textAnchor="middle" fill="#fcd34d" fontSize="8">{mbar}mb</text>
                <line x1="31" y1="38" x2="31" y2="55" stroke="#f59e0b" strokeWidth="1.5"/>
                <line x1="31" y1="38" x2="60" y2="38" stroke="#3b82f6" strokeWidth="2"/>
                <line x1="60" y1="38" x2="60" y2="218" stroke="#3b82f6" strokeWidth="2"/>
                {[0,1,2].map(i=><circle key={i} cx={62+i*9} cy={216-i*18} r="3" fill="none" stroke="#3b82f666" strokeWidth="1"/>)}
                <text x="130" y="258" textAnchor="middle" fill="#64748b" fontSize="8">Tubo sumergido → P = h·ρ·g en manómetro</text>
              </>)}
              {tipo==='sub'&&(<>
                <rect x="108" y="205" width="44" height="20" rx="5" fill="#f97316" stroke="#f97316" strokeWidth="1.5"/>
                <text x="130" y="218" textAnchor="middle" fill="#fff" fontSize="8">Sensor piezores.</text>
                <line x1="130" y1="200" x2="130" y2={20+(200*(1-h/10))+10} stroke="#94a3b8" strokeWidth="1.5"/>
                <rect x="8" y="18" width="52" height="34" rx="4" fill="#0d1425" stroke="#f97316aa"/>
                <text x="34" y="31" textAnchor="middle" fill="#f97316" fontSize="8">Transmisor</text>
                <text x="34" y="43" textAnchor="middle" fill="#fcd34d" fontSize="9">{mbar}mb</text>
                <line x1="108" y1="215" x2="60" y2="35" stroke="#f97316" strokeWidth="1.5" strokeDasharray="3,2"/>

  {q:'El HTG con dos transmisores de presión a distancia fija puede calcular simultáneamente:',opts:['Nivel, densidad del líquido Y masa con exactitud ±0.01%','Solo el nivel con exactitud ±0.1%','Solo la densidad del líquido','El perfil de temperatura en el tanque'],ans:0,exp:'ρ = (P₁−P₂)/(h·g); Nivel = (P₁−Pₛ)/(ρ·g); Masa = (P₁−Pₛ)×Área_media. El sistema híbrido con radar añade volumen para inventario fiscal.'},
  {q:'Las paletas rotativas detectan nivel de sólidos cuando:',opts:['El material inmoviliza las paletas → el cuerpo del motor rota y activa microswitches','Las paletas vibran en resonancia con el material','El material cambia la capacitancia del rotor','El material bloquea la señal de radar'],ans:0,exp:'Motor síncrono de baja velocidad. Al bloquear las paletas, el motor (libre para girar) rota el cuerpo del instrumento activando microswitches. Un muelle devuelve al retroceder el nivel.'},
  {q:'¿Cuál instrumento de nivel es completamente independiente de temperatura, presión, vapor y dieléctrico del líquido?',opts:['Medidor láser (TOF o por fase)','Radar FMCW','Ultrasonidos con compensación de temperatura','Capacitivo RF bien calibrado'],ans:0,exp:'El láser (TOF/fase) usa la velocidad de la luz (c = constante). No interactúa con propiedades fisicoquímicas del medio. Divergencia 0.2°, pasa por aperturas de 50 mm. Inmune a reflexiones de agitadores.'},
];

function Scene8(){
  const [idx,setIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const [answers,setAnswers]=useState([]);
  const q=QS[idx];
  const choose=(i)=>{if(sel!==null)return;setSel(i);const ok=i===q.ans;if(ok)setScore(s=>s+1);setAnswers(a=>[...a,ok]);};
  const next=()=>{if(idx<QS.length-1){setIdx(i=>i+1);setSel(null);}else setDone(true);};
  const restart=()=>{setIdx(0);setSel(null);setScore(0);setDone(false);setAnswers([]);};
  if(done){
    const pct=Math.round(score/QS.length*100);
    return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:500}}>
      <div style={{fontSize:60,marginBottom:12}}>{pct>=80?'🏆':pct>=60?'📊':'📚'}</div>
      <div style={{fontSize:26,fontWeight:700,color:'#f59e0b',marginBottom:4}}>{score}/{QS.length} — {pct}%</div>
      <div style={{fontSize:14,color:'#94a3b8',marginBottom:20}}>{pct>=80?'¡Dominas la medición de nivel industrial!':pct>=60?'Buen nivel — repasa HTG y GWR':'Revisa los principios hidrostáticos y sin contacto'}</div>
      <div style={{display:'flex',gap:5,marginBottom:20}}>{answers.map((ok,i)=><div key={i} style={{width:26,height:26,borderRadius:4,background:ok?'#14532d':'#7f1d1d',border:`1px solid ${ok?'#22c55e':'#ef4444'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>{ok?'✓':'✗'}</div>)}</div>
      <button className="btn btn-gold" onClick={restart}>Reiniciar Quiz</button>
    </div>);
  }
  return(<div>
    <div className="sec-title">Quiz — Medición de Nivel</div>
    <div className="sec-sub">10 preguntas sobre principios directos, hidrostáticos, sin contacto y sólidos</div>
    <div style={{display:'flex',gap:4,marginBottom:12}}>{QS.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<idx?'#f59e0b':i===idx?'#f59e0b88':'#1e2d4a'}}/>)}</div>
    <div className="card" style={{marginBottom:8,minHeight:72}}>
      <div style={{fontSize:11,color:'#64748b',marginBottom:6}}>Pregunta {idx+1} de {QS.length}</div>
      <div style={{fontSize:15,fontWeight:600,color:'#e2e8f0',lineHeight:1.5}}>{q.q}</div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:8}}>
      {q.opts.map((o,i)=>{
        let cls='quiz-opt';
        if(sel!==null){if(i===q.ans)cls+=' correct';else if(i===sel)cls+=' wrong';}
        return(<div key={i} className={cls} onClick={()=>choose(i)}>
          <div style={{width:22,height:22,borderRadius:'50%',background:'#1e2d4a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{String.fromCharCode(65+i)}</div>
          <span style={{fontSize:12}}>{o}</span>
        </div>);
      })}
    </div>
    {sel!==null&&(<div className="card" style={{background:'#060a14',borderColor:'#f59e0b33',marginBottom:8}}>
      <div style={{fontSize:11,color:'#fcd34d',marginBottom:2}}>💡 {sel===q.ans?'¡Correcto!':'Incorrecto'}</div>
      <div style={{fontSize:12,color:'#cbd5e1'}}>{q.exp}</div>
    </div>)}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontSize:12,color:'#64748b'}}>Puntuación: <b className="gold">{score}</b></span>
      {sel!==null&&<button className="btn btn-gold" onClick={next}>{idx<QS.length-1?'Siguiente →':'Ver resultados'}</button>}
    </div>
  </div>);
}

const SCENES=[
  {id:1,label:'1. Medida Directa',short:'Directa'},
  {id:2,label:'2. Presión Hidrostática',short:'Hidrost.'},
  {id:3,label:'3. Supresión/Interfase',short:'Sup/Iface'},
  {id:4,label:'4. Capacitivo/Desplaz.',short:'Cap/Despl'},
  {id:5,label:'5. Ultrasonidos/Radar',short:'US/Radar'},
  {id:6,label:'6. Radiación/Láser/HTG',short:'Rad/HTG'},
  {id:7,label:'7. Nivel de Sólidos',short:'Sólidos'},
  {id:8,label:'8. Quiz',short:'Quiz'},
];
const SC={1:<Scene1/>,2:<Scene2/>,3:<Scene3/>,4:<Scene4/>,5:<Scene5/>,6:<Scene6/>,7:<Scene7/>,8:<Scene8/>};

function App(){
  const [scene,setScene]=useState(1);
  return(<div className="slide">
    <div className="topbar">
      <div>
        <div className="topbar-title">Medición de Nivel</div>
        <div className="topbar-sub">Clase 2.3 · Directa · Hidrostática · Sin contacto · Sólidos — 8 tecnologías principales</div>
      </div>
      <div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end'}}>
        {SCENES.map(s=>(
          <button key={s.id} onClick={()=>setScene(s.id)} className="scene-badge"
            style={{background:scene===s.id?'#f59e0b22':'transparent',borderColor:scene===s.id?'#f59e0b':'#1e2d4a',color:scene===s.id?'#f59e0b':'#475569'}}>
            {s.short}
          </button>
        ))}
      </div>
    </div>
    <div className="content">
      <div className="sidebar">
        <div style={{padding:'8px 12px 4px',fontSize:9,color:'#334155',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700}}>Contenido</div>
        {SCENES.map(s=>(
          <div key={s.id} className={`nav-item${scene===s.id?' active':''}`} onClick={()=>setScene(s.id)}>{s.label}</div>
        ))}
        <div style={{marginTop:'auto',padding:'10px 12px',borderTop:'1px solid #1e2d4a'}}>
          <div style={{fontSize:9,color:'#334155',marginBottom:4}}>NORMAS</div>
          {['ISA-5.1-2022','API MPMS Cap. 3','IEC 61511','OIML R 85','ISO 4267'].map(n=>(
            <div key={n} style={{fontSize:9,color:'#475569',padding:'2px 0'}}>{n}</div>
          ))}
        </div>
      </div>
      <div className="main">{SC[scene]}</div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
