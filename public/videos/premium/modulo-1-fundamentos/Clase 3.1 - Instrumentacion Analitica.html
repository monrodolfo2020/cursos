<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clase 3.1 – Instrumentación Analítica</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:#080c18;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.gold{color:#f59e0b;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:linear-gradient(135deg,#0f1729,#1a2540);border-bottom:2px solid #f59e0b;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:#f59e0b;}
.topbar-sub{font-size:11px;color:#94a3b8;}
.scene-badge{background:#f59e0b22;border:1px solid #f59e0b55;color:#f59e0b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;cursor:pointer;}
.content{flex:1;display:flex;overflow:hidden;}
.sidebar{width:210px;background:#0d1425;border-right:1px solid #1e2d4a;padding:12px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.nav-item{padding:7px 12px;cursor:pointer;font-size:11px;color:#64748b;border-left:3px solid transparent;transition:all .2s;line-height:1.3;}
.nav-item:hover{color:#cbd5e1;background:#ffffff08;}
.nav-item.active{color:#f59e0b;border-left-color:#f59e0b;background:#f59e0b10;font-weight:600;}
.main{flex:1;padding:16px 22px;overflow-y:auto;overflow-x:hidden;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:#0d1425;}
.main::-webkit-scrollbar-thumb{background:#f59e0b44;border-radius:2px;}
.sec-title{font-size:20px;font-weight:700;color:#f59e0b;margin-bottom:3px;}
.sec-sub{font-size:11px;color:#64748b;margin-bottom:12px;}
.card{background:#0d1425;border:1px solid #1e2d4a;border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-h{font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.formula-box{background:#060a14;border:1px solid #f59e0b33;border-radius:7px;padding:9px 13px;font-family:monospace;font-size:13px;color:#fcd34d;text-align:center;margin:7px 0;}
.btn-gold{background:#f59e0b;color:#080c18;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;}
.btn-gold:hover{background:#d97706;}
.btn-outline{background:transparent;border:1px solid #f59e0b55;color:#f59e0b;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;}
.btn-outline:hover{background:#f59e0b22;}
.btn-outline.active{background:#f59e0b33;border-color:#f59e0b;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#1e2d4a;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#f59e0b;border-radius:50%;cursor:pointer;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#0f1729;color:#f59e0b;padding:6px 9px;text-align:left;border-bottom:1px solid #1e2d4a;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
td{padding:5px 9px;border-bottom:1px solid #0f1729;color:#cbd5e1;}
tr:hover td{background:#ffffff05;}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin:2px;}
.tag-blue{background:#1e40af44;color:#93c5fd;border:1px solid #1e40af66;}
.tag-green{background:#14532d44;color:#86efac;border:1px solid #14532d66;}
.pill{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.pill-green{background:#14532d55;color:#86efac;border:1px solid #22c55e44;}
.meter-bar{height:12px;background:#0f1729;border-radius:6px;overflow:hidden;margin:4px 0;}
.meter-fill{height:100%;border-radius:6px;transition:width .4s;}
.quiz-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;border:1px solid #1e2d4a;cursor:pointer;margin:4px 0;font-size:12px;transition:all .15s;}
.quiz-opt:hover{border-color:#f59e0b55;background:#f59e0b08;}
.quiz-opt.correct{border-color:#22c55e;background:#14532d33;color:#86efac;}
.quiz-opt.wrong{border-color:#ef4444;background:#7f1d1d33;color:#fca5a5;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ── SCENE 1: pH — Nernst + ISFET ────────────────────────── */
function Scene1(){
  const [pH,setPH]=useState(7.0);
  const [temp,setTemp]=useState(25);
  const [mode,setMode]=useState('glass');
  const S=(0.0001984*(temp+273.15));
  const E=(0.2-S*pH).toFixed(4);
  const color=(v)=>{if(v<3)return'#ef4444';if(v<6)return'#f97316';if(v<7)return'#eab308';if(v===7)return'#22c55e';if(v<9)return'#3b82f6';return'#8b5cf6';};
  const label=(v)=>{if(v<2)return'Ácido fuerte';if(v<4)return'Ácido moderado';if(v<6)return'Ácido débil';if(v<7.5)return'Neutro';if(v<9)return'Base débil';if(v<11)return'Base moderada';return'Base fuerte';};
  const pHColors=['#dc2626','#ea580c','#f97316','#fb923c','#facc15','#a3e635','#22c55e','#22c55e','#34d399','#3b82f6','#60a5fa','#818cf8','#8b5cf6','#7c3aed','#6d28d9'];
  return(<div>
    <div className="sec-title">Medición de pH</div>
    <div className="sec-sub">Electrodo de vidrio · Ecuación de Nernst · ISFET · Compensación de temperatura · ASTM E70</div>
    <div style={{display:'flex',gap:6,marginBottom:10}}>
      {[['glass','Electrodo de vidrio'],['isfet','ISFET (estado sólido)']].map(([k,v])=>(
        <button key={k} className={`btn-outline${mode===k?' active':''}`} onClick={()=>setMode(k)}>{v}</button>
      ))}
    </div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">{mode==='glass'?'Electrodo de vidrio — Principio':'ISFET — Ion Sensitive FET'}</div>
          <svg width="100%" viewBox="0 0 300 195">
            {mode==='glass'&&(<>
              <rect x="50" y="55" width="200" height="120" rx="8" fill="#0f1729" stroke="#1e2d4a"/>
              <rect x="51" y="56" width="198" height="118" rx="7" fill={color(pH)+'18'}/>
              <rect x="108" y="18" width="20" height="98" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
              <ellipse cx="118" cy="118" rx="10" ry="8" fill="#60a5fa" stroke="#3b82f6"/>
              <text x="142" y="75" fill="#93c5fd" fontSize="9">Electrodo vidrio</text>
              <text x="142" y="85" fill="#93c5fd" fontSize="8">(H⁺ sensible)</text>
              <rect x="158" y="18" width="16" height="93" rx="3" fill="#1a2540" stroke="#f59e0b"/>
              <line x1="166" y1="111" x2="166" y2="118" stroke="#f59e0b" strokeWidth="1.5"/>
              <text x="178" y="70" fill="#fcd34d" fontSize="9">Ref. Ag/AgCl</text>
              <rect x="78" y="8" width="50" height="26" rx="4" fill="#0d1425" stroke="#f59e0b55"/>
              <text x="103" y="20" textAnchor="middle" fill="#f59e0b" fontSize="10" fontWeight="bold">{(parseFloat(E)*1000).toFixed(0)} mV</text>
              <text x="103" y="30" textAnchor="middle" fill="#64748b" fontSize="8">Potencial</text>
              <line x1="118" y1="18" x2="118" y2="8" stroke="#3b82f6" strokeWidth="1.5"/>
              <line x1="166" y1="18" x2="166" y2="8" stroke="#f59e0b" strokeWidth="1.5"/>
              <line x1="78" y1="21" x2="118" y2="8" stroke="#3b82f6" strokeWidth="1" strokeDasharray="3,2"/>
              <line x1="128" y1="21" x2="166" y2="8" stroke="#f59e0b" strokeWidth="1" strokeDasharray="3,2"/>
              <text x="150" y="148" textAnchor="middle" fill={color(pH)} fontSize="24" fontWeight="bold">pH {pH.toFixed(1)}</text>
              <text x="150" y="163" textAnchor="middle" fill="#94a3b8" fontSize="11">{label(pH)}</text>
            </>)}
            {mode==='isfet'&&(<>
              <rect x="40" y="60" width="220" height="110" rx="8" fill="#0f1729" stroke="#a78bfa"/>
              <rect x="100" y="80" width="100" height="50" rx="4" fill="#1a2540" stroke="#a78bfa" strokeWidth="1.5"/>
              <text x="150" y="100" textAnchor="middle" fill="#a78bfa" fontSize="9">Gate: SiO₂/Si₃N₄</text>
              <text x="150" y="112" textAnchor="middle" fill="#64748b" fontSize="8">(sensible a H⁺)</text>
              <rect x="60" y="90" width="40" height="30" rx="3" fill="#14532d44" stroke="#22c55e"/>
              <text x="80" y="108" textAnchor="middle" fill="#22c55e" fontSize="8">Source</text>
              <rect x="200" y="90" width="40" height="30" rx="3" fill="#7f1d1d44" stroke="#ef4444"/>
              <text x="220" y="108" textAnchor="middle" fill="#ef4444" fontSize="8">Drain</text>
              <rect x="120" y="55" width="60" height="20" rx="3" fill="#3b82f644" stroke="#3b82f6"/>
              <text x="150" y="68" textAnchor="middle" fill="#93c5fd" fontSize="8">Ref. electrode</text>
              <text x="150" y="155" textAnchor="middle" fill="#a78bfa" fontSize="11" fontWeight="bold">pH {pH.toFixed(1)} → V_T</text>
              <text x="150" y="170" textAnchor="middle" fill="#64748b" fontSize="9">Señal baja impedancia — sin ruptura vidrio</text>
              <text x="80" y="175" textAnchor="middle" fill="#94a3b8" fontSize="8">ISFET: V = E_ref − 2ψ₀ + ψ_sol − φSi</text>
            </>)}
          </svg>
          <div style={{margin:'6px 0'}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginBottom:4}}>
              <span>pH: <b style={{color:color(pH)}}>{pH.toFixed(1)} — {label(pH)}</b></span>
              <span>T: <b className="gold">{temp}°C</b></span>
            </div>
            <input type="range" min="0" max="14" step="0.1" value={pH} onChange={e=>setPH(+e.target.value)}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#475569',marginTop:2,marginBottom:8}}>
              <span>0 Ácido</span><span>7 Neutro</span><span>14 Base</span>
            </div>
            <input type="range" min="0" max="100" step="1" value={temp} onChange={e=>setTemp(+e.target.value)}/>
            <div style={{textAlign:'center',fontSize:10,color:'#64748b',marginTop:2}}>Temperatura: {temp}°C</div>
          </div>
          <div style={{display:'flex',height:14,borderRadius:4,overflow:'hidden',marginTop:6}}>
            {pHColors.map((c,i)=><div key={i} style={{flex:1,background:c}}/>)}
          </div>
        </div>
      </div>
      <div>
        <div className="card" style={{marginBottom:8}}>
          <div className="card-h">Ecuación de Nernst</div>
          <div className="formula-box">E = E₀ − S · pH</div>
          <div className="formula-box" style={{fontSize:11}}>S = R·T / (n·F) · ln(10) ≈ {(S*1000).toFixed(2)} mV/pH @ {temp}°C</div>
          <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.6,marginTop:6}}>
            <b style={{color:'#cbd5e1'}}>E</b> = {E} V &nbsp; <b style={{color:'#cbd5e1'}}>S</b> = {(S*1000).toFixed(2)} mV/pH<br/>
            Teórico @ 25°C: <b className="gold">59.16 mV/pH</b><br/>
            El potencial de asimetría (pocas mV) se corrige ajustando el "punto isopotencial".
          </div>
        </div>
        <div className="card" style={{marginBottom:8}}>
          <div className="card-h">Comparativa: Vidrio vs ISFET</div>
          <table>
            <thead><tr><th>Característica</th><th>Vidrio</th><th>ISFET</th></tr></thead>
            <tbody>{[
              ['Fragilidad','Alta (vidrio)','Prácticamente irrompible'],
              ['Impedancia salida','Alta (MΩ)','Baja (amplif. integrado)'],
              ['Respuesta','~5–30 s','<5 s'],
              ['Exactitud','±0.01–0.2 pH','±0.01 pH / ±0.1%'],
              ['Líquidos sucios','Dificultad (coating)','Mejor desempeño'],
              ['Referencia','Interna + ext.','Externa reemplazable'],
            ].map(([p,v,i],j)=>(
              <tr key={j}><td style={{color:'#64748b'}}>{p}</td><td style={{color:'#60a5fa'}}>{v}</td><td style={{color:'#a78bfa'}}>{i}</td></tr>
            ))}</tbody>
          </table>
        </div>
        <div className="card">
          <div className="card-h">Aplicaciones pH en industria</div>
          <table>
            <thead><tr><th>Proceso</th><th>pH típico</th><th>Norma</th></tr></thead>
            <tbody>{[
              ['Agua potable','6.5–8.5','WHO 2022 / EPA'],
              ['Efluente industrial','6.0–9.0','Regulación local'],
              ['Fermentación bio','4–7','FDA 21 CFR'],
              ['Pasta de papel (kraft)','9–12','Control blanqueado'],
              ['Neutralización ácidos','7 ± 0.5','ISO 14001'],
            ].map(([a,b,c],i)=><tr key={i}><td>{a}</td><td style={{color:'#fcd34d'}}>{b}</td><td style={{color:'#94a3b8'}}>{c}</td></tr>)}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 2: Redox / ORP ─────────────────────────────────── */
function Scene2(){
  const [orp,setOrp]=useState(200); // mV
  const [reduct,setReduct]=useState(50); // % reductor
  const oxid=100-reduct;
  const label=(v)=>{if(v<-200)return'Fuertemente reductor';if(v<0)return'Reductor';if(v<100)return'Levemente oxidante';if(v<400)return'Oxidante';return'Fuertemente oxidante';};
  const color=(v)=>{if(v<0)return'#22c55e';if(v<200)return'#eab308';return'#ef4444';};
  return(<div>
    <div className="sec-title">Potencial Redox / ORP</div>
    <div className="sec-sub">Potencial de oxidación-reducción — Electrodo de platino — Aplicaciones en desinfección y control de procesos</div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">Principio — Electrodo de Platino</div>
          <p style={{fontSize:12,color:'#94a3b8',lineHeight:1.6,marginBottom:8}}>
            Mide el potencial electrónico de equilibrio entre especies oxidadas y reducidas en solución. Un electrodo de metal noble (Pt o Au) + electrodo de referencia (Ag/AgCl). El potencial indica la <b style={{color:'#fcd34d'}}>capacidad relativa</b> de reaccionar con oxidantes/reductores. La misma electrónica que el pH (amplificador de alta impedancia).
          </p>
          <div className="formula-box">ORP = Eh − E₀ = −(RT/nF)·ln([ox]/[red])</div>
          <div className="formula-box" style={{fontSize:11}}>
            Ref. Ag/AgCl 4N KCl: E₀ = −0.199 V &nbsp; | &nbsp; Calomel sat.: E₀ = +0.244 V
          </div>
          <div style={{margin:'10px 0'}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginBottom:4}}>
              <span>ORP: <b style={{color:color(orp)}}>{orp} mV ({label(orp)})</b></span>
            </div>
            <input type="range" min="-500" max="800" step="5" value={orp} onChange={e=>setOrp(+e.target.value)}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#475569',marginTop:2}}>
              <span>−500 mV (reductor)</span><span>0</span><span>+800 mV (oxidante)</span>
            </div>
          </div>
          <div style={{background:'#060a14',borderRadius:8,padding:10,marginTop:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
              <span style={{color:'#94a3b8'}}>Potencial medido:</span>
              <span style={{color:color(orp),fontWeight:700,fontSize:16}}>{orp} mV</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginTop:4}}>
              <span style={{color:'#94a3b8'}}>Estado:</span>
              <span style={{color:color(orp)}}>{label(orp)}</span>
            </div>
            <div style={{fontSize:10,color:'#64748b',marginTop:6}}>Exactitud: ±1 mV | Electrodo Pt o Au | Ag/AgCl referencia</div>
          </div>
        </div>
      </div>
      <div>
        <div className="card" style={{marginBottom:8}}>
          <div className="card-h">Diagrama — Celda de medición Redox</div>
          <svg width="100%" viewBox="0 0 280 200">
            <rect x="50" y="40" width="170" height="130" rx="8" fill="#0f1729" stroke="#1e2d4a" strokeWidth="2"/>
            <rect x="52" y="42" width="166" height="128" rx="7" fill={color(orp)+'12'}/>
            {/* Pt electrode */}
            <rect x="100" y="20" width="14" height="100" rx="3" fill="#94a3b8" stroke="#e2e8f0" strokeWidth="1.5"/>
            <text x="107" y="140" textAnchor="middle" fill="#94a3b8" fontSize="9">Pt</text>
            {/* Reference */}
            <rect x="148" y="20" width="14" height="90" rx="3" fill="#1a2540" stroke="#f59e0b" strokeWidth="1.5"/>
            <text x="155" y="130" textAnchor="middle" fill="#f59e0b" fontSize="8">Ref</text>
            <text x="155" y="140" textAnchor="middle" fill="#f59e0b" fontSize="7">Ag/AgCl</text>
            {/* mV meter */}
            <rect x="78" y="8" width="52" height="26" rx="4" fill="#060a14" stroke="#f59e0b55"/>
            <text x="104" y="20" textAnchor="middle" fill={color(orp)} fontSize="11" fontWeight="bold">{orp} mV</text>
            <text x="104" y="30" textAnchor="middle" fill="#64748b" fontSize="8">ORP</text>
            <line x1="107" y1="20" x2="107" y2="8" stroke="#94a3b8" strokeWidth="1.5"/>
            <line x1="155" y1="20" x2="155" y2="8" stroke="#f59e0b" strokeWidth="1.5"/>
            <line x1="78" y1="21" x2="107" y2="8" stroke="#94a3b8" strokeWidth="1" strokeDasharray="3,2"/>
            <line x1="130" y1="21" x2="155" y2="8" stroke="#f59e0b" strokeWidth="1" strokeDasharray="3,2"/>
            <text x="135" y="100" textAnchor="middle" fill={color(orp)} fontSize="12" fontWeight="bold">{orp} mV</text>
            <text x="135" y="115" textAnchor="middle" fill="#64748b" fontSize="9">{label(orp)}</text>
          </svg>
        </div>
        <div className="card">
          <div className="card-h">Valores ORP típicos por proceso</div>
          <table>
            <thead><tr><th>Proceso</th><th>ORP (mV)</th><th>Interpretación</th></tr></thead>
            <tbody>{[
              ['Cloración de agua potable','+600 a +800','Desinfección efectiva'],
              ['Agua de piscinas','+650 a +750','Control Cl₂ activo'],
              ['Planta de depuración aneróbica','−200 a −400','Actividad metanogénica'],
              ['Fermentación aeróbica','+100 a +300','O₂ disponible'],
              ['Oxidación de cianuro','+600 a +800','Destrucción completa'],
              ['Reducción de Cr⁶⁺ a Cr³⁺','0 a −200','Cr⁶⁺ tóxico → Cr³⁺'],
              ['Agua ultra-pura (semicon.)','+200 a +400','Monitoreo pureza'],
            ].map(([p,v,i],j)=>(
              <tr key={j}><td style={{fontSize:10}}>{p}</td><td style={{color:'#fcd34d',fontWeight:600}}>{v}</td><td style={{color:'#94a3b8',fontSize:10}}>{i}</td></tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  </div>);
}

/* ── SCENE 3: Conductividad ───────────────────────────────── */
function Scene3(){
  const [conc,setConc]=useState(500);
  const [method,setMethod]=useState('2e');
  const cond=(conc*2.0).toFixed(0);
  const res=conc>0?(1e6/(conc*2.0)).toFixed(1):'>∞';
  return(<div>
    <div className="sec-title">Medición de Conductividad</div>
    <div className="sec-sub">2 electrodos · 4 electrodos · Toroidal inductivo — σ [μS/cm] — ASTM D1125</div>
    <div style={{display:'flex',gap:6,marginBottom:10}}>
      {[['2e','2 Electrodos'],['4e','4 Electrodos'],['tor','Toroidal (inductivo)']].map(([k,v])=>(
        <button key={k} className={`btn-outline${method===k?' active':''}`} onClick={()=>setMethod(k)}>{v}</button>
      ))}
    </div>
    <div className="grid2">
      <div>
        <div className="card">
          <div className="card-h">Principio — {method==='2e'?'2 Electrodos':method==='4e'?'4 Electrodos':'Sensor Toroidal'}</div>
          <svg width="100%" viewBox="0 0 300 175">
            {method==='2e'&&(<>
              <rect x="40" y="30" width="220" height="115" rx="6" fill="#0f1729" stroke="#1e2d4a"/>
              <rect x="42" y="32" width="216" height="111" rx="5" fill={`hsl(200,60%,${Math.min(35,3+conc/180)}%)`} opacity="0.35"/>
              <rect x="90" y="38" width="14" height="100" rx="3" fill="#1e3a5f" stroke="#60a5fa" strokeWidth="2"/>
              <rect x="196" y="38" width="14" height="100" rx="3" fill="#1e3a5f" stroke="#60a5fa" strokeWidth="2"/>
              {[55,75,95,115].map(y=>(
                <line key={y} x1="104" y1={y} x2="196" y2={y} stroke="#22c55e" strokeWidth="1" opacity="0.5" strokeDasharray="4,3"/>
              ))}
              <text x="150" y="95" textAnchor="middle" fill="#22c55e" fontSize="14" fontWeight="bold">{cond} μS/cm</text>
              <text x="97" y="155" textAnchor="middle" fill="#60a5fa" fontSize="8">I+</text>

/* ── SCENE 4: Turbidez y OD ──────────────────────────────── */

  // Polymer sensor formula

  {q:'¿Qué ecuación describe el principio del electrodo de pH de vidrio?',opts:['Ecuación de Nernst: E = E₀ − S·pH, S ≈ 59.16 mV/pH @ 25°C','Ley de Ohm','Ecuación de Bernoulli','Ley de Beer-Lambert'],ans:0,exp:'El electrodo de vidrio genera un potencial según Nernst. La sensibilidad S = (RT/nF)·ln10 varía linealmente con la temperatura absoluta.'},
  {q:'El ISFET (Ion Sensitive FET) mide pH generando:',opts:['Una señal de baja impedancia directamente en el gate del FET — sin necesidad de vidrio frágil','Un potencial en un electrodo de vidrio especial','Una corriente proporcional al pH vía electrolito','Una diferencia de presión entre dos cámaras'],ans:0,exp:'El ISFET usa una compuerta (gate) de SiO₂ o Si₃N₄ sensible a H⁺. La señal de baja impedancia es más robusta y rápida que el electrodo de vidrio clásico.'},
  {q:'El potencial Redox (ORP) indica:',opts:['La capacidad relativa del medio de oxidar o reducir otras sustancias','El contenido de oxígeno disuelto en mg/L','La concentración de iones H⁺','La conductividad eléctrica de la solución'],ans:0,exp:'ORP = Eh−E₀ = −(RT/nF)·ln([ox]/[red]). Un ORP de +650 mV indica fuertemente oxidante (desinfección con Cl₂). −300 mV indica condiciones anaeróbicas.'},
  {q:'El sensor de conductividad toroidal (inductivo) tiene ventaja sobre el de electrodos porque:',opts:['Sin contacto electrónico con el proceso — inmune a incrustaciones, corrosión y polarización — rango 0–2000 mS/cm','Es más exacto en todos los rangos','Funciona solo con agua pura','Mide conductividad térmica, no eléctrica'],ans:0,exp:'Dos bobinas selladas en Teflón: una excita y otra recibe la corriente inducida en el líquido. Sin polarización ni depósitos. Rango 0–2.000.000 μS/cm.'},
  {q:'Un analizador NDIR mide gases basándose en:',opts:['Absorción de IR a longitud de onda específica de cada molécula (Beer-Lambert: A = ε·c·l)','Conductividad térmica del gas','Susceptibilidad paramagnética','Ionización en llama de H₂'],ans:0,exp:'NDIR (Non-Dispersive InfraRed): la celda muestra absorbe IR en λ específica del gas objetivo. La intensidad transmitida indica concentración via Beer-Lambert.'},
  {q:'El sensor de O₂ de cerámica de zirconio (ZrO₂) funciona a alta temperatura porque:',opts:['A 650°C el ZrO₂ conduce iones O²⁻ generando FEM proporcional a ln([O₂]ref/[O₂]muestra)','A alta temperatura el O₂ se ioniza fácilmente','El sensor paramagnético necesita alta temperatura para funcionar','El calor aumenta la conductividad eléctrica del O₂'],ans:0,exp:'La ecuación de Nernst para la celda electroquímica de ZrO₂: E=(RT/4F)·ln([O₂]ref/[O₂]muestra). Exactitud ±0.5%. Usado en calderas y hornos.'},
  {q:'La turbidez se mide preferentemente por nefelometría (90°) porque:',opts:['La señal aumenta con la turbidez y es más sensible en bajas concentraciones que la transmisión directa','La señal disminuye con la turbidez haciendo la lectura más intuitiva','Es el único método aceptado internacionalmente','No requiere fuente de luz'],ans:0,exp:'A 90° se mide la luz dispersada (Rayleigh/Mie). Para turbidez baja, la señal crece con la concentración de partículas — más sensible que medir la atenuación de la luz transmitida.'},
  {q:'El espejo refrigerado (Peltier) para punto de rocío es considerado método de referencia porque:',opts:['Mide directamente la temperatura a la que se condensa el vapor (definición física de punto de rocío) con exactitud ±0.2°C','Es el más económico','No requiere calibración','Funciona en cualquier gas sin corrección'],ans:0,exp:'Al enfriar el espejo de Pt pulido hasta que se detecta empañamiento (fotocélula), la T° del espejo = T° de rocío por definición termodinámica. Trazable a NIST/PTB.'},
  {q:'¿Por qué los sensores de oxígeno disuelto de fluorescencia (PSt3) son preferidos hoy?',opts:['No consumen O₂ en la medición, no requieren membrana y tienen larga vida útil','Son más baratos que la celda Clark','Miden tanto O₂ disuelto como CO₂','Son insensibles a la temperatura'],ans:0,exp:'La extinción de la fosforescencia del indicador Ru(II) o Pt(II)-porfirina por colisión con O₂ no consume moléculas de O₂ → sin agotamiento del electrolito. Exactitud ±0.1 mg/L.'},
  {q:'En cromatografía de gases, ¿qué permite calcular la concentración de un componente?',opts:['El área bajo el pico cromatográfico (proporcional a masa), mientras que el tR identifica el componente','La altura del pico solamente','El tiempo de retención (tR) identifica Y cuantifica a la vez','La temperatura de la columna durante la elución'],ans:0,exp:'tR (tiempo de retención) → identifica el compuesto comparando con estándares. Área del pico → cuantifica la concentración. La combinación tR + área es la base del análisis cromatográfico cuantitativo.'},
];

function Scene9(){
  const [idx,setIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const [answers,setAnswers]=useState([]);
  const q=QS[idx];
  const choose=(i)=>{if(sel!==null)return;setSel(i);const ok=i===q.ans;if(ok)setScore(s=>s+1);setAnswers(a=>[...a,ok]);};
  const next=()=>{if(idx<QS.length-1){setIdx(i=>i+1);setSel(null);}else setDone(true);};
  const restart=()=>{setIdx(0);setSel(null);setScore(0);setDone(false);setAnswers([]);};
  if(done){
    const pct=Math.round(score/QS.length*100);
    return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:500}}>
      <div style={{fontSize:60,marginBottom:12}}>{pct>=80?'🏆':pct>=60?'📊':'📚'}</div>
      <div style={{fontSize:26,fontWeight:700,color:'#f59e0b',marginBottom:4}}>{score}/{QS.length} — {pct}%</div>
      <div style={{fontSize:14,color:'#94a3b8',marginBottom:20}}>{pct>=80?'¡Dominas la instrumentación analítica industrial!':pct>=60?'Buen nivel — repasa sensores de gas y humedad':'Revisa principios electroquímicos y de absorción'}</div>
      <div style={{display:'flex',gap:5,marginBottom:20}}>{answers.map((ok,i)=><div key={i} style={{width:26,height:26,borderRadius:4,background:ok?'#14532d':'#7f1d1d',border:`1px solid ${ok?'#22c55e':'#ef4444'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>{ok?'✓':'✗'}</div>)}</div>
      <button className="btn-gold" onClick={restart}>Reiniciar Quiz</button>
    </div>);
  }
  return(<div>
    <div className="sec-title">Quiz — Instrumentación Analítica</div>
    <div className="sec-sub">10 preguntas: pH · ORP · Conductividad · Turbidez · OD · Gases · Humedad · GC</div>
    <div style={{display:'flex',gap:4,marginBottom:12}}>{QS.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<idx?'#f59e0b':i===idx?'#f59e0b88':'#1e2d4a'}}/>)}</div>
    <div className="card" style={{marginBottom:8,minHeight:72}}>
      <div style={{fontSize:11,color:'#64748b',marginBottom:6}}>Pregunta {idx+1} de {QS.length}</div>
      <div style={{fontSize:15,fontWeight:600,color:'#e2e8f0',lineHeight:1.5}}>{q.q}</div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:8}}>
      {q.opts.map((o,i)=>{
        let cls='quiz-opt';
        if(sel!==null){if(i===q.ans)cls+=' correct';else if(i===sel)cls+=' wrong';}
        return(<div key={i} className={cls} onClick={()=>choose(i)}>
          <div style={{width:22,height:22,borderRadius:'50%',background:'#1e2d4a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{String.fromCharCode(65+i)}</div>
          <span style={{fontSize:12}}>{o}</span>
        </div>);
      })}
    </div>
    {sel!==null&&(<div className="card" style={{background:'#060a14',borderColor:'#f59e0b33',marginBottom:8}}>
      <div style={{fontSize:11,color:'#fcd34d',marginBottom:2}}>💡 {sel===q.ans?'¡Correcto!':'Incorrecto'}</div>
      <div style={{fontSize:12,color:'#cbd5e1'}}>{q.exp}</div>
    </div>)}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontSize:12,color:'#64748b'}}>Puntuación: <b className="gold">{score}</b></span>
      {sel!==null&&<button className="btn-gold" onClick={next}>{idx<QS.length-1?'Siguiente →':'Ver resultados'}</button>}
    </div>
  </div>);
}

  {id:1,label:'1. pH — Nernst + ISFET',short:'pH'},

  {id:3,label:'3. Conductividad',short:'Cond.'},

            style={{background:scene===s.id?'#f59e0b22':'transparent',borderColor:scene===s.id?'#f59e0b':'#1e2d4a',color:scene===s.id?'#f59e0b':'#475569'}}>

    <div className="content">

          {['ASTM E70 (pH)','ASTM D1125 (Cond.)','ISO 7027 (Turb.)','EPA Method 360 (OD)','IEC 60746 (ORP)','ISO 10058 (Humedad)'].map(n=>(
